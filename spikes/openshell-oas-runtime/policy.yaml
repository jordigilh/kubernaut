version: 1

filesystem_policy:
  read_only: [/usr, /lib, /etc]
  read_write: [/sandbox, /tmp]

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  anthropic_api:
    name: anthropic-api
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/local/bin/oas-runtime
  kubernaut_mcp:
    name: kubernaut-mcp
    endpoints:
      - host: "*.svc.cluster.local"
        port: 8080
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/local/bin/oas-runtime
