apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: oomkill-increase-memory-v1
spec:
  # OOMKill Increase Memory Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Used by: FullPipeline E2E (execution.engine: job)
  version: "1.0.0"
  description:
    what: "Increases memory limits for pods experiencing OOMKill events"
    whenToUse: "When pods are OOMKilled due to insufficient memory limits"
    whenNotToUse: "When OOM is caused by a memory leak requiring code fix"
    preconditions: "Pod is managed by a Deployment or StatefulSet"
  
  actionType: IncreaseMemoryLimits
  
  labels:
    severity: [critical, high]
    environment: [production, staging, test]
    component: "*"
    priority: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/oomkill-increase-memory-job:v1.0.0-exec@sha256:d8c87f9e8b9692309863be7e06a1ec90feb711210982ecf31748c5fbfb513a6a
  
  parameters:
    - name: TARGET_RESOURCE_KIND
      type: string
      required: false
      description: "Kubernetes resource kind (Deployment, StatefulSet, DaemonSet). Falls back to TARGET_RESOURCE if not provided."
    - name: TARGET_RESOURCE_NAME
      type: string
      required: false
      description: "Name of the resource to patch. Falls back to TARGET_RESOURCE if not provided."
    - name: TARGET_NAMESPACE
      type: string
      required: false
      description: "Namespace of the resource. Falls back to TARGET_RESOURCE if not provided."
    - name: MEMORY_LIMIT_NEW
      type: string
      required: true
      description: "New memory limit to apply (e.g., 128Mi, 256Mi, 1Gi)"
