{{- include "kubernaut.monitoring.validate" . -}}
{{- $effectivenessmonitorOauth2 := include "kubernaut.fleet.oauth2" (dict "root" $ "svc" .Values.effectivenessmonitor.fleet.oauth2) | fromYaml }}
{{- $effectivenessmonitorFleet := include "kubernaut.fleet.config" (dict "root" $ "svc" .Values.effectivenessmonitor.fleet) | fromYaml }}
{{- if and .Values.effectivenessmonitor.fleet.enabled .Values.effectivenessmonitor.fleet.oauth2.enabled }}
{{- if not $effectivenessmonitorOauth2.tokenURL }}
{{- fail "effectivenessmonitor.fleet.oauth2.tokenURL is required when effectivenessmonitor.fleet.oauth2.enabled=true (set it directly, or set global.fleet.oauth2.tokenURL if shared across services)" }}
{{- end }}
{{- if not $effectivenessmonitorOauth2.credentialsSecretRef }}
{{- fail "effectivenessmonitor.fleet.oauth2.credentialsSecretRef is required when effectivenessmonitor.fleet.oauth2.enabled=true (Secret must contain keys: client-id, client-secret; set it directly, or set global.fleet.oauth2.credentialsSecretRef if shared across services)" }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: effectivenessmonitor-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: effectivenessmonitor
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  effectivenessmonitor.yaml: |
    logging:
      level: {{ .Values.effectivenessmonitor.logging.level | default "INFO" | quote }}
    assessment:
      stabilizationWindow: {{ .Values.effectivenessmonitor.config.assessment.stabilizationWindow | default "30s" }}
      validityWindow: {{ .Values.effectivenessmonitor.config.assessment.validityWindow | default "300s" }}
    datastorage:
      url: {{ include "kubernaut.datastorage.url" . }}
      timeout: 10s
      buffer:
        bufferSize: 100
        batchSize: 10
        flushInterval: 1s
        maxRetries: 3
    controller:
      metricsAddr: ":9090"
      healthProbeAddr: ":8081"
      leaderElection: false
      leaderElectionId: "effectivenessmonitor.kubernaut.ai"
    external:
      prometheusUrl: {{ include "kubernaut.monitoring.prometheus.url" . | default "" | quote }}
      prometheusEnabled: {{ if include "kubernaut.monitoring.prometheus.enabled" . }}true{{ else }}false{{ end }}
      alertManagerUrl: {{ include "kubernaut.monitoring.alertManager.url" . | default "" | quote }}
      alertManagerEnabled: {{ if include "kubernaut.monitoring.alertManager.enabled" . }}true{{ else }}false{{ end }}
      connectionTimeout: 10s
      {{- if include "kubernaut.monitoring.prometheus.tlsCaFile" . }}
      tlsCaFile: /etc/ssl/em/service-ca.crt
      {{- end }}
    {{- if .Values.effectivenessmonitor.fleet.enabled }}
    fleet:
      enabled: true
      mcpGatewayEndpoint: {{ $effectivenessmonitorFleet.mcpGatewayEndpoint | quote }}
      {{- if $effectivenessmonitorFleet.mcpGatewayType }}
      mcpGatewayType: {{ $effectivenessmonitorFleet.mcpGatewayType | quote }}
      {{- end }}
      tlsCAFile: {{ $effectivenessmonitorFleet.tlsCAFile | default (include "kubernaut.interServiceTLS.caFile" .) | quote }}
      {{- if .Values.effectivenessmonitor.fleet.oauth2.enabled }}
      oauth2:
        enabled: true
        tokenURL: {{ $effectivenessmonitorOauth2.tokenURL | quote }}
        credentialsSecretRef: {{ $effectivenessmonitorOauth2.credentialsSecretRef | quote }}
        {{- if $effectivenessmonitorOauth2.scopes }}
        scopes:
          {{- range $effectivenessmonitorOauth2.scopes }}
          - {{ . | quote }}
          {{- end }}
        {{- end }}
        tlsCAFile: {{ $effectivenessmonitorOauth2.tlsCAFile | default (include "kubernaut.interServiceTLS.caFile" .) | quote }}
      {{- end }}
    {{- end }}
{{/* DEPRECATED v1.4 (Issue #848): OCP service-ca inject-cabundle ConfigMap.
     Will be removed in v1.5 — use the Kubernaut Operator for OCP. */}}
{{- if include "kubernaut.monitoring.prometheus.tlsCaFile" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: effectivenessmonitor-service-ca
  namespace: {{ .Release.Namespace }}
  labels:
    app: effectivenessmonitor
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
data: {}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: effectivenessmonitor-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: effectivenessmonitor-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: effectivenessmonitor-controller
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["effectivenessassessments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["effectivenessassessments/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "persistentvolumeclaims", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  # ── Istio (#373) ────────────────────────────────────────────────────────
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies", "peerauthentications", "requestauthentications"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "destinationrules", "gateways", "serviceentries"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # controller-runtime leader election requires lease RBAC (#687)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- if eq $effectivenessmonitorFleet.mcpGatewayType "kuadrant" }}
  # BR-FLEET-054: EM's ClusterRegistry watches MCPServerRegistration CRs
  # directly via a dynamic informer when the Kuadrant MCP Gateway is used.
  - apiGroups: ["mcp.kuadrant.io"]
    resources: ["mcpserverregistrations"]
    verbs: ["get", "list", "watch"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: effectivenessmonitor-controller
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: effectivenessmonitor-controller
subjects:
  - kind: ServiceAccount
    name: effectivenessmonitor-controller
    namespace: {{ .Release.Namespace }}
---
# Issue #545: Bind to built-in view ClusterRole for broad read access to CRDs
# (cert-manager, Istio, etc.) needed for post-remediation hash capture (DD-EM-002).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: effectivenessmonitor-view
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: effectivenessmonitor-controller
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: effectivenessmonitor-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: effectivenessmonitor-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.effectivenessmonitor.replicas }}
  selector:
    matchLabels:
      app: effectivenessmonitor-controller
  template:
    metadata:
      labels:
        app: effectivenessmonitor-controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: effectivenessmonitor-controller
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.effectivenessmonitor | nindent 8 }}
      {{- include "kubernaut.affinity" .Values.effectivenessmonitor | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.effectivenessmonitor "global" .Values.global) | nindent 6 }}
      {{- if include "kubernaut.monitoring.prometheus.tlsCaFile" . }}
      initContainers:
        - name: wait-for-service-ca
          image: {{ .Values.effectivenessmonitor.initImage | default "registry.access.redhat.com/ubi10/ubi-minimal:latest" }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for service-ca.crt to be populated..."
              while [ ! -s /etc/ssl/em/service-ca.crt ]; do
                echo "  service-ca.crt not yet populated, retrying in 2s..."
                sleep 2
              done
              echo "service-ca.crt is available ($(wc -c < /etc/ssl/em/service-ca.crt) bytes)"
          volumeMounts:
            - name: service-ca
              mountPath: /etc/ssl/em
              readOnly: true
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.effectivenessmonitor | nindent 12 }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      {{- end }}
      containers:
        - name: controller
          image: {{ include "kubernaut.image" (dict "service" "effectivenessmonitor" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.effectivenessmonitor | nindent 12 }}
          args:
            - "--config=/etc/effectivenessmonitor/effectivenessmonitor.yaml"
          env:
            - name: TLS_CA_FILE
              value: {{ include "kubernaut.interServiceTLS.caFile" . | quote }}
          ports:
            - containerPort: 9090
              name: metrics
            - containerPort: 8081
              name: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/effectivenessmonitor
            {{- if include "kubernaut.monitoring.prometheus.tlsCaFile" . }}
            - name: service-ca
              mountPath: /etc/ssl/em
              readOnly: true
            {{- end }}
            - name: tls-ca
              mountPath: /etc/tls-ca
              readOnly: true
            {{- if and .Values.effectivenessmonitor.fleet.enabled .Values.effectivenessmonitor.fleet.oauth2.enabled }}
            - name: oauth2-credentials
              mountPath: "/etc/effectivenessmonitor/{{ $effectivenessmonitorOauth2.credentialsSecretRef }}"
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.effectivenessmonitor.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: effectivenessmonitor-config
        {{- if include "kubernaut.monitoring.prometheus.tlsCaFile" . }}
        - name: service-ca
          configMap:
            name: effectivenessmonitor-service-ca
        {{- end }}
        - name: tls-ca
          configMap:
            name: inter-service-ca
            optional: true
        {{- if and .Values.effectivenessmonitor.fleet.enabled .Values.effectivenessmonitor.fleet.oauth2.enabled }}
        - name: oauth2-credentials
          secret:
            secretName: {{ $effectivenessmonitorOauth2.credentialsSecretRef }}
        {{- end }}
{{/* DEPRECATED v1.4 (Issue #848): OCP monitoring RBAC block. Removed in v1.5. */}}
{{- if include "kubernaut.monitoring.ocpRbac" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: effectivenessmonitor-monitoring-view
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: effectivenessmonitor-controller
    namespace: {{ .Release.Namespace }}
{{- if include "kubernaut.monitoring.alertManager.enabled" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernaut-alertmanager-view
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["alertmanagers/api"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: effectivenessmonitor-alertmanager-view
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernaut-alertmanager-view
subjects:
  - kind: ServiceAccount
    name: effectivenessmonitor-controller
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: effectivenessmonitor-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: effectivenessmonitor-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
  selector:
    app: effectivenessmonitor-controller
