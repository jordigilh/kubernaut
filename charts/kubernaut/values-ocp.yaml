#
# OCP overlay for OpenShift deployments (DEPRECATED).
# Usage: helm install kubernaut charts/kubernaut -f charts/kubernaut/values-ocp.yaml
#
# Layer this on top of your values to:
#   - Switch PostgreSQL and Valkey to Red Hat RHEL10 catalog images (direct pull)
#   - Replace bitnami/kubectl with ose-cli for hook jobs
#   - Override signal sources and Prometheus/AlertManager URLs for OCP monitoring
#
# No ImageStream prerequisites — pods pull directly from registry.redhat.io.
# The global pull secret must include registry.redhat.io credentials (default on OCP).
#
# Disconnected/air-gapped — layer values-airgap.yaml AFTER this file.
# See chart README "Disconnected / Air-Gapped Install" section for full guide.

postgresql:
  variant: ocp
  image: registry.redhat.io/rhel10/postgresql-16

valkey:
  image: registry.redhat.io/rhel10/valkey-8

hooks:
  tlsCerts:
    image: registry.redhat.io/openshift4/ose-cli-rhel9:v4.17

gateway:
  auth:
    signalSources:
      - name: alertmanager
        serviceAccount: alertmanager-main
        namespace: openshift-monitoring

effectivenessmonitor:
  initImage: "registry.access.redhat.com/ubi10/ubi-minimal:latest"

# Unified monitoring config — OCP auto-detection fills Thanos/AM URLs
# when urls are left empty, so explicit URLs here are only for documentation.
monitoring:
  prometheus:
    enabled: true
  alertManager:
    enabled: true

networkPolicies:
  monitoring:
    prometheusPort: 9091
    alertManagerPort: 9094

# Issue #678: Enable inter-service TLS on OCP.
# The service-ca operator provisions certs via Service annotations.
tls:
  interService:
    enabled: true

# Issue #678: Enable inter-service TLS on OCP.
# The service-ca operator provisions certs via Service annotations.
tls:
  interService:
    enabled: true

# TLS defaults to hook (self-signed). To use cert-manager instead, uncomment
# and set issuerRef.name to your ClusterIssuer (requires cert-manager installed):
#
# tls:
#   mode: cert-manager
#   certManager:
#     issuerRef:
#       name: "letsencrypt-prod"
#       kind: ClusterIssuer
#       group: cert-manager.io
