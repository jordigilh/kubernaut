apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: memory-optimize-v1
spec:
  # Memory Optimize Workflow Schema (BR-WORKFLOW-004)
  # Used by: AIAnalysis E2E, HolmesGPT-API E2E
  version: "1.0.0"
  description:
    what: "Scales replicas to optimize memory usage across pods"
    whenToUse: "When pods are OOMKilled and scaling can distribute memory pressure"
    whenNotToUse: "When the application has a memory leak"
    preconditions: "Deployment supports horizontal scaling"
  
  actionType: ScaleReplicas
  
  labels:
    severity: [high]
    environment: [production, staging, test]
    component: deployment
    priority: P1
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:9771eca86cd5b39ac22c9490a5e7e0420abe6b4576e927326edfac1ecc7e5980
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: NAMESPACE
      type: string
      required: true
      description: "Target namespace"
    - name: DEPLOYMENT_NAME
      type: string
      required: true
      description: "Name of the deployment to scale"
    - name: REPLICA_COUNT
      type: integer
      required: false
      description: "Target number of replicas"
      default: 3
      minimum: 1
      maximum: 10
