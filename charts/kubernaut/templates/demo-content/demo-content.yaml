{{- if .Values.demoContent.enabled }}
# Bundled demo ActionTypes and RemediationWorkflows.
# Deployed via a post-install hook Job that waits for the authwebhook to be
# ready before applying CRs. This avoids the race condition where the
# ValidatingWebhookConfiguration is registered but the authwebhook pod has
# no endpoints yet (especially on OCP where pod startup is slower).
# Disable with --set demoContent.enabled=false for production deployments.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubernaut.fullname" . }}-demo-action-types
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "8"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  {{- range $path, $_ := .Files.Glob "files/demo-content/action-types/*.yaml" }}
  {{ $path | base }}: |
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubernaut.fullname" . }}-demo-workflows
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "8"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  {{- range $path, $_ := .Files.Glob "files/demo-content/workflows/*.yaml" }}
  {{ $path | base }}: |
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubernaut.fullname" . }}-demo-content-seed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: demo-content-seed
    spec:
      serviceAccountName: {{ include "kubernaut.fullname" . }}-hook-sa
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      restartPolicy: Never
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.hooks | nindent 8 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.hooks "global" .Values.global) | nindent 6 }}
      containers:
        - name: seed
          image: {{ .Values.hooks.tlsCerts.image }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.hooks | nindent 12 }}
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: action-types
              mountPath: /data/action-types
              readOnly: true
            - name: workflows
              mountPath: /data/workflows
              readOnly: true
            - name: scratch
              mountPath: /tmp
          command:
            - /bin/sh
            - -c
            - |
              set -e
              NAMESPACE="{{ .Release.Namespace }}"
              EXEC_NS="{{ .Values.workflowexecution.workflowNamespace }}"

              get_required_secrets() {
                awk '
                  /^  dependencies:/ { dep=1; next }
                  dep && /^    secrets:/ { sec=1; next }
                  sec && /^      - name: / { print $3 }
                  sec && /^  [a-z]/ { exit }
                ' "$1"
              }

              echo "==> Waiting for authwebhook to be ready..."
              kubectl rollout status deploy/authwebhook -n "$NAMESPACE" --timeout=120s

              echo "==> Waiting for datastorage to be ready..."
              kubectl rollout status deploy/datastorage -n "$NAMESPACE" --timeout=120s

              echo "==> Applying ActionTypes..."
              kubectl apply -f /data/action-types/ -n "$NAMESPACE"
              AT_COUNT=$(ls /data/action-types/ | wc -l | tr -d ' ')

              echo "==> Waiting for ActionTypes to be indexed by datastorage..."
              sleep 5

              echo "==> Checking workflow dependencies..."
              mkdir -p /tmp/eligible
              SKIP_COUNT=0
              SKIP_DETAILS=""
              TOTAL_WF=$(ls /data/workflows/ | wc -l | tr -d ' ')

              for f in /data/workflows/*; do
                fname=$(basename "$f")
                SECRETS=$(get_required_secrets "$f")
                if [ -z "$SECRETS" ]; then
                  echo "    $fname: no dependencies"
                  cp "$f" /tmp/eligible/
                  continue
                fi
                ALL_MET=true
                MISSING=""
                for secret in $SECRETS; do
                  if kubectl get secret "$secret" -n "$EXEC_NS" --no-headers 2>/dev/null | grep -q .; then
                    echo "    $fname: secret '$secret' in $EXEC_NS — found"
                  else
                    ALL_MET=false
                    MISSING="$MISSING $secret"
                    echo "    $fname: secret '$secret' in $EXEC_NS — MISSING"
                  fi
                done
                if [ "$ALL_MET" = "true" ]; then
                  cp "$f" /tmp/eligible/
                else
                  SKIP_COUNT=$((SKIP_COUNT + 1))
                  SKIP_DETAILS="$SKIP_DETAILS\n      - $fname (needs:$MISSING)"
                fi
              done

              INSTALL_COUNT=$(ls /tmp/eligible/ 2>/dev/null | wc -l | tr -d ' ')
              if [ "$INSTALL_COUNT" -gt 0 ]; then
                echo "==> Applying $INSTALL_COUNT workflows (skipping $SKIP_COUNT with unmet dependencies)..."
                RETRIES=3
                DELAY=5
                for attempt in $(seq 1 "$RETRIES"); do
                  if kubectl apply -f /tmp/eligible/ -n "$NAMESPACE" 2>/dev/null; then
                    break
                  fi
                  if [ "$attempt" -lt "$RETRIES" ]; then
                    echo "    Retry in ${DELAY}s (attempt $attempt/$RETRIES)..."
                    sleep "$DELAY"
                  else
                    kubectl apply -f /tmp/eligible/ -n "$NAMESPACE" || true
                  fi
                done
              else
                echo "==> No workflows eligible for installation (all have unmet dependencies)"
              fi

              echo ""
              echo "==> Summary:"
              echo "    ActionTypes installed: $AT_COUNT"
              echo "    Workflows installed:   $INSTALL_COUNT/$TOTAL_WF"
              echo "    Workflows skipped:     $SKIP_COUNT/$TOTAL_WF (missing dependencies)"
              if [ -n "$SKIP_DETAILS" ]; then
                printf "    Skipped workflows:$SKIP_DETAILS\n"
                echo ""
                echo "    To install skipped workflows later, create the required"
                echo "    Secrets in the '$EXEC_NS' namespace and run: helm upgrade"
              fi
              echo ""
              echo "==> Demo content seeded successfully"
      volumes:
        - name: action-types
          configMap:
            name: {{ include "kubernaut.fullname" . }}-demo-action-types
        - name: workflows
          configMap:
            name: {{ include "kubernaut.fullname" . }}-demo-workflows
        - name: scratch
          emptyDir:
            sizeLimit: 1Mi
{{- end }}
