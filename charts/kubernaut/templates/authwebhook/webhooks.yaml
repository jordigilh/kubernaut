{{- $caConfigMap := lookup "v1" "ConfigMap" .Release.Namespace "authwebhook-ca" -}}
{{- $caBundle := "" -}}
{{- if and $caConfigMap $caConfigMap.data -}}
{{-   $caBundle = index $caConfigMap.data "ca.crt" | default "" | b64enc -}}
{{- end -}}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: authwebhook-mutating
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
webhooks:
  - name: workflowexecution.mutate.kubernaut.ai
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: authwebhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-workflowexecution
      caBundle: {{ $caBundle | quote }}
    failurePolicy: Fail
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kubernaut.ai"]
        apiVersions: ["v1alpha1"]
        operations: ["UPDATE"]
        resources: ["workflowexecutions/status"]
        scope: "Namespaced"
    sideEffects: None
    timeoutSeconds: 10
  - name: remediationapprovalrequest.mutate.kubernaut.ai
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: authwebhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-remediationapprovalrequest
      caBundle: {{ $caBundle | quote }}
    failurePolicy: Fail
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kubernaut.ai"]
        apiVersions: ["v1alpha1"]
        operations: ["UPDATE"]
        resources: ["remediationapprovalrequests/status"]
        scope: "Namespaced"
    sideEffects: None
    timeoutSeconds: 10
  - name: remediationrequest.mutate.kubernaut.ai
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: authwebhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-remediationrequest
      caBundle: {{ $caBundle | quote }}
    failurePolicy: Fail
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kubernaut.ai"]
        apiVersions: ["v1alpha1"]
        operations: ["UPDATE"]
        resources: ["remediationrequests/status"]
        scope: "Namespaced"
    sideEffects: None
    timeoutSeconds: 10
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: authwebhook-validating
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
webhooks:
  - name: notificationrequest.validate.kubernaut.ai
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: authwebhook
        namespace: {{ .Release.Namespace }}
        path: /validate-notificationrequest-delete
      caBundle: {{ $caBundle | quote }}
    failurePolicy: Fail
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["kubernaut.ai"]
        apiVersions: ["v1alpha1"]
        operations: ["DELETE"]
        resources: ["notificationrequests"]
        scope: "Namespaced"
    sideEffects: None
    timeoutSeconds: 10
  - name: remediationworkflow.validate.kubernaut.ai
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: authwebhook
        namespace: {{ .Release.Namespace }}
        path: /validate-remediationworkflow
      caBundle: {{ $caBundle | quote }}
    failurePolicy: Fail
    matchPolicy: Equivalent
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: {{ .Release.Namespace }}
    rules:
      - apiGroups: ["kubernaut.ai"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "DELETE"]
        resources: ["remediationworkflows"]
        scope: "Namespaced"
    sideEffects: NoneOnDryRun
    timeoutSeconds: 15
  - name: actiontype.validate.kubernaut.ai
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: authwebhook
        namespace: {{ .Release.Namespace }}
        path: /validate-actiontype
      caBundle: {{ $caBundle | quote }}
    failurePolicy: Fail
    matchPolicy: Equivalent
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: {{ .Release.Namespace }}
    rules:
      - apiGroups: ["kubernaut.ai"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["actiontypes"]
        scope: "Namespaced"
    sideEffects: NoneOnDryRun
    timeoutSeconds: 15
