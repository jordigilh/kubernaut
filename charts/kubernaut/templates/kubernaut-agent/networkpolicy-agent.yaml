{{- if and .Values.networkPolicies.enabled .Values.networkPolicies.kubernautAgent.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubernaut.fullname" . }}-kubernaut-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app: kubernaut-agent
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: kubernaut-agent
  policyTypes:
    - Ingress
  ingress:
    # Investigation traffic from aianalysis-controller
    - ports:
        - port: 8443
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app: aianalysis-controller
    {{- include "kubernaut.np.metricsIngress" $ | nindent 4 }}
{{- end }}
