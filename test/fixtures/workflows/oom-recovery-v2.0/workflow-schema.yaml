apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: oom-recovery-v1
spec:
  # OOM Recovery Workflow Schema v2.0.0 (BR-WORKFLOW-004)
  # Used by: DataStorage E2E — 07_workflow_version_management_test.go (DD-WORKFLOW-002)
  version: "v2.0.0"
  description:
    what: "Recovers pods from OOM events with vertical pod autoscaling integration"
    whenToUse: "When pods are OOMKilled and VPA-based memory adjustment is preferred"
    whenNotToUse: "When OOM is caused by memory leaks requiring code fix"
    preconditions: "Pod is managed by a Deployment or StatefulSet; VPA installed"
  
  actionType: IncreaseMemoryLimits
  
  labels:
    severity: [critical]
    environment: [production, staging, test]
    component: [deployment]
    priority: P1
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/tekton-bundles/hello-world:v1.0.0@sha256:c4fc636f28d46f94c3f4a211f4dc07f60545891818ee45262e860b0825296ba0
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: NAMESPACE
      type: string
      required: true
      description: "Target namespace containing the affected deployment"
    - name: DEPLOYMENT_NAME
      type: string
      required: true
      description: "Name of the deployment to update memory limits"
    - name: MEMORY_INCREASE_PERCENT
      type: integer
      required: false
      description: "Percentage to increase memory limits by"
      default: 50
    - name: USE_VPA
      type: boolean
      required: false
      description: "Whether to use VPA for memory adjustment"
      default: true
