apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: detected-labels-test-v1
spec:
  # Detected Labels Test Workflow Schema (BR-WORKFLOW-004, ADR-043 v1.3)
  # Used by: DataStorage E2E -- detected_labels_search_e2e_test.go
  # Purpose: Validates full OCI registration -> search with detectedLabels scoring
  version: "1.0.0"
  description:
    what: "Test workflow for detectedLabels end-to-end validation"
    whenToUse: "For E2E testing that OCI-registered detectedLabels affect search scoring"
    whenNotToUse: "Not intended for production use"
    preconditions: "DataStorage service running with action_type_taxonomy seeded"
  
  actionType: ScaleReplicas
  
  labels:
    severity: [critical]
    environment: [production]
    component: pod
    priority: P0
  
  detectedLabels:
    hpaEnabled: "true"
    gitOpsTool: "argocd"
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:9771eca86cd5b39ac22c9490a5e7e0420abe6b4576e927326edfac1ecc7e5980
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: NAMESPACE
      type: string
      required: true
      description: "Target namespace containing the affected pod"
    - name: REPLICA_COUNT
      type: integer
      required: false
      description: "Target replica count"
      default: 3
