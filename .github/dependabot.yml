version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "k8s.io/*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "sigs.k8s.io/*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      all-go-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"
    groups:
      all-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    # NOTE: "directory: /build" (previous config) only matched a Dockerfile
    # directly under /build, never recursed into subdirectories. Use
    # "directories" (plural, globbing) to recursively cover every Dockerfile
    # location in the repo.
    directories:
      - "/docker"
      - "/cmd/**"
      - "/test/**"
      - "/docs/architecture/spikes/**"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "docker"
    groups:
      all-docker:
        patterns:
          - "*"
