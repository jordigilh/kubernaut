name: Scorecard supply-chain assessment

# Runs the OpenSSF Scorecard against this repository and publishes the score
# to https://scorecard.dev so the README badge reflects live results.
# Also uploads SARIF to the Security tab for tracking check-by-check trends.
on:
  branch_protection_rule:
  schedule:
    - cron: '24 3 * * 2' # weekly, Tuesday 03:24 UTC
  push:
    branches: [ main ]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # to upload SARIF results
      id-token: write        # to publish results and get a badge via OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@703b9949c65fcfced30e2f9f41569c4adfcb657f # v3.36.3
        with:
          sarif_file: results.sarif
