{{- if and .Values.networkPolicies.enabled .Values.networkPolicies.effectivenessmonitor.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
{{ include "kubernaut.np.metadata" (dict "root" $ "nameSuffix" "effectivenessmonitor" "appLabel" "effectivenessmonitor-controller") }}
spec:
  podSelector:
    matchLabels:
      app: effectivenessmonitor-controller
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- include "kubernaut.np.metricsIngress" $ | nindent 4 }}
  egress:
    {{- include "kubernaut.np.commonEgress" . | nindent 4 }}
    {{- include "kubernaut.np.datastorageEgress" . | nindent 4 }}
    - ports:
        - port: {{ .Values.networkPolicies.monitoring.prometheusPort | default 9090 }}
          protocol: TCP
    - ports:
        - port: {{ .Values.networkPolicies.monitoring.alertManagerPort | default 9093 }}
          protocol: TCP
{{- end }}
