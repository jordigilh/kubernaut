{{- if and .Values.networkPolicies.enabled .Values.networkPolicies.postgresql.enabled .Values.postgresql.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubernaut.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgresql
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 5432
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app: datastorage
  egress:
    {{- include "kubernaut.np.commonEgress" . | nindent 4 }}
{{- end }}
