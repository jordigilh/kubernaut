apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: kubernaut-system
  labels:
    app.kubernetes.io/name: kubernaut
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: kubernaut
data:
  config.yaml: |
    # Gateway Service Configuration
    # Organized by Single Responsibility Principle
    # See: pkg/gateway/server.go - type ServerConfig struct

    # HTTP Server configuration
    server:
      listenAddr: ":8080"
      readTimeout: 30s
      writeTimeout: 30s
      idleTimeout: 120s

    # Middleware configuration
    middleware:
      rate_limit:
        requests_per_minute: 100
        burst: 10

    # DD-GATEWAY-012: Redis REMOVED - Gateway is now Redis-free (K8s-native)
    # Deduplication state managed via RR status fields

    # ADR-030: DataStorage connectivity (audit trail + workflow catalog)
    datastorage:
      url: "http://data-storage-service:8080"
      timeout: 10s
      buffer:
        bufferSize: 10000
        batchSize: 100
        flushInterval: 1s
        maxRetries: 3

    # Business logic configuration
    processing:
      deduplication:
        cooldownPeriod: 5m

      environment:
        cache_ttl: 30s
        configmap_namespace: kubernaut-system
        configmap_name: kubernaut-environment-overrides

  # NOTE: priority.rego removed (2025-02-05).
  # Priority/Environment classification moved to Signal Processing per DD-CATEGORIZATION-001.

