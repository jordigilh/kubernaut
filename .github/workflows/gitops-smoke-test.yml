name: GitOps Smoke Test (ArgoCD)

# Repeatable, scripted validation that charts/kubernaut/ deploys correctly
# through a real ArgoCD Application -- not just `helm install`. This is item 4
# from issue #1617's original findings: the manual Kind+ArgoCD spike that
# found and confirmed the #334 / DD-PLATFORM-001 fixes (and the CRD-ConfigMap
# ServerSideApply requirement) was valuable but not automated. This workflow
# makes it repeatable.
#
# Runs per-PR, but path-filtered to only the parts of the chart whose
# correctness genuinely depends on ArgoCD's phase/wave/hook semantics rather
# than plain `helm install` order (hooks/**, interservice mTLS, the
# datastorage signing cert, CRDs, and Chart.yaml/values.yaml). Everything
# else in charts/kubernaut/ is already covered per-PR by the plain
# helm-install smoke test in ci-pipeline.yml, which is far cheaper and
# doesn't need this job's heavier Kind+ArgoCD+cert-manager setup. No
# schedule/cron backstop: since this now runs on every PR that touches an
# ArgoCD-sensitive path, a periodic re-run would only add value against
# drift with no chart change at all (e.g. an ArgoCD/cert-manager version
# bump) -- accepted as out of scope for now; re-add a schedule trigger if
# that gap ever bites.
#
# Authority: issue #1617 (GitOps/ArgoCD operational readiness)

on:
  pull_request:
    paths:
      - 'charts/kubernaut/templates/hooks/**'
      - 'charts/kubernaut/templates/interservice/**'
      - 'charts/kubernaut/templates/datastorage/certificate.yaml'
      - 'charts/kubernaut/Chart.yaml'
      - 'charts/kubernaut/values.yaml'
      - 'charts/kubernaut/crds/**'
      - '.github/workflows/gitops-smoke-test.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch/tag/SHA) of charts/kubernaut/ to deploy'
        required: false
        type: string
        default: main
      image_tag:
        description: 'Published image tag to deploy (this test validates chart/GitOps mechanics, not new app code)'
        required: false
        type: string
        default: latest

permissions:
  contents: read

env:
  KIND_CLUSTER_NAME: gitops-smoke
  ARGOCD_VERSION: v3.4.4
  CERT_MANAGER_VERSION: v1.20.3
  NAMESPACE: kubernaut-system
  # refs/pull/<n>/head is maintained by GitHub in the base repo for every PR
  # (including from forks), so ArgoCD's own in-cluster git clone of
  # REPO_URL (always the base repo, below) can fetch the exact PR head
  # commit without needing fork-specific repo URLs.
  PR_REF: ${{ github.event.pull_request.number && format('refs/pull/{0}/head', github.event.pull_request.number) || '' }}

jobs:
  gitops-smoke-test:
    name: GitOps Smoke Test (Kind + ArgoCD + cert-manager)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}

      - name: Install Kind
        run: |
          KIND_VERSION="v0.32.0"
          curl -Lo ./kind "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd
          argocd version --client

      # extraPortMappings exposes a fixed hostPort straight through to a
      # NodePort on the control-plane container. Combined with patching
      # argocd-server to NodePort 30080 below, this lets the ArgoCD CLI
      # connect via a plain, static "localhost:8080" TCP connection -- no
      # `kubectl port-forward` background process to launch, track a PID
      # for, restart on failure, or leak if a later step exits early. A
      # backgrounded port-forward is an extra moving part with its own
      # failure mode (the process can die mid-workflow independent of
      # cluster/app health); NodePort removes that class of flakiness
      # entirely by using the same "real fixed port" connection ArgoCD
      # would have in production.
      - name: Create Kind cluster
        run: |
          cat <<'EOF' > /tmp/kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 30080
              hostPort: 8080
              protocol: TCP
          EOF
          kind create cluster --name "$KIND_CLUSTER_NAME" --config /tmp/kind-config.yaml --wait 120s
          kubectl cluster-info
          kubectl get nodes -o wide

      # #1617 spike finding: ArgoCD's own CRDs (e.g. applicationsets.argoproj.io)
      # exceed the client-side apply kubectl.kubernetes.io/last-applied-configuration
      # annotation limit (262144 bytes) -- server-side apply is required to install
      # ArgoCD itself, not just to sync this chart.
      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd
          kubectl apply -n argocd --server-side --force-conflicts \
            -f "https://raw.githubusercontent.com/argoproj/argo-cd/${ARGOCD_VERSION}/manifests/install.yaml"
          kubectl wait --for=condition=Available --timeout=180s deployment -l app.kubernetes.io/part-of=argocd -n argocd

      - name: Install cert-manager
        run: |
          kubectl apply -f "https://github.com/cert-manager/cert-manager/releases/download/${CERT_MANAGER_VERSION}/cert-manager.yaml"
          kubectl wait --for=condition=Available --timeout=120s deployment --all -n cert-manager
          kubectl apply -f deploy/cert-manager/selfsigned-issuer.yaml
          kubectl wait --for=condition=Ready --timeout=60s clusterissuer/selfsigned-issuer

      - name: Log in to ArgoCD CLI
        run: |
          kubectl -n argocd wait --for=condition=Available --timeout=60s deployment/argocd-server
          kubectl patch svc argocd-server -n argocd -p \
            '{"spec": {"type": "NodePort", "ports": [{"name": "https", "port": 443, "targetPort": 8080, "nodePort": 30080}]}}'
          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d)
          for i in $(seq 1 10); do
            argocd login localhost:8080 --username admin --password "$ARGOCD_PASSWORD" --insecure && break
            echo "Retrying ArgoCD login ($i/10)..."
            sleep 5
          done

      - name: Provision prerequisite namespace and secrets
        run: |
          kubectl create namespace "$NAMESPACE"
          # #1617 spike finding: `lookup` has no live cluster access when ArgoCD's
          # repo-server renders the chart (equivalent to `helm template`, not a real
          # `helm install`) -- every value the chart would otherwise auto-discover
          # via `lookup` (issuerRef, secrets) must be supplied explicitly here.
          kubectl create secret generic postgresql-secret -n "$NAMESPACE" \
            --from-literal=POSTGRES_USER=slm_user \
            --from-literal=POSTGRES_PASSWORD=gitops-smoke-pass \
            --from-literal=POSTGRES_DB=action_history \
            --from-literal="db-secrets.yaml=$(printf 'username: slm_user\npassword: gitops-smoke-pass')"
          kubectl create secret generic valkey-secret -n "$NAMESPACE" \
            --from-literal="valkey-secrets.yaml=password: gitops-smoke-pass"
          kubectl create secret generic kubernaut-llm-credentials -n "$NAMESPACE" \
            --from-literal=OPENAI_API_KEY=sk-gitops-smoke-placeholder # pre-commit:allow-sensitive

      - name: Create ArgoCD Application
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          TARGET_REVISION: ${{ inputs.ref || env.PR_REF || 'main' }}
          IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
        run: |
          cat <<EOF | argocd app create -f -
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: kubernaut-gitops-smoke
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: ${REPO_URL}
              targetRevision: ${TARGET_REVISION}
              path: charts/kubernaut
              helm:
                valuesObject:
                  global:
                    image:
                      tag: ${IMAGE_TAG}
                  postgresql:
                    auth:
                      existingSecret: postgresql-secret
                  valkey:
                    existingSecret: valkey-secret
                  kubernautAgent:
                    llm:
                      provider: openai
                      model: gpt-4o
                      credentialsSecretName: kubernaut-llm-credentials
                  signalprocessing:
                    policies:
                      content: |
                        package signalprocessing
                        import rego.v1
                        default severity := "info"
                  aianalysis:
                    policies:
                      content: |
                        package aianalysis.approval
                        import rego.v1
                        default allow := false
                  monitoring:
                    prometheus:
                      enabled: false
                    alertManager:
                      enabled: false
                  tls:
                    mode: cert-manager
                    certManager:
                      issuerRef:
                        name: selfsigned-issuer
                        kind: ClusterIssuer
            destination:
              server: https://kubernetes.default.svc
              namespace: ${NAMESPACE}
            # #1617 spike finding: the chart's bundled-CRDs ConfigMap (consumed by the
            # crd-upgrade hook) is large enough that ArgoCD's default client-side apply
            # fails with "metadata.annotations: Too long: may not be more than 262144
            # bytes". ServerSideApply is required at the Application level.
            syncPolicy:
              syncOptions:
                - ServerSideApply=true
          EOF
          argocd app list

      # NOTE: `argocd app sync` blocks until the app reaches its "desired state"
      # (Synced AND Healthy), not just until manifests are applied. This smoke
      # test intentionally uses placeholder LLM credentials/config (it validates
      # GitOps sync mechanics -- CRDs, hooks, cert-manager wiring -- not full
      # application runtime health), so several controllers (e.g. aianalysis,
      # kubernaut-agent) never reach Healthy for reasons unrelated to GitOps
      # mechanics, and this command reliably times out even on a fully
      # successful sync. That timeout is therefore tolerated here (`|| true`);
      # the "Verify GitOps deployment" step below asserts the specific
      # resources that actually matter (CRD count, Certificate readiness,
      # ConfigMap sync) with their own precise waits, instead of relying on
      # aggregate app health.
      #
      # DD-PLATFORM-002 fixed the ArgoCD PostSync/health deadlock that used to
      # prevent db-migration and interservice-ca-sync from ever running (see
      # that DD for the full root cause). Empirically confirmed via a local
      # kind+ArgoCD dry run: with the fix, both Jobs complete within ~20s and
      # the Application reaches full Health.
      - name: Sync ArgoCD Application
        run: |
          argocd app sync kubernaut-gitops-smoke --server-side --timeout 180 || \
            echo "::notice::sync timed out waiting for full pod health (expected -- some controllers need real LLM credentials/config this smoke test doesn't provide) -- proceeding to targeted resource checks"
          argocd app get kubernaut-gitops-smoke || true

      # DD-PLATFORM-002 residual nuance (shared with tls.mode=hook under plain
      # Helm CLI -- not new, not ArgoCD-specific): ~11 services mount
      # inter-service-ca as a ConfigMap volume with `optional: true`. If a
      # service's pod is scheduled and its volume set up *before*
      # interservice-ca-sync creates that ConfigMap (a real race: the Job
      # needs ~15-20s to run, a Deployment pod can start faster), kubelet
      # mounts an empty directory and -- per documented kubelet behavior --
      # will not retroactively populate it for that pod once the ConfigMap
      # appears; only a fresh pod (not just a container restart within the
      # same pod) re-evaluates the volume. The same race exists for
      # db-migration and any pod hitting DataStorage before its schema
      # exists. This step makes that convergence deterministic in CI by
      # restarting any pod still crash-looping once both sync Jobs have
      # actually completed, mirroring what a human operator (or a follow-up
      # `kubectl rollout restart`) would do on a real first install.
      - name: Recover pods that raced the migration/CA-sync Jobs
        run: |
          echo "=== Waiting for db-migration and interservice-ca-sync Jobs to complete ==="
          # Job objects only carry the chart's generic app.kubernetes.io/*
          # labels; the `app: db-migration` / `app: interservice-ca-sync`
          # labels live on the pod template. Resolve the actual (release-
          # name-prefixed) Job name via Kubernetes' auto-injected `job-name`
          # pod label instead of hardcoding the release name.
          for app_label in db-migration interservice-ca-sync; do
            JOB_NAME=$(kubectl get pods -n "$NAMESPACE" -l "app=${app_label}" -o jsonpath='{.items[0].metadata.labels.job-name}' 2>/dev/null || true)
            if [[ -n "$JOB_NAME" ]]; then
              kubectl wait --for=condition=Complete --timeout=120s "job/${JOB_NAME}" -n "$NAMESPACE" 2>&1 || true
            else
              echo "::warning::no pod found for app=${app_label} yet -- Job may not have been scheduled"
            fi
          done

          echo "=== Restarting any pods still CrashLoopBackOff after the Jobs completed ==="
          CRASHING=$(kubectl get pods -n "$NAMESPACE" --field-selector=status.phase=Running -o json | \
            jq -r '.items[] | select(.status.containerStatuses[]?.state.waiting.reason == "CrashLoopBackOff") | .metadata.name')
          if [[ -n "$CRASHING" ]]; then
            echo "Restarting: $CRASHING"
            # shellcheck disable=SC2086
            kubectl delete pod -n "$NAMESPACE" $CRASHING
            sleep 30
          else
            echo "No crash-looping pods found -- nothing to restart"
          fi
          kubectl get pods -n "$NAMESPACE" -o wide

      - name: Verify GitOps deployment
        run: |
          FAIL=0

          echo "=== CRDs (expect 10, installed by the PreSync crd-upgrade hook) ==="
          CRD_COUNT=$(kubectl get crds 2>/dev/null | grep -c "kubernaut.ai" || true)
          echo "Found: ${CRD_COUNT}"
          [[ "$CRD_COUNT" -eq 10 ]] || { echo "FAIL: expected 10 CRDs"; FAIL=1; }

          echo "=== cert-manager Certificates (#334 + DD-PLATFORM-001) ==="
          for cert in authwebhook-cert datastorage-signing-cert kubernaut-interservice-ca gateway-tls datastorage-tls kubernautagent-tls; do
            if kubectl wait --for=condition=Ready --timeout=180s "certificate/${cert}" -n "$NAMESPACE" 2>/dev/null; then
              echo "OK: ${cert} Ready"
            else
              echo "FAIL: ${cert} not Ready"
              kubectl describe "certificate/${cert}" -n "$NAMESPACE" 2>&1 || true
              FAIL=1
            fi
          done

          echo "=== db-migration + inter-service-ca ConfigMap sync hooks (DD-PLATFORM-002) ==="
          MIGRATION_JOB=$(kubectl get pods -n "$NAMESPACE" -l app=db-migration -o jsonpath='{.items[0].metadata.labels.job-name}' 2>/dev/null || true)
          if [[ -n "$MIGRATION_JOB" ]] && kubectl get job "$MIGRATION_JOB" -n "$NAMESPACE" -o jsonpath='{.status.succeeded}' 2>/dev/null | grep -q '^1$'; then
            echo "OK: db-migration Job (${MIGRATION_JOB}) succeeded"
          else
            echo "FAIL: db-migration Job did not succeed -- ArgoCD PostSync/health deadlock may have regressed"
            kubectl get pods -n "$NAMESPACE" -l app=db-migration -o wide 2>&1 || true
            FAIL=1
          fi
          if kubectl get configmap inter-service-ca -n "$NAMESPACE" >/dev/null 2>&1; then
            echo "OK: inter-service-ca ConfigMap exists"
          else
            echo "FAIL: inter-service-ca ConfigMap missing -- ArgoCD PostSync/health deadlock may have regressed"
            FAIL=1
          fi

          echo "=== datastorage-signing-cert Secret (#334 regression guard) ==="
          if kubectl get secret datastorage-signing-cert -n "$NAMESPACE" -o jsonpath='{.data.tls\.key}' 2>/dev/null | grep -q .; then
            echo "OK: datastorage-signing-cert has tls.key"
          else
            echo "FAIL: datastorage-signing-cert missing or empty tls.key"
            FAIL=1
          fi

          echo "=== datastorage + gateway Ready (DD-PLATFORM-002 end-to-end proof) ==="
          for dep in datastorage gateway; do
            if kubectl wait --for=condition=Available --timeout=120s "deployment/${dep}" -n "$NAMESPACE" 2>/dev/null; then
              echo "OK: ${dep} Available"
            else
              echo "FAIL: ${dep} not Available"
              kubectl describe "deployment/${dep}" -n "$NAMESPACE" 2>&1 || true
              FAIL=1
            fi
          done

          echo "=== Pod status (informational -- real quay.io images, no app-level config tuning) ==="
          kubectl get pods -n "$NAMESPACE" -o wide

          if [[ "$FAIL" -ne 0 ]]; then
            echo "::error::One or more GitOps deployment checks failed"
            exit 1
          fi
          echo "PASS: all GitOps deployment checks succeeded"

      - name: Verify PreDelete hook fires on cascade delete
        if: always()
        run: |
          echo "=== Webhook configs before delete ==="
          kubectl get mutatingwebhookconfigurations,validatingwebhookconfigurations 2>&1 || true

          argocd app delete kubernaut-gitops-smoke --cascade --yes || true

          echo "Waiting up to 3m for cascade delete + webhook-cleanup PreDelete hook..."
          for i in $(seq 1 18); do
            if ! kubectl get namespace "$NAMESPACE" >/dev/null 2>&1; then
              echo "OK: namespace ${NAMESPACE} fully removed (cascade + PreDelete hook completed)"
              exit 0
            fi
            sleep 10
          done

          echo "::warning::Namespace ${NAMESPACE} still present after 3m -- cascade delete or PreDelete hook may be stuck"
          kubectl get all -n "$NAMESPACE" 2>&1 || true

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "=== ArgoCD Application status ==="
          argocd app get kubernaut-gitops-smoke 2>&1 || true
          echo "=== Pods ==="
          kubectl get pods -n "$NAMESPACE" -o wide 2>&1 || true
          echo "=== Events ==="
          kubectl get events -n "$NAMESPACE" --sort-by='.lastTimestamp' 2>&1 | tail -40 || true
          echo "=== Certificates ==="
          kubectl get certificates -n "$NAMESPACE" -o wide 2>&1 || true
          echo "=== Kind node logs ==="
          kind export logs /tmp/kind-gitops-smoke-logs --name "$KIND_CLUSTER_NAME" 2>/dev/null || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gitops-smoke-diagnostics-${{ github.run_id }}
          path: /tmp/kind-gitops-smoke-logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          kind delete cluster --name "$KIND_CLUSTER_NAME" 2>/dev/null || true
