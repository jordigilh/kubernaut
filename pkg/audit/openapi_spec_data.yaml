        total_completion_tokens:
          type: integer
          minimum: 0
          description: Completion tokens consumed during Phase 1 RCA

    AIAgentResponseFailedPayload:
      type: object
      required: [event_type, event_id, incident_id, error_message, phase]
      description: AI Agent response failure event payload (aiagent.response.failed) - Emitted when an investigation fails (DD-AUDIT-005, SOC2 CC8.1)
      properties:
        event_type:
          type: string
          enum: ['aiagent.response.failed']
          description: Event type for discriminator
        event_id:
          type: string
