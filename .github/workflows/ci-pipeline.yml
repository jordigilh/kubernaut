name: CI Pipeline

# 4-Stage CI Pipeline with Artifact-Based Image Handoff (no registry push)
#
# Stage 1: Lint, License Scan & Unit Tests (parallel: 1 lint + 1 license scan + 13 unit test jobs) ~1-2 min
# Stage 2: Build Images
#   - 2a: Go service images (parallel matrix: 12 services × 2 arches) ~5 min
#        amd64: full multi-stage Dockerfile (native, coverage-instrumented)
#        arm64: native Go cross-compile + scratch runtime Dockerfile (no QEMU),
#        build-validation only, not consumed downstream
#   - 2a-infra: infra images (parallel matrix: 2 images — db-migrate, mock-llm, amd64 only) ~5 min
# Stage 3: Integration Tests (parallel matrix: 12 services) ~15 min
# Stage 4: E2E Tests (parallel jobs: 13 services, when enabled) ~30 min each
#
# CI/CD Optimization (Artifact-Based, No Registry):
#   - Images are built, scanned locally with Trivy, `docker save`d and handed
#     to downstream jobs as short-lived workflow artifacts (2-day retention)
#   - Downstream jobs `podman load` (IT/E2E) or `kind load image-archive`
#     (Helm smoke) the artifacts directly -- no ghcr.io push/pull anywhere
#   - This makes the whole pipeline work unmodified for fork PRs, whose
#     GITHUB_TOKEN is read-only and cannot push to ghcr.io (see #1573 CI triage)
#   - Cosign signing / SBOM generation are NOT done here -- ephemeral CI
#     images are never deployed; signing/SBOM apply only to release.yml's
#     Quay.io artifacts
#   - Automatic fallback to local build if an artifact wasn't loaded
#   - Saves ~60% disk space and ~30% build time in CI vs. building fresh
#     in every downstream job
#
# Trigger Strategy (merge-gate pattern):
#   - CI skips draft PRs (types filter excludes draft events)
#   - CI runs on ALL non-draft PRs (no paths-ignore filter)
#   - detect-changes job uses dorny/paths-filter to detect code changes
#   - Code PRs: all CI jobs run; merge-gate checks results
#   - Docs-only PRs: all CI jobs skipped; merge-gate auto-passes
#   - Spike/docs PRs (docs/**, spikes/**) don't match any positive pattern (no **.go glob)
#   - Single required check in branch protection: "Merge Gate"
#   - Push to main → always runs (full validation)
#
# Optimization Strategy:
#   - Go lint job
#   - No redundant builds (code compiled once in Stage 2 image builds)
#   - Sequential stages ensure images ready before tests
#   - Matrix parallelization for homogeneous jobs (unit, build, integration)
#   - Individual jobs for heterogeneous jobs (E2E with different infra)
#   - Fail-fast disabled for comprehensive feedback
#   - Registry image reuse eliminates duplicate builds
#   - Generated code (controller-gen deepcopy + ogen OpenAPI clients) is
#     cached via actions/cache, keyed on a hash of its source inputs
#     (api/**, openapi specs, Makefile). Every job that needs generated code
#     restores from cache instead of paying the ~25-30s codegen cost, while
#     staying fully parallel (no shared upstream job / no new critical-path
#     dependency). First job per commit to reach the step still generates and
#     seeds the cache for the rest.
#
# Authority: [TODO] Create ADR-CI-001 from docs/handoff/TRIAGE_GITHUB_WORKFLOW_OPTIMIZATION_REQUIREMENTS.md

on:
  pull_request:
    branches: [ main, 'release/**' ]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [ main, 'release/**' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least-privilege default for every job. No job in this workflow needs
# ghcr.io push/pull or Cosign OIDC signing (see artifact-based image handoff
# above); jobs that comment on PRs declare their own elevated job-level
# `permissions:` block below, which fully replaces (not merges with) this
# default for that job.
permissions:
  contents: read

env:
  # CRITICAL: Kind must use Podman (we don't have Docker in our CI)
  # This ensures all Kind commands (create, load, etc.) use Podman as the provider
  KIND_EXPERIMENTAL_PROVIDER: podman

jobs:
  # ========================================
  # CHANGE DETECTION (runs on every PR)
  # Determines if code files changed; all CI jobs are conditional on this.
  # Docs-only PRs skip all CI jobs; the merge-gate auto-passes.
  # ========================================

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          # Note: dorny/paths-filter uses picomatch globs. Negation patterns
          # must appear AFTER the positive patterns they override. Files under
          # spikes/ and docs/ are non-production and should not trigger CI.
          # NOTE: We use explicit directory globs instead of '**.go' because
          # dorny/paths-filter's picomatch globstar matches at any depth,
          # causing negation patterns (!spikes/**, !docs/**) to fail when a
          # file like spikes/foo/main.go matches '**.go' positively.
          filters: |
            code:
              - 'cmd/**'
              - 'pkg/**'
              - 'internal/**'
              - 'api/**'
              - 'test/**'
              - 'migrations/**'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/**'
              - 'docker/**'
              - 'charts/**'
              - 'scripts/helm-smoke-test.sh'
              - 'config/**'

  # ========================================
  # STAGE 1: LINT, LICENSE SCAN & UNIT TESTS (ALL PARALLEL)
  # 15 parallel jobs (1 lint + 1 license scan + 13 unit tests) ~2 min total
  # Note: Code compilation happens in Stage 2 (image builds)
  # Skipped for docs-only PRs (detect-changes.code_changed == false)
  # ========================================

  lint-go:
    name: Lint (Go Services)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache: true

      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}

      - name: Generate Go code (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: |
          echo "🔄 Generating Go code (required for linting)..."
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Verify generated files are up-to-date
        run: |
          echo "🔍 Checking for uncommitted generated file changes..."
          if ! git diff --exit-code --name-only; then
            echo "❌ Generated files are out of date. Run 'make generate' and commit."
            git diff --stat
            exit 1
          fi
          echo "✅ Generated files are up-to-date"

      - name: Validate embedded assets (CRDs, migrations)
        run: make validate-embed

      - name: Lint Go code
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.9.0
          args: --timeout=10m cmd/... pkg/... internal/... test/...

      - name: Lint Go code (godox TODO/FIXME report -- informational only)
        # godox is deliberately excluded from .golangci.yml's blocking linter
        # set (see the NOTE there, Issue #1546 Tier 4): blocking merges on the
        # presence of the word TODO would defeat the purpose of TODO comments
        # as a deferred-work tracking tool. .golangci.yml also scopes godox's
        # keywords to [TODO, FIXME] (dropping the default BUG keyword), since
        # ~72 of ~97 raw findings were retrospective "Bug:"/"BUG FIX" doc-
        # comment prose describing an already-fixed defect, not pending work.
        # continue-on-error keeps this annotation-only -- it never fails the job.
        continue-on-error: true
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.9.0
          args: --timeout=5m --enable-only godox cmd/... pkg/... internal/... test/...

      - name: Dependency vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          IGNORE_FILE=.govulncheck-ignore.yaml ./scripts/ci/govulncheck-gated.sh

  license-scan:
    name: License Scan
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache: true

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0

      - name: Check licenses
        run: |
          echo "Scanning dependency licenses..."
          go-licenses check ./... \
            --ignore=github.com/jordigilh/kubernaut \
            --ignore=github.com/segmentio/asm \
            --ignore=github.com/Alcova-AI/adk-anthropic-go \
            --logtostderr=false
          echo "All dependency licenses are compliant."

      - name: Generate license report
        if: always()
        run: |
          go-licenses report ./... \
            --ignore=github.com/jordigilh/kubernaut \
            --ignore=github.com/segmentio/asm \
            --ignore=github.com/Alcova-AI/adk-anthropic-go \
            --logtostderr=false \
            --format csv > licenses.csv 2>/dev/null || true
          echo "License report generated ($(wc -l < licenses.csv) dependencies)"

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: license-report
          path: licenses.csv
          retention-days: 90

  # DD-PLATFORM-005 (motivated by #1686/BR-RBAC-020): dedicated fast
  # fail-fast gate for chart template changes, distinct from helm-smoke-test
  # (Stage 2+, needs built images and a live Kind cluster, ~30-45min).
  # helm-unittest asserts specific rendered output (RBAC rule shape,
  # conditional resources) offline in seconds -- runs in Stage 1 alongside
  # lint-go/unit-tests instead of waiting on build-images, so a broken
  # template fails CI in ~1min instead of ~30min.
  helm-unittest:
    name: Helm Chart Unit Tests (helm-unittest)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: latest

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1

      - name: Run helm-unittest specs
        run: helm unittest charts/kubernaut/

  unit-tests:
    name: Unit Tests (${{ matrix.service }})
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service:
          - aianalysis
          - authwebhook
          - datastorage
          - effectivenessmonitor
          - fleetmetadatacache
          - gateway
          - kubernautagent
          - notification
          - remediationorchestrator
          - signalprocessing
          - workflowexecution
          - apifrontend
          - shared-packages  # pkg/audit, pkg/cache, pkg/http, pkg/k8sutil, pkg/shared
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache: true

      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}

      - name: Generate Go code (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: |
          echo "🔄 Generating Go code for tests..."
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Run unit tests
        run: |
          echo "🧪 Running unit tests for ${{ matrix.service }}..."
          export PATH="${{ github.workspace }}/bin:$PATH"
          make test-unit-${{ matrix.service }}

      - name: Run fuzz corpus regression (this service's fuzz targets, if any)
        # ginkgo's runner (used by test-unit-* above) only executes Ginkgo
        # specs and silently skips func FuzzXxx(f *testing.F) functions in the
        # same package. This reuses the checkout/generate already done above
        # (no extra job/setup) to run each service's fuzz seed + saved-crasher
        # corpus as a plain `go test` -- catches regressions like the
        # nil-pointer panic found in pkg/notification/routing.ParseConfig.
        # No-op for services with no fuzz targets. Does NOT do new fuzzing
        # (needs a time budget); see `make fuzz`.
        run: |
          export PATH="${{ github.workspace }}/bin:$PATH"
          make test-fuzz-${{ matrix.service }}

      - name: Calculate and save coverage
        if: always()
        run: |
          mkdir -p coverage-reports
          if [ -f coverage_unit_${{ matrix.service }}.out ]; then
            COVERAGE=$(go tool cover -func=coverage_unit_${{ matrix.service }}.out | grep total | awk '{print $3}')
            if [ -z "$COVERAGE" ]; then
              echo "${{ matrix.service }},N/A" > coverage-reports/unit-${{ matrix.service }}.txt
              echo "⚠️  No coverage data found for ${{ matrix.service }} (coverage file exists but parsing failed)"
            else
              echo "${{ matrix.service }},${COVERAGE}" > coverage-reports/unit-${{ matrix.service }}.txt
              echo "📊 Unit Coverage for ${{ matrix.service }}: ${COVERAGE}"
            fi
          else
            echo "${{ matrix.service }},N/A" > coverage-reports/unit-${{ matrix.service }}.txt
            echo "ℹ️  Coverage file not found for ${{ matrix.service }}"
          fi
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-unit-${{ matrix.service }}
          path: coverage-reports/unit-${{ matrix.service }}.txt
          retention-days: 1

      - name: Upload full coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-profile-unit-${{ matrix.service }}
          path: |
            coverage_unit_${{ matrix.service }}.out
            coverage_unit_${{ matrix.service }}.txt
          retention-days: 1
          if-no-files-found: ignore

  # ========================================
  # STAGE 2: BUILD IMAGES (artifact-based, no registry push)
  # Matrix job: Build 12 Go service images for amd64 + arm64, scan them
  # locally with Trivy, and hand them to downstream jobs as workflow
  # artifacts (docker save + actions/upload-artifact).
  #   - amd64: full multi-stage Dockerfile (native on runner, coverage-instrumented)
  #   - arm64: native Go cross-compile + scratch runtime Dockerfile (no QEMU),
  #     build-validation only -- no downstream job consumes the arm64 artifact.
  # Purpose: Integration & E2E tests load the amd64 artifact directly, no
  # registry round-trip. This removes the ghcr.io push entirely from the CI
  # pipeline, so it works unmodified for fork PRs (read-only GITHUB_TOKEN).
  # Cosign signing and SBOM generation are intentionally NOT done here --
  # they only apply to real release artifacts (see release.yml, Quay.io).
  # Retention: Artifacts auto-expire after 2 days (see retention-days below).
  # Authority: Issue #1500; DD follow-up to #1573 CI investigation
  # ========================================

  build-images:
    name: "Build (${{ matrix.service }}/${{ matrix.arch }})"
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - aianalysis
          - apifrontend
          - authwebhook
          - datastorage
          - effectivenessmonitor
          - fleetmetadatacache
          - gateway
          - kubernautagent
          - notification
          - remediationorchestrator
          - signalprocessing
          - workflowexecution
        arch:
          - amd64
          - arm64
        include:
          - service: aianalysis
            dockerfile: docker/aianalysis.Dockerfile
          - service: apifrontend
            dockerfile: docker/apifrontend.Dockerfile
          - service: authwebhook
            dockerfile: docker/authwebhook.Dockerfile
          - service: datastorage
            dockerfile: docker/data-storage.Dockerfile
          - service: effectivenessmonitor
            dockerfile: docker/effectivenessmonitor-controller.Dockerfile
          - service: fleetmetadatacache
            dockerfile: docker/fleetmetadatacache.Dockerfile
          - service: gateway
            dockerfile: docker/gateway.Dockerfile
          - service: kubernautagent
            dockerfile: docker/kubernautagent.Dockerfile
          - service: notification
            dockerfile: docker/notification-controller.Dockerfile
          - service: remediationorchestrator
            dockerfile: docker/remediationorchestrator-controller.Dockerfile
          - service: signalprocessing
            dockerfile: docker/signalprocessing-controller.Dockerfile
          - service: workflowexecution
            dockerfile: docker/workflowexecution-controller.Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache: true

      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}

      - name: Generate required files (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: |
          echo "🔄 Generating OpenAPI specs and required files for Docker builds..."
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Generate image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=main-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build amd64 image
        if: matrix.arch == 'amd64'
        run: |
          IMAGE="localhost/${{ matrix.service }}:${{ steps.tag.outputs.tag }}"

          echo "🔨 Building ${{ matrix.service }} image (amd64, multi-stage)..."
          echo "   Image: ${IMAGE}"
          echo "   Dockerfile: ${{ matrix.dockerfile }}"

          docker build \
            --build-arg GOFLAGS=-cover \
            -t "${IMAGE}" \
            -f ${{ matrix.dockerfile }} \
            .

      - name: Cross-compile binary for arm64 (native, no QEMU)
        if: matrix.arch == 'arm64'
        run: |
          echo "Cross-compiling ${{ matrix.service }} for arm64 (native)..."
          make cross-build-${{ matrix.service }} IMAGE_ARCH=arm64

      - name: Build arm64 runtime image
        if: matrix.arch == 'arm64'
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          IMAGE_ARCH: arm64
          CONTAINER_TOOL: docker
          IMAGE_REGISTRY: localhost
        run: |
          IMAGE="localhost/${{ matrix.service }}:${{ steps.tag.outputs.tag }}"
          echo "Building runtime image ${IMAGE} (no QEMU)..."
          make image-runtime-${{ matrix.service }}

      - name: Compute local image reference
        id: image-ref
        run: |
          # image-runtime-% (arm64 path) always appends -$(IMAGE_ARCH) to the tag;
          # the amd64 `docker build` step above does not. Match each arch's
          # actual local tag here rather than changing the shared Makefile target.
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            echo "image=localhost/${{ matrix.service }}:${{ steps.tag.outputs.tag }}-arm64" >> $GITHUB_OUTPUT
          else
            echo "image=localhost/${{ matrix.service }}:${{ steps.tag.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image-ref.outputs.image }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.72.0

      - name: Save image to tarball
        run: |
          mkdir -p /tmp/image-artifact
          TARBALL="/tmp/image-artifact/${{ matrix.service }}-${{ matrix.arch }}.tar"
          echo "💾 Saving ${{ steps.image-ref.outputs.image }} -> ${TARBALL}..."
          docker save -o "${TARBALL}" "${{ steps.image-ref.outputs.image }}"
          ls -lh "${TARBALL}"

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: image-${{ matrix.service }}-${{ matrix.arch }}
          path: /tmp/image-artifact/${{ matrix.service }}-${{ matrix.arch }}.tar
          retention-days: 2

  # ========================================
  # STAGE 2a-infra: BUILD INFRA IMAGES (artifact-based, no registry push)
  # Matrix job: Build infrastructure and test fixture images.
  # Separated from service images so downstream jobs can depend on
  # service images without waiting for infra builds (and vice versa).
  # ========================================

  build-infra-images:
    name: Build Infra (${{ matrix.service }})
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Infrastructure (1)
          - service: db-migrate
            dockerfile: docker/db-migrate.Dockerfile
            image_name: db-migrate
          # Test Fixtures (1)
          - service: mock-llm
            dockerfile: test/services/mock-llm/go.Dockerfile
            image_name: mock-llm
            context: .
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache: true

      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}

      - name: Generate required files (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: |
          echo "🔄 Generating OpenAPI specs and required files for Docker builds..."
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Generate image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=main-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build ${{ matrix.service }} image
        run: |
          IMAGE="localhost/${{ matrix.image_name }}:${{ steps.tag.outputs.tag }}"
          CONTEXT=${{ matrix.context || '.' }}

          echo "🔨 Building ${{ matrix.service }} image..."
          echo "   Image: ${IMAGE}"
          echo "   Dockerfile: ${{ matrix.dockerfile }}"
          echo "   Context: ${CONTEXT}"

          docker build \
            --build-arg GOFLAGS=-cover \
            -t "${IMAGE}" \
            -f ${{ matrix.dockerfile }} \
            ${CONTEXT}

      - name: Scan image for CVEs (trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: localhost/${{ matrix.image_name }}:${{ steps.tag.outputs.tag }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.72.0

      - name: Save image to tarball
        run: |
          mkdir -p /tmp/image-artifact
          IMAGE="localhost/${{ matrix.image_name }}:${{ steps.tag.outputs.tag }}"
          TARBALL="/tmp/image-artifact/${{ matrix.image_name }}-amd64.tar"
          echo "💾 Saving ${IMAGE} -> ${TARBALL}..."
          docker save -o "${TARBALL}" "${IMAGE}"
          ls -lh "${TARBALL}"

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: image-${{ matrix.image_name }}-amd64
          path: /tmp/image-artifact/${{ matrix.image_name }}-amd64.tar
          retention-days: 2

  # ========================================
  # STAGE 3: INTEGRATION TESTS
  # Waits for BOTH unit-tests AND build-images to complete
  # Matrix strategy: 10 services (all Go, same pattern: envtest + Podman)
  #
  # CI/CD Optimization:
  #   - Loads dependency images (DataStorage, KA, Mock LLM) from workflow
  #     artifacts produced by build-images/build-infra-images (no registry)
  #   - Fallback to local build if a needed image wasn't loaded
  #   - Saves ~60% disk space and ~30% build time vs. building fresh
  #
  # DESIGN DECISION: No smart path detection at this level
  # - All integration tests run for ANY change (after images are built)
  # - Rationale: Integration tests are fast (~15 min total, parallel)
  # - Benefit: Better cross-service issue detection
  # - Trade-off: Uses more CI minutes, but comprehensive coverage worth it
  # - Smart path detection reserved for E2E tests (slower, 30 min each)
  # ========================================

  integration-tests:
    name: Integration (${{ matrix.service }})
    needs: [detect-changes, unit-tests, build-images, build-infra-images]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    env:
      KUBERNAUT_CI_ARTIFACT_TAG: ${{ needs.build-images.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        service: [signalprocessing, aianalysis, authwebhook, workflowexecution, remediationorchestrator, notification, gateway, datastorage, effectivenessmonitor, kubernautagent, apifrontend, fleetmetadatacache]
        include:
          - service: signalprocessing
            service_name: "Signal Processing"
            timeout: 10
          - service: aianalysis
            service_name: "AI Analysis"
            timeout: 15
          - service: fleetmetadatacache
            service_name: "Fleet Metadata Cache"
            timeout: 10
          - service: authwebhook
            service_name: "Auth Webhook"
            timeout: 10
          - service: workflowexecution
            service_name: "Workflow Execution"
            timeout: 15
          - service: remediationorchestrator
            service_name: "Remediation Orchestrator"
            timeout: 15
          - service: notification
            service_name: "Notification"
            timeout: 10
          - service: gateway
            service_name: "Gateway"
            timeout: 20
          - service: datastorage
            service_name: "Data Storage"
            timeout: 10
          - service: effectivenessmonitor
            service_name: "Effectiveness Monitor"
            timeout: 15
          - service: kubernautagent
            service_name: "Kubernaut Agent"
            timeout: 20
          - service: apifrontend
            service_name: "API Frontend"
            timeout: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true

      - name: Free disk space (kubernautagent IT builds 4 concurrent DataStorage images)
        if: matrix.service == 'kubernautagent'
        run: |
          # #1657: kubernautagent's 4 Ginkgo suites (investigator, mcp, tools/custom,
          # enrichment) each independently build a fresh DataStorage Podman image with
          # --procs=$(nproc) parallelism, so multiple full multi-stage builds run
          # concurrently. This deterministically exhausted the runner's ~14GB disk
          # budget (writing blob: ... no space left on device). Same remediation
          # already used by the E2E jobs below for the same class of problem.
          echo "Disk before cleanup:"
          df -h /
          sudo apt-get purge -y \
            google-cloud-cli azure-cli microsoft-edge-stable google-chrome-stable \
            dotnet-sdk-* powershell mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/share/swift /opt/hostedtoolcache/CodeQL \
            /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/share/edge_driver /opt/microsoft 2>/dev/null || true
          sudo docker image prune -a -f 2>/dev/null || true
          sudo podman system prune -a -f 2>/dev/null || true
          echo "Disk after cleanup:"
          df -h /

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}
      - name: Generate OpenAPI specs (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: make generate
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Setup envtest (K8s test binaries)
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@f9589b9f2b9dddf8532b432bb8315f2820ab9971 # release-0.23
          echo "KUBEBUILDER_ASSETS=$($(go env GOPATH)/bin/setup-envtest use -p path)" >> $GITHUB_ENV
      - name: Load pre-built images (artifact-based, no registry)
        uses: ./.github/actions/load-ci-images
      - name: Run ${{ matrix.service }} integration tests
        run: |
          make test-integration-${{ matrix.service }} 2>&1 | tee integration-${{ matrix.service }}.log
          exit ${PIPESTATUS[0]}
      
      - name: Upload integration test log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: integration-log-${{ matrix.service }}-${{ github.run_id }}
          path: integration-${{ matrix.service }}.log
          retention-days: 14
          if-no-files-found: ignore
      
      - name: Calculate and save integration coverage
        if: always()
        run: |
          mkdir -p coverage-reports
          if [ -f coverage_integration_${{ matrix.service }}.out ]; then
            COVERAGE=$(go tool cover -func=coverage_integration_${{ matrix.service }}.out | grep total | awk '{print $3}')
            if [ -z "$COVERAGE" ]; then
              echo "${{ matrix.service }},N/A" > coverage-reports/integration-${{ matrix.service }}.txt
              echo "⚠️  No integration coverage data found for ${{ matrix.service }} (parsing failed)"
            else
              echo "${{ matrix.service }},${COVERAGE}" > coverage-reports/integration-${{ matrix.service }}.txt
              echo "📊 Integration Coverage for ${{ matrix.service }}: ${COVERAGE}"
            fi
          else
            echo "${{ matrix.service }},N/A" > coverage-reports/integration-${{ matrix.service }}.txt
            echo "ℹ️  No integration coverage data found for ${{ matrix.service }}"
          fi
      
      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-integration-${{ matrix.service }}
          path: coverage-reports/integration-${{ matrix.service }}.txt
          retention-days: 1

      - name: Upload full integration coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-profile-integration-${{ matrix.service }}
          path: coverage_integration_${{ matrix.service }}.out
          retention-days: 1
          if-no-files-found: ignore
      
      - name: Validate Data Storage OpenAPI spec (ADR-031)
        if: matrix.service == 'datastorage'
        run: make validate-openapi-datastorage
      - name: Collect must-gather logs on failure
        if: failure() || cancelled()
        run: |
          echo "📋 Collecting must-gather logs for triage..."
          if [ -d "/tmp/kubernaut-must-gather" ]; then
            echo "✅ Found must-gather directory"
            ls -la /tmp/kubernaut-must-gather/
            # Create timestamped archive for this service
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            tar -czf must-gather-${{ matrix.service }}-${TIMESTAMP}.tar.gz -C /tmp kubernaut-must-gather/
            echo "✅ Created must-gather archive: must-gather-${{ matrix.service }}-${TIMESTAMP}.tar.gz"
          else
            echo "⚠️  No must-gather directory found at /tmp/kubernaut-must-gather"
            echo "    This may be expected if tests failed before must-gather was triggered"
          fi
      - name: Upload must-gather logs as artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: must-gather-logs-integration-${{ matrix.service }}-${{ github.run_id }}
          path: must-gather-*.tar.gz
          retention-days: 14
          if-no-files-found: warn
      - name: Cleanup
        if: always()
        run: podman ps -a --filter "name=${{ matrix.service }}-" --format "{{.Names}}" | xargs -r podman rm -f
  # ========================================
  # STAGE 4: E2E TESTS (PARALLEL)
  # Matrix job, 11 services in parallel (~30 min each)
  # 
  # Test Coverage:
  #   - 10 Go services: signalprocessing, aianalysis, authwebhook, workflowexecution,
  #     remediationorchestrator, notification, gateway, datastorage,
  #     effectivenessmonitor, kubernautagent
  #   - 1 full pipeline E2E
  #
  # Image Strategy:
  #   - Pre-built images are loaded from workflow artifacts (build-images /
  #     build-infra-images), no registry involved
  #   - BuildImageForKind() picks them up via KUBERNAUT_CI_ARTIFACT_TAG,
  #     falling back to a local build if an image wasn't loaded
  #
  # DESIGN DECISION: Runs after integration tests pass
  # - E2E tests are slower (30 min each) and more resource-intensive
  # - Integration tests validate core functionality first (faster feedback)
  # - E2E tests validate full user journeys and cross-service scenarios
  # ========================================

  e2e-tests:
    name: E2E (${{ matrix.service }})
    needs: [detect-changes, unit-tests, build-images, build-infra-images]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    permissions:
      contents: read
    env:
      # E2E Image Strategy: Use artifact-loaded images, fallback to local build.
      # BuildImageForKind() checks KUBERNAUT_CI_ARTIFACT_TAG first (see
      # test/infrastructure/e2e_images.go); falls back to local build+cover
      # if a given service's image wasn't loaded (non-fatal, just slower).
      KUBERNAUT_CI_ARTIFACT_TAG: ${{ needs.build-images.outputs.tag }}
      E2E_COVERAGE: true  # Enable coverage instrumentation for local builds (GOFLAGS=-cover)
    strategy:
      fail-fast: false
      matrix:
        service: [signalprocessing, aianalysis, authwebhook, workflowexecution, remediationorchestrator, notification, gateway, datastorage, effectivenessmonitor, kubernautagent, apifrontend, fullpipeline, fleet, fleetmetadatacache-kuadrant, fleetmetadatacache-eaigw]
        include:
          - service: signalprocessing
            service_name: "Signal Processing"
            timeout: 20
          - service: aianalysis
            service_name: "AI Analysis"
            timeout: 20
          - service: authwebhook
            service_name: "Auth Webhook"
            timeout: 20
          - service: workflowexecution
            service_name: "Workflow Execution"
            timeout: 20
          - service: remediationorchestrator
            service_name: "Remediation Orchestrator"
            timeout: 20
          - service: notification
            service_name: "Notification"
            timeout: 20
          - service: gateway
            service_name: "Gateway"
            timeout: 20
          - service: datastorage
            service_name: "Data Storage"
            timeout: 20
          - service: effectivenessmonitor
            service_name: "Effectiveness Monitor"
            timeout: 20
          - service: kubernautagent
            service_name: "Kubernaut Agent"
            timeout: 30
          - service: apifrontend
            service_name: "API Frontend"
            timeout: 25
          - service: fullpipeline
            service_name: "Full Pipeline"
            timeout: 20
          - service: fleet
            service_name: "Fleet Multi-Cluster"
            timeout: 35
          - service: fleetmetadatacache-kuadrant
            service_name: "Fleet Metadata Cache (Kuadrant)"
            timeout: 15
          - service: fleetmetadatacache-eaigw
            service_name: "Fleet Metadata Cache (EAIGW)"
            timeout: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true

      - name: Free disk space (E2E jobs need headroom for Kind + images)
        if: matrix.service == 'workflowexecution' || matrix.service == 'fullpipeline' || matrix.service == 'fleet'
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo apt-get purge -y \
            google-cloud-cli azure-cli microsoft-edge-stable google-chrome-stable \
            dotnet-sdk-* powershell mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/share/swift /opt/hostedtoolcache/CodeQL \
            /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/share/edge_driver /opt/microsoft 2>/dev/null || true
          sudo docker image prune -a -f 2>/dev/null || true
          sudo podman system prune -a -f 2>/dev/null || true
          echo "Disk after cleanup:"
          df -h /

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}
      - name: Generate OpenAPI specs (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: make generate
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Load pre-built images (artifact-based, no registry)
        uses: ./.github/actions/load-ci-images
      - name: Install Kind v0.32.0
        run: |
          KIND_VERSION="v0.32.0"
          curl -Lo ./kind "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version
      - name: Install Helm (fleet/fleetmetadatacache-kuadrant/fleetmetadatacache-eaigw E2E deploy Istio/Kuadrant/Envoy AI Gateway via helm)
        if: matrix.service == 'fleet' || matrix.service == 'fleetmetadatacache-kuadrant' || matrix.service == 'fleetmetadatacache-eaigw'
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: latest
      - name: Install Tekton CLI (tkn)
        run: |
          TKN_VERSION="0.40.0"
          TKN_TARBALL="tkn_${TKN_VERSION}_Linux_x86_64.tar.gz"
          TKN_URL="https://github.com/tektoncd/cli/releases/download/v${TKN_VERSION}/${TKN_TARBALL}"
          curl -L --retry 3 --retry-delay 5 -o "${TKN_TARBALL}" "${TKN_URL}"
          file "${TKN_TARBALL}" | grep -q "gzip" || {
            echo "::error::Downloaded ${TKN_TARBALL} is not a valid gzip archive (possible CDN issue). Actual type: $(file ${TKN_TARBALL})"
            exit 1
          }
          tar xzf "${TKN_TARBALL}" tkn
          chmod +x tkn
          sudo mv tkn /usr/local/bin/tkn
          tkn version
      - name: Disable AppArmor rsyslog profile (for AWX)
        if: matrix.service == 'workflowexecution' || matrix.service == 'fullpipeline' || matrix.service == 'fleet'
        run: |
          # Issue #440: AWX rsyslog sidecar crash-loops on Ubuntu runners because
          # AppArmor denies rsyslogd read access to /var/lib/awx/rsyslog/rsyslog.conf.
          # Upstream fix: ansible/awx#15717 (merged to devel, not yet released).
          if sudo apparmor_parser -R /etc/apparmor.d/usr.sbin.rsyslogd 2>/dev/null; then
            echo "✅ AppArmor rsyslog profile removed"
          else
            echo "⚠️  AppArmor rsyslog profile not found or already removed (non-fatal)"
          fi
      # Note: previously wrapped in nick-fields/retry@v4 (max_attempts: 3). Retries
      # mask flakes AND destroy diagnostics: a retry tears down the failing attempt's
      # cluster and stands up a fresh one, so the "Collect must-gather logs on failure"
      # step below only ever sees the LAST attempt's (often mid-bootstrap) cluster
      # instead of the one that actually failed. A single attempt gets the full
      # matrix.timeout budget (job-level timeout-minutes below), which is more time
      # than any individual retry attempt got before.
      - name: Run ${{ matrix.service }} E2E tests
        run: make test-e2e-${{ matrix.service }}
      
      - name: Calculate and save E2E coverage
        if: always()
        run: |
          mkdir -p coverage-reports
          if [ -f coverage_e2e_${{ matrix.service }}.out ]; then
            COVERAGE=$(go tool cover -func=coverage_e2e_${{ matrix.service }}.out | grep total | awk '{print $3}')
            if [ -z "$COVERAGE" ]; then
              echo "${{ matrix.service }},N/A" > coverage-reports/e2e-${{ matrix.service }}.txt
              echo "⚠️  No E2E coverage data found for ${{ matrix.service }} (coverage file exists but parsing failed)"
            else
              echo "${{ matrix.service }},${COVERAGE}" > coverage-reports/e2e-${{ matrix.service }}.txt
              echo "📊 E2E Coverage for ${{ matrix.service }}: ${COVERAGE}"
            fi
          else
            echo "${{ matrix.service }},N/A" > coverage-reports/e2e-${{ matrix.service }}.txt
            echo "ℹ️  No E2E coverage data found for ${{ matrix.service }}"
          fi
      
      - name: Upload E2E coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-e2e-${{ matrix.service }}
          path: coverage-reports/e2e-${{ matrix.service }}.txt
          retention-days: 1

      - name: Upload full E2E coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-profile-e2e-${{ matrix.service }}
          path: coverage_e2e_${{ matrix.service }}.out
          retention-days: 1
          if-no-files-found: ignore

      - name: Collect must-gather logs on failure
        if: failure() || cancelled()
        run: |
          echo "📋 Collecting must-gather logs for triage..."
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          if [ -d "/tmp/kubernaut-must-gather" ]; then
            echo "✅ Found must-gather directory (AfterSuite executed)"
            ls -la /tmp/kubernaut-must-gather/
            tar -czf must-gather-e2e-${{ matrix.service }}-${TIMESTAMP}.tar.gz -C /tmp kubernaut-must-gather/
            echo "✅ Created must-gather archive: must-gather-e2e-${{ matrix.service }}-${TIMESTAMP}.tar.gz"
          else
            echo "⚠️  No must-gather directory found (BeforeSuite failure)"
            echo "📋 Manually exporting Kind cluster logs..."
            
            # FIX: Dynamically detect cluster name (each E2E test uses custom names)
            # Examples: gateway-e2e, authwebhook-e2e, notification-e2e, ro-e2e, etc.
            CLUSTER_NAME=$(kind get clusters 2>/dev/null | grep -E "e2e|${{ matrix.service }}" | head -1)
            
            if [ -n "$CLUSTER_NAME" ]; then
              echo "✅ Found Kind cluster: $CLUSTER_NAME"
              
              # Export Kind logs to temporary directory
              EXPORT_DIR=$(mktemp -d)
              kind export logs "$EXPORT_DIR" --name "$CLUSTER_NAME" || echo "⚠️  Kind export logs failed"
              
              if [ -d "$EXPORT_DIR" ]; then
                echo "✅ Exported Kind logs to $EXPORT_DIR"
                ls -la "$EXPORT_DIR"
                tar -czf must-gather-e2e-${{ matrix.service }}-${TIMESTAMP}.tar.gz -C "$EXPORT_DIR" .
                echo "✅ Created must-gather archive from Kind export"
                rm -rf "$EXPORT_DIR"
              else
                echo "❌ Failed to export Kind logs"
              fi
            else
              echo "❌ No Kind cluster found - tests failed before cluster creation"
              echo "Available clusters:"
              kind get clusters 2>&1 || echo "  (none)"
            fi
          fi
      - name: Upload must-gather logs as artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: must-gather-logs-e2e-${{ matrix.service }}-${{ github.run_id }}
          path: must-gather-e2e-*.tar.gz
          retention-days: 14
          if-no-files-found: warn
      - name: Cleanup Kind cluster
        if: always()
        run: |
          # FIX: Dynamically detect and cleanup E2E clusters (custom names per service)
          for cluster in $(kind get clusters 2>/dev/null | grep -E "e2e"); do
            echo "🗑️  Deleting Kind cluster: $cluster"
            kind delete cluster --name "$cluster" || true
          done
      - name: Cleanup containers
        if: always()
        run: podman ps -a --filter "name=${{ matrix.service }}-" --format "{{.Names}}" | xargs -r podman rm -f

  # ========================================
  # HELM SMOKE TESTS
  # Validates the Helm chart install/upgrade/uninstall lifecycle on a Kind cluster.
  # Runs after images are built (parallel with integration + E2E tests).
  #
  # Includes two freshness gates that run BEFORE the Kind cluster is created:
  #   1. CRD freshness: `make manifests` + diff against charts/kubernaut/crds/
  #   2. values.schema.json: `helm lint --strict` validates schema consistency
  #
  # Image strategy: Load pre-built images from workflow artifacts (no
  # registry, no pull secret) and `kind load` them directly into the cluster.
  # Authority: docs/testing/342/TEST_PLAN.md
  # ========================================

  helm-smoke-test:
    name: Helm Smoke Tests (Kind, tls=${{ matrix.tls_mode }})
    needs: [detect-changes, build-images, build-infra-images, unit-tests]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    # cert-manager leg additionally runs the ArgoCD GitOps validation (see
    # "Install ArgoCD" onward below) on top of the plain helm-install smoke
    # test, so it needs materially more headroom than the hook leg.
    timeout-minutes: ${{ matrix.tls_mode == 'cert-manager' && 45 || 30 }}
    strategy:
      fail-fast: false
      matrix:
        # #334 + DD-PLATFORM-001: cert-manager mode was previously untested in
        # CI -- both the datastorage-signing-cert gap and the inter-service
        # mTLS gap were silent regressions only caught by manual kind spikes.
        tls_mode: [hook, cert-manager]
    permissions:
      contents: read
    env:
      KIND_CLUSTER_NAME: helm-smoke-${{ matrix.tls_mode }}
      IMAGE_TAG: ${{ needs.build-images.outputs.tag }}
      ARGOCD_VERSION: v3.4.4
      GITOPS_NAMESPACE: kubernaut-gitops-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache: true

      - name: CRD freshness gate
        run: |
          echo "Generating CRDs from Go types (make manifests)..."
          make manifests
          echo ""
          echo "Comparing config/crd/bases/ with charts/kubernaut/crds/..."
          if ! diff -r config/crd/bases/ charts/kubernaut/crds/; then
            echo ""
            echo "FAIL: Chart CRDs are stale. Run 'make manifests' and copy"
            echo "      config/crd/bases/*.yaml to charts/kubernaut/crds/"
            exit 1
          fi
          echo "PASS: Chart CRDs match generated CRDs"

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: latest

      - name: values.schema.json validation
        run: |
          echo "Running helm lint --strict to validate schema consistency..."
          helm lint charts/kubernaut/ --strict \
            --set global.image.tag=schema-check \
            --set postgresql.auth.existingSecret=lint-placeholder \
            --set datastorage.dbExistingSecret=lint-placeholder \
            --set valkey.existingSecret=lint-placeholder \
            --set kubernautAgent.llm.provider=openai \
            --set kubernautAgent.llm.model=gpt-4o \
            --set kubernautAgent.llm.credentialsSecretName=lint-placeholder
          echo "PASS: values.schema.json is consistent with values.yaml"

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman --version

      - name: Install Kind
        run: |
          KIND_VERSION="v0.32.0"
          curl -Lo ./kind "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      # extraPortMappings (hostPort 8080 -> containerPort 30080) is only
      # consumed by the cert-manager leg's ArgoCD CLI access below (NodePort,
      # not `kubectl port-forward` -- avoids a backgrounded process as a
      # source of flakiness); harmless no-op for the hook leg.
      - name: Create Kind cluster
        run: |
          cat <<'EOF' > /tmp/kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 30080
              hostPort: 8080
              protocol: TCP
          EOF
          kind create cluster --name "$KIND_CLUSTER_NAME" --config /tmp/kind-config.yaml --wait 120s
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Download pre-built image artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: image-*-amd64
          path: /tmp/ci-images
          merge-multiple: true

      - name: Load images directly into Kind (no registry, no pull secret)
        run: |
          shopt -s nullglob
          tars=(/tmp/ci-images/*.tar)
          if [ ${#tars[@]} -eq 0 ]; then
            echo "::error::No image tarballs found in /tmp/ci-images"
            exit 1
          fi
          for tar in "${tars[@]}"; do
            echo "📦 Loading $(basename "$tar") into Kind cluster ${KIND_CLUSTER_NAME}..."
            kind load image-archive "$tar" --name "$KIND_CLUSTER_NAME"
          done

      # #334 + DD-PLATFORM-001: install cert-manager + a single bootstrap
      # ClusterIssuer so the chart's `lookup`-based issuerRef auto-selection
      # (tls.certManager.issuerRef in values.yaml) has exactly one candidate,
      # matching how a real cluster operator would prepare cert-manager mode.
      - name: Install cert-manager
        if: matrix.tls_mode == 'cert-manager'
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.20.3/cert-manager.yaml
          kubectl wait --for=condition=Available --timeout=120s deployment --all -n cert-manager
          kubectl apply -f deploy/cert-manager/selfsigned-issuer.yaml
          kubectl wait --for=condition=Ready --timeout=60s clusterissuer/selfsigned-issuer

      - name: Run smoke tests
        run: |
          scripts/helm-smoke-test.sh \
            --platform kind \
            --image-tag "${IMAGE_TAG}" \
            --registry localhost \
            --chart-path charts/kubernaut/ \
            --tls-mode "${{ matrix.tls_mode }}"

      # ==========================================================
      # GitOps (ArgoCD) validation -- issue #1617 item 4, DD-PLATFORM-002
      #
      # Deploys the SAME chart, at the SAME commit, using the SAME
      # already-loaded PR images (registry=localhost, tag=${IMAGE_TAG}) as
      # the plain `helm install` smoke test above -- but through a real
      # ArgoCD Application instead of the Helm CLI, to catch ArgoCD-specific
      # phase/wave/hook incompatibilities (e.g. the PostSync/health deadlock
      # fixed by DD-PLATFORM-002) that a plain `helm install` can never
      # exercise. Deliberately reuses this job's already-running Kind
      # cluster and already-loaded images rather than a separate workflow
      # with its own cluster: a separate workflow has no access to this PR's
      # freshly-built (unpublished) images, so it would have to fall back to
      # a stale published tag -- silently passing/failing independently of
      # the actual code change under review. Scoped to the cert-manager leg
      # only: DD-PLATFORM-001's inter-service mTLS auto-provisioning (which
      # this validates end-to-end) only applies in that mode.
      # ==========================================================

      - name: Install ArgoCD CLI
        if: matrix.tls_mode == 'cert-manager'
        run: |
          curl -sSL -o /usr/local/bin/argocd "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd
          argocd version --client

      # #1617 spike finding: ArgoCD's own CRDs (e.g. applicationsets.argoproj.io)
      # exceed the client-side apply kubectl.kubernetes.io/last-applied-configuration
      # annotation limit (262144 bytes) -- server-side apply is required to install
      # ArgoCD itself, not just to sync this chart.
      - name: Install ArgoCD
        if: matrix.tls_mode == 'cert-manager'
        run: |
          kubectl create namespace argocd
          kubectl apply -n argocd --server-side --force-conflicts \
            -f "https://raw.githubusercontent.com/argoproj/argo-cd/${ARGOCD_VERSION}/manifests/install.yaml"
          kubectl wait --for=condition=Available --timeout=180s deployment -l app.kubernetes.io/part-of=argocd -n argocd

      - name: Log in to ArgoCD CLI
        if: matrix.tls_mode == 'cert-manager'
        run: |
          kubectl -n argocd wait --for=condition=Available --timeout=60s deployment/argocd-server
          kubectl patch svc argocd-server -n argocd -p \
            '{"spec": {"type": "NodePort", "ports": [{"name": "https", "port": 443, "targetPort": 8080, "nodePort": 30080}]}}'
          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d)
          for i in $(seq 1 10); do
            argocd login localhost:8080 --username admin --password "$ARGOCD_PASSWORD" --insecure && break
            echo "Retrying ArgoCD login ($i/10)..."
            sleep 5
          done

      - name: Provision GitOps prerequisite namespace and secrets
        if: matrix.tls_mode == 'cert-manager'
        run: |
          kubectl create namespace "$GITOPS_NAMESPACE"
          # #1617 spike finding: `lookup` has no live cluster access when ArgoCD's
          # repo-server renders the chart (equivalent to `helm template`, not a real
          # `helm install`) -- every value the chart would otherwise auto-discover
          # via `lookup` (issuerRef, secrets) must be supplied explicitly here.
          kubectl create secret generic postgresql-secret -n "$GITOPS_NAMESPACE" \
            --from-literal=POSTGRES_USER=slm_user \
            --from-literal=POSTGRES_PASSWORD=gitops-smoke-pass \
            --from-literal=POSTGRES_DB=action_history \
            --from-literal="db-secrets.yaml=$(printf 'username: slm_user\npassword: gitops-smoke-pass')"
          kubectl create secret generic valkey-secret -n "$GITOPS_NAMESPACE" \
            --from-literal="valkey-secrets.yaml=password: gitops-smoke-pass"
          kubectl create secret generic kubernaut-llm-credentials -n "$GITOPS_NAMESPACE" \
            --from-literal=OPENAI_API_KEY=sk-gitops-smoke-placeholder # pre-commit:allow-sensitive

      # targetRevision uses the same merge commit this job already checked
      # out and built images from (refs/pull/<n>/merge is maintained by
      # GitHub in the base repo for every PR, fork or not), so ArgoCD's
      # in-cluster git clone deploys the exact chart under review -- not a
      # separately-fetched branch head that could have already diverged.
      - name: Create ArgoCD Application
        if: matrix.tls_mode == 'cert-manager'
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          TARGET_REVISION: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
        run: |
          cat <<EOF | argocd app create -f -
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: kubernaut-gitops-smoke
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: ${REPO_URL}
              targetRevision: ${TARGET_REVISION}
              path: charts/kubernaut
              helm:
                valuesObject:
                  global:
                    image:
                      registry: localhost
                      namespace: ""
                      tag: ${IMAGE_TAG}
                  postgresql:
                    auth:
                      existingSecret: postgresql-secret
                  valkey:
                    existingSecret: valkey-secret
                  kubernautAgent:
                    llm:
                      provider: openai
                      model: gpt-4o
                      credentialsSecretName: kubernaut-llm-credentials
                  signalprocessing:
                    policies:
                      content: |
                        package signalprocessing
                        import rego.v1
                        default severity := "info"
                  aianalysis:
                    policies:
                      content: |
                        package aianalysis.approval
                        import rego.v1
                        default allow := false
                  monitoring:
                    prometheus:
                      enabled: false
                    alertManager:
                      enabled: false
                  tls:
                    mode: cert-manager
                    certManager:
                      issuerRef:
                        name: selfsigned-issuer
                        kind: ClusterIssuer
            destination:
              server: https://kubernetes.default.svc
              namespace: ${GITOPS_NAMESPACE}
          EOF
          argocd app list

      # `argocd app sync` blocks until Synced AND Healthy, not just until
      # manifests are applied. This validates GitOps sync mechanics -- CRDs,
      # hooks, cert-manager wiring -- with placeholder LLM credentials, so
      # some controllers (aianalysis, kubernaut-agent) never reach Healthy
      # for reasons unrelated to GitOps mechanics, and this command reliably
      # times out even on a fully successful sync. That timeout is
      # therefore tolerated here (`|| true`); "Verify GitOps deployment"
      # below asserts the specific resources that actually matter with
      # their own precise waits, instead of relying on aggregate app health.
      # RCA (PR #1625 run 28916308187, 2026-07-08): the very first cert-manager
      # run of this job hit a *terminal* sync failure, not the tolerated
      # health-timeout above -- the operation phase flipped straight to
      # "Failed" with message "one or more synchronization tasks completed
      # unsuccessfully" while every sync-wave "-1" resource was in fact
      # Healthy by the time the operation ended (confirmed via must-gather:
      # datastorage-signing-cert, the 3 leaf Certificates, and the
      # kubernaut-interservice-ca-issuer Issuer were all momentarily observed
      # Degraded -- "Issuing certificate as Secret does not exist" / "Error
      # getting keypair for CA issuer" -- for exactly one controller poll
      # before self-healing). ArgoCD's sync engine records a sync task's
      # phase as Failed the instant it sees this and never re-evaluates it,
      # so it refuses to progress into sync-wave "0" (gateway, etc.) for the
      # rest of that operation even though the gating wave *did* finish
      # Healthy moments later -- this is a documented upstream behavior, not
      # a chart defect (argoproj/argo-cd#9721: "when a hook fails [i.e. any
      # sync task], even when it is retried and eventually successful, this
      # will block argocd from continuing the sync"). A brand new sync
      # operation re-evaluates current live state -- by then everything from
      # the previous attempt is already Synced/Healthy -- so retry a bounded
      # number of times before falling back to the pre-existing
      # health-timeout tolerance.
      - name: Sync ArgoCD Application
        if: matrix.tls_mode == 'cert-manager'
        run: |
          for attempt in 1 2 3; do
            if argocd app sync kubernaut-gitops-smoke --server-side --timeout 180; then
              echo "::notice::ArgoCD sync succeeded on attempt $attempt"
              break
            fi
            phase=$(argocd app get kubernaut-gitops-smoke -o json 2>/dev/null | jq -r '.status.operationState.phase // "Unknown"')
            if [ "$phase" != "Failed" ] && [ "$phase" != "Error" ]; then
              echo "::notice::sync timed out waiting for full pod health (expected -- some controllers need real LLM credentials/config this smoke test doesn't provide) -- proceeding to targeted resource checks"
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::notice::sync operation phase '$phase' (attempt $attempt/3) -- terminal sync failure, likely a transient ArgoCD sync-wave health race (argoproj/argo-cd#9721); retrying with a fresh sync operation"
              sleep 5
            else
              echo "::warning::sync failed 3 times with terminal phase '$phase' -- proceeding to targeted resource checks regardless, which will fail below if this was not a transient race"
            fi
          done
          argocd app get kubernaut-gitops-smoke || true

      # DD-PLATFORM-002 residual nuance (shared with tls.mode=hook under plain
      # Helm CLI -- not new, not ArgoCD-specific): ~11 services mount
      # inter-service-ca as a ConfigMap volume with `optional: true`. If a
      # service's pod is scheduled and its volume set up *before*
      # interservice-ca-sync creates that ConfigMap (a real race: the Job
      # needs ~15-20s to run, a Deployment pod can start faster), kubelet
      # mounts an empty directory and will not retroactively populate it for
      # that pod once the ConfigMap appears; only a fresh pod re-evaluates
      # the volume. This step makes that convergence deterministic in CI by
      # restarting any pod still crash-looping once both sync Jobs have
      # actually completed.
      #
      # Separate, CI-only resource-contention finding (observed on
      # PR #1625's first cert-manager run, 2026-07-08): this Kind cluster
      # runs kube-apiserver/etcd/scheduler + ArgoCD's ~9 pods + cert-manager's
      # 3 pods + this chart's ~14 Go controllers + postgres + valkey -- and
      # DD-PLATFORM-002 puts every chart Deployment in the same sync-wave "0"
      # as the hook Jobs, so ArgoCD applies (and each controller starts) them
      # essentially simultaneously. On a standard 4-vCPU/16GB GitHub-hosted
      # runner (docs.github.com/en/actions/reference/runners/github-hosted-runners),
      # that simultaneous burst can transiently starve the node enough that
      # in-cluster apiserver connections fail during controller-runtime
      # manager startup -- confirmed via must-gather: multiple *unrelated*
      # services (gateway, authwebhook, effectivenessmonitor, notification,
      # signalprocessing, workflowexecution) all failed with the identical
      # "dial tcp <apiserver-ClusterIP>:443: i/o timeout" error, each exactly
      # 30s (client-go's dial timeout) after their last successful log line,
      # in the same ~45s wall-clock window -- while kube-apiserver's own log
      # went silent for the preceding ~4 minutes. This is a CI-environment
      # capacity artifact, not a chart/app defect, so a single restart isn't
      # reliably enough time for the burst to subside; poll across multiple
      # passes instead of failing fast on the first one.
      - name: Recover pods that raced the migration/CA-sync Jobs
        if: matrix.tls_mode == 'cert-manager'
        run: |
          echo "=== Waiting for db-migration and interservice-ca-sync Jobs to complete ==="
          for app_label in db-migration interservice-ca-sync; do
            JOB_NAME=$(kubectl get pods -n "$GITOPS_NAMESPACE" -l "app=${app_label}" -o jsonpath='{.items[0].metadata.labels.job-name}' 2>/dev/null || true)
            if [[ -n "$JOB_NAME" ]]; then
              kubectl wait --for=condition=Complete --timeout=120s "job/${JOB_NAME}" -n "$GITOPS_NAMESPACE" 2>&1 || true
            else
              echo "::warning::no pod found for app=${app_label} yet -- Job may not have been scheduled"
            fi
          done

          echo "=== Restarting any pods still CrashLoopBackOff, across multiple passes to absorb transient CI resource contention ==="
          for attempt in 1 2 3 4 5; do
            CRASHING=$(kubectl get pods -n "$GITOPS_NAMESPACE" -o json | \
              jq -r '.items[] | select(.status.containerStatuses[]?.state.waiting.reason == "CrashLoopBackOff") | .metadata.name')
            if [[ -z "$CRASHING" ]]; then
              echo "No crash-looping pods found on attempt ${attempt}/5 -- stable"
              break
            fi
            echo "Attempt ${attempt}/5: restarting crash-looping pods: $CRASHING"
            # shellcheck disable=SC2086
            kubectl delete pod -n "$GITOPS_NAMESPACE" $CRASHING
            echo "Waiting 45s for restarted pods to stabilize..."
            sleep 45
          done
          kubectl get pods -n "$GITOPS_NAMESPACE" -o wide

      - name: Verify GitOps deployment
        if: matrix.tls_mode == 'cert-manager'
        run: |
          FAIL=0

          echo "=== CRDs (expect 10, installed by the PreSync crd-upgrade hook) ==="
          CRD_COUNT=$(kubectl get crds 2>/dev/null | grep -c "kubernaut.ai" || true)
          echo "Found: ${CRD_COUNT}"
          [[ "$CRD_COUNT" -eq 10 ]] || { echo "FAIL: expected 10 CRDs"; FAIL=1; }

          echo "=== cert-manager Certificates (#334 + DD-PLATFORM-001) ==="
          for cert in authwebhook-cert datastorage-signing-cert kubernaut-interservice-ca gateway-tls datastorage-tls kubernautagent-tls; do
            if kubectl wait --for=condition=Ready --timeout=180s "certificate/${cert}" -n "$GITOPS_NAMESPACE" 2>/dev/null; then
              echo "OK: ${cert} Ready"
            else
              echo "FAIL: ${cert} not Ready"
              kubectl describe "certificate/${cert}" -n "$GITOPS_NAMESPACE" 2>&1 || true
              FAIL=1
            fi
          done

          echo "=== db-migration + inter-service-ca ConfigMap sync hooks (DD-PLATFORM-002) ==="
          MIGRATION_JOB=$(kubectl get pods -n "$GITOPS_NAMESPACE" -l app=db-migration -o jsonpath='{.items[0].metadata.labels.job-name}' 2>/dev/null || true)
          if [[ -n "$MIGRATION_JOB" ]] && kubectl get job "$MIGRATION_JOB" -n "$GITOPS_NAMESPACE" -o jsonpath='{.status.succeeded}' 2>/dev/null | grep -q '^1$'; then
            echo "OK: db-migration Job (${MIGRATION_JOB}) succeeded"
          else
            echo "FAIL: db-migration Job did not succeed -- ArgoCD PostSync/health deadlock may have regressed"
            kubectl get pods -n "$GITOPS_NAMESPACE" -l app=db-migration -o wide 2>&1 || true
            FAIL=1
          fi
          if kubectl get configmap inter-service-ca -n "$GITOPS_NAMESPACE" >/dev/null 2>&1; then
            echo "OK: inter-service-ca ConfigMap exists"
          else
            echo "FAIL: inter-service-ca ConfigMap missing -- ArgoCD PostSync/health deadlock may have regressed"
            FAIL=1
          fi

          echo "=== datastorage-signing-cert Secret (#334 regression guard) ==="
          if kubectl get secret datastorage-signing-cert -n "$GITOPS_NAMESPACE" -o jsonpath='{.data.tls\.key}' 2>/dev/null | grep -q .; then
            echo "OK: datastorage-signing-cert has tls.key"
          else
            echo "FAIL: datastorage-signing-cert missing or empty tls.key"
            FAIL=1
          fi

          echo "=== datastorage + gateway Ready (DD-PLATFORM-002 end-to-end proof) ==="
          # 180s (not 120s): the "Recover pods" step above already absorbs most
          # of the CI resource-contention-driven restarts, but leaves some
          # margin here in case a pod's crash-loop backoff had grown past 45s
          # by the time this runs.
          for dep in datastorage gateway; do
            if kubectl wait --for=condition=Available --timeout=180s "deployment/${dep}" -n "$GITOPS_NAMESPACE" 2>/dev/null; then
              echo "OK: ${dep} Available"
            else
              echo "FAIL: ${dep} not Available"
              kubectl describe "deployment/${dep}" -n "$GITOPS_NAMESPACE" 2>&1 || true
              FAIL=1
            fi
          done

          echo "=== Pod status (informational) ==="
          kubectl get pods -n "$GITOPS_NAMESPACE" -o wide

          if [[ "$FAIL" -ne 0 ]]; then
            echo "::error::One or more GitOps deployment checks failed"
            exit 1
          fi
          echo "PASS: all GitOps deployment checks succeeded"

      - name: Verify PreDelete hook fires on ArgoCD cascade delete
        if: matrix.tls_mode == 'cert-manager' && always()
        run: |
          argocd app delete kubernaut-gitops-smoke --cascade --yes || true
          echo "Waiting up to 3m for cascade delete + webhook-cleanup PreDelete hook..."
          for i in $(seq 1 18); do
            if ! kubectl get namespace "$GITOPS_NAMESPACE" >/dev/null 2>&1; then
              echo "OK: namespace ${GITOPS_NAMESPACE} fully removed (cascade + PreDelete hook completed)"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::Namespace ${GITOPS_NAMESPACE} still present after 3m -- cascade delete or PreDelete hook may be stuck"
          kubectl get all -n "$GITOPS_NAMESPACE" 2>&1 || true

      - name: Collect ArgoCD diagnostics on failure
        if: matrix.tls_mode == 'cert-manager' && (failure() || cancelled())
        run: |
          argocd app get kubernaut-gitops-smoke 2>&1 || true
          kubectl get pods -n "$GITOPS_NAMESPACE" -o wide 2>&1 || true
          kubectl get events -n "$GITOPS_NAMESPACE" --sort-by='.lastTimestamp' 2>&1 | tail -40 || true
          kubectl get certificates -n "$GITOPS_NAMESPACE" -o wide 2>&1 || true

      - name: Collect Kind node logs on failure
        if: failure() || cancelled()
        run: |
          kind export logs /tmp/kind-smoke-logs --name "$KIND_CLUSTER_NAME" 2>/dev/null || true

      - name: Upload must-gather and Kind logs
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: helm-smoke-must-gather-${{ matrix.tls_mode }}-${{ github.run_id }}
          path: |
            /tmp/must-gather-helm-smoke-*.tar.gz
            /tmp/kind-smoke-logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup Kind cluster
        if: always()
        run: |
          kind delete cluster --name "$KIND_CLUSTER_NAME" 2>/dev/null || true

      - name: Cleanup Podman
        if: always()
        run: |
          podman system prune -a -f 2>/dev/null || true

  # ========================================
  # SUMMARY
  # ========================================
  summary:
    name: Test Suite Summary
    needs: [detect-changes, lint-go, unit-tests, build-images, build-infra-images, integration-tests, e2e-tests, helm-unittest, helm-smoke-test]
    if: always() && needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # required for sticky-pull-request-comment to post/update PR comment
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Download coverage summary reports
        if: always()
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: coverage-*
          path: coverage-reports
          merge-multiple: true
        continue-on-error: true

      - name: Download full coverage profiles
        if: always()
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: coverage-profile-*
          path: coverage-profiles
          merge-multiple: true
        continue-on-error: true
      
      - name: Generate comprehensive coverage report
        if: always()
        run: |
          echo "📊 Generating comprehensive coverage report (Python-based, line-by-line merging)..."
          echo ""
          
          # Debug: Show available coverage artifacts
          echo "🔍 Downloaded coverage summary artifacts:"
          find coverage-reports -name "*.txt" -type f 2>/dev/null | sort || echo "  ⚠️  No coverage-reports directory found"
          echo ""
          echo "🔍 Downloaded full coverage profiles:"
          find coverage-profiles -type f 2>/dev/null | sort || echo "  ⚠️  No coverage-profiles directory found"
          echo ""
          
          # Move full .out/.txt coverage profiles to repo root (where coverage_report.py expects them)
          echo "🔄 Reconstructing coverage files..."
          if [ -d "coverage-profiles" ]; then
            for profile in coverage-profiles/coverage_*; do
              [ ! -f "$profile" ] && continue
              filename=$(basename "$profile")
              if [ -s "$profile" ]; then
                cp "$profile" "./$filename"
                echo "  ✅ $filename ($(wc -l < "$profile") lines)"
              else
                echo "  ⏭️  $filename (empty, skipped)"
              fi
            done
          fi
          echo ""
          
          # For services/tiers where full .out profiles aren't available,
          # create .pct fallback files from the summary artifacts
          echo "🔄 Creating .pct fallbacks for missing profiles..."
          if [ -d "coverage-reports" ]; then
            for artifact_file in coverage-reports/*.txt; do
              [ ! -f "$artifact_file" ] && continue
              filename=$(basename "$artifact_file")
              
              if [[ "$filename" =~ ^(unit|integration|e2e)-(.+)\.txt$ ]]; then
                tier="${BASH_REMATCH[1]}"
                service="${BASH_REMATCH[2]}"
                coverage=$(cut -d',' -f2 "$artifact_file" | head -1 | tr -d '[:space:]')
                
                # Only create .pct if no real .out file exists
                out_file="coverage_${tier}_${service}.out"
                if [ ! -s "$out_file" ]; then
                  echo "${coverage}" > "coverage_${tier}_${service}.pct"
                  echo "  📝 coverage_${tier}_${service}.pct = $coverage (fallback)"
                else
                  echo "  ✅ $out_file exists ($(wc -l < "$out_file") lines), skip .pct"
                fi
              fi
            done
          fi
          echo ""
          
          # Debug: Show final coverage file state
          echo "📋 Coverage files in workspace:"
          ls -la coverage_*.out coverage_*.pct coverage_*.txt 2>/dev/null | head -30 || echo "  (none)"
          echo ""
          
          # Generate markdown report using Python script (replaces bash+awk)
          if python3 scripts/coverage/coverage_report.py --format markdown > coverage-summary.md 2>&1; then
            echo "✅ Coverage report generated successfully"
            echo ""
            echo "📋 Preview:"
            head -n 40 coverage-summary.md | sed 's/^/  /'
            echo ""
            
            if grep -q "Kubernaut Coverage Report" coverage-summary.md && \
               grep -q "Unit-Testable" coverage-summary.md && \
               grep -q "All Tiers" coverage-summary.md; then
              echo "✅ Report format validated"
            else
              echo "⚠️  Warning: Report may be incomplete"
            fi
            
            SERVICE_COUNT=$(grep -c "^| [a-z]" coverage-summary.md || echo "0")
            echo "📊 Report contains $SERVICE_COUNT services"
          else
            echo "❌ Coverage report generation failed"
            echo "## 📊 Kubernaut Coverage Report" > coverage-summary.md
            echo "" >> coverage-summary.md
            echo "⚠️ **Coverage data could not be generated.**" >> coverage-summary.md
            echo "" >> coverage-summary.md
            echo "Run locally: \`make coverage-report-markdown\`" >> coverage-summary.md
            echo "" >> coverage-summary.md
            echo "See [Testing Coverage Methodology](docs/testing/TESTING_COVERAGE_METHODOLOGY.md)." >> coverage-summary.md
            echo "⚠️  Fallback report created"
          fi
          
          # Ensure file exists
          if [ ! -f coverage-summary.md ]; then
            echo "❌ CRITICAL: coverage-summary.md not created"
            echo "## ❌ Coverage Report Unavailable" > coverage-summary.md
            exit 1
          fi
      
      - name: Enforce coverage gate (unit + all-tiers merged >=80%)
        if: always()
        run: |
          echo "🔒 Coverage Gate: Checking unit-testable + all-tiers-merged >=80%..."
          echo "   (IT/E2E measured by wiring + control completeness, not line %. See AGENTS.md)"
          if python3 scripts/coverage/coverage_report.py --check-gate 80 > /dev/null 2>&1; then
            echo "✅ Coverage gate PASSED"
          else
            echo "⚠️  Coverage gate: some services below 80% — see report for details"
            echo "   (Non-blocking in V1.5 rollout; will become blocking after Phase 9)"
          fi

      - name: Publish coverage report to job summary
        # Works for every PR (fork or same-repo) and every event type: writing
        # to GITHUB_STEP_SUMMARY needs no token permissions at all, unlike the
        # sticky PR comment below. This is the primary, permission-agnostic
        # place contributors should look -- linked directly from the "Test
        # Suite Summary" entry on the PR's Checks tab even for forks.
        if: always()
        run: cat coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage report to PR
        # Fork PRs get a read-only GITHUB_TOKEN on `pull_request` events -- a
        # GitHub security restriction that cannot be elevated via the
        # `permissions:` block above (see
        # https://docs.github.com/en/actions/reference/security/securely-using-pull_request_target).
        # Posting the sticky comment there fails with "403 Resource not
        # accessible by integration" and would fail this job (and Merge Gate
        # with it) for every external contributor PR. Skip for forks instead
        # -- the job summary step above already gives them the full report
        # regardless of token permissions; this step is just the inline-PR-
        # comment convenience for same-repo PRs.
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3
        with:
          header: coverage-report
          path: coverage-summary.md
      
      - name: Test Suite Summary
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "Defense-in-Depth Test Suite Summary (Optimized + Parallel)"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          echo "STAGE 1 - Lint & Unit Tests (All Parallel):"
          echo "  Lint (Go):        ${{ needs.lint-go.result }}"
          echo "  Unit Tests (13):  ${{ needs.unit-tests.result }} (includes per-service fuzz corpus regression)"
          echo ""
          echo "STAGE 2 - Build Images (Parallel Matrix, artifact-based):"
          echo "  Go Services (12×2 arch):    ${{ needs.build-images.result }}"
          echo "  Infra Images (2, amd64):    ${{ needs.build-infra-images.result }}"
          echo "  Distribution: workflow artifacts (no registry push, 2-day retention)"
          echo ""
          echo "STAGE 3 - Integration Tests (Parallel Matrix):"
          echo "  All Services (12 services): ${{ needs.integration-tests.result }}"
          echo "  Image Strategy: Load from workflow artifacts (DataStorage, KA, Mock LLM)"
          echo ""
          echo "STAGE 4 - E2E Tests (Parallel Matrix):"
          echo "  All Services (13 services): ${{ needs.e2e-tests.result }}"
          echo "  Image Strategy: Load from workflow artifacts (all service images)"
          echo ""
          echo "Helm Smoke Tests (parallel with Stage 3+4):"
          echo "  Smoke Tests (Kind):  ${{ needs.helm-smoke-test.result }}"
          echo "  Gates: CRD freshness + values.schema.json validation"
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "Test Strategy:"
          echo "  ✅ ALL tests run for every non-draft PR"
          echo "  ✅ Comprehensive validation ensures stability"
          echo "  ✅ Sequential stages ensure images ready before use"
          echo ""
          echo "Optimizations:"
          echo "  ✅ Stage 1: All parallel (1 lint + 13 unit tests)"
          echo "  ✅ No redundant builds (code compiled once in image builds)"
          echo "  ✅ Parallel image builds, handed off as artifacts (matrix: 12 services × 2 arches + 2 infra)"
          echo "  ✅ Integration tests reuse artifact-loaded images (saves ~60% disk, ~30% time)"
          echo "  ✅ Parallel integration tests (matrix: 12 services)"
          echo "  ✅ E2E tests reuse artifact-loaded images (saves ~60% disk, ~30% time)"
          echo "  ✅ Parallel E2E tests (matrix: 13 services)"
          echo "  ✅ Automatic fallback to local build if an image artifact is missing"
          echo "═══════════════════════════════════════════════════════════"

          # Check for lint failure (non-blocking, but report)
          if [ "${{ needs.lint-go.result }}" != "success" ]; then
            echo ""
            echo "⚠️  Lint warnings detected (non-blocking in V1.0)"
          fi

          # Check for unit tests failure (critical)
          if [ "${{ needs.unit-tests.result }}" == "failure" ]; then
            echo ""
            echo "❌ Unit tests failed - subsequent stages skipped"
            exit 1
          elif [ "${{ needs.unit-tests.result }}" == "cancelled" ]; then
            echo ""
            echo "⚠️  Unit tests cancelled"
            exit 1
          fi

          # Check for image build failure (critical for integration + E2E)
          if [ "${{ needs.build-images.result }}" == "failure" ]; then
            echo ""
            echo "❌ Image builds failed - check individual service builds in the matrix"
            echo "   Services: datastorage, gateway, aianalysis, authwebhook, notification,"
            echo "             remediationorchestrator, signalprocessing, workflowexecution,"
            echo "             kubernautagent, mock-llm"
            exit 1
          elif [ "${{ needs.build-images.result }}" == "cancelled" ]; then
            echo ""
            echo "⚠️  Image builds cancelled"
            exit 1
          fi

          # Check for integration tests (handle skipped if dependencies failed)
          if [ "${{ needs.integration-tests.result }}" == "failure" ]; then
            echo ""
            echo "❌ Integration tests failed - check individual service logs in the matrix"
            echo "   Services tested: signalprocessing, aianalysis, workflowexecution,"
            echo "                    remediationorchestrator, gateway, datastorage,"
            echo "                    notification, kubernautagent, authwebhook"
            exit 1
          elif [ "${{ needs.integration-tests.result }}" == "skipped" ]; then
            echo ""
            echo "⏭️  Integration tests skipped (dependencies failed)"
          elif [ "${{ needs.integration-tests.result }}" == "cancelled" ]; then
            echo ""
            echo "⚠️  Integration tests cancelled"
            exit 1
          fi

          # Check for E2E tests (handle skipped if dependencies failed)
          if [ "${{ needs.e2e-tests.result }}" == "failure" ]; then
            echo ""
            echo "❌ E2E tests failed - check individual service logs in the matrix"
            echo "   Services tested: signalprocessing, aianalysis, workflowexecution,"
            echo "                    remediationorchestrator, gateway, datastorage,"
            echo "                    notification, authwebhook, kubernautagent"
            exit 1
          elif [ "${{ needs.e2e-tests.result }}" == "skipped" ]; then
            echo ""
            echo "⏭️  E2E tests skipped (dependencies failed)"
          elif [ "${{ needs.e2e-tests.result }}" == "cancelled" ]; then
            echo ""
            echo "⚠️  E2E tests cancelled"
            exit 1
          fi

          # Check for Helm chart unit tests (helm-unittest, #1686)
          if [ "${{ needs.helm-unittest.result }}" == "failure" ]; then
            echo ""
            echo "❌ Helm chart unit tests failed - check charts/kubernaut/tests/*.yaml"
            exit 1
          elif [ "${{ needs.helm-unittest.result }}" == "skipped" ]; then
            echo ""
            echo "⏭️  Helm chart unit tests skipped (dependencies failed)"
          elif [ "${{ needs.helm-unittest.result }}" == "cancelled" ]; then
            echo ""
            echo "⚠️  Helm chart unit tests cancelled"
            exit 1
          fi

          # Check for Helm smoke test (handle skipped if dependencies failed)
          if [ "${{ needs.helm-smoke-test.result }}" == "failure" ]; then
            echo ""
            echo "❌ Helm smoke tests failed - check CRD freshness, schema validation, or install logs"
            exit 1
          elif [ "${{ needs.helm-smoke-test.result }}" == "skipped" ]; then
            echo ""
            echo "⏭️  Helm smoke tests skipped (dependencies failed)"
          elif [ "${{ needs.helm-smoke-test.result }}" == "cancelled" ]; then
            echo ""
            echo "⚠️  Helm smoke tests cancelled"
            exit 1
          fi

          # Final result
          echo ""
          if [ "${{ needs.integration-tests.result }}" == "success" ] && \
             [ "${{ needs.e2e-tests.result }}" == "success" ] && \
             [ "${{ needs.helm-unittest.result }}" == "success" ] && \
             [ "${{ needs.helm-smoke-test.result }}" == "success" ]; then
            echo "✅ All tests passed!"
            exit 0
          else
            echo "⚠️  Some tests were skipped or had issues (see above)"
            exit 1
          fi

  # ========================================
  # MERGE GATE (single required check)
  # This is the ONLY job required in branch protection.
  # - Code PRs: checks that all CI jobs passed
  # - Docs-only PRs: all CI jobs are skipped → no failures → auto-passes
  # - Replaces the previous 3-check + ci-skip-checks.yml approach
  # ========================================

  merge-gate:
    name: Merge Gate
    if: always()
    needs: [detect-changes, lint-go, license-scan, unit-tests, build-images,
            build-infra-images,
            integration-tests, e2e-tests, helm-unittest, helm-smoke-test, summary]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI results
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "Merge Gate - Evaluating CI Pipeline Results"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          echo "Code changed: ${{ needs.detect-changes.outputs.code_changed }}"
          echo ""
          echo "Job results:"
          echo "  detect-changes:       ${{ needs.detect-changes.result }}"
          echo "  lint-go:              ${{ needs.lint-go.result }}"
          echo "  license-scan:         ${{ needs.license-scan.result }}"
          echo "  unit-tests:           ${{ needs.unit-tests.result }}"
          echo "  build-images:         ${{ needs.build-images.result }}"
          echo "  build-infra:          ${{ needs.build-infra-images.result }}"
          echo "  integration-tests:    ${{ needs.integration-tests.result }}"
          echo "  e2e-tests:            ${{ needs.e2e-tests.result }}"
          echo "  helm-unittest:        ${{ needs.helm-unittest.result }}"
          echo "  helm-smoke-test:      ${{ needs.helm-smoke-test.result }}"
          echo "  summary:              ${{ needs.summary.result }}"
          echo ""

          # Fail if any job failed
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ One or more CI jobs failed — merge blocked"
            exit 1
          fi

          # Fail if any job was cancelled (except for docs-only PRs where jobs are skipped)
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "❌ One or more CI jobs were cancelled — merge blocked"
            exit 1
          fi

          echo "═══════════════════════════════════════════════════════════"
          if [[ "${{ needs.detect-changes.outputs.code_changed }}" == "true" ]]; then
            echo "✅ All CI checks passed — merge allowed"
          else
            echo "✅ Docs-only PR — no CI checks required — merge allowed"
          fi
          echo "═══════════════════════════════════════════════════════════"
