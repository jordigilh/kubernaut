---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "kubernaut.workflowNamespace" . }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
    # BR-WE-018: Pod Security Admission backstop. Spawned Job/PipelineRun pods are
    # already hardened to "restricted" in code (pkg/workflowexecution/executor); this
    # label provides an independent, API-server-enforced guarantee in case that code
    # ever regresses. Not configurable -- see BR-WE-018 for rationale.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflowexecution-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: workflowexecution-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workflowexecution-controller
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["workflowexecutions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["workflowexecutions/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["workflowexecutions/finalizers"]
    verbs: ["update"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["tekton.dev"]
    resources: ["taskruns"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # BR-WORKFLOW-008 (Issue #1481): "watch" is required even though the
  # reconciler only calls List() on Events (to enrich WFE failure messages
  # from FailedMount/CreateContainerConfigError Events) -- the manager's
  # cached client establishes an Informer for any type it reads, and that
  # Informer needs list+watch to sync, regardless of which verb application
  # code exercises directly.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "get", "list", "watch"]
  # Issue #637: TokenRequest API for per-workflow SA tokens (Ansible engine)
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ── Istio (#373) ────────────────────────────────────────────────────────
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies", "peerauthentications", "requestauthentications"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "destinationrules", "gateways", "serviceentries"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernaut-workflow-runner
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "delete", "patch", "update"]
  # Issue #501: TokenRequest API for per-workflow SA tokens (Ansible executor)
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["policy.linkerd.io"]
    resources: ["authorizationpolicies", "servers", "meshtlsauthentications"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies", "peerauthentications", "requestauthentications"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "destinationrules", "gateways", "serviceentries"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # ── Ansible playbook requirements (#551) ──────────────────────────────
  - apiGroups: ["kubernaut.ai"]
    resources: ["workflowexecutions"]
    verbs: ["get"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workflowexecution-controller
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: workflowexecution-controller
subjects:
  - kind: ServiceAccount
    name: workflowexecution-controller
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: workflowexecution-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: workflowexecution
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  workflowexecution.yaml: |
    logging:
      level: {{ .Values.workflowexecution.logging.level | default "INFO" | quote }}
    controller:
      metricsAddr: ":9090"
      healthProbeAddr: ":8081"
      leaderElection: false
      leaderElectionId: workflowexecution.kubernaut.ai
    execution:
      namespace: {{ include "kubernaut.workflowNamespace" . }}
      cooldownPeriod: {{ .Values.workflowexecution.config.execution.cooldownPeriod | default "1m" }}
    datastorage:
      url: "{{ include "kubernaut.datastorage.url" . }}"
      timeout: 10s
      buffer:
        bufferSize: 10000
        batchSize: 50
        flushInterval: 100ms
        maxRetries: 3
    {{- if .Values.workflowexecution.config.ansible }}
    ansible:
      apiURL: {{ .Values.workflowexecution.config.ansible.apiURL | quote }}
      organizationID: {{ .Values.workflowexecution.config.ansible.organizationID | default 1 }}
      {{- if .Values.workflowexecution.config.ansible.tokenSecretRef }}
      tokenSecretRef:
        name: {{ .Values.workflowexecution.config.ansible.tokenSecretRef.name | quote }}
        key: {{ .Values.workflowexecution.config.ansible.tokenSecretRef.key | default "token" | quote }}
        {{- if .Values.workflowexecution.config.ansible.tokenSecretRef.namespace }}
        namespace: {{ .Values.workflowexecution.config.ansible.tokenSecretRef.namespace | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflowexecution-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: workflowexecution-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.workflowexecution.replicas }}
  selector:
    matchLabels:
      app: workflowexecution-controller
  template:
    metadata:
      labels:
        app: workflowexecution-controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: workflowexecution-controller
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.workflowexecution | nindent 8 }}
      {{- include "kubernaut.affinity" (dict "component" .Values.workflowexecution "matchLabels" (dict "app" "workflowexecution-controller")) | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.workflowexecution "global" .Values.global) | nindent 6 }}
      {{- if and .Values.workflowexecution.config.ansible .Values.workflowexecution.config.ansible.caCertSecretRef }}
      # BR-PLATFORM-005 (Kubernaut Operator parity): combine the inter-service CA
      # with the AAP/AWX private CA into one bundle, since TLS_CA_FILE accepts a
      # single file. Gracefully skips the inter-service CA half when TLS is
      # disabled (inter-service-ca ConfigMap absent/empty).
      initContainers:
        - name: build-ca-bundle
          image: {{ .Values.hooks.tlsCerts.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.workflowexecution | nindent 12 }}
          command: ["sh", "-c"]
          args:
            - |
              { [ -s /etc/tls-ca/ca.crt ] && cat /etc/tls-ca/ca.crt; cat /etc/aap-ca/aap-ca.crt; } > /etc/combined-ca/ca-bundle.crt
          volumeMounts:
            - name: tls-ca
              mountPath: /etc/tls-ca
              readOnly: true
            - name: aap-ca
              mountPath: /etc/aap-ca
              readOnly: true
            - name: combined-ca
              mountPath: /etc/combined-ca
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      {{- end }}
      containers:
        - name: workflowexecution-controller
          image: {{ include "kubernaut.image" (dict "service" "workflowexecution" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.workflowexecution | nindent 12 }}
          args:
            - "--config=/etc/config/workflowexecution.yaml"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          env:
            - name: TLS_CA_FILE
              {{- if and .Values.workflowexecution.config.ansible .Values.workflowexecution.config.ansible.caCertSecretRef }}
              value: "/etc/combined-ca/ca-bundle.crt"
              {{- else }}
              value: {{ include "kubernaut.interServiceTLS.caFile" . | quote }}
              {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/config
              readOnly: true
            - name: tls-ca
              mountPath: /etc/tls-ca
              readOnly: true
            {{- if and .Values.workflowexecution.config.ansible .Values.workflowexecution.config.ansible.caCertSecretRef }}
            - name: combined-ca
              mountPath: /etc/combined-ca
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.workflowexecution.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: workflowexecution-config
        - name: tls-ca
          configMap:
            name: inter-service-ca
            optional: true
        {{- if and .Values.workflowexecution.config.ansible .Values.workflowexecution.config.ansible.caCertSecretRef }}
        - name: aap-ca
          secret:
            secretName: {{ .Values.workflowexecution.config.ansible.caCertSecretRef.name }}
            items:
              - key: {{ .Values.workflowexecution.config.ansible.caCertSecretRef.key | default "ca.crt" }}
                path: aap-ca.crt
        - name: combined-ca
          emptyDir:
            sizeLimit: 1Mi
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: workflowexecution-controller-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: workflowexecution-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: workflowexecution-controller
{{- if .Values.workflowexecution.config.ansible }}
---
# Issue #478: Namespace-scoped secret access for the AWX token.
# Least-privilege: only allows get on secrets in the release namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflowexecution-awx-token-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app: workflowexecution-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflowexecution-awx-token-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app: workflowexecution-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workflowexecution-awx-token-reader
subjects:
  - kind: ServiceAccount
    name: workflowexecution-controller
    namespace: {{ .Release.Namespace }}
---
# BR-WORKFLOW-008 (Issue #1481): the Ansible engine reads schema-declared
# Secret/ConfigMap dependencies from the execution namespace to build
# ephemeral AWX credentials and extra_vars (see AnsibleExecutor.Create in
# pkg/workflowexecution/executor/ansible.go). This is independent of the
# removed pre-flight DependencyValidator -- Kubernetes now validates
# dependency existence at runtime, but the Ansible engine still needs to
# read the *content* of declared Secrets/ConfigMaps to inject them. list+watch
# are required (not just get) because the manager's cached client establishes
# a namespace-scoped Informer for these types.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflowexecution-dependency-reader
  namespace: {{ include "kubernaut.workflowNamespace" . }}
  labels:
    app: workflowexecution-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflowexecution-dependency-reader
  namespace: {{ include "kubernaut.workflowNamespace" . }}
  labels:
    app: workflowexecution-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workflowexecution-dependency-reader
subjects:
  - kind: ServiceAccount
    name: workflowexecution-controller
    namespace: {{ .Release.Namespace }}
{{- end }}
