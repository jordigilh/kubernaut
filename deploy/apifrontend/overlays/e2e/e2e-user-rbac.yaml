# Kubernetes RBAC for E2E users.
# ADR-022: All AF K8s operations (MCP bridge and A2A) use AF's ServiceAccount.
# E2E users do not need CRD permissions for kubernaut_* tools at runtime.
# These grants remain for E2E test fixture setup (admin kubectl).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: e2e-user-k8s-tools
rules:
  # kubectl_list (kind: Pod) — AF SA reads; kept for E2E validation
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # kubectl_list_events — AF SA reads
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list"]
  # kubectl_list (kind: Deployment/StatefulSet) — AF SA reads
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["list"]
  # kubectl_get (owner chain: Pod -> ReplicaSet -> Deployment) — AF SA reads
  - apiGroups: [""]
    resources: ["pods", "replicationcontrollers"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get"]
  # MCP tool authorization (SAR verb: "use" on kubernaut.ai/tools)
  - apiGroups: ["kubernaut.ai"]
    resources: ["tools"]
    resourceNames:
      - kubernaut_takeover
      - kubernaut_discover_workflows
      - kubernaut_investigate
      - kubernaut_select_workflow
      - kubernaut_present_decision
      - kubernaut_message
      - kubernaut_complete
      - kubernaut_cancel
      - kubernaut_status
      - kubernaut_reconnect
      - af_create_rr
      - af_check_existing_rr
      - kubernaut_cancel_remediation
      - kubernaut_watch
      - kubernaut_approve
      - kubernaut_list_remediations
      - kubernaut_get_remediation
      - kubernaut_list_workflows
      - kubernaut_get_remediation_history
      - kubernaut_get_effectiveness
      - kubernaut_get_audit_trail
    verbs: ["use"]
  # af_create_rr / af_check_existing_rr / kubernaut_cancel_remediation / kubernaut_watch
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests/status"]
    verbs: ["get", "update", "patch"]
  # remediation approvals
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationapprovalrequests"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationapprovalrequests/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: e2e-sre-k8s-tools
subjects:
  - kind: Group
    name: sre
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: e2e-user-k8s-tools
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: e2e-ai-orchestrator-k8s-tools
subjects:
  - kind: Group
    name: ai-orchestrator
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: e2e-user-k8s-tools
  apiGroup: rbac.authorization.k8s.io
---
# Observability group uses a namespace-scoped RoleBinding (not ClusterRoleBinding)
# to verify that K8s RBAC correctly restricts access to specific namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: e2e-observability-k8s-tools
  namespace: kubernaut-system
subjects:
  - kind: Group
    name: observability
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: e2e-user-k8s-tools
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: e2e-remediation-approver-k8s-tools
subjects:
  - kind: Group
    name: remediation-approver
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: e2e-user-k8s-tools
  apiGroup: rbac.authorization.k8s.io
