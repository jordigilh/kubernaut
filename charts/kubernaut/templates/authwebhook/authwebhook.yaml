---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authwebhook
  namespace: {{ .Release.Namespace }}
  labels:
    app: authwebhook
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: authwebhook
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["workflowexecutions", "remediationapprovalrequests", "notificationrequests", "remediationrequests", "actiontypes"]
    verbs: ["get", "list", "watch"]
  # Issue #418: RW reconciler needs update/patch to add/remove the catalog-cleanup finalizer
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationworkflows"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationworkflows/finalizers"]
    verbs: ["update"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["workflowexecutions/status", "remediationapprovalrequests/status", "remediationrequests/status", "remediationworkflows/status", "actiontypes/status"]
    verbs: ["update", "patch"]
  {{- if eq .Values.tls.mode "hook" }}
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "patch"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: authwebhook
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: authwebhook
subjects:
  - kind: ServiceAccount
    name: authwebhook
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: Service
metadata:
  name: authwebhook
  namespace: {{ .Release.Namespace }}
  labels:
    app: authwebhook
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: authwebhook
  ports:
    - name: https
      port: 443
      targetPort: webhook
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authwebhook-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: authwebhook
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  authwebhook.yaml: |
    webhook:
      port: 9443
      certDir: /tmp/k8s-webhook-server/serving-certs
      healthProbeAddr: ":8081"
    datastorage:
      url: "{{ include "kubernaut.datastorage.url" . }}"
      timeout: 30s
      buffer:
        bufferSize: 1000
        batchSize: 100
        flushInterval: 5s
        maxRetries: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authwebhook
  namespace: {{ .Release.Namespace }}
  labels:
    app: authwebhook
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.authwebhook.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: authwebhook
  template:
    metadata:
      labels:
        app: authwebhook
    spec:
      serviceAccountName: authwebhook
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.authwebhook | nindent 8 }}
      {{- include "kubernaut.affinity" .Values.authwebhook | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.authwebhook "global" .Values.global) | nindent 6 }}
      {{- if eq .Values.tls.mode "hook" }}
      initContainers:
        - name: patch-cabundle
          image: {{ .Values.hooks.tlsCerts.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.hooks | nindent 12 }}
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: webhook-certs
              mountPath: /certs
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              CA_FILE="/certs/ca.crt"
              if [ ! -f "$CA_FILE" ]; then
                echo "WARNING: $CA_FILE not found — skipping caBundle patch"
                exit 0
              fi

              CA_BUNDLE=$(base64 < "$CA_FILE" | tr -d '\n')

              patch_webhooks() {
                KIND="$1"
                NAME="$2"
                COUNT=$(kubectl get "$KIND" "$NAME" -o jsonpath='{.webhooks[*].name}' | wc -w | tr -d ' ')
                PATCH="["
                i=0
                while [ "$i" -lt "$COUNT" ]; do
                  [ "$i" -gt 0 ] && PATCH="${PATCH},"
                  PATCH="${PATCH}{\"op\":\"add\",\"path\":\"/webhooks/${i}/clientConfig/caBundle\",\"value\":\"${CA_BUNDLE}\"}"
                  i=$((i + 1))
                done
                PATCH="${PATCH}]"
                echo "  Patching $NAME ($COUNT webhooks)..."
                kubectl patch "$KIND" "$NAME" --type='json' -p "$PATCH"
              }

              echo "==> Init-container: patching webhook caBundle (#377 self-healing)..."
              patch_webhooks mutatingwebhookconfigurations authwebhook-mutating
              patch_webhooks validatingwebhookconfigurations authwebhook-validating
              echo "==> Webhook caBundle patching complete"
      {{- end }}
      containers:
        - name: authwebhook
          image: {{ include "kubernaut.image" (dict "service" "authwebhook" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.authwebhook | nindent 12 }}
          args:
            - -config=/etc/authwebhook/authwebhook.yaml
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: "debug"
            {{- if include "kubernaut.interServiceTLS.enabled" . }}
            - name: TLS_CA_FILE
              value: {{ include "kubernaut.interServiceTLS.caFile" . | quote }}
            {{- end }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            - name: config
              mountPath: /etc/authwebhook
              readOnly: true
            {{- if include "kubernaut.interServiceTLS.enabled" . }}
            - name: tls-ca
              mountPath: /etc/tls-ca
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.authwebhook.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: webhook-certs
          secret:
            secretName: authwebhook-tls
        - name: config
          configMap:
            name: authwebhook-config
        {{- if include "kubernaut.interServiceTLS.enabled" . }}
        - name: tls-ca
          configMap:
            name: inter-service-ca
            optional: true
        {{- end }}
