    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RemediationWorkflow is the Schema for the remediationworkflows API.
          BR-WORKFLOW-006: Kubernetes-native workflow schema definition.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              RemediationWorkflowSpec defines the desired state of RemediationWorkflow.
              Declared as a Kubernetes resource; registered via kubectl apply (BR-WORKFLOW-006).
              Workflow name is derived from the CRD's metadata.name (not duplicated in spec).
            properties:
              actionType:
                description: |-
                  ActionType is the action type from the taxonomy (PascalCase).
                  Pattern requires an uppercase leading letter followed by alphanumerics
                  only (no underscores/hyphens/spaces), matching ActionType.spec.name's
                  own PascalCase contract so the two stay in lockstep. Issue #1661.
                pattern: ^[A-Z][A-Za-z0-9]*$
                type: string
              customLabels:
                additionalProperties:
                  type: string
                description: CustomLabels contains operator-defined key-value labels
                  for additional filtering
                type: object
              dependencies:
                description: Dependencies declares infrastructure resources required
                  by the workflow
                properties:
                  configMaps:
                    items:
                      description: RemediationWorkflowResourceDependency identifies
                        a Kubernetes resource by name
                      properties:
                        name:
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  secrets:
                    items:
                      description: RemediationWorkflowResourceDependency identifies
                        a Kubernetes resource by name
                      properties:
                        name:
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                type: object
              description:
                description: Description is a structured description for LLM and operator
                  consumption
                properties:
                  preconditions:
                    description: Preconditions describes conditions that must be verified
                      through investigation
                    type: string
                  what:
                    description: What describes what this workflow concretely does
                    type: string
                  whenNotToUse:
                    description: WhenNotToUse describes specific exclusion conditions
                    type: string
                  whenToUse:
                    description: WhenToUse describes conditions under which this workflow
                      is appropriate
                    type: string
                required:
                - what
                - whenToUse
                type: object
              detectedLabels:
                description: DetectedLabels contains author-declared infrastructure
                  requirements
                x-kubernetes-preserve-unknown-fields: true
              execution:
                description: Execution contains execution engine configuration
                properties:
                  bundle:
                    description: Bundle is the execution bundle or container image
                      reference
                    type: string
                  bundleDigest:
                    description: BundleDigest is the digest of the execution bundle
                    type: string
                  engine:
                    description: Engine is the execution engine type
                    enum:
                    - tekton
                    - job
                    - ansible
                    type: string
                  engineConfig:
                    description: EngineConfig holds engine-specific configuration
                    x-kubernetes-preserve-unknown-fields: true
                  serviceAccountName:
                    description: |-
                      ServiceAccountName is the pre-existing ServiceAccount for the execution
                      resource (Job, PipelineRun, or Ansible TokenRequest).
                      DD-WE-005 v2.0: Operators pre-create SAs with appropriate RBAC in the
                      execution namespace. If absent, K8s assigns the namespace's default SA
                      (Job/Tekton) or the Ansible executor uses the controller's in-cluster
                      credentials (#500 fallback).
                    type: string
                type: object
              labels:
                description: Labels contains mandatory matching/filtering criteria
                  for discovery
                properties:
                  cluster:
                    description: |-
                      Cluster restricts this workflow to signals whose SP-derived
                      ClusterClassification matches one of these values.
                      Empty/omitted is valid: in non-fleet deployments (no ClusterClassification
                      produced) this dimension is never evaluated. In fleet-enabled deployments,
                      once a concrete classification is supplied by KA, workflows with no
                      `cluster` entries are excluded unless they explicitly opt in with "*"
                      (see DD-FLEET-002 Matching Semantics -- this is a query-time exclusion,
                      not schema-level validation).
                      BR-FLEET-003, Issue #1511.
                    items:
                      type: string
                    type: array
                  component:
                    description: Component is the Kubernetes resource type(s)
                    items:
                      type: string
                    minItems: 1
                    type: array
                  environment:
                    description: Environment is the target environment(s)
                    items:
                      type: string
                    minItems: 1
                    type: array
                  priority:
                    description: Priority is the business priority level
                    type: string
                  severity:
                    description: Severity is the severity level(s)
                    items:
                      type: string
                    minItems: 1
                    type: array
                required:
                - component
                - environment
                - priority
                - severity
                type: object
              maintainers:
                description: Maintainers is optional maintainer information
                items:
                  description: RemediationWorkflowMaintainer contains maintainer contact
                    information
                  properties:
                    email:
                      description: |-
                        Email must contain exactly one "@" with a non-empty local part, domain,
                        and TLD, and no whitespace. Intentionally permissive (not full RFC 5322)
                        since this is a contact-hint field, not an auth credential. Issue #1661.
                      pattern: ^[^\s@]+@[^\s@]+\.[^\s@]+$
                      type: string
                    name:
                      type: string
                  required:
                  - email
                  - name
                  type: object
                type: array
              parameters:
                description: Parameters defines the workflow input parameters
                items:
                  description: RemediationWorkflowParameter defines a workflow input
                    parameter
                  properties:
                    default:
                      x-kubernetes-preserve-unknown-fields: true
                    dependsOn:
                      items:
                        type: string
                      type: array
                    description:
                      type: string
                    enum:
                      items:
                        type: string
                      type: array
                    maximum:
                      type: number
                    minimum:
                      type: number
                    name:
                      type: string
                    pattern:
                      type: string
                    required:
                      type: boolean
                    type:
                      enum:
