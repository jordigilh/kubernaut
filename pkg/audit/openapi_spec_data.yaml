          type: string
          enum: ['aiagent.investigation.cancelled']
          description: Event type for discriminator (matches parent event_type)
        event_id:
          type: string
          description: Unique event identifier
        session_id:
          type: string
          description: Investigation session identifier for cross-event correlation (AUD-4)
        cancelled_phase:
          type: string
          description: Investigation phase active at cancellation (rca or workflow_discovery)
          example: "rca"
        cancelled_at_turn:
          type: integer
          minimum: 0
          description: LLM conversation turn number at cancellation
        total_prompt_tokens:
          type: integer
          minimum: 0
          description: Cumulative prompt tokens consumed before cancellation (cost attribution)
        total_completion_tokens:
          type: integer
          minimum: 0
          description: Cumulative completion tokens consumed before cancellation (cost attribution)
        total_tokens:
          type: integer
          minimum: 0
          description: Cumulative total tokens consumed before cancellation
        accumulated_messages:
          type: string
          description: JSON-serialized conversation messages accumulated before cancellation (forensic RAG, capped at 64KB)

    # ─── Alignment Payloads (BR-AUDIT-070, SOC2 CC7.2) ───

    AIAgentAlignmentStepPayload:
      type: object
      required: [event_type, event_id, step_index, step_kind, explanation]
      description: Alignment step event payload (aiagent.alignment.step) - Emitted per suspicious observation from the shadow agent alignment check (SOC2 CC7.2, BR-AUDIT-070)
      properties:
        event_type:
          type: string
          enum: ['aiagent.alignment.step']
          description: Event type for discriminator (matches parent event_type)
        event_id:
          type: string
          description: Unique event identifier
        step_index:
          type: integer
          minimum: 0
          description: Sequential index of the observed step
        step_kind:
          type: string
          description: Kind of step observed (signal_input, tool_call, llm_response, etc.)
          example: "tool_call"
        tool:
          type: string
          description: Tool name if step_kind is tool_call
        explanation:
          type: string
          description: Shadow agent explanation of why the step was flagged as suspicious

    AIAgentAlignmentVerdictPayload:
      type: object
      required: [event_type, event_id, result, flagged, total]
      description: Alignment verdict event payload (aiagent.alignment.verdict) - Final verdict from the shadow agent alignment evaluation (SOC2 CC7.2, BR-AUDIT-070)
      properties:
        event_type:
          type: string
          enum: ['aiagent.alignment.verdict']
          description: Event type for discriminator (matches parent event_type)
        event_id:
          type: string
          description: Unique event identifier
        result:
          type: string
          description: Verdict result (aligned or suspicious)
          example: "aligned"
        summary:
          type: string
          description: Human-readable summary of the alignment verdict
        flagged:
          type: integer
          minimum: 0
          description: Number of steps flagged as suspicious
        total:
          type: integer
          minimum: 0
          description: Total number of steps evaluated

    # ─── Remediation History Context (DD-HAPI-016) ───

    RemediationHistoryContext:
      type: object
      description: |
        Structured remediation history context for LLM prompt enrichment.
        Contains two tiers of remediation chain data for a target resource.
        Authority: DD-HAPI-016.
      required:
        - targetResource
        - currentSpecHash
        - regressionDetected
        - tier1
        - tier2
      properties:
        targetResource:
          type: string
          description: |
            Target resource identifier in format "{namespace}/{kind}/{name}".
            Matches the format used by RO and EM audit events.
          example: "prod/Deployment/my-app"
        currentSpecHash:
          type: string
          description: |
            SHA-256 hash of the current target resource spec (echoed from request).
          example: "sha256:aabb112233dd"
        regressionDetected:
          type: boolean
          description: |
            True if any remediation entry's preRemediationSpecHash matches
            currentSpecHash, indicating configuration regression.
        tier1:
          $ref: '#/components/schemas/RemediationHistoryTier1'
        tier2:
          $ref: '#/components/schemas/RemediationHistoryTier2'

    RemediationHistoryTier1:
      type: object
      description: |
        Tier 1: Detailed remediation chain within the recent window (default 24h).
        Contains full effectiveness data, health checks, and metric deltas.
      required:
        - window
        - chain
      properties:
        window:
          type: string
          description: Lookback window used for this tier (e.g. "24h")
          example: "24h"
        chain:
          type: array
          description: Ordered list of detailed remediation entries (ascending by completedAt)
          items:
            $ref: '#/components/schemas/RemediationHistoryEntry'

    RemediationHistoryTier2:
      type: object
      description: |
        Tier 2: Summary remediation chain for historical lookback (default 90d).
        Activated when currentSpecHash matches a historical preRemediationSpecHash
        beyond the Tier 1 window. Contains compact entries without health/metric details.
      required:
        - window
        - chain
      properties:
        window:
          type: string
          description: Lookback window used for this tier (e.g. "2160h")
          example: "2160h"
        chain:
          type: array
          description: Ordered list of summary remediation entries (ascending by completedAt)
          items:
            $ref: '#/components/schemas/RemediationHistorySummary'

    RemediationHistoryEntry:
      type: object
      description: |
        Full remediation history entry for Tier 1.
        Correlates RO (remediation.workflow_created) and EM (effectiveness.assessment.completed)
        audit events by remediation_request_uid.
      required:
        - remediationUID
        - completedAt
      properties:
        remediationUID:
          type: string
          description: RemediationRequest UID (correlation key)
          example: "rr-abc-123"
        signalFingerprint:
          type: string
          description: Signal fingerprint that triggered the remediation
          example: "fp-highcpu-123"
        signalType:
          type: string
          description: Type of signal (e.g. HighCPULoad, OOMKilled)
          example: "HighCPULoad"
        actionType:
          type: string
          nullable: true
          description: Action type applied (null if escalated to human review)
          example: "ScaleUp"
        outcome:
          type: string
          description: Remediation outcome (Success, Failed, Escalated)
          example: "Success"
        effectivenessScore:
          type: number
          format: double
          nullable: true
          description: |
            EM effectiveness score (0.0-1.0). Null if assessment not yet completed
            or remediation was escalated.
          minimum: 0
          maximum: 1
          example: 0.4
        signalResolved:
          type: boolean
          nullable: true
          description: Whether the originating signal was resolved after remediation
          example: false
        hashMatch:
          type: string
          enum:
            - preRemediation
            - postRemediation
            - none
          description: |
            Result of three-way hash comparison:
            - preRemediation: currentSpecHash matches preRemediationSpecHash (regression)
            - postRemediation: currentSpecHash matches postRemediationSpecHash (unchanged)
            - none: currentSpecHash matches neither hash
          example: "postRemediation"
        preRemediationSpecHash:
          type: string
          description: Spec hash captured before remediation was applied
          example: "sha256:aabb112233dd"
        postRemediationSpecHash:
          type: string
          description: Spec hash captured after remediation was applied
          example: "sha256:ccdd334455ee"
        healthChecks:
          $ref: '#/components/schemas/RemediationHealthChecks'
        metricDeltas:
          $ref: '#/components/schemas/RemediationMetricDeltas'
        sideEffects:
          type: array
          description: List of detected side effects from the remediation
          items:
            type: string
          example: []
        completedAt:
          type: string
          format: date-time
          description: When the remediation was completed
          example: "2026-02-05T08:00:00Z"
        assessmentReason:
          type: string
          nullable: true
          enum:
            - Full
            - Partial
            - SpecDrift
            - Expired
            - NoExecution
            - MetricsTimedOut
            - AlertDecayTimeout
            - Unrecoverable
          description: |
            Reason/status of the effectiveness assessment. Null if assessment
            not yet completed. When "SpecDrift", the effectiveness score is
            unreliable (hard-overridden to 0.0) because the target resource
            spec was modified during the assessment window (DD-EM-002 v1.1).
          example: "Full"
        assessedAt:
          type: string
          format: date-time
          description: When the effectiveness assessment was completed
          example: "2026-02-05T08:05:00Z"

    RemediationHistorySummary:
      type: object
      description: |
        Compact remediation history entry for Tier 2.
        Contains only essential fields for historical context.
      required:
        - remediationUID
        - completedAt
      properties:
        remediationUID:
          type: string
          description: RemediationRequest UID (correlation key)
          example: "rr-old-001"
        signalType:
          type: string
          description: Type of signal
          example: "HighCPULoad"
        actionType:
          type: string
          nullable: true
          description: Action type applied (null if escalated)
          example: "ScaleUp"
        outcome:
          type: string
          description: Remediation outcome
          example: "Success"
        effectivenessScore:
          type: number
          format: double
          nullable: true
          description: EM effectiveness score (0.0-1.0)
          minimum: 0
          maximum: 1
          example: 0.4
        signalResolved:
          type: boolean
          nullable: true
          description: Whether the originating signal was resolved
          example: false
        hashMatch:
          type: string
          enum:
            - preRemediation
            - postRemediation
            - none
          description: Result of three-way hash comparison against currentSpecHash
          example: "preRemediation"
        assessmentReason:
          type: string
          nullable: true
          enum:
            - Full
            - Partial
            - SpecDrift
            - Expired
            - NoExecution
            - MetricsTimedOut
            - AlertDecayTimeout
            - Unrecoverable
          description: |
            Reason/status of the effectiveness assessment (same enum as
            RemediationHistoryEntry). When "SpecDrift", effectiveness score
            is unreliable (DD-EM-002 v1.1).
          example: "Full"
        completedAt:
          type: string
          format: date-time
          description: When the remediation was completed
          example: "2026-01-15T10:00:00Z"

    RemediationHealthChecks:
      type: object
      description: |
        Post-remediation health check results from EM assessment.
      properties:
        podRunning:
          type: boolean
          description: Whether the target pod is running
          example: true
        readinessPass:
          type: boolean
          description: Whether readiness probes are passing
          example: true
        restartDelta:
          type: integer
          description: Change in restart count since remediation
          example: 0
        crashLoops:
          type: boolean
          description: Whether crash loops were detected
          example: false
        oomKilled:
          type: boolean
          description: Whether OOM kills were detected
          example: false
        pendingCount:
          type: integer
          description: |
            Number of pods still in Pending phase after the stabilization window.
            Non-zero indicates scheduling failures, image pull issues, or resource exhaustion.
          example: 0

    RemediationMetricDeltas:
      type: object
      description: |
        Metric deltas between pre-remediation and post-remediation measurements.
      properties:
        cpuBefore:
          type: number
          format: double
          description: CPU utilization before remediation (0.0-1.0)
          example: 0.95
        cpuAfter:
          type: number
          format: double
          description: CPU utilization after remediation (0.0-1.0)
          example: 0.92
        memoryBefore:
          type: number
          format: double
          description: Memory utilization before remediation (0.0-1.0)
          example: 0.60
        memoryAfter:
          type: number
          format: double
          description: Memory utilization after remediation (0.0-1.0)
          example: 0.62
        latencyP95BeforeMs:
          type: number
          format: double
          description: P95 latency before remediation (milliseconds)
          example: 200
        latencyP95AfterMs:
          type: number
          format: double
          description: P95 latency after remediation (milliseconds)
          example: 195
        errorRateBefore:
          type: number
          format: double
          description: Error rate before remediation (0.0-1.0)
          example: 0.02
        errorRateAfter:
          type: number
          format: double
          description: Error rate after remediation (0.0-1.0)
          example: 0.019

    # ========================================
    # ActionType Taxonomy (BR-WORKFLOW-007)
    # ========================================

    ActionTypeDescription:
      type: object
      description: "Structured description for an action type"
      required:
        - what
        - whenToUse
      properties:
        what:
          type: string
          description: "What this action type concretely does"
        whenToUse:
          type: string
          description: "When this action type is appropriate"
        whenNotToUse:
          type: string
          description: "Exclusion conditions"
        preconditions:
          type: string
          description: "Conditions to verify before use"

    ActionTypeCreateRequest:
      type: object
      description: "Request body for creating or re-enabling an action type"
      required:
        - name
        - description
        - registeredBy
      properties:
        name:
          type: string
          description: "PascalCase action type name (e.g., RestartPod)"
        description:
          $ref: '#/components/schemas/ActionTypeDescription'
        registeredBy:
          type: string
          description: "Identity of the registrant (K8s SA or user)"

    ActionTypeCreateResponse:
      type: object
      description: "Response for action type create/re-enable"
      required:
        - actionType
        - status
        - wasReenabled
      properties:
        actionType:
          type: string
          description: "PascalCase action type name"
        description:
          $ref: '#/components/schemas/ActionTypeDescription'
        status:
          type: string
          description: "Outcome: created, exists, or reenabled"
          enum:
            - created
            - exists
            - reenabled
        wasReenabled:
          type: boolean
          description: "true if re-enabled from disabled state"

    ActionTypeUpdateRequest:
      type: object
      description: "Request body for updating action type description. updatedBy is optional — the audit trail (Phase 6a) captures the actor authoritatively."
      required:
        - description
      properties:
        description:
          $ref: '#/components/schemas/ActionTypeDescription'
        updatedBy:
          type: string
          description: "Identity of who made the change"

    ActionTypeUpdateResponse:
      type: object
      description: "Response for action type description update"
      required:
        - actionType
        - oldDescription
        - newDescription
        - updatedFields
      properties:
        actionType:
          type: string
        oldDescription:
          $ref: '#/components/schemas/ActionTypeDescription'
        newDescription:
          $ref: '#/components/schemas/ActionTypeDescription'
        updatedFields:
          type: array
          items:
            type: string
          description: "List of changed field names"

    ActionTypeDisableRequest:
      type: object
      description: "Request body for disabling an action type"
      required:
        - disabledBy
      properties:
        disabledBy:
          type: string
          description: "Identity of who is disabling"

    ActionTypeDisableResponse:
      type: object
      description: "Response for successful action type disable"
      required:
        - actionType
        - status
      properties:
        actionType:
          type: string
        status:
          type: string
          enum:
            - Disabled

    ActionTypeDisableDeniedResponse:
      type: object
      description: "409 response when disable is denied due to active workflow dependencies"
      required:
        - actionType
        - dependentWorkflowCount
        - dependentWorkflows
      properties:
        actionType:
          type: string
        dependentWorkflowCount:
          type: integer
          description: "Number of active workflows referencing this action type"
        dependentWorkflows:
          type: array
          items:
            type: string
          description: "Names of dependent workflows"

    ActionTypeWorkflowCountResponse:
      type: object
      description: "Response containing the count of active workflows referencing an action type"
      required:
        - count
      properties:
        count:
          type: integer
          description: "Number of active RemediationWorkflows referencing this action type"

    # ── ActionType Audit Payloads (Phase 6, BR-WORKFLOW-007) ──────────────────

    ActionTypeDescriptionPayload:
      type: object
      description: "Structured description of an action type for audit payloads"
      required:
        - what
        - when_to_use
      properties:
        what:
          type: string
        when_to_use:
          type: string
        when_not_to_use:
          type: string
        preconditions:
          type: string

    ActionTypeCatalogCreatedPayload:
      type: object
      description: "DS audit payload when a new action type is created or re-enabled"
      required:
        - event_type
        - action_type
        - description
        - registered_by
        - was_reenabled
      properties:
        event_type:
          type: string
          enum: ['datastorage.actiontype.created']
        action_type:
          type: string
        description:
          $ref: '#/components/schemas/ActionTypeDescriptionPayload'
        registered_by:
          type: string
        was_reenabled:
          type: boolean

    ActionTypeCatalogUpdatedPayload:
      type: object
      description: "DS audit payload when an action type description is updated (SOC2: old+new)"
      required:
        - event_type
        - action_type
        - old_description
        - new_description
        - updated_by
        - updated_fields
      properties:
        event_type:
          type: string
          enum: ['datastorage.actiontype.updated']
        action_type:
          type: string
        old_description:
          $ref: '#/components/schemas/ActionTypeDescriptionPayload'
        new_description:
          $ref: '#/components/schemas/ActionTypeDescriptionPayload'
        updated_by:
          type: string
        updated_fields:
          type: array
          items:
            type: string

    ActionTypeCatalogDisabledPayload:
      type: object
      description: "DS audit payload when an action type is soft-disabled"
      required:
        - event_type
        - action_type
        - disabled_by
        - disabled_at
      properties:
        event_type:
          type: string
          enum: ['datastorage.actiontype.disabled']
        action_type:
          type: string
        disabled_by:
          type: string
        disabled_at:
          type: string
          format: date-time

    ActionTypeCatalogReenabledPayload:
      type: object
      description: "DS audit payload when a previously disabled action type is re-enabled"
      required:
        - event_type
        - action_type
        - reenabled_by
        - previous_state
        - disabled_at
        - disabled_by
      properties:
        event_type:
          type: string
          enum: ['datastorage.actiontype.reenabled']
        action_type:
          type: string
        reenabled_by:
          type: string
        previous_state:
          type: string
          enum: ['Disabled']
        disabled_at:
          type: string
          format: date-time
        disabled_by:
          type: string

    ActionTypeCatalogDisableDeniedPayload:
      type: object
      description: "DS audit payload when disable is denied due to active workflow dependencies"
      required:
        - event_type
        - action_type
        - denied_reason
        - dependent_workflow_count
        - dependent_workflows
        - requested_by
      properties:
        event_type:
          type: string
          enum: ['datastorage.actiontype.disable_denied']
        action_type:
          type: string
        denied_reason:
          type: string
        dependent_workflow_count:
          type: integer
        dependent_workflows:
          type: array
          items:
            type: string
        requested_by:
          type: string

    ConversationTurnPayload:
      type: object
      required: [event_type, event_id, session_id, user_id, question]
      description: Conversation turn event payload (aiagent.conversation.turn)
      properties:
        event_type:
          type: string
          enum: ['aiagent.conversation.turn']
          description: Event type for discriminator (matches parent event_type)
        event_id:
          type: string
          description: Unique event identifier
        session_id:
          type: string
          description: Conversation session identifier
        user_id:
          type: string
          description: Authenticated user who sent the message
        question:
          type: string
          description: User's question or message
        answer:
          type: string
          description: Agent's response
        turn_number:
          type: integer
          minimum: 0
          description: Sequential turn number within the session

    ActionTypeWebhookAuditPayload:
      type: object
      description: "AW audit payload for ActionType CRD admission events"
      required:
        - event_type
        - action_type_name
        - crd_name
        - crd_namespace
        - action
      properties:
        event_type:
          type: string
          enum:
            - 'actiontype.admitted.create'
            - 'actiontype.admitted.update'
            - 'actiontype.admitted.delete'
            - 'actiontype.denied.create'
            - 'actiontype.denied.update'
            - 'actiontype.denied.delete'
        action_type_name:
          type: string
          description: "PascalCase name from spec.name"
        crd_name:
          type: string
          description: "K8s metadata.name"
        crd_namespace:
          type: string
          description: "K8s namespace"
        action:
          type: string
          enum: ['create', 'update', 'delete', 'denied']
        previously_existed:
          type: boolean
        catalog_status:
          type: string
        denial_reason:
          type: string
        denial_operation:
          type: string

