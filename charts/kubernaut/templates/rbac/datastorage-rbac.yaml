---
# DataStorage service RBAC (ServiceAccount + auth middleware)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-storage-sa
  namespace: {{ .Release.Namespace }}
  labels:
    app: data-storage-service
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    # DD-PLATFORM-003: a Deployment's serviceAccountName must already exist at
    # apply time or pod admission is rejected outright -- this SA must render
    # in the same "infra-first" wave as the DataStorage Deployment
    # (templates/datastorage/datastorage.yaml) that references it, ahead of
    # every other application controller.
    "argocd.argoproj.io/sync-wave": "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: data-storage-auth-middleware
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    # DD-PLATFORM-003: Issue #1661 Phase 29 (DD-WORKFLOW-018) added the
    # remediationworkflows/actiontypes list/watch rule below, which DataStorage's
    # informer cache now needs at startup (no fallback, fails hard) -- must render
    # in the same "-1" sync-wave as the DataStorage Deployment, not the default
    # wave "0", or ArgoCD applies it after the pod already crash-looped on
    # Forbidden. Mirrors datastorage/{certificate,datastorage}.yaml.
    "argocd.argoproj.io/sync-wave": "-1"
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
  # Issue #1661 Phase 29 (DD-WORKFLOW-018): informer-backed read-only cache of
  # RemediationWorkflow/ActionType CRDs (etcd is the single source of truth;
  # DataStorage no longer maintains a Postgres catalog for these). Cluster-scoped
  # list/watch, no write verbs -- AuthWebhook is the sole write path (ADR-058/059).
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationworkflows", "actiontypes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: data-storage-auth-middleware
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    # DD-PLATFORM-003: must render in the same "-1" wave as its ClusterRole
    # above -- see that resource's annotation for the full rationale.
    "argocd.argoproj.io/sync-wave": "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: data-storage-auth-middleware
subjects:
  - kind: ServiceAccount
    name: data-storage-sa
    namespace: {{ .Release.Namespace }}
---
# DataStorage client ClusterRole + RoleBindings
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: data-storage-client
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["data-storage-service"]
    verbs: ["create", "get", "list", "update", "delete"]
---
# Gateway
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
