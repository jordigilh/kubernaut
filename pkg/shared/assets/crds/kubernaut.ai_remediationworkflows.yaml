                      - integer
                      - boolean
                      - array
                      - float
                      type: string
                  required:
                  - description
                  - name
                  - required
                  - type
                  type: object
                minItems: 1
                type: array
              rollbackParameters:
                description: RollbackParameters defines parameters needed for rollback
                items:
                  description: RemediationWorkflowParameter defines a workflow input
                    parameter
                  properties:
                    default:
                      x-kubernetes-preserve-unknown-fields: true
                    dependsOn:
                      items:
                        type: string
                      type: array
                    description:
                      type: string
                    enum:
                      items:
                        type: string
                      type: array
                    maximum:
                      type: number
                    minimum:
                      type: number
                    name:
                      type: string
                    pattern:
                      type: string
                    required:
                      type: boolean
                    type:
                      enum:
                      - string
                      - integer
                      - boolean
                      - array
                      - float
                      type: string
                  required:
                  - description
                  - name
                  - required
                  - type
                  type: object
                type: array
              version:
                description: |-
                  Version is the semantic version (e.g., "1.0.0").
                  Pattern enforces semver-core (MAJOR.MINOR.PATCH, numeric, no leading "v")
                  with optional "-<pre-release>" and "+<build>" suffixes per semver.org §9-10.
                  Issue #1661 (CRD schema format hardening).
                maxLength: 50
                pattern: ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$
                type: string
            required:
            - actionType
            - description
            - execution
            - labels
            - parameters
            - version
            type: object
          status:
            description: RemediationWorkflowStatus defines the observed state of RemediationWorkflow
            properties:
              catalogStatus:
                allOf:
                - enum:
                  - Active
                  - Invalid
                  - Pending
                  - Deprecated
                  - Archived
                  - Disabled
                  - Superseded
                - enum:
                  - Active
                  - Invalid
                  - Pending
                  - Deprecated
                  - Archived
                  - Disabled
                  - Superseded
                description: |-
                  CatalogStatus reflects the workflow's lifecycle state. Always "Active"
                  once admitted -- there is no external catalog decision to defer to
                  (#1661 Change 8c, DD-WORKFLOW-018).
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the workflow's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              contentHash:
                description: |-
                  ContentHash is the sha256 hex digest of the workflow's clean CRD content
                  (apiVersion/kind/metadata.name/spec), computed locally by AuthWebhook
                  (#1661 Change 8c). Lets DELETE/UPDATE flows and downstream consumers
                  verify content identity without any Data Storage round-trip.
                type: string
              previouslyExisted:
                description: PreviouslyExisted indicates if this workflow was re-registered
                  after deletion
                type: boolean
              registeredAt:
                description: RegisteredAt is the timestamp of initial registration
                format: date-time
                type: string
              registeredBy:
                description: RegisteredBy is the identity of the registrant
                type: string
              workflowId:
                description: |-
                  WorkflowID is the deterministic UUID derived from the workflow's content
                  hash (DeterministicUUID(ComputeContentHash(spec))). Computed locally by
                  AuthWebhook (#1661 Change 8a/8c) rather than assigned by Data Storage --
                  stable across the etcd-single-source-of-truth migration (DD-WORKFLOW-018).
                type: string
            type: object
