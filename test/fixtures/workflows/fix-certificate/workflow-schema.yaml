apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: fix-certificate-v1
spec:
  # Fix Certificate Workflow Schema (BR-WORKFLOW-004)
  # Used by: Full Pipeline E2E — 02_async_hash_deferral_test.go (cert-manager scenario)
  version: "1.0.0"
  description:
    what: "Recreates a missing or corrupted CA Secret backing a cert-manager ClusterIssuer to restore certificate issuance"
    whenToUse: "When a cert-manager Certificate is stuck in NotReady because the CA Secret has been deleted or corrupted"
    whenNotToUse: "When the Certificate failure is caused by DNS validation issues, incorrect certificate spec, or an expired root CA"
    preconditions: "cert-manager is installed, the ClusterIssuer exists, and the failure is specifically due to a missing or corrupted CA Secret"
  
  actionType: FixCertificate
  
  labels:
    severity: [critical]
    environment: [production]
    component: pod
    priority: P0
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:adfc09ea45a5b627550c6a73fe75d50efe1c80fa43359fcc4908c9c5b0639ac3
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: TARGET_NAMESPACE
      type: string
      required: true
      description: "Namespace of the affected Certificate"
    - name: TARGET_CERTIFICATE
      type: string
      required: true
      description: "Name of the Certificate to fix"
    - name: ISSUER_NAME
      type: string
      required: true
      description: "Name of the ClusterIssuer backing the certificate"
    - name: CA_SECRET_NAME
      type: string
      required: true
      description: "Name of the CA Secret to recreate"
    - name: CA_SECRET_NAMESPACE
      type: string
      required: false
      description: "Namespace of the CA Secret (defaults to cert-manager namespace)"
