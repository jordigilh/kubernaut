          example: "llm_analysis"
        duration_seconds:
          type: number
          format: float
          description: Duration of the investigation before failure (seconds)
          example: 120.5

    AIAgentEnrichmentCompletedPayload:
      type: object
      required: [event_type, event_id, incident_id, root_owner_kind, root_owner_name, owner_chain_length, remediation_history_fetched]
      description: AI Agent Phase 2 enrichment completed event payload (aiagent.enrichment.completed) - SOC2 CC8.1, Issue #533
      properties:
        event_type:
          type: string
          enum: ['aiagent.enrichment.completed']
          description: Event type for discriminator (matches parent event_type)
        event_id:
          type: string
          description: Unique event identifier
          example: "evt-enrich-ok-abc123"
        incident_id:
          type: string
          description: Incident correlation ID from request
          example: "incident-payment-api-2026-03-04-abc123"
        root_owner_kind:
          type: string
          description: Resolved root owner resource kind (e.g., Deployment, StatefulSet)
          example: "Deployment"
        root_owner_name:
          type: string
          description: Resolved root owner resource name
          example: "api-server"
        root_owner_namespace:
          type: string
          description: Resolved root owner namespace (empty for cluster-scoped resources)
          example: "production"
        owner_chain_length:
          type: integer
          description: Number of resources in the K8s owner chain (1 = no parent)
          example: 3
        detected_labels_summary:
          type: object
          nullable: true
          description: Infrastructure labels detected by LabelDetector (null when detector unavailable)
          example: {"gitOpsManaged": true, "pdbProtected": false, "hpaEnabled": true}
        failed_detections:
          type: array
          nullable: true
          items:
            type: string
          description: Labels that could not be detected (null when all succeeded or detector unavailable)
          example: ["networkIsolated", "serviceMesh"]
        remediation_history_fetched:
          type: boolean
          description: Whether remediation history was successfully fetched from DataStorage
          example: true

    AIAgentEnrichmentFailedPayload:
      type: object
      required: [event_type, event_id, incident_id, reason, detail, affected_resource_kind, affected_resource_name]
      description: AI Agent Phase 2 enrichment failure event payload (aiagent.enrichment.failed) - SOC2 CC8.1, Issue #533
      properties:
        event_type:
          type: string
          enum: ['aiagent.enrichment.failed']
          description: Event type for discriminator (matches parent event_type)
        event_id:
          type: string
          description: Unique event identifier
          example: "evt-enrich-fail-abc123"
        incident_id:
          type: string
          description: Incident correlation ID from request
          example: "incident-payment-api-2026-03-04-abc123"
        reason:
          type: string
          description: Failure reason from EnrichmentFailure (e.g., rca_incomplete)
          example: "rca_incomplete"
        detail:
          type: string
          description: Detailed failure context including retry information
          example: "resolve_owner_chain failed after 3 retries: ConnectionError"
        affected_resource_kind:
          type: string
          description: Kind of the resource that was being enriched when failure occurred
          example: "Pod"
        affected_resource_name:
          type: string
          description: Name of the resource that was being enriched when failure occurred
          example: "api-xyz-12345"
        affected_resource_namespace:
          type: string
          description: Namespace of the resource (empty for cluster-scoped)
          example: "production"

    IncidentResponseData:
      type: object
      required: [incidentId, analysis, rootCauseAnalysis, confidence, timestamp]
      description: Complete IncidentResponse structure from HolmesGPT API (DD-AUDIT-004 - strongly typed, no additionalProperties)
      properties:
        incidentId:
          type: string
          description: Incident identifier from request
          example: "incident-payment-api-2025-12-17-abc123"
        analysis:
          type: string
          description: Natural language analysis from LLM
          example: "Root cause analysis indicates..."
        rootCauseAnalysis:
          type: object
          description: Structured RCA with summary, severity, contributingFactors
          required: [summary, severity, contributingFactors]
          properties:
            summary:
              type: string
              description: Brief RCA summary
            severity:
              type: string
              enum: [critical, high, medium, low, unknown]
              description: Incident severity (BR-SEVERITY-001)
              example: "high"
            contributingFactors:
              type: array
              items:
                type: string
              description: List of contributing factors
            remediationTarget:
              type: object
              description: Target resource for remediation (kind/name/namespace from KA investigation)
              properties:
                kind:
                  type: string
                  description: Kubernetes resource kind
                  example: "Deployment"
                name:
                  type: string
                  description: Resource name
                  example: "api-server"
                namespace:
                  type: string
                  description: Resource namespace (empty for cluster-scoped)
                  example: "production"
              additionalProperties: false
            causalChain:
              type: array
              items:
                type: string
              description: Five whys causal chain from signal to root cause. Each entry is one step tracing from the observed symptom to the deepest identifiable cause.
              example: ["Signal: OOMKilled on pod X", "Why? Container exceeded memory limit", "Root cause: Missing memory limit configuration"]
            dueDiligence:
              type: object
              description: Adversarial self-review across 8 dimensions (Issue #847). Captures the LLM's justification for its RCA.
              properties:
                causalCompleteness:
                  type: string
                  description: Assessment of causal chain depth and completeness
                targetAccuracy:
                  type: string
                  description: Justification that remediation target is the root cause, not the symptom reporter
                evidenceSufficiency:
                  type: string
                  description: Which claims are backed by tool evidence vs assumptions
                alternativeHypotheses:
                  type: string
                  description: Alternative root causes considered and ruled out
                scopeCompleteness:
                  type: string
                  description: Assessment of investigation coverage across all relevant resources
                proportionality:
                  type: string
                  description: Whether remediation target matches the problem scope
                regressionAwareness:
                  type: string
                  description: Assessment against previously failed remediations
                confidenceCalibration:
                  type: string
                  description: Breakdown of factors that reduced confidence from 1.0
              additionalProperties: false
          additionalProperties: false
        selectedWorkflow:
          type: object
          description: Selected workflow with workflowId, actionType, executionBundle, confidence, parameters (optional)
          properties:
            workflowId:
              type: string
            actionType:
              type: string
              description: |
                Action type from DD-WORKFLOW-016 taxonomy (e.g., ScaleReplicas, RestartPod).
                Propagated from HAPI three-step discovery protocol.
              example: "ScaleReplicas"
            executionBundle:
              type: string
            confidence:
              type: number
              format: float
              minimum: 0.0
              maximum: 1.0
            parameters:
              type: object
              additionalProperties: true
          additionalProperties: false
        confidence:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Overall confidence in analysis
          example: 0.85
        timestamp:
          type: string
          format: date-time
          description: ISO timestamp of analysis completion
        needsHumanReview:
          type: boolean
          default: false
          description: True when AI could not produce reliable result
        humanReviewReason:
          type: string
          enum: [workflow_not_found, image_mismatch, parameter_validation_failed, no_matching_workflows, low_confidence, llm_parsing_error, investigation_inconclusive, rca_incomplete]
          description: Structured reason when needsHumanReview=true (BR-HAPI-197, BR-HAPI-200, BR-HAPI-212)
        warnings:
          type: array
          items:
            type: string
          description: Non-fatal warnings (e.g., OwnerChain validation issues)
        alternativeWorkflows:
          type: array
          items:
            type: object
            properties:
              workflowId:
                type: string
              rationale:
                type: string
              executionBundle:
                type: string
                description: Execution bundle for the alternative workflow
              confidence:
                type: number
                format: float
                minimum: 0.0
                maximum: 1.0
                description: Confidence score for the alternative workflow
            additionalProperties: false
          description: Other workflows considered but not selected

    LLMRequestPayload:
      type: object
      required: [event_type, event_id, incident_id, model, prompt_length, prompt_preview]
      description: LLM API request event payload (aiagent.llm.request)
      properties:
