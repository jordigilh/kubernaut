apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: rollback-deployment-test-v1
spec:
  # Rollback Deployment Test Workflow Schema (BR-WORKFLOW-004)
  # Used by: DataStorage E2E — 04_workflow_discovery_test.go (DD-HAPI-017)
  version: "1.0.0"
  description:
    what: "Rolls back a deployment to a previous revision"
    whenToUse: "When a deployment update causes failures and needs rollback"
    whenNotToUse: "When the issue is not caused by the latest deployment change"
    preconditions: "Deployment has previous revisions available"
  
  actionType: RollbackDeployment
  
  labels:
    severity: [high]
    environment: [production, staging, test]
    component: deployment
    priority: P1
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:2a07b572d7c2d16845da11ea01ff24198bd2ff366580c81a8d2fbc6ae6b78389
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (HAPI-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (HAPI-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (HAPI-injected)"
    - name: NAMESPACE
      type: string
      required: true
      description: "Target namespace containing the deployment"
    - name: DEPLOYMENT_NAME
      type: string
      required: true
      description: "Name of the deployment to roll back"
