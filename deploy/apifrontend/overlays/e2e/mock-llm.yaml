---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-llm
  namespace: kubernaut-system
  labels:
    app.kubernetes.io/name: mock-llm
    app.kubernetes.io/component: test-infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-llm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-llm
        app.kubernetes.io/component: test-infrastructure
    spec:
      containers:
        - name: mock-llm
          image: ghcr.io/jordigilh/kubernaut/mock-llm:pr-1161
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: MOCK_LLM_HOST
              value: "0.0.0.0"
            - name: MOCK_LLM_PORT
              value: "8080"
            - name: MOCK_LLM_FORCE_TEXT
              value: "false"
            - name: MOCK_LLM_CONFIG_PATH
              value: "/etc/mock-llm/config.yaml"
          volumeMounts:
            - name: mock-llm-config
              mountPath: /etc/mock-llm
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
      volumes:
        - name: mock-llm-config
          configMap:
            name: mock-llm-config
      securityContext:
        fsGroup: 1001
      restartPolicy: Always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-llm-config
  namespace: kubernaut-system
  labels:
    app.kubernetes.io/name: mock-llm
    app.kubernetes.io/component: test-infrastructure
data:
  config.yaml: |
    # AF-specific keyword→tool_call mappings for E2E testing.
    # mock-LLM matches prompt keywords and returns the corresponding tool call.
    keyword_scenarios:
      - name: "af_investigate"
        keywords: ["start investigation", "investigate", "begin investigation"]
        match_last_only: true
        tool_call:
          name: "kubernaut_investigate"
          arguments:
            namespace: "default"
            name: "nginx"
            kind: "Pod"

      - name: "af_investigate_resume"
        keywords: ["stream the investigation", "resume investigation", "check investigation status"]
        match_last_only: true
        repeat_tool_call: true
        tool_call:
          name: "kubernaut_investigate"
          arguments:
            session_id: "$from_tool:kubernaut_investigate:session_id"

      - name: "af_discover_workflows"
        keywords: ["discover available workflows", "discover workflows"]
        match_last_only: true
        tool_call:
          name: "kubernaut_discover_workflows"
          arguments:
            rr_id: "kubernaut-system/rr-test"

      - name: "af_select_workflow"
        keywords: ["select workflow", "select the restart workflow"]
        match_last_only: true
        tool_call:
          name: "kubernaut_select_workflow"
          arguments:
            workflow_id: "restart-v1"
            remediation_id: "rr-001"

      - name: "af_present_decision"
        keywords: ["present decision", "present remediation options", "remediation options"]
        match_last_only: true
        tool_call:
          name: "kubernaut_present_decision"
          arguments:
            session_id: "sess-002"
            summary: "Remediation decision required"
            options:
              - workflow_id: "wf-restart"
                name: "Restart"
                description: "Restart affected pods"
              - workflow_id: "wf-scale-up"
                name: "Scale Up"
                description: "Scale up deployment replicas"
              - workflow_id: "wf-rollback"
                name: "Rollback"
                description: "Rollback to previous revision"

      - name: "af_progressive_investigate"
        keywords: ["progressive investigate", "investigate progressively"]
        match_last_only: true
        tool_call:
          name: "kubernaut_investigate"
          arguments:
            api_version: "v1"
            namespace: "default"
            name: "nginx"
            kind: "Pod"
        next_tool_call:
          name: "kubernaut_discover_workflows"
          arguments:
            rr_id: "kubernaut-system/rr-progressive-e2e"

      - name: "af_structured_decision"
        keywords: ["structured decision", "present structured rca decision"]
        match_last_only: true
        thought_text: "Let me analyze the investigation findings. The data-processor pod has been OOMKilled repeatedly, which correlates with the memory leak pattern in the worker goroutine. I should present the decision options to the operator."
        tool_call:
          name: "kubernaut_present_decision"
          arguments:
            session_id: "sess-structured-001"
            summary: "OOMKill detected in production data-processor pod with critical severity and high confidence from investigation"
            rca:
              severity: "critical"
              confidence: 0.92
              causal_chain:
                - "Memory leak in data-processor worker goroutine"
                - "Container hit 512Mi memory limit"
                - "Kernel sent OOMKill signal to container"
              target: "Deployment/data-processor in production"
              tool_calls_count: 19
              llm_turns: 17
            options:
              - workflow_id: "wf-restart-pod"
                name: "Restart Pod"
                description: "Rolling restart of affected deployment pods to recover from OOM state"
                risk: "low"
                recommended: true
                parameters:
                  namespace: "production"
                  deployment: "data-processor"
              - workflow_id: "wf-increase-memory"
                name: "Increase Memory Limit"
                description: "Scale memory limit from 512Mi to 1Gi to prevent future OOMKill events"
                risk: "medium"
                parameters:
                  new_limit: "1Gi"
              - workflow_id: "wf-rollback"
                name: "Rollback Deployment"
                description: "Roll back to previous stable revision without memory leak"
                risk: "low"
                ruled_out_reason: "No previous revision available in cluster deployment history"

      - name: "af_approval_request"
        keywords: ["watch approval gate", "watch approval gate and approve", "watch approval gate expire"]
        match_last_only: true
        tool_call:
          name: "kubernaut_watch"
          arguments:
            name: "rr-approval-e2e"

      - name: "af_list_remediations"
        keywords: ["list remediations", "list all remediations"]
        match_last_only: true
        tool_call:
          name: "kubernaut_list_remediations"
          arguments: {}

      - name: "af_get_remediation"
        keywords: ["get details for remediation", "get remediation"]
        match_last_only: true
        tool_call:
          name: "kubernaut_get_remediation"
          arguments:
            name: "rr-test"

      - name: "af_approve"
        keywords: ["approve the remediation", "approve remediation"]
        match_last_only: true
        tool_call:
          name: "kubernaut_approve"
          arguments:
            name: "rr-test"

      - name: "af_cancel_remediation"
        keywords: ["cancel the remediation", "cancel remediation"]
        match_last_only: true
        tool_call:
          name: "kubernaut_cancel_remediation"
          arguments:
            name: "rr-test"

      - name: "af_watch"
        keywords: ["watch the progress", "watch remediation"]
        match_last_only: true
        tool_call:
          name: "kubernaut_watch"
          arguments:
            name: "rr-test"

      - name: "af_watch_progress_e2e"
        keywords: ["watch progress e2e 1403"]
        match_last_only: true
        tool_call:
          name: "kubernaut_watch"
          arguments:
            name: "rr-progress-e2e-1403"

      - name: "af_list_workflows"
        keywords: ["list workflows", "available remediation workflows", "list all available"]
        match_last_only: true
        tool_call:
          name: "kubernaut_list_workflows"
          arguments:
            action_type: "remediation"

      - name: "af_get_remediation_history"
        keywords: ["remediation history", "get remediation history"]
        match_last_only: true
        tool_call:
          name: "kubernaut_get_remediation_history"
          arguments:
            namespace: "payments"

      - name: "af_get_effectiveness"
        keywords: ["effectiveness", "remediation effectiveness"]
        match_last_only: true
        tool_call:
          name: "kubernaut_get_effectiveness"
          arguments: {}

      - name: "af_get_audit_trail"
        keywords: ["audit trail", "get the audit trail"]
        match_last_only: true
        tool_call:
          name: "kubernaut_get_audit_trail"
          arguments:
            remediation_id: "rr-audit"

      - name: "kubectl_list_events"
        keywords: ["list events", "list kubernetes events"]
        match_last_only: true
        tool_call:
          name: "kubectl_list_events"
          arguments:
            namespace: "kubernaut-system"

      - name: "kubectl_list_pods"
        keywords: ["get pods", "get all pods"]
        match_last_only: true
        tool_call:
          name: "kubectl_list"
          arguments:
            kind: "Pod"
            namespace: "default"

      - name: "kubectl_list_workloads"
        keywords: ["get workloads"]
        match_last_only: true
        tool_call:
          name: "kubectl_list"
          arguments:
            kind: "Deployment"
            namespace: "default"

      - name: "kubernaut_check_existing_remediation"
        keywords: ["check existing", "remediation already exists", "check if a remediation"]
        match_last_only: true
        tool_call:
          name: "kubernaut_check_existing_remediation"
          arguments:
            namespace: "prod"
            kind: "Deployment"
            name: "web"
---
apiVersion: v1
kind: Service
metadata:
  name: mock-llm
  namespace: kubernaut-system
  labels:
    app.kubernetes.io/name: mock-llm
    app.kubernetes.io/component: test-infrastructure
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: mock-llm
