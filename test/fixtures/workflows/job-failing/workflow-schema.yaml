apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: test-job-intentional-failure
spec:
  # Intentional Failure Job Backend Test Workflow (BR-WE-014)
  # Used by: WorkflowExecution E2E (Job backend failure tests)
  version: "1.0.0"
  description:
    what: "Job workflow that intentionally fails for testing error handling"
    whenToUse: "For E2E validation of Job failure detection and error propagation"
    whenNotToUse: "Not intended for production use"
    preconditions: "Kubernetes cluster available"
  
  actionType: RestartPod
  
  labels:
    severity: [low]
    environment: [test]
    component: deployment
    priority: P3
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/job-failing:v1.0.0-exec@sha256:b160392f97472e5b1a80867b55e48398829f52f8352b8926f14bbb243886951e
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE
      type: string
      required: true
      description: "Target resource identifier"
      default: "test/deployment/failing"
    - name: FAILURE_MESSAGE
      type: string
      required: false
      description: "Error message to produce"
      default: "Intentional failure for Job backend testing"
