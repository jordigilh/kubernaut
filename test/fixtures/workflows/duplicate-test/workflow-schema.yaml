apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: duplicate-test-v1
spec:
  # Duplicate Test Workflow Schema (BR-WORKFLOW-004)
  # Used by: DataStorage E2E — 18_workflow_duplicate_api_test.go (DS-BUG-001)
  # This workflow is created twice to test 409 Conflict duplicate detection
  version: "1.0.0"
  description:
    what: "Test workflow for duplicate creation detection"
    whenToUse: "For E2E testing of RFC 9110 Section 15.5.10 duplicate resource handling"
    whenNotToUse: "Not intended for production use"
    preconditions: "DataStorage service running"
  
  actionType: RestartPod
  
  labels:
    severity: [high]
    environment: [test]
    component: deployment
    priority: P2
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:2a07b572d7c2d16845da11ea01ff24198bd2ff366580c81a8d2fbc6ae6b78389
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (HAPI-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (HAPI-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (HAPI-injected)"
    - name: NAMESPACE
      type: string
      required: true
      description: "Target namespace"
    - name: POD_NAME
      type: string
      required: true
      description: "Name of the pod to restart"
