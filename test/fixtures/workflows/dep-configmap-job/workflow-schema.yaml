apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: test-dep-configmap-job
spec:
  # DD-WE-006 Test Workflow: Job with ConfigMap Dependency (BR-WORKFLOW-004)
  # Used by: WorkflowExecution E2E (ConfigMap dependency injection tests)
  # Authority: DD-WE-006, BR-WE-014
  version: "1.0.0"
  description:
    what: "Job workflow that declares a ConfigMap dependency for DD-WE-006 E2E testing"
    whenToUse: "For E2E validation of schema-declared ConfigMap dependency injection into Jobs"
    whenNotToUse: "Not intended for production use"
    preconditions: "ConfigMap 'e2e-dep-configmap' provisioned in execution namespace"
  
  actionType: RestartPod
  
  labels:
    severity: [low]
    environment: [test]
    component: deployment
    priority: P3
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:9771eca86cd5b39ac22c9490a5e7e0420abe6b4576e927326edfac1ecc7e5980
  
  dependencies:
    configMaps:
      - name: e2e-dep-configmap
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE
      type: string
      required: true
      description: "Target resource being remediated"
      default: "test/deployment/dep-test"
    - name: MESSAGE
      type: string
      required: false
      description: "Optional message for execution log"
      default: "Hello from DD-WE-006 ConfigMap dependency injection test!"
