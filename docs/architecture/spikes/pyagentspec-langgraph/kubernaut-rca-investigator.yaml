component_type: Agent
id: b27290f5-32a3-4d71-a0e4-0e4e175cd342
name: kubernaut-rca-investigator
description: Investigates Kubernetes alert signals and produces structured RCA
metadata: {}
inputs: []
outputs: []
llm_config:
  component_type: OpenAiCompatibleConfig
  id: 26806a5c-31b3-4a4a-b3c4-dc32346a77bc
  name: vertex-anthropic
  description: Anthropic Claude via Vertex AI OpenAI-compatible endpoint
  metadata: {}
  default_generation_parameters: null
  url: https://us-east5-aiplatform.googleapis.com/v1/projects/PROJECT/locations/us-east5/endpoints/openapi  # pre-commit:allow-sensitive
  model_id: claude-sonnet-4-20250514
system_prompt: 'You are a Kubernetes incident investigator for the Kubernaut platform.

  A signal has fired. Use the available tools to inspect the affected resource, check
  events, query metrics, and determine the root cause.


  When you have identified the root cause, call submit_result with a structured JSON
  object containing:

  - root_cause: string describing the root cause

  - confidence: number 0-1

  - affected_resources: array of resource identifiers

  - remediation_suggested: boolean

  '
tools:
- component_type: ServerTool
  id: 4ffb4705-c7a3-4e7d-8141-20cc03cfc023
  name: kubectl_get
  description: Get a Kubernetes resource by kind, name, and namespace
  metadata: {}
  inputs:
  - description: Resource kind
    title: kind
    type: string
  - description: Resource name
    title: name
    type: string
  - description: Namespace
    title: namespace
    type: string
  outputs: []
- component_type: ServerTool
  id: 0fc35937-1f91-4931-93e1-972e35451e45
  name: kubectl_list_events
  description: List Kubernetes events for a resource in a namespace
  metadata: {}
  inputs:
  - description: Namespace
    title: namespace
    type: string
  - description: Resource name
    title: resource_name
    type: string
  outputs: []
- component_type: ServerTool
  id: 18a6906e-2ba0-4d6b-8649-2fec39244d16
  name: prometheus_query
  description: Execute a PromQL query and return metric results
  metadata: {}
  inputs:
  - description: PromQL expression
    title: query
    type: string
  - description: Time range, e.g. 1h
    title: time_range
    type: string
  outputs: []
- component_type: ServerTool
  id: 7823b7c0-bf0b-4db4-9c9d-7ec021bf42a4
  name: submit_result
  description: Submit the structured RCA investigation result
  metadata: {}
  inputs:
  - description: Structured RCA result
    type: object
    properties:
      root_cause:
        type: string
      confidence:
        type: number
        minimum: 0
        maximum: 1
      affected_resources:
        type: array
        items:
          type: string
      remediation_suggested:
        type: boolean
    required:
    - root_cause
    - confidence
    title: result
  outputs: []
agentspec_version: 25.4.1
