apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubernaut.fullname" . }}-db-migration
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migration
    spec:
      serviceAccountName: {{ include "kubernaut.fullname" . }}-hook-sa
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- include "kubernaut.scheduling" (dict "component" .Values.hooks "global" .Values.global) | nindent 6 }}
      initContainers:
        - name: wait-for-postgresql
          image: {{ .Values.hooks.migrations.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until pg_isready -h {{ include "kubernaut.postgresql.host" . }} -p {{ include "kubernaut.postgresql.port" . }} -U {{ include "kubernaut.postgresql.username" . }} -d {{ include "kubernaut.postgresql.database" . }}; do
                echo "  PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready."
      containers:
        - name: migrate
          image: {{ .Values.hooks.migrations.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: PGHOST
              value: {{ include "kubernaut.postgresql.host" . }}
            - name: PGPORT
              value: "{{ include "kubernaut.postgresql.port" . }}"
            - name: PGUSER
              value: {{ include "kubernaut.postgresql.username" . }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernaut.postgresql.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: PGDATABASE
              value: {{ include "kubernaut.postgresql.database" . }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              GOOSE_DBSTRING="host=$PGHOST user=$PGUSER password=$PGPASSWORD dbname=$PGDATABASE sslmode=disable"

              echo "==> Applying SQL migrations with goose (DD-012)"
              goose -dir /migrations postgres "$GOOSE_DBSTRING" up

              echo "==> Granting privileges..."
              psql -q <<'EOSQL'
              GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ include "kubernaut.postgresql.username" . }};
              GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ include "kubernaut.postgresql.username" . }};
              GRANT EXECUTE ON ALL FUNCTIONS IN SCHEMA public TO {{ include "kubernaut.postgresql.username" . }};
              EOSQL
              echo "==> Migrations complete"
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: {{ include "kubernaut.fullname" . }}-migrations
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubernaut.fullname" . }}-migrations
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  {{- $migrationsDir := printf "%s/migrations" $.Chart.Name }}
  {{- range $path, $_ := .Files.Glob "migrations/*.sql" }}
  {{ base $path }}: |
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
