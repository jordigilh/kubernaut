{{- if and .Values.networkPolicies.enabled .Values.networkPolicies.kubernautAgent.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
{{ include "kubernaut.np.metadata" (dict "root" $ "nameSuffix" "kubernaut-agent" "appLabel" "kubernaut-agent") }}
spec:
  podSelector:
    matchLabels:
      app: kubernaut-agent
  policyTypes:
    - Ingress
  ingress:
    # Investigation traffic from aianalysis-controller
    - ports:
        - port: 8443
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app: aianalysis-controller
    # Trusted intermediary traffic from apifrontend (#1287)
    - ports:
        - port: 8443
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app: apifrontend
    {{- include "kubernaut.np.metricsIngress" $ | nindent 4 }}
{{- end }}
