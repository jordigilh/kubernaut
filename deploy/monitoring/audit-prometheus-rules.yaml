# Audit Service - Prometheus Alert Rules
# F-5 SOC2 Fix: Deploy Audit Prometheus Alerting Rules
#
# These alerts monitor the audit event pipeline defined in pkg/audit/metrics.go
# and the Data Storage service metrics defined in pkg/datastorage/metrics/metrics.go.
#
# Key Metrics:
# - audit_events_dropped_total: Events dropped due to buffer full
# - datastorage_dlq_pel_pending: DLQ PEL backlog depth (#1088 Phase 7)
# - datastorage_shutdown_dlq_drain_errors_total: Shutdown drain errors (#1088 Phase 7)
# - datastorage_retention_purge_total: Retention purge operations (#1088 Phase 7)
# - datastorage_dlq_warning: DLQ at 80% capacity (#1048 Phase 5)
# - datastorage_dlq_critical: DLQ at 90% capacity (#1048 Phase 5)

apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-prometheus-rules
  namespace: kubernaut-system
  labels:
    app: audit
    component: monitoring
data:
  audit-alerts.yaml: |
    groups:
      - name: audit_pipeline_health
        interval: 30s
        rules:
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # WARNING ALERTS (Investigate during business hours)
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          - alert: AuditEventsDropped
            expr: rate(audit_events_dropped_total[5m]) > 0
            for: 5m
            labels:
              severity: warning
              component: audit
              service: "{{ $labels.service }}"
            annotations:
              summary: "Audit events being dropped for {{ $labels.service }}"
              description: |
                Audit events are being dropped for service {{ $labels.service }}.
                This indicates the audit buffer is reaching capacity.

                **SOC2 Impact**:
                - Dropped events create gaps in the audit trail (CC7.2)
                - Compliance auditors may flag missing events

                **Actions**:
                1. Check Data Storage Service health: `kubectl get pods -n kubernaut-system -l app=datastorage`
                2. Check Data Storage logs for errors: `kubectl logs -n kubernaut-system deployment/datastorage --tail=100`
                3. Check PostgreSQL connectivity and performance
                4. Consider increasing buffer size in audit config (current default: 10000)
                5. Check if PostgreSQL is under pressure

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # DATA STORAGE ALERTS (#1088 Phase 7 — Checkpoint B / H3)
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          - alert: DLQPELBacklogHigh
            expr: datastorage_dlq_pel_pending > 100
            for: 5m
            labels:
              severity: warning
              component: datastorage
            annotations:
              summary: "DLQ PEL backlog is high ({{ $value }} pending messages)"
              description: |
                The DLQ Pending Entry List has {{ $value }} messages that have
                been read but not yet acknowledged. This may indicate the retry
                worker is stuck, PostgreSQL is slow, or messages are failing
                validation repeatedly.

                **Runbook**: RB-DS-005 (PEL Stuck Messages)
                **Actions**:
                1. Check DLQ retry worker logs for errors
                2. Check PostgreSQL connectivity and query performance
                3. Look for poison messages (delivery count > 5)

          - alert: ShutdownDrainErrors
            expr: increase(datastorage_shutdown_dlq_drain_errors_total[10m]) > 0
            for: 1m
            labels:
              severity: warning
              component: datastorage
            annotations:
              summary: "DLQ drain errors during recent pod shutdown"
              description: |
                Errors occurred while draining DLQ messages to PostgreSQL during
                graceful shutdown. Messages that failed to drain remain in Redis
                and will be retried by the next pod's retry worker.

                **Runbook**: RB-DS-006 (Shutdown DLQ Drain Issues)
                **Actions**:
                1. Correlate with shutdown_id in logs
                2. Check PostgreSQL availability at shutdown time
                3. Verify DLQ depth after pod restart (XLEN)

          - alert: RetentionPurgeStalled
            expr: increase(datastorage_retention_purge_total[1h]) == 0 and on() datastorage_retention_enabled == 1
            for: 10m
            labels:
              severity: warning
              component: datastorage
            annotations:
              summary: "Retention worker has not purged in over 1 hour"
              description: |
                The retention worker has not completed a purge cycle in the last
                hour. This may indicate the worker has stopped, PostgreSQL is
                unreachable, or all events are under legal hold.

                **Runbook**: RB-DS-002 (Retention Worker Not Purging)
                **Actions**:
                1. Check retention worker logs for errors
                2. Verify retention_operations table for recent runs
                3. Check if events exist past retention_days threshold

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # DLQ CAPACITY ALERTS (#1048 Phase 5 / AU-11 / FEDRAMP-H3)
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          - alert: DLQCapacityWarning
            expr: datastorage_dlq_warning == 1
            for: 5m
            labels:
              severity: warning
              component: datastorage
            annotations:
              summary: "DLQ at 80%+ capacity for stream {{ $labels.stream }}"
              description: |
                The DLQ stream {{ $labels.stream }} has reached 80% of its
                configured MAXLEN. If the retry worker cannot drain messages
                faster than they arrive, older entries will be trimmed on
                the next XADD, causing data loss.

                **Runbook**: RB-DS-001 (DLQ Backpressure / RPO Risk)
                **Actions**:
                1. Check PostgreSQL connectivity and DLQ retry worker logs
                2. Monitor XADD rate: `rate(datastorage_dlq_stream_xadd_total[5m])`
                3. Consider increasing `dlqMaxLen` if backpressure is expected

          - alert: DLQCapacityCritical
            expr: datastorage_dlq_critical == 1
            for: 2m
            labels:
              severity: critical
              component: datastorage
            annotations:
              summary: "DLQ at 90%+ capacity for stream {{ $labels.stream }} — trim imminent"
              description: |
                The DLQ stream {{ $labels.stream }} has reached 90% of its
                configured MAXLEN. MAXLEN~ trimming is imminent or already
                active, meaning audit events may be permanently lost.

                **Runbook**: RB-DS-001 (DLQ Backpressure / RPO Risk)
                **RPO Impact**: ~20-50 MB of unsynced audit data at risk
                **Actions**:
                1. URGENT: Check PostgreSQL availability immediately
                2. Check DLQ retry worker logs for errors
                3. Increase `dlqMaxLen` as a stopgap if DB recovery is slow
                4. Verify DLQ depth: `redis-cli XLEN audit:dlq:events`
