<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bgGrad)"/>

  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1E293B">Interactive Mode -- Not a Black Box</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#64748B">Kubernaut's MCP interactive mode makes delegation feel native in your UI</text>

  <!-- Card 1: Real-time streaming -->
  <g filter="url(#shadow)">
    <rect x="40" y="80" width="420" height="120" rx="14" fill="white"/>
  </g>
  <rect x="40" y="80" width="8" height="120" rx="4" fill="#0D9488"/>
  <rect x="66" y="96" width="28" height="28" rx="6" fill="#0D9488" opacity="0.1"/>
  <text x="80" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#0D9488">&gt;&gt;</text>
  <text x="104" y="108" font-size="15" font-weight="700" fill="#1E293B">Real-time streaming</text>
  <g font-size="12" fill="#475569">
    <text x="68" y="134">Investigation findings stream token-by-token via SSE.</text>
    <text x="68" y="152">Your agent renders them however fits your UX --</text>
    <text x="68" y="170">chat bubbles, log panels, progress bars.</text>
  </g>
  <rect x="68" y="180" width="100" height="14" rx="4" fill="#0D9488" opacity="0.08"/>
  <text x="118" y="191" text-anchor="middle" font-size="8" font-weight="600" fill="#0D9488">YOUR RENDERING</text>

  <!-- Card 2: Conversational steering -->
  <g filter="url(#shadow)">
    <rect x="500" y="80" width="420" height="120" rx="14" fill="white"/>
  </g>
  <rect x="500" y="80" width="8" height="120" rx="4" fill="#2563EB"/>
  <rect x="526" y="96" width="28" height="28" rx="6" fill="#2563EB" opacity="0.1"/>
  <text x="540" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#2563EB">Q&amp;A</text>
  <text x="564" y="108" font-size="15" font-weight="700" fill="#1E293B">Conversational steering</text>
  <g font-size="12" fill="#475569">
    <text x="528" y="134">Your user asks follow-ups in your chat:</text>
    <text x="528" y="152" font-style="italic" fill="#64748B">"What about the other pods?"</text>
    <text x="528" y="170">Your agent passes them through. Kubernaut responds.</text>
  </g>
  <rect x="528" y="180" width="100" height="14" rx="4" fill="#2563EB" opacity="0.08"/>
  <text x="578" y="191" text-anchor="middle" font-size="8" font-weight="600" fill="#1D4ED8">MULTI-TURN</text>

  <!-- Card 3: Choice presentation -->
  <g filter="url(#shadow)">
    <rect x="40" y="220" width="420" height="120" rx="14" fill="white"/>
  </g>
  <rect x="40" y="220" width="8" height="120" rx="4" fill="#7C3AED"/>
  <rect x="66" y="236" width="28" height="28" rx="6" fill="#7C3AED" opacity="0.1"/>
  <text x="80" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#7C3AED">1|2</text>
  <text x="104" y="248" font-size="15" font-weight="700" fill="#1E293B">Choice presentation</text>
  <g font-size="12" fill="#475569">
    <text x="68" y="274">Workflow options return as structured data:</text>
    <text x="68" y="292">name, description, risk level, parameters.</text>
    <text x="68" y="310">Your UI renders them as cards, dropdowns, buttons.</text>
  </g>
  <rect x="68" y="320" width="100" height="14" rx="4" fill="#7C3AED" opacity="0.08"/>
  <text x="118" y="331" text-anchor="middle" font-size="8" font-weight="600" fill="#7C3AED">YOUR DESIGN</text>

  <!-- Card 4: Join mid-flight -->
  <g filter="url(#shadow)">
    <rect x="500" y="220" width="420" height="120" rx="14" fill="white"/>
  </g>
  <rect x="500" y="220" width="8" height="120" rx="4" fill="#D97706"/>
  <rect x="526" y="236" width="28" height="28" rx="6" fill="#D97706" opacity="0.1"/>
  <text x="540" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#D97706">-&gt;|</text>
  <text x="564" y="248" font-size="15" font-weight="700" fill="#1E293B">Join mid-flight</text>
  <g font-size="12" fill="#475569">
    <text x="528" y="274">Kubernaut's autonomous pipeline already started</text>
    <text x="528" y="292">(from an alert). Your user attaches and sees the</text>
    <text x="528" y="310">current state + live updates. No restart needed.</text>
  </g>
  <rect x="528" y="320" width="100" height="14" rx="4" fill="#D97706" opacity="0.08"/>
  <text x="578" y="331" text-anchor="middle" font-size="8" font-weight="600" fill="#D97706">SEAMLESS</text>

  <!-- Bottom: comparison -->
  <g filter="url(#shadow)">
    <rect x="40" y="368" width="880" height="148" rx="14" fill="white"/>
  </g>
  <text x="480" y="396" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">What this enables vs. a simple API call</text>

  <rect x="64" y="412" width="396" height="88" rx="10" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="262" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#991B1B">Without interactive mode</text>
  <g font-size="11" fill="#7F1D1D">
    <text x="84" y="456">Fire-and-forget: send request, wait 2 minutes,</text>
    <text x="84" y="472">get a blob of text. User has no visibility.</text>
    <text x="84" y="488" font-weight="600">Black box -- poor UX</text>
  </g>

  <rect x="500" y="412" width="396" height="88" rx="10" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="698" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">With interactive mode</text>
  <g font-size="11" fill="#14532D">
    <text x="520" y="456">Stream findings, ask follow-ups, see options,</text>
    <text x="520" y="472">pick a workflow, watch it execute. Full control.</text>
    <text x="520" y="488" font-weight="600">Transparent -- great UX</text>
  </g>
</svg>
