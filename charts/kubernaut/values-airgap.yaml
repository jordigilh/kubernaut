# Air-gapped / disconnected overlay for Kubernaut Helm chart.
#
# IMPORTANT: Layer this AFTER values-ocp.yaml so it overrides the
# registry.redhat.io pulls with your mirror registry.
#
# Usage (nested registry — Harbor, Artifactory, generic Docker v2):
#   helm install kubernaut charts/kubernaut \
#     -f charts/kubernaut/values-demo.yaml \
#     -f charts/kubernaut/values-ocp.yaml \
#     -f charts/kubernaut/values-airgap.yaml \
#     --set global.image.registry=harbor.corp
#
# Usage (flat registry — quay.io, Docker Hub, OCP internal):
#   helm install kubernaut charts/kubernaut \
#     -f charts/kubernaut/values-demo.yaml \
#     -f charts/kubernaut/values-ocp.yaml \
#     -f charts/kubernaut/values-airgap.yaml \
#     --set global.image.registry=quay.io/myorg \
#     --set global.image.separator=-
#
# Prerequisites:
#   1. Mirror all images listed by hack/airgap/generate-image-list.sh
#      to your internal registry using `oc mirror` or `skopeo copy`.
#   2. If using OCP, add mirror registry credentials to the global pull secret:
#        oc set data secret/pull-secret -n openshift-config \
#          --from-file=.dockerconfigjson=<auth-file>
#   3. For OCP 4.13+, create an ImageDigestMirrorSet (see chart README).

# Override the registry for all Kubernaut service images (including db-migrate).
# Replace <mirror-registry> with your internal registry hostname.
#
# Nested registries (Harbor, Artifactory, generic Docker v2):
#   Images are stored as <mirror-registry>/kubernaut-ai/gateway:tag
#   → separator stays "/"
#
# Flat registries (quay.io, Docker Hub, OCP internal):
#   Images are stored as <mirror-registry>/kubernaut-ai-gateway:tag
#   → set separator to "-"
global:
  image:
    registry: <mirror-registry>
    namespace: kubernaut-ai
    separator: "/"  # change to "-" for flat registries (quay.io, Docker Hub)
    # Optionally pin by digest for immutable references:
    # digest: "sha256:<digest-from-oc-mirror-output>"

# Override each third-party image to point to your mirror.
# These images are NOT governed by global.image settings.
# Red Hat RHEL10 equivalents are used (matching values-ocp.yaml).
#
# For flat registries, adjust paths to single-level repos, e.g.:
#   postgresql.image: <mirror-registry>/rhel10-postgresql-16
postgresql:
  image: <mirror-registry>/rhel10/postgresql-16

valkey:
  image: <mirror-registry>/rhel10/valkey-8

hooks:
  tlsCerts:
    image: <mirror-registry>/openshift4/ose-cli-rhel9:v4.17
