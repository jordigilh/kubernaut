# Kind Cluster Configuration for Full Pipeline E2E Tests
# Reference: DD-TEST-001 Port Allocation Strategy
#
# Full Pipeline E2E deploys ALL Kubernaut services in a single Kind cluster
# to test the complete remediation lifecycle:
#   Gateway → RO → SP → AA → KA → WE → Notification
#
# Port Allocation (from DD-TEST-001 v2.8):
#   Gateway API:      hostPort 30080, NodePort 30080
#   Data Storage API: hostPort 30081, NodePort 30081
#   Mock LLM:         ClusterIP only (internal access by KA)
#   Prometheus:        hostPort 9190,  NodePort 30190 (EM metric comparison)
#   AlertManager:      hostPort 9193,  NodePort 30193 (EM alert resolution)
#
# Kubeconfig Convention (per TESTING_GUIDELINES.md):
#   Pattern: ~/.kube/{service}-e2e-config
#   Path: ~/.kube/fullpipeline-e2e-config
#   Cluster Name: fullpipeline-e2e
#
# Memory Budget: ~6.1GB total (fullpipeline base + fleet components)
#   - Kind cluster overhead: ~1.5GB
#   - PostgreSQL: ~256MB
#   - DataStorage: ~128MB
#   - Gateway: ~128MB
#   - RO Controller: ~128MB
#   - SP Controller: ~64MB
#   - AA Controller: ~128MB
#   - WE Controller: ~64MB
#   - Notification Controller: ~64MB
#   - KA + Mock LLM: ~192MB
#   - Event Exporter: ~64MB
#   - Prometheus: ~128MB
#   - AlertManager: ~64MB
#   - Memory Eater Pod: ~256MB (target workload)
#   - Fleet: Istio (istiod + gateway proxy): ~250MB
#   - Fleet: Kuadrant (broker + controller): ~60MB
#   - Fleet: kube-mcp-server: ~16MB
#   - Fleet: Valkey: ~30MB
#   - Fleet: FMC: ~32MB
#   - Buffer: ~1.5GB
#
# Usage:
#   kind create cluster \
#     --name fullpipeline-e2e \
#     --config test/infrastructure/kind-fullpipeline-config.yaml \
#     --kubeconfig ~/.kube/fullpipeline-e2e-config

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  image: kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a  # K8s 1.34.0 with containerd 2.1.3 (avoids v2.2.0 mount-manager regression)
  # Expose service ports via NodePort to host machine
  # Gateway (for event-exporter webhook delivery)
  extraPortMappings:
  - containerPort: 30080  # Gateway NodePort
    hostPort: 30080       # DD-TEST-001: Gateway API
    protocol: TCP
  # DataStorage (for workflow catalog seeding and audit queries)
  - containerPort: 30081  # DataStorage NodePort
    hostPort: 30081       # DD-TEST-001: DataStorage API
    protocol: TCP
  - containerPort: 30281  # Data Storage health NodePort (Issue #753)
    hostPort: 30281       # Port on host machine
    protocol: TCP
  # Kubernaut Agent (MCP endpoint for HARM-001 regression test)
  - containerPort: 30088  # Kubernaut Agent NodePort
    hostPort: 8088        # localhost:8088 (same as KA E2E per DD-TEST-001)
    protocol: TCP
  # Prometheus (for EM metric comparison - remote write receiver)
  - containerPort: 30190  # Prometheus NodePort
    hostPort: 9190        # DD-TEST-001 v2.8: Prometheus
    protocol: TCP
  # AlertManager (for EM alert resolution queries)
  - containerPort: 30193  # AlertManager NodePort
    hostPort: 9193        # DD-TEST-001 v2.8: AlertManager
    protocol: TCP
  # API Frontend HTTPS (Issue #1189: AF as FP signal source)
  - containerPort: 30443  # AF NodePort
    hostPort: 30443       # DD-TEST-001: AF HTTPS
    protocol: TCP
  # DEX OIDC for AF's own login flow (Issue #1189) -- unrelated to fleet;
  # kept as-is, this DEX instance is never used for the K8s API server's
  # OIDC trust below.
  - containerPort: 30556  # DEX NodePort
    hostPort: 30556       # DD-TEST-001: DEX for AF
    protocol: TCP
  # Fleet: Kuadrant MCP Gateway (multi-cluster tool routing, Issue #54)
  - containerPort: 31975  # Kuadrant Istio gateway MCP NodePort
    hostPort: 31975       # DD-TEST-001: MCP Gateway
    protocol: TCP
  # Fleet: Keycloak OIDC + RFC 8693 Standard Token Exchange (replaces DEX
  # for kube-mcp-server passthrough auth and the K8s API server's OIDC
  # trust -- DEX has no Standard Token Exchange, Spike S17/S20). Same
  # dedicated port as the FMC E2E lane (DD-TEST-001); safe to reuse since
  # each suite runs in its own isolated Kind cluster.
  - containerPort: 30557  # Keycloak NodePort
    hostPort: 30557       # DD-TEST-001: Keycloak for fleet token exchange
    protocol: TCP
  # Extra mounts for coverage data collection (DD-TEST-007) and notification output
  # Note: ALL extraMounts are added programmatically in SetupFullPipelineInfrastructure
  # based on OS (macOS vs Linux) to handle path differences between environments
  # Increase API server rate limits for parallel integration testing
  # OIDC for fleet: configured post-deploy by patchAPIServerForOIDC() in fleet_e2e.go
  # (Dex must be running before the API server can perform OIDC discovery)
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        # Increase API server rate limits for parallel operations
        max-requests-inflight: "800"
        max-mutating-requests-inflight: "400"
    controllerManager:
      extraArgs:
        # Increase controller manager QPS for CRD operations
        kube-api-qps: "100"
        kube-api-burst: "200"
