{{- if eq .Values.tls.mode "cert-manager" }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: authwebhook-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  secretName: authwebhook-tls
  duration: 8760h   # 365 days
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: {{ required "tls.certManager.issuerRef.name is required when tls.mode=cert-manager" .Values.tls.certManager.issuerRef.name }}
    kind: {{ .Values.tls.certManager.issuerRef.kind }}
    group: {{ .Values.tls.certManager.issuerRef.group }}
  dnsNames:
    - authwebhook
    - authwebhook.{{ .Release.Namespace }}
    - authwebhook.{{ .Release.Namespace }}.svc
    - authwebhook.{{ .Release.Namespace }}.svc.cluster.local
{{- end }}
