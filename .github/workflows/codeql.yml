name: CodeQL

# Static Application Security Testing (SAST) for Go source.
#
# Runs on every push to main and every PR, plus a weekly schedule so newly
# published CodeQL query packs get a chance to flag latent issues even when
# no code has changed.
#
# Addresses OpenSSF Scorecard's SAST check.

on:
  push:
    branches: [ main, 'release/**' ]
  pull_request:
    branches: [ main, 'release/**' ]
  schedule:
    - cron: '17 3 * * 1' # weekly, Monday 03:17 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go
          build-mode: manual

      - name: Generate Go code
        run: |
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Build
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:go"
