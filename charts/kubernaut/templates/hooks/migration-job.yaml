apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubernaut.fullname" . }}-db-migration
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    # DD-PLATFORM-002: under ArgoCD, "helm.sh/hook": post-install,post-upgrade
    # maps to PostSync, which only fires once the WHOLE Application is Healthy
    # -- but DataStorage can never become Healthy without this migration
    # having run first, deadlocking the sync forever. An explicit
    # argocd.argoproj.io/hook annotation takes precedence over the
    # Helm-translated one (ArgoCD-only; Helm CLI ignores this annotation and
    # is unaffected), so this Job instead runs in ArgoCD's "Sync" phase --
    # concurrently with the rest of the manifests, not gated on their health.
    #
    # sync-wave override is equally required: ArgoCD also translates
    # "helm.sh/hook-weight": "2" into argocd.argoproj.io/sync-wave: "2", and
    # a positive wave would place this Job *after* PostgreSQL (DD-PLATFORM-003:
    # sync-wave "-1"), which it depends on, but also after every default-wave
    # "0" Deployment, recreating the exact same deadlock one level down.
    # DD-PLATFORM-003 pins this to "-1" (not "0"): it must run in the same
    # "infra-first" wave as PostgreSQL and DataStorage, both of which it is a
    # hard prerequisite for, ahead of every other application controller.
    "argocd.argoproj.io/hook": Sync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation,HookSucceeded
    "argocd.argoproj.io/sync-wave": "-1"
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migration
    spec:
      serviceAccountName: {{ include "kubernaut.fullname" . }}-hook-sa
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- include "kubernaut.scheduling" (dict "component" .Values.hooks "global" .Values.global) | nindent 6 }}
      initContainers:
        - name: wait-for-postgresql
          image: {{ include "kubernaut.image" (dict "service" "db-migrate" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until pg_isready -h {{ include "kubernaut.postgresql.host" . }} -p {{ include "kubernaut.postgresql.port" . }} -U {{ include "kubernaut.postgresql.username" . }} -d {{ include "kubernaut.postgresql.database" . }}; do
                echo "  PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready."
      containers:
        - name: migrate
          image: {{ include "kubernaut.image" (dict "service" "db-migrate" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: PGHOST
              value: {{ include "kubernaut.postgresql.host" . }}
            - name: PGPORT
              value: "{{ include "kubernaut.postgresql.port" . }}"
            - name: PGUSER
              value: {{ include "kubernaut.postgresql.username" . }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernaut.postgresql.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: PGDATABASE
              value: {{ include "kubernaut.postgresql.database" . }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              GOOSE_DBSTRING="host=$PGHOST user=$PGUSER password=$PGPASSWORD dbname=$PGDATABASE sslmode=disable"

              # Issue #581: Fresh-vs-upgrade detection for future major-version baselines.
              # For minor releases, `goose up` handles both paths (fresh applies all;
              # upgrade applies only pending). Uncomment when a baseline file exists.
              #
              # if ! psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -tAc \
              #     "SELECT 1 FROM goose_db_version LIMIT 1" 2>/dev/null; then
              #   echo "==> Fresh install detected — applying baseline"
              #   psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -f /migrations/baseline_v2_schema.sql
              #   echo "==> Baseline applied, skipping numbered chain"
              #   exit 0
              # fi

              echo "==> Applying SQL migrations with goose (DD-012)"
              goose -dir /migrations postgres "$GOOSE_DBSTRING" up

              echo "==> Granting privileges..."
              psql -q <<'EOSQL'
              GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ include "kubernaut.postgresql.username" . }};
              GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ include "kubernaut.postgresql.username" . }};
              GRANT EXECUTE ON ALL FUNCTIONS IN SCHEMA public TO {{ include "kubernaut.postgresql.username" . }};
              EOSQL
              echo "==> Migrations complete"
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: {{ include "kubernaut.fullname" . }}-migrations
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubernaut.fullname" . }}-migrations
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    # DD-PLATFORM-002/003: see the db-migration Job annotation above -- this
    # ConfigMap is consumed by that Job and must render in the same ArgoCD
    # "Sync" phase and sync-wave ("-1", not PostSync, not a later wave) so
    # both are available together, ahead of every application controller.
    "argocd.argoproj.io/hook": Sync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation,HookSucceeded
    "argocd.argoproj.io/sync-wave": "-1"
data:
  {{- range $path, $_ := .Files.Glob "migrations/*.sql" }}
  {{ base $path }}: |
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
