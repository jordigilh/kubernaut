<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bgGrad)"/>

  <text x="480" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1E293B">Suggested Next Steps</text>

  <!-- Step 1 -->
  <g filter="url(#shadow)">
    <rect x="80" y="68" width="800" height="60" rx="12" fill="white"/>
  </g>
  <rect x="80" y="68" width="56" height="60" rx="12" fill="url(#purpleGrad)"/>
  <rect x="120" y="68" width="16" height="60" fill="url(#purpleGrad)"/>
  <text x="108" y="105" text-anchor="middle" font-size="22" font-weight="700" fill="white">1</text>
  <text x="156" y="95" font-size="15" font-weight="600" fill="#1E293B">Joint architecture session</text>
  <text x="156" y="115" font-size="12" fill="#64748B">Walk through MCP tool contracts, A2A Agent Card schema, and data flows together</text>

  <!-- Step 2 -->
  <g filter="url(#shadow)">
    <rect x="80" y="142" width="800" height="60" rx="12" fill="white"/>
  </g>
  <rect x="80" y="142" width="56" height="60" rx="12" fill="url(#purpleGrad)"/>
  <rect x="120" y="142" width="16" height="60" fill="url(#purpleGrad)"/>
  <text x="108" y="179" text-anchor="middle" font-size="22" font-weight="700" fill="white">2</text>
  <text x="156" y="169" font-size="15" font-weight="600" fill="#1E293B">Pick a scenario and wire it end-to-end</text>
  <text x="156" y="189" font-size="12" fill="#64748B">Your agent calls kubernaut_investigate against a shared dev cluster -- prove the flow works</text>

  <!-- Step 3 -->
  <g filter="url(#shadow)">
    <rect x="80" y="216" width="800" height="60" rx="12" fill="white"/>
  </g>
  <rect x="80" y="216" width="56" height="60" rx="12" fill="url(#purpleGrad)"/>
  <rect x="120" y="216" width="16" height="60" fill="url(#purpleGrad)"/>
  <text x="108" y="253" text-anchor="middle" font-size="22" font-weight="700" fill="white">3</text>
  <text x="156" y="243" font-size="15" font-weight="600" fill="#1E293B">Align on UX patterns</text>
  <text x="156" y="263" font-size="12" fill="#64748B">How your UI renders Kubernaut's streaming responses, workflow options, and status updates</text>

  <!-- Step 4 -->
  <g filter="url(#shadow)">
    <rect x="80" y="290" width="800" height="60" rx="12" fill="white"/>
  </g>
  <rect x="80" y="290" width="56" height="60" rx="12" fill="url(#purpleGrad)"/>
  <rect x="120" y="290" width="16" height="60" fill="url(#purpleGrad)"/>
  <text x="108" y="327" text-anchor="middle" font-size="22" font-weight="700" fill="white">4</text>
  <text x="156" y="317" font-size="15" font-weight="600" fill="#1E293B">Agree on security model</text>
  <text x="156" y="337" font-size="12" fill="#64748B">Auth between your agent and Kubernaut's API Frontend -- shared infrastructure or separate</text>

  <!-- Bottom: joint planning -->
  <g filter="url(#shadow)">
    <rect x="80" y="378" width="800" height="142" rx="14" fill="white"/>
  </g>
  <rect x="80" y="378" width="800" height="32" rx="14" fill="#7C3AED" opacity="0.06"/>
  <rect x="80" y="402" width="800" height="8" fill="#7C3AED" opacity="0.06"/>
  <text x="480" y="400" text-anchor="middle" font-size="14" font-weight="700" fill="#7C3AED">What we should figure out together</text>

  <g font-size="12" fill="#334155">
    <circle cx="112" cy="432" r="3" fill="#7C3AED"/>
    <text x="124" y="436">Which protocols does your agent support today? (MCP, A2A, or both)</text>

    <circle cx="112" cy="456" r="3" fill="#7C3AED"/>
    <text x="124" y="460">What remediation scenarios matter most for your use case?</text>

    <circle cx="112" cy="480" r="3" fill="#7C3AED"/>
    <text x="124" y="484">Auth model -- how do our services authenticate to each other?</text>

    <circle cx="112" cy="504" r="3" fill="#7C3AED"/>
    <text x="124" y="508">Timeline -- Kubernaut MCP/A2A is in design; when do you need it?</text>
  </g>
</svg>
