---
apiVersion: v1
kind: ConfigMap
metadata:
  name: datastorage-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: datastorage
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      port: 8080
      host: "0.0.0.0"
      healthPort: 8081
      metricsPort: 9090
      readTimeout: 30s
      writeTimeout: 30s
      {{- if include "kubernaut.interServiceTLS.enabled" . }}
      tls:
        certDir: {{ include "kubernaut.interServiceTLS.certDir" . | quote }}
      {{- end }}
    database:
      host: {{ include "kubernaut.postgresql.host" . }}
      port: {{ include "kubernaut.postgresql.port" . }}
      name: {{ include "kubernaut.postgresql.database" . }}
      user: {{ include "kubernaut.postgresql.username" . }}
      sslMode: {{ .Values.datastorage.config.database.sslMode | default "disable" }}
      maxOpenConns: {{ .Values.datastorage.config.database.maxOpenConns | default 100 }}
      maxIdleConns: {{ .Values.datastorage.config.database.maxIdleConns | default 20 }}
      connMaxLifetime: {{ .Values.datastorage.config.database.connMaxLifetime | default "1h" }}
      connMaxIdleTime: 10m
      secretsFile: "/etc/datastorage/secrets/db-secrets.yaml"
      usernameKey: "username"
      passwordKey: "password"
    redis:
      addr: {{ include "kubernaut.valkey.addr" . }}
      db: 0
      dlqStreamName: dlq-stream
      dlqMaxLen: 1000
      dlqConsumerGroup: dlq-group
      secretsFile: "/etc/datastorage/secrets/valkey-secrets.yaml"
      passwordKey: "password"
    logging:
      level: debug
      format: json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datastorage
  namespace: {{ .Release.Namespace }}
  labels:
    app: datastorage
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.datastorage.replicas }}
  selector:
    matchLabels:
      app: datastorage
  template:
    metadata:
      labels:
        app: datastorage
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: data-storage-sa
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.datastorage | nindent 8 }}
      {{- include "kubernaut.affinity" .Values.datastorage | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.datastorage "global" .Values.global) | nindent 6 }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgresql.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            {{- if ne (include "kubernaut.postgresql.variant" .) "ocp" }}
            runAsUser: 70
            {{- end }}
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command: ['sh', '-c', 'until pg_isready -h {{ include "kubernaut.postgresql.host" . }} -p {{ include "kubernaut.postgresql.port" . }}; do echo "waiting for postgresql..."; sleep 2; done']
      containers:
        - name: datastorage
          image: {{ include "kubernaut.image" (dict "service" "datastorage" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.datastorage | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
            - name: health
              containerPort: 8081
            - name: metrics
              containerPort: 9090
          env:
            - name: CONFIG_PATH
              value: /etc/datastorage/config.yaml
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config
              mountPath: /etc/datastorage
              readOnly: true
            - name: secrets
              mountPath: /etc/datastorage/secrets
              readOnly: true
            {{- if include "kubernaut.interServiceTLS.enabled" . }}
            - name: tls-certs
              mountPath: {{ include "kubernaut.interServiceTLS.certDir" . }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.datastorage.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: datastorage-config
        - name: secrets
          projected:
            sources:
              - secret:
                  name: {{ include "kubernaut.datastorage.dbSecretName" . }}
                  items:
                    - key: db-secrets.yaml
                      path: db-secrets.yaml
              - secret:
                  name: {{ include "kubernaut.valkey.secretName" . }}
                  items:
                    - key: valkey-secrets.yaml
                      path: valkey-secrets.yaml
        {{- if include "kubernaut.interServiceTLS.enabled" . }}
        - name: tls-certs
          secret:
            secretName: datastorage-tls
            optional: true
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: data-storage-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: datastorage
    {{- include "kubernaut.labels" . | nindent 4 }}
  {{- if include "kubernaut.interServiceTLS.enabled" . }}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: datastorage-tls
  {{- end }}
spec:
  type: {{ .Values.datastorage.service.type }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: health
      port: 8081
      targetPort: 8081
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: datastorage
