global:
  image:
    registry: quay.io/kubernaut-ai
    tag: ""  # defaults to Chart.appVersion
    digest: ""  # when set (e.g. "sha256:abc..."), overrides tag for immutable image references
    pullPolicy: IfNotPresent
  nodeSelector: {}
  tolerations: []

nameOverride: ""
fullnameOverride: ""

# -- TLS certificate management for the AuthWebhook admission controller.
# Two modes are supported:
#   hook         - Self-signed certificates generated by Helm hooks (default, suitable for dev/testing).
#                  No external dependencies. Certs are stored in authwebhook-tls Secret.
#   cert-manager - Certificates managed by cert-manager (recommended for production).
#                  Requires cert-manager installed and an Issuer/ClusterIssuer configured.
tls:
  mode: hook  # "hook" or "cert-manager"
  certManager:
    issuerRef:
      name: ""    # required when tls.mode=cert-manager (e.g., "letsencrypt-prod" or "selfsigned-issuer")
      kind: ClusterIssuer
      group: cert-manager.io

# -- Gateway service (AlertManager webhook target + external signal ingestion)
gateway:
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  service:
    type: ClusterIP
    nodePort: null
  # BR-GATEWAY-036/037: Auth middleware configuration
  auth:
    # External signal sources that need RBAC to call the Gateway.
    # Each entry creates a ClusterRoleBinding granting services/gateway-service/create.
    # Event Exporter is bound automatically (deployed by this chart).
    signalSources:
      - name: alertmanager
        serviceAccount: alertmanager-kube-prometheus-stack-alertmanager
        namespace: monitoring

# -- DataStorage service (audit trail, workflow catalog)
datastorage:
  replicas: 1
  dbExistingSecret: ""  # name of pre-created Secret with db-secrets.yaml key; when set, overrides chart-managed datastorage-db-secret
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  service:
    type: ClusterIP
    nodePort: null

# -- AIAnalysis controller
aianalysis:
  replicas: 1
  rego:
    confidenceThreshold: null  # nil = use Rego default (0.8 per BR-AI-076)
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- SignalProcessing controller
signalprocessing:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- RemediationOrchestrator controller
remediationorchestrator:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  config:
    effectivenessAssessment:
      # Time for system stabilization after remediation before assessment
      stabilizationWindow: "5m"
    asyncPropagation:
      # Expected time for GitOps tool (ArgoCD/Flux) to sync changes to cluster
      gitOpsSyncDelay: "3m"
      # Expected time for operator to reconcile after CR update
      operatorReconcileDelay: "1m"
      # Extra delay for proactive alert resolution (e.g. predict_linear needs fresh data)
      proactiveAlertDelay: "5m"

# -- WorkflowExecution controller
workflowexecution:
  workflowNamespace: kubernaut-workflows  # namespace for Job/PipelineRun execution
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Notification controller
notification:
  replicas: 1
  # -- Enable Slack delivery channel. When false (default), only console/log delivery is active.
  # Requires a K8s Secret with the Slack webhook URL (see credentials below).
  slack:
    enabled: false
    channel: "#kubernaut-alerts"
  # Per-receiver credentials projected into /etc/notification/credentials/
  # Each entry creates a projected volume source from a K8s Secret.
  # Default: [] (no credentials required). When slack is enabled, add entries:
  #   credentials:
  #     - name: slack-webhook
  #       secretName: my-slack-secret   # pre-existing K8s Secret
  #       secretKey: webhook-url
  credentials: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- EffectivenessMonitor controller
effectivenessmonitor:
  replicas: 1
  external:
    prometheusUrl: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"
    prometheusEnabled: true
    alertManagerUrl: "http://kube-prometheus-stack-alertmanager.monitoring.svc:9093"
    alertManagerEnabled: true
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 500m

# -- HolmesGPT API (LLM integration service)
holmesgptApi:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    type: ClusterIP
    nodePort: null
  llm:
    provider: ""
    model: ""
    endpoint: ""
    gcpProjectId: ""
    gcpRegion: ""
    maxRetries: 3
    timeoutSeconds: 120
    temperature: 0.7
    credentialsSecretName: llm-credentials

# -- AuthWebhook admission controller
authwebhook:
  replicas: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

# -- Event Exporter (forwards K8s Warning events to Gateway)
# Optional component — disable when K8s event ingestion is not needed or when
# deploying on OCP where there is no Red Hat-supported equivalent image.
eventExporter:
  enabled: true
  replicas: 1
  image: ghcr.io/resmoio/kubernetes-event-exporter:v1.7
  # Pod/container security context overrides (same Tier 2 rationale as postgresql/valkey).
  # No hardcoded runAsUser/fsGroup for OCP/Kind compatibility.
  # On vanilla K8s with PodSecurity "restricted", add runAsUser and runAsNonRoot here.
  podSecurityContext: {}
  containerSecurityContext: {}
  resources:
    requests:
      memory: 32Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

# -- PostgreSQL (DataStorage backend)
# Credential flow (#204):
#   Option A (prod): Pre-create a Secret and set postgresql.auth.existingSecret.
#     Secret must have keys: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB.
#     Also set datastorage.dbExistingSecret to a Secret with key db-secrets.yaml
#     containing "username: <user>\npassword: <pass>".
#   Option B (dev):  Set postgresql.auth.password via --set or values-demo.yaml.
#     Chart auto-creates postgresql-secret and datastorage-db-secret.
#   Option C (BYO #256): Set postgresql.enabled=false and configure externalPostgresql.
postgresql:
  replicas: 1
  enabled: true  # set false to skip in-chart PostgreSQL and use externalPostgresql instead
  # variant: "upstream" (default) or "ocp".
  #   upstream — postgres:16-alpine with POSTGRES_* env vars
  #   ocp      — Red Hat RHEL10 PostgreSQL with POSTGRESQL_* env vars,
  #              runs non-root (UID 26), compatible with restricted-v2 SCC
  variant: upstream
  image: postgres:16-alpine  # OCP: registry.redhat.io/rhel10/postgresql-16
  # Pod/container security context overrides.
  # Defaults: seccompProfile RuntimeDefault only (no runAsUser/fsGroup) for OCP/Kind compatibility.
  # On vanilla K8s with PodSecurity "restricted", add runAsUser and runAsNonRoot here.
  podSecurityContext: {}
  containerSecurityContext: {}
  auth:
    existingSecret: ""  # name of pre-created K8s Secret; when set, chart skips Secret creation
    username: slm_user
    password: ""  # required when existingSecret is empty; use --set or values-demo.yaml
    database: action_history
  storage:
    size: 10Gi
    storageClassName: ""  # empty = cluster default
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

# -- External PostgreSQL (BYO #256). Used when postgresql.enabled=false.
# Provide the host of an existing PostgreSQL instance.
externalPostgresql:
  host: ""          # required when postgresql.enabled=false (e.g., "db.example.com")
  port: 5432
  auth:
    existingSecret: ""  # K8s Secret with POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB keys
    username: slm_user
    password: ""
    database: action_history

# -- Valkey (DataStorage DLQ)
# Valkey is a BSD-licensed Redis-compatible in-memory data store.
# Credential flow (#204):
#   Option A (prod): Pre-create a Secret and set valkey.existingSecret.
#     Secret must have key valkey-secrets.yaml containing "password: <pass>".
#   Option B (dev):  Set valkey.password via --set. Chart auto-creates valkey-secret.
#     Empty password ("") is allowed for development.
#   Option C (BYO #256): Set valkey.enabled=false and configure externalValkey.
valkey:
  replicas: 1
  enabled: true  # set false to skip in-chart Valkey and use externalValkey instead
  image: valkey/valkey:8-alpine
  # Pod/container security context overrides (same rationale as postgresql above).
  podSecurityContext: {}
  containerSecurityContext: {}
  existingSecret: ""  # name of pre-created K8s Secret; when set, chart skips Secret creation
  password: ""
  storage:
    size: 512Mi
    storageClassName: ""  # empty = cluster default
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

# -- External Valkey/Redis (BYO #256). Used when valkey.enabled=false.
# Provide the host of an existing Valkey or Redis instance.
externalValkey:
  host: ""          # required when valkey.enabled=false (e.g., "valkey.example.com")
  port: 6379
  existingSecret: ""  # K8s Secret with valkey-secrets.yaml key
  password: ""

# -- NetworkPolicies (optional, restricts inter-service traffic)
networkPolicies:
  enabled: false  # enable to create NetworkPolicy resources

# -- Hooks (post-install Jobs)
hooks:
  migrations:
    image: quay.io/kubernaut-ai/db-migrate:v1.1.0-pre1  # UBI9-minimal with goose + psql; works in disconnected environments
  tlsCerts:
    image: bitnami/kubectl:1.32
