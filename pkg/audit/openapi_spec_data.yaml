        started_at:
          type: string
          format: date-time
          description: When the PipelineRun started execution
        completed_at:
          type: string
          format: date-time
          description: When the PipelineRun finished (success or failure)
        duration:
          type: string
          description: Human-readable execution duration
          example: "2m30s"

        # Failure Fields (conditional)
        failure_reason:
