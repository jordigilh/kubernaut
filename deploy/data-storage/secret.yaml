# Database secrets — mounted at /etc/datastorage/secrets/db-secrets.yaml
# ADR-030 Section 6: Secrets loaded from mounted files, not environment variables.
# In production, use SealedSecrets or ExternalSecrets to manage these values.
apiVersion: v1
kind: Secret
metadata:
  name: data-storage-db-secret
  namespace: kubernaut-system
type: Opaque
stringData:
  db-secrets.yaml: |
    username: "db_user"
    password: "slm_password_dev"
---
# Redis secrets — mounted at /etc/datastorage/secrets/redis-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: data-storage-redis-secret
  namespace: kubernaut-system
type: Opaque
stringData:
  redis-secrets.yaml: |
    password: ""
