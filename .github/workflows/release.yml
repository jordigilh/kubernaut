name: Release

# Triggered by version tag push (e.g., v1.0.0, v1.1.0-rc0)
# Builds multi-arch images (amd64 + arm64) for all 12 services in parallel,
# runs Helm smoke tests against the amd64 images, publishes Helm chart to
# OCI registry, and creates a GitHub Release gated on smoke test success.
# Pre-release tags (-rc*, -alpha*, -beta*) create a pre-release and skip :latest tagging.
#
# Prerequisites:
#   - Quay.io robot account with Creator role in kubernaut-ai org
#   - GitHub Actions secrets: QUAY_ROBOT_USERNAME, QUAY_ROBOT_TOKEN
#
# Authority: Issue #257 (sub-issue of #80), Issue #569
# Business Requirement: BR-PLATFORM-RELEASE-001

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  IMAGE_REGISTRY: quay.io/kubernaut-ai

jobs:
  # ========================================
  # STAGE 0: PREPARE
  # Extract version metadata and generate code once.
  # Outputs are consumed by all downstream jobs.
  # ========================================

  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      build_date: ${{ steps.version.outputs.build_date }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

          if [[ "$VERSION" =~ -(rc|alpha|beta) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "Pre-release: $TAG (version: $VERSION)"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "Release: $TAG (version: $VERSION)"
          fi

  # ========================================
  # STAGE 1a: BUILD & PUSH amd64 IMAGES
  # 12 parallel jobs: one per service, amd64 only.
  # Helm smoke tests depend on this stage completing (Issue #569).
  #
  # Services (12):
  #   Go (11): gateway, signalprocessing, aianalysis, authwebhook,
  #            remediationorchestrator, workflowexecution, notification,
  #            datastorage, effectivenessmonitor, db-migrate, kubernautagent
  #   Bash (1): must-gather
  #
  # Strategy:
  #   - Go services: CGO_ENABLED=0 cross-compile via GOARCH (native speed)
  #   - Makefile image-build-% targets handle service-to-Dockerfile mapping
  # ========================================

  build-amd64:
    name: "${{ matrix.service }} (amd64)"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - signalprocessing
          - aianalysis
          - authwebhook
          - remediationorchestrator
          - workflowexecution
          - notification
          - datastorage
          - effectivenessmonitor
          - kubernautagent
          - must-gather
          - db-migrate
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Generate code
        run: |
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Build image
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
          IMAGE_ARCH: amd64
          IMAGE_TARGET: production
          CONTAINER_TOOL: podman
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
        run: |
          echo "Building ${{ matrix.service }} for amd64..."
          make image-build-${{ matrix.service }}

      - name: Push image
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          IMAGE="${IMAGE_REGISTRY}/${{ matrix.service }}:${IMAGE_TAG}-amd64"
          echo "Pushing ${IMAGE}..."
          podman push "${IMAGE}"

  # ========================================
  # STAGE 1b: BUILD & PUSH arm64 IMAGES (Go services)
  # 10 parallel jobs: one per Go service, arm64 via host-native cross-compile.
  # No QEMU needed — CGO_ENABLED=0 GOARCH=arm64 runs natively on amd64.
  # Runtime images use FROM scratch with pre-built binary.
  #
  # Strategy:
  #   - Host cross-compile: go build with GOARCH=arm64 (native speed, ~25s)
  #   - Runtime image: scratch + certs from amd64 ubi-minimal (no QEMU, ~5s)
  # ========================================

  build-arm64:
    name: "${{ matrix.service }} (arm64)"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - signalprocessing
          - aianalysis
          - authwebhook
          - remediationorchestrator
          - workflowexecution
          - notification
          - datastorage
          - effectivenessmonitor
          - kubernautagent
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Generate code
        run: |
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Cross-compile binary (native, no QEMU)
        env:
          IMAGE_ARCH: arm64
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
        run: |
          echo "Cross-compiling ${{ matrix.service }} for arm64 (native)..."
          START=$(date +%s)
          make cross-build-${{ matrix.service }}
          END=$(date +%s)
          echo "Binary built in $(($END - $START))s"
          ls -lh bin/*-arm64

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Build runtime image (no QEMU)
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
          IMAGE_ARCH: arm64
          CONTAINER_TOOL: podman
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
        run: |
          echo "Building runtime image ${{ matrix.service }} (arm64, no QEMU)..."
          START=$(date +%s)
          make image-runtime-${{ matrix.service }}
          END=$(date +%s)
          echo "Image built in $(($END - $START))s"

      - name: Push image
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          IMAGE="${IMAGE_REGISTRY}/${{ matrix.service }}:${IMAGE_TAG}-arm64"
          echo "Pushing ${IMAGE}..."
          podman push "${IMAGE}"

  # ========================================
  # STAGE 1c: BUILD & PUSH arm64 IMAGES (non-Go services)
  # must-gather (Bash) and db-migrate (downloads goose binary) still need QEMU
  # for package installation in their respective base images.
  # ========================================

  build-arm64-qemu:
    name: "${{ matrix.service }} (arm64, QEMU)"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        service:
          - must-gather
          - db-migrate
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Generate code
        run: |
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Install QEMU for arm64 emulation
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          if [ -f /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo "QEMU aarch64 registered successfully"
          else
            echo "::warning::QEMU aarch64 not registered in binfmt_misc"
          fi

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Build image
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
          IMAGE_ARCH: arm64
          IMAGE_TARGET: production
          CONTAINER_TOOL: podman
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
        run: |
          echo "::group::arm64 QEMU build for ${{ matrix.service }}"
          echo "Building ${{ matrix.service }} for arm64 (QEMU emulated)..."
          echo "Start: $(date -u '+%H:%M:%S UTC')"

          # Background heartbeat: prints elapsed time every 60s
          (
            LOOP_START=$SECONDS
            while true; do
              sleep 60
              ELAPSED=$(( (SECONDS - LOOP_START) / 60 ))
              BUILD_PID=$(pgrep -f "podman build" || echo "none")
              QEMU_PROCS=$(pgrep -c qemu-aarch64 2>/dev/null || echo "0")
              echo "[heartbeat +${ELAPSED}m] podman_pid=${BUILD_PID} qemu_procs=${QEMU_PROCS}"
            done
          ) &
          HEARTBEAT_PID=$!

          make image-build-${{ matrix.service }}
          BUILD_EXIT=$?

          kill $HEARTBEAT_PID 2>/dev/null || true
          echo "Finished: $(date -u '+%H:%M:%S UTC') (exit: $BUILD_EXIT)"
          echo "::endgroup::"
          exit $BUILD_EXIT

      - name: Push image
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          IMAGE="${IMAGE_REGISTRY}/${{ matrix.service }}:${IMAGE_TAG}-arm64"
          echo "Pushing ${IMAGE}..."
          podman push "${IMAGE}"

  # ========================================
  # STAGE 2: HELM SMOKE TESTS (Issue #569)
  # Depends ONLY on build-amd64. Runs as soon as amd64 images are in Quay.
  # arm64 builds continue in parallel and do NOT block this stage.
  #
  # Pulls amd64 images from Quay into a Kind cluster and runs the full
  # smoke test suite. Gates the GitHub Release — a failing smoke test
  # prevents the release from being published.
  #
  # Uses the same script and pattern as ci-pipeline.yml's helm-smoke-test
  # job, adapted for Quay (public registry, no pull secret needed).
  # ========================================

  helm-smoke-test:
    name: Helm Smoke Tests (Kind)
    needs: [prepare, build-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KIND_EXPERIMENTAL_PROVIDER: podman
      KIND_CLUSTER_NAME: helm-smoke-release
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman --version

      - name: Install Kind
        run: |
          KIND_VERSION="v0.30.0"
          curl -Lo ./kind "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Create Kind cluster
        run: |
          kind create cluster --name "$KIND_CLUSTER_NAME" --wait 120s
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Pull amd64 images from Quay and load into Kind
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          for svc in gateway signalprocessing aianalysis authwebhook \
                     remediationorchestrator workflowexecution notification \
                     datastorage effectivenessmonitor kubernautagent \
                     must-gather db-migrate; do
            IMAGE="${IMAGE_REGISTRY}/${svc}:${IMAGE_TAG}-amd64"
            echo "Pulling ${IMAGE}..."
            podman pull "${IMAGE}"
            echo "Loading into Kind..."
            podman save "${IMAGE}" | kind load image-archive /dev/stdin --name "$KIND_CLUSTER_NAME"
          done

      - name: Run smoke tests
        run: |
          scripts/helm-smoke-test.sh \
            --platform kind \
            --image-tag "${{ needs.prepare.outputs.version }}-amd64" \
            --chart-path charts/kubernaut/

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -A --no-headers 2>/dev/null || true
          echo "=== Events ==="
          kubectl get events -n kubernaut-system --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true
          echo "=== Describe failing pods ==="
          kubectl get pods -n kubernaut-system --no-headers 2>/dev/null \
            | grep -v Running \
            | awk '{print $1}' \
            | xargs -r -I {} kubectl describe pod {} -n kubernaut-system 2>/dev/null || true
          echo "=== Kind logs ==="
          kind export logs /tmp/kind-smoke-logs --name "$KIND_CLUSTER_NAME" 2>/dev/null || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: helm-smoke-diagnostics-${{ github.run_id }}
          path: /tmp/kind-smoke-logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup Kind cluster
        if: always()
        run: |
          kind delete cluster --name "$KIND_CLUSTER_NAME" 2>/dev/null || true

      - name: Cleanup Podman
        if: always()
        run: |
          podman system prune -a -f 2>/dev/null || true

  # ========================================
  # STAGE 3: MULTI-ARCH MANIFESTS
  # After both arch builds complete, create manifest lists so a single
  # tag (e.g., 1.0.0) resolves to the correct arch automatically.
  # Also tags every image as :latest for GA releases.
  # ========================================

  create-manifests:
    name: Create Multi-Arch Manifests
    needs: [prepare, build-amd64, build-arm64, build-arm64-qemu]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Create and push multi-arch manifests
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
          CONTAINER_TOOL: podman
        run: |
          echo "Creating multi-arch manifests (amd64 + arm64)..."
          make image-manifest

      - name: Tag images as latest
        if: needs.prepare.outputs.is_prerelease == 'false'
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          for svc in datastorage gateway aianalysis authwebhook notification \
                     remediationorchestrator signalprocessing workflowexecution \
                     effectivenessmonitor kubernautagent must-gather db-migrate; do
            echo "  Tagging $svc:latest..."
            podman manifest rm ${IMAGE_REGISTRY}/$svc:latest 2>/dev/null || true
            podman manifest create ${IMAGE_REGISTRY}/$svc:latest \
              ${IMAGE_REGISTRY}/$svc:${IMAGE_TAG}-amd64 \
              ${IMAGE_REGISTRY}/$svc:${IMAGE_TAG}-arm64
            podman manifest push ${IMAGE_REGISTRY}/$svc:latest \
              docker://${IMAGE_REGISTRY}/$svc:latest
          done
          echo "All images tagged as latest"

  # ========================================
  # STAGE 4: HELM CHART PUBLISH
  # Packages the Helm chart with the release version and pushes
  # to the OCI registry at oci://quay.io/kubernaut-ai/charts
  #
  # Users install with:
  #   helm install kubernaut oci://quay.io/kubernaut-ai/charts/kubernaut --version <version>
  # ========================================

  helm-publish:
    name: Publish Helm Chart
    needs: [prepare, build-amd64, build-arm64, build-arm64-qemu]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Update Chart.yaml with release version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/kubernaut/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/kubernaut/Chart.yaml

          echo "Updated Chart.yaml:"
          head -6 charts/kubernaut/Chart.yaml

      - name: Login to Quay.io OCI registry
        run: |
          echo "${{ secrets.QUAY_ROBOT_TOKEN }}" | helm registry login quay.io \
            -u "${{ secrets.QUAY_ROBOT_USERNAME }}" --password-stdin

      - name: Package and push Helm chart
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          helm package charts/kubernaut/
          helm push kubernaut-${VERSION}.tgz oci://quay.io/kubernaut-ai/charts
          echo "Helm chart published: oci://quay.io/kubernaut-ai/charts/kubernaut:${VERSION}"

  # ========================================
  # STAGE 5: GITHUB RELEASE
  # Creates a GitHub Release with auto-generated release notes.
  # Gated on smoke tests, manifests, AND Helm publish (Issue #569).
  # ========================================

  release:
    name: Create GitHub Release
    needs: [prepare, helm-smoke-test, create-manifests, helm-publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${TAG}" \
            --title "Kubernaut ${TAG}" \
            --generate-notes \
            ${PRERELEASE_FLAG} \
            --notes-start-tag "$(git tag --sort=-creatordate | grep '^v' | sed -n '2p')" || \
          gh release create "${TAG}" \
            --title "Kubernaut ${TAG}" \
            --generate-notes \
            ${PRERELEASE_FLAG}

          echo ""
          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          echo ""
          echo "Install with:"
          echo "  helm install kubernaut oci://quay.io/kubernaut-ai/charts/kubernaut --version ${VERSION}"
