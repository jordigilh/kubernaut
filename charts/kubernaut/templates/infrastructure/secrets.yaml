{{/*
  Infrastructure credential secrets — MUST be pre-created before helm install/upgrade.
  The chart does NOT auto-generate secrets. This eliminates:
    - Password leaks via rendered Helm templates (sh.helm.release.v1.* secrets)
    - Silent lookup failures on OCP / restricted-RBAC environments
    - Password rotation on pending-install recovery upgrades

  Required secrets:
    1. postgresql-secret (or postgresql.auth.existingSecret):
       Keys: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, db-secrets.yaml
       The db-secrets.yaml key is consumed by DataStorage (YAML with username + password).

    2. valkey-secret (or valkey.existingSecret):
       Keys: valkey-secrets.yaml (YAML with password)

  See README.md for creation commands.

  Validation is skipped during `helm template` (no cluster access).
  Authority: Issue #557
*/}}

{{/* Canary: detect real cluster access. kube-system always exists in a live cluster.
     During helm template / --dry-run=client, lookup returns empty dict → falsy.
     NOTE: If the Helm installer ServiceAccount lacks Namespace read permissions,
     the canary also returns empty and validation is silently skipped (false negative).
     In restricted-RBAC environments, operators must ensure secrets exist manually. */}}
{{- $hasCluster := lookup "v1" "Namespace" "" "kube-system" }}

{{- if $hasCluster }}

{{- $pgSecretName := include "kubernaut.postgresql.secretName" . -}}
{{- $dsSecretName := include "kubernaut.datastorage.dbSecretName" . -}}
{{- $valkeySecretName := include "kubernaut.valkey.secretName" . -}}

{{- if .Values.postgresql.enabled }}
{{- $pgSecret := lookup "v1" "Secret" .Release.Namespace $pgSecretName }}
{{- if not $pgSecret }}
{{- fail (printf "Required Secret %q not found in namespace %q. Pre-create it before installing:\n\n  PG_PASSWORD=$(openssl rand -base64 24)\n  kubectl create secret generic %s \\\n    --from-literal=POSTGRES_USER=slm_user \\\n    --from-literal=POSTGRES_PASSWORD=\"$PG_PASSWORD\" \\\n    --from-literal=POSTGRES_DB=action_history \\\n    --from-literal=db-secrets.yaml=\"$(printf 'username: slm_user\\npassword: %%s' \"$PG_PASSWORD\")\" \\\n    -n %s" $pgSecretName .Release.Namespace $pgSecretName .Release.Namespace) }}
{{- end }}
{{- end }}

{{/* Validate BYO DataStorage secret when it differs from the PostgreSQL secret (#557). */}}
{{- if and .Values.datastorage.dbExistingSecret (ne $dsSecretName $pgSecretName) }}
{{- $dsSecret := lookup "v1" "Secret" .Release.Namespace $dsSecretName }}
{{- if not $dsSecret }}
{{- fail (printf "Required Secret %q (datastorage.dbExistingSecret) not found in namespace %q. Pre-create it with a db-secrets.yaml key:\n\n  kubectl create secret generic %s \\\n    --from-literal=db-secrets.yaml=\"$(printf 'username: <user>\\npassword: <password>')\" \\\n    -n %s" $dsSecretName .Release.Namespace $dsSecretName .Release.Namespace) }}
{{- end }}
{{- end }}

{{- if .Values.valkey.enabled }}
{{- $valkeySecret := lookup "v1" "Secret" .Release.Namespace $valkeySecretName }}
{{- if not $valkeySecret }}
{{- fail (printf "Required Secret %q not found in namespace %q. Pre-create it before installing:\n\n  kubectl create secret generic %s \\\n    --from-literal=valkey-secrets.yaml=\"$(printf 'password: %%s' \"$(openssl rand -base64 24)\")\" \\\n    -n %s" $valkeySecretName .Release.Namespace $valkeySecretName .Release.Namespace) }}
{{- end }}
{{- end }}

{{- end }}{{/* end $hasCluster */}}
