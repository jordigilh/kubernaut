apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: test-intentional-failure
spec:
  # Intentional Failure Test Workflow Schema (BR-WORKFLOW-004)
  # Used by: WorkflowExecution E2E
  version: "1.0.0"
  description:
    what: "Workflow that intentionally fails for testing error handling"
    whenToUse: "For E2E validation of failure detection and error propagation"
    whenNotToUse: "Not intended for production use"
    preconditions: "Tekton Pipelines installed in the cluster"
  
  actionType: RestartPod
  
  labels:
    severity: [info]
    environment: [test]
    component: [apps/v1/Deployment]
    priority: P3
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/tekton-bundles/failing:v1.0.0@sha256:8f57121ab1df255cd2ae644ae38680e19217c3117b320da660efc3c7cefa0dce
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE
      type: string
      required: true
      description: "Target resource identifier"
      default: "test/deployment/failing"
    - name: FAILURE_MESSAGE
      type: string
      required: false
      description: "Error message to produce"
      default: "Intentional failure for testing"
