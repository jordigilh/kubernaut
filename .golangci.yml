# GolangCI-Lint v2 Configuration for Kubernaut
# Enforces anti-pattern detection per TESTING_GUIDELINES.md

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - forbidigo  # Detects forbidden patterns (NULL-TESTING, Skip(), time.Sleep())
    - errcheck   # Ensures error returns are checked
    - ineffassign # Detects assignments to variables that are never used
    - staticcheck
    - unused
    - govet
    - gosec      # SAST: detects common Go security issues (Issue #1002)

  settings:
    forbidigo:
      # ANTI-PATTERN DETECTION: Per TESTING_GUIDELINES.md and NT_TEST_ANTI_PATTERN_TRIAGE_DEC_17_2025.md
      forbid:
        # NULL-TESTING Anti-Pattern (Per TESTING_GUIDELINES.md)
        - pattern: '\bExpect\([^)]+\)\.ToNot\(BeNil\(\)\)'
          msg: "NULL-TESTING anti-pattern: Validate business outcomes, not just nil checks. See TESTING_GUIDELINES.md"
        - pattern: '\bExpect\([^)]+\)\.ToNot\(BeEmpty\(\)\)'
          msg: "NULL-TESTING anti-pattern: Validate specific values or counts, not just empty checks. See TESTING_GUIDELINES.md"
        - pattern: '\.ShouldNot\(BeEmpty\(\)\)'
          msg: "NULL-TESTING anti-pattern: Validate terminal states like NotificationPhaseSent/Failed, not just empty checks"
        - pattern: '\.ShouldNot\(BeNil\(\)\)'
          msg: "NULL-TESTING anti-pattern: Validate actual pointer values after checking non-nil"

        # Skip() Anti-Pattern (Per TESTING_GUIDELINES.md: Integration tests must Fail() when required infra unavailable)
        - pattern: '\bSkip\('
          msg: "Skip() forbidden in integration tests when required infrastructure unavailable (DD-AUDIT-003). Use Fail() instead."

        # time.Sleep() Anti-Pattern (Per TESTING_GUIDELINES.md v2.0.0: ABSOLUTELY FORBIDDEN)
        - pattern: 'time\.Sleep\('
          msg: "time.Sleep() ABSOLUTELY FORBIDDEN per TESTING_GUIDELINES.md v2.0.0. Use Eventually/Consistently for async validation."

  exclusions:
    rules:
      # Exclude test setup/teardown and infrastructure code from Close() checks
      - path: (_test\.go|test/)
        linters:
          - errcheck
        text: "Error return value of.*Close.*is not checked"
      # gosec: suppress specific rules in test code that flag expected test patterns
      # G101: hardcoded credentials (test fixtures for credential handling/sanitization)
      # G107: HTTP variable URL, G112: Slowloris (test servers), G115: int overflow
      # G201/G202/G204: SQL/subprocess with variable, G301/G302/G304/G306: file/dir perms
      # G402: TLS InsecureSkipVerify (test endpoints), G404: math/rand (not crypto)
      - path: "(^test/|_test\\.go)"
        linters:
          - gosec
        text: "G101|G1(07|12|15)|G20[124]|G30[1246]|G40[24]"
      # Dot imports are idiomatic for Ginkgo/Gomega BDD test framework
      - path: "^test/"
        linters:
          - staticcheck
        text: "ST1001"
      # SA1019: controller-runtime deprecated APIs (GetEventRecorderFor, result.Requeue)
      # require a coordinated migration to the new events API — tracked separately
      - linters:
          - staticcheck
        text: "SA1019"
      # G101: mount paths, config keys, constant names, and test fixture hashes are not credentials
      - linters:
          - gosec
        text: "G101"
        path: "(cmd/|internal/kubernautagent/|pkg/workflowexecution/|pkg/shared/|test/infrastructure/)"
      # G304: file paths from config loaders, credential resolvers, and TLS helpers
      - linters:
          - gosec
        text: "G304"
        path: "(cmd/|/config/|/config\\.go|credentials/|tls/|tls\\.go|resolver\\.go|signalmode\\.go)"
      # G306: test fixture files don't need 0600 permissions
      - path: _test\.go
        linters:
          - gosec
        text: "G306"
      # G115: safe integer conversions (len() to int32 for K8s API types)
      - linters:
          - gosec
        text: "G115"
        path: "(internal/|pkg/)"
      # G104: intentionally unhandled errors (already covered by errcheck linter)
      - linters:
          - gosec
        text: "G104"
      # G201/G202: SQL string formatting in DataStorage (uses parameterized queries internally)
      - linters:
          - gosec
        text: "G20[12]"
        path: "pkg/datastorage/"
      # G301/G306: notification file delivery uses appropriate permissions
      - linters:
          - gosec
        text: "G30[16]"
        path: "notification"
      # G401/G505: UUID v5 uses SHA1 per RFC 4122 spec
      - linters:
          - gosec
        text: "G40[15]|G505"
        path: "pkg/shared/uuid/"
      # G404: backoff jitter uses math/rand intentionally (not security-sensitive)
      - linters:
          - gosec
        text: "G404"
        path: "pkg/shared/backoff/"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

# Per TESTING_GUIDELINES.md v2.0.0: Enforce best practices with NO EXCEPTIONS
# - NULL-TESTING: Weak assertions (ToNot(BeNil), ToNot(BeEmpty)) - FORBIDDEN
# - Skip(): Forbidden for required infrastructure (DD-AUDIT-003) - FORBIDDEN
# - time.Sleep(): ABSOLUTELY FORBIDDEN per v2.0.0 - Use Eventually/Consistently
#
# NO EXCEPTIONS ALLOWED: All violations must be remediated per TESTING_GUIDELINES.md v2.0.0
