{{- if and .Values.networkPolicies.enabled .Values.networkPolicies.valkey.enabled .Values.valkey.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
{{ include "kubernaut.np.metadata" (dict "root" $ "nameSuffix" "valkey" "appLabel" "valkey") }}
spec:
  podSelector:
    matchLabels:
      app: valkey
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 6379
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app: datastorage
        {{- if .Values.apifrontend.config.auth.replayCache.enabled }}
        # GAP-08 (#1505): APIFrontend connects to Valkey directly for the JWT
        # replay-detection cache (bypasses DataStorage).
        - podSelector:
            matchLabels:
              app: apifrontend
        {{- end }}
  egress:
    {{- include "kubernaut.np.commonEgress" . | nindent 4 }}
{{- end }}
