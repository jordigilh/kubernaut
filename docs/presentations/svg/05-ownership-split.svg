<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bgGrad)"/>

  <text x="480" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1E293B">Clear boundaries, no duplication</text>

  <!-- Left: Your Project -->
  <g filter="url(#shadow)">
    <rect x="40" y="64" width="420" height="440" rx="16" fill="white"/>
  </g>
  <rect x="40" y="64" width="420" height="48" rx="16" fill="#0D9488"/>
  <rect x="40" y="96" width="420" height="16" fill="#0D9488"/>
  <text x="250" y="95" text-anchor="middle" font-size="17" font-weight="700" fill="white">Your Project Covers</text>

  <g font-size="13">
    <rect x="64" y="128" width="372" height="48" rx="8" fill="#F0FDFA"/>
    <rect x="72" y="140" width="24" height="24" rx="6" fill="#0D9488" opacity="0.12"/>
    <text x="84" y="157" text-anchor="middle" font-size="11" font-weight="700" fill="#0D9488">UX</text>
    <text x="106" y="146" font-weight="600" fill="#0F766E">UX and branding</text>
    <text x="106" y="164" fill="#475569" font-size="11">Users interact with your interface, your design language</text>

