apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubernaut.fullname" . }}-db-migration
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migration
    spec:
      serviceAccountName: {{ include "kubernaut.fullname" . }}-hook-sa
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- include "kubernaut.scheduling" (dict "component" .Values.hooks "global" .Values.global) | nindent 6 }}
      initContainers:
        - name: wait-for-postgresql
          image: {{ include "kubernaut.postgresql.clientImage" . }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until pg_isready -h {{ include "kubernaut.postgresql.host" . }} -p {{ include "kubernaut.postgresql.port" . }} -U {{ include "kubernaut.postgresql.username" . }} -d {{ include "kubernaut.postgresql.database" . }}; do
                echo "  PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready."
      containers:
        - name: migrate
          image: {{ include "kubernaut.postgresql.clientImage" . }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: PGHOST
              value: {{ include "kubernaut.postgresql.host" . }}
            - name: PGPORT
              value: "{{ include "kubernaut.postgresql.port" . }}"
            - name: PGUSER
              value: {{ include "kubernaut.postgresql.username" . }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernaut.postgresql.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: PGDATABASE
              value: {{ include "kubernaut.postgresql.database" . }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              GOOSE_VERSION="{{ .Values.hooks.migrations.gooseVersion }}"
              GOOSE_BIN="/tmp/goose"
              ARCH=$(uname -m)
              case "$ARCH" in
                x86_64)  GOOSE_ARCH="x86_64" ;;
                aarch64) GOOSE_ARCH="arm64" ;;
                *)       echo "ERROR: Unsupported architecture: $ARCH"; exit 1 ;;
              esac

              GOOSE_URL="https://github.com/pressly/goose/releases/download/${GOOSE_VERSION}/goose_linux_${GOOSE_ARCH}"
              echo "==> Installing goose ${GOOSE_VERSION} (${GOOSE_ARCH})..."
              if command -v curl &>/dev/null; then
                curl -fsSL -o "$GOOSE_BIN" "$GOOSE_URL"
              elif command -v wget &>/dev/null; then
                wget -qO "$GOOSE_BIN" "$GOOSE_URL"
              else
                echo "ERROR: Neither curl nor wget available"; exit 1
              fi

              echo "==> Verifying SHA256 checksum..."
              EXPECTED_x86_64="313ba1c77a367f431faf690fe817aad297722623b62395a8ac64281f54f6c415"
              EXPECTED_arm64="207681c8ed67511fa53da6790de986e9a70981af0eec6c4ba1d8ff05e552f043"
              eval "EXPECTED=\$EXPECTED_${GOOSE_ARCH}"
              ACTUAL=$(sha256sum "$GOOSE_BIN" | awk '{print $1}')
              if [ "$ACTUAL" != "$EXPECTED" ]; then
                echo "ERROR: SHA256 checksum mismatch for goose_linux_${GOOSE_ARCH}"
                echo "  expected: $EXPECTED"
                echo "  actual:   $ACTUAL"
                exit 1
              fi
              echo "  Checksum verified."

              chmod +x "$GOOSE_BIN"

              GOOSE_DBSTRING="host=$PGHOST user=$PGUSER password=$PGPASSWORD dbname=$PGDATABASE sslmode=disable"

              echo "==> Applying SQL migrations with goose (DD-012)"
              "$GOOSE_BIN" -dir /migrations postgres "$GOOSE_DBSTRING" up

              echo "==> Granting privileges..."
              psql -q <<'EOSQL'
              GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ include "kubernaut.postgresql.username" . }};
              GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ include "kubernaut.postgresql.username" . }};
              GRANT EXECUTE ON ALL FUNCTIONS IN SCHEMA public TO {{ include "kubernaut.postgresql.username" . }};
              EOSQL
              echo "==> Migrations complete"
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: {{ include "kubernaut.fullname" . }}-migrations
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubernaut.fullname" . }}-migrations
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  {{- $migrationsDir := printf "%s/migrations" $.Chart.Name }}
  {{- range $path, $_ := .Files.Glob "migrations/*.sql" }}
  {{ base $path }}: |
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
