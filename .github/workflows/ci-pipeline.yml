name: CI Pipeline

# 4-Stage CI Pipeline with Registry-Aware Image Reuse
#
# Stage 1: Lint, License Scan & Unit Tests (parallel: 1 lint + 1 license scan + 13 unit test jobs) ~1-2 min
# Stage 2: Build & Push Images
#   - 2a: Go service images (parallel matrix: 12 services × 2 arches) ~5 min
#        amd64: full multi-stage Dockerfile (native, coverage-instrumented)
#        arm64: native Go cross-compile + scratch runtime Dockerfile (no QEMU)
#   - 2a-infra: infra images (parallel matrix: 2 images — db-migrate, mock-llm, amd64 only) ~5 min
#   - 2b: Multi-arch manifests (single job, loop over 12 Go services) ~1 min
# Stage 3: Integration Tests (parallel matrix: 12 services) ~15 min
# Stage 4: E2E Tests (parallel jobs: 13 services, when enabled) ~30 min each
#
# CI/CD Optimization (Registry-Aware):
#   - All images pushed to ghcr.io after unit tests pass
#   - arm64 images built via native Go cross-compile in same matrix (no QEMU)
#   - Multi-arch manifests enable transparent arch-aware pulls (Issue #1500)
#   - Integration tests pull dependency images (DataStorage, KA, Mock LLM) from registry
#   - E2E tests pull service images from registry
#   - Automatic fallback to local build if registry pull fails
#   - Saves ~60% disk space and ~30% build time in CI
#
# Trigger Strategy (merge-gate pattern):
#   - CI skips draft PRs (types filter excludes draft events)
#   - CI runs on ALL non-draft PRs (no paths-ignore filter)
#   - detect-changes job uses dorny/paths-filter to detect code changes
#   - Code PRs: all CI jobs run; merge-gate checks results
#   - Docs-only PRs: all CI jobs skipped; merge-gate auto-passes
#   - Spike/docs PRs (docs/**, spikes/**) don't match any positive pattern (no **.go glob)
#   - Single required check in branch protection: "Merge Gate"
#   - Push to main → always runs (full validation)
#
# Optimization Strategy:
#   - Go lint job
#   - No redundant builds (code compiled once in Stage 2 image builds)
#   - Sequential stages ensure images ready before tests
#   - Matrix parallelization for homogeneous jobs (unit, build, integration)
#   - Individual jobs for heterogeneous jobs (E2E with different infra)
#   - Fail-fast disabled for comprehensive feedback
#   - Registry image reuse eliminates duplicate builds
#   - Generated code (controller-gen deepcopy + ogen OpenAPI clients) is
#     cached via actions/cache, keyed on a hash of its source inputs
#     (api/**, openapi specs, Makefile). Every job that needs generated code
#     restores from cache instead of paying the ~25-30s codegen cost, while
#     staying fully parallel (no shared upstream job / no new critical-path
#     dependency). First job per commit to reach the step still generates and
#     seeds the cache for the rest.
#
# Authority: [TODO] Create ADR-CI-001 from docs/handoff/TRIAGE_GITHUB_WORKFLOW_OPTIMIZATION_REQUIREMENTS.md

on:
  pull_request:
    branches: [ main, 'release/**' ]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [ main, 'release/**' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # CRITICAL: Kind must use Podman (we don't have Docker in our CI)
  # This ensures all Kind commands (create, load, etc.) use Podman as the provider
  KIND_EXPERIMENTAL_PROVIDER: podman
  
  # Image registry configuration for E2E tests
  # NOTE: ghcr.io is for CI/CD ONLY (ephemeral images, 14-day cleanup)
  # Production releases use Quay.io (separate workflow)
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}/kubernaut

jobs:
  # ========================================
  # CHANGE DETECTION (runs on every PR)
  # Determines if code files changed; all CI jobs are conditional on this.
  # Docs-only PRs skip all CI jobs; the merge-gate auto-passes.
  # ========================================

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Note: dorny/paths-filter uses picomatch globs. Negation patterns
          # must appear AFTER the positive patterns they override. Files under
          # spikes/ and docs/ are non-production and should not trigger CI.
          # NOTE: We use explicit directory globs instead of '**.go' because
          # dorny/paths-filter's picomatch globstar matches at any depth,
          # causing negation patterns (!spikes/**, !docs/**) to fail when a
          # file like spikes/foo/main.go matches '**.go' positively.
          filters: |
            code:
              - 'cmd/**'
              - 'pkg/**'
              - 'internal/**'
              - 'api/**'
              - 'test/**'
              - 'migrations/**'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/**'
              - 'docker/**'
              - 'charts/**'
              - 'scripts/helm-smoke-test.sh'
              - 'config/**'

  # ========================================
  # STAGE 1: LINT, LICENSE SCAN & UNIT TESTS (ALL PARALLEL)
  # 15 parallel jobs (1 lint + 1 license scan + 13 unit tests) ~2 min total
  # Note: Code compilation happens in Stage 2 (image builds)
  # Skipped for docs-only PRs (detect-changes.code_changed == false)
  # ========================================

  lint-go:
    name: Lint (Go Services)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}

      - name: Generate Go code (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: |
          echo "🔄 Generating Go code (required for linting)..."
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Verify generated files are up-to-date
        run: |
          echo "🔍 Checking for uncommitted generated file changes..."
          if ! git diff --exit-code --name-only; then
            echo "❌ Generated files are out of date. Run 'make generate' and commit."
            git diff --stat
            exit 1
          fi
          echo "✅ Generated files are up-to-date"

      - name: Validate embedded assets (CRDs, migrations)
        run: make validate-embed

      - name: Lint Go code
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          args: --timeout=10m --new-from-merge-base=origin/${{ github.base_ref }} --whole-files cmd/... pkg/... internal/... test/...

      - name: Dependency vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          IGNORE_FILE=.govulncheck-ignore.yaml ./scripts/ci/govulncheck-gated.sh

  license-scan:
    name: License Scan
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Check licenses
        run: |
          echo "Scanning dependency licenses..."
          go-licenses check ./... \
            --ignore=github.com/jordigilh/kubernaut \
            --ignore=github.com/segmentio/asm \
            --ignore=github.com/Alcova-AI/adk-anthropic-go \
            --logtostderr=false
          echo "All dependency licenses are compliant."

      - name: Generate license report
        if: always()
        run: |
          go-licenses report ./... \
            --ignore=github.com/jordigilh/kubernaut \
            --ignore=github.com/segmentio/asm \
            --ignore=github.com/Alcova-AI/adk-anthropic-go \
            --logtostderr=false \
            --format csv > licenses.csv 2>/dev/null || true
          echo "License report generated ($(wc -l < licenses.csv) dependencies)"

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: license-report
          path: licenses.csv
          retention-days: 90

  unit-tests:
    name: Unit Tests (${{ matrix.service }})
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service:
          - aianalysis
          - authwebhook
          - datastorage
          - effectivenessmonitor
          - fleetmetadatacache
          - gateway
          - kubernautagent
          - notification
          - remediationorchestrator
          - signalprocessing
          - workflowexecution
          - apifrontend
          - shared-packages  # pkg/audit, pkg/cache, pkg/http, pkg/k8sutil, pkg/shared
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}

      - name: Generate Go code (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: |
          echo "🔄 Generating Go code for tests..."
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Run unit tests
        run: |
          echo "🧪 Running unit tests for ${{ matrix.service }}..."
          export PATH="${{ github.workspace }}/bin:$PATH"
          make test-unit-${{ matrix.service }}

      - name: Calculate and save coverage
        if: always()
        run: |
          mkdir -p coverage-reports
          if [ -f coverage_unit_${{ matrix.service }}.out ]; then
            COVERAGE=$(go tool cover -func=coverage_unit_${{ matrix.service }}.out | grep total | awk '{print $3}')
            if [ -z "$COVERAGE" ]; then
              echo "${{ matrix.service }},N/A" > coverage-reports/unit-${{ matrix.service }}.txt
              echo "⚠️  No coverage data found for ${{ matrix.service }} (coverage file exists but parsing failed)"
            else
              echo "${{ matrix.service }},${COVERAGE}" > coverage-reports/unit-${{ matrix.service }}.txt
              echo "📊 Unit Coverage for ${{ matrix.service }}: ${COVERAGE}"
            fi
          else
            echo "${{ matrix.service }},N/A" > coverage-reports/unit-${{ matrix.service }}.txt
            echo "ℹ️  Coverage file not found for ${{ matrix.service }}"
          fi
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit-${{ matrix.service }}
          path: coverage-reports/unit-${{ matrix.service }}.txt
          retention-days: 1

      - name: Upload full coverage profile
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile-unit-${{ matrix.service }}
          path: |
            coverage_unit_${{ matrix.service }}.out
            coverage_unit_${{ matrix.service }}.txt
          retention-days: 1
          if-no-files-found: ignore

  # ========================================
  # STAGE 2: BUILD & PUSH IMAGES (ghcr.io)
  # Matrix job: Build 12 Go service images for amd64 + arm64 and push to
  # GitHub Container Registry.
  #   - amd64: full multi-stage Dockerfile (native on runner, coverage-instrumented)
  #   - arm64: native Go cross-compile + scratch runtime Dockerfile (no QEMU)
  # Purpose: Integration & E2E tests pull from registry (saves ~60% disk space)
  # Retention: Images auto-cleanup after 14 days (GitHub policy)
  # Production: NOT used for production (Quay.io for production releases)
  # Authority: Issue #1500
  # ========================================

  build-and-push-images:
    name: "Build & Push (${{ matrix.service }}/${{ matrix.arch }})"
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write  # Required for ghcr.io push
      id-token: write  # Required for Cosign keyless signing (GitHub OIDC)
    env:
      IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}/kubernaut
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - aianalysis
          - apifrontend
          - authwebhook
          - datastorage
          - effectivenessmonitor
          - fleetmetadatacache
          - gateway
          - kubernautagent
          - notification
          - remediationorchestrator
          - signalprocessing
          - workflowexecution
        arch:
          - amd64
          - arm64
        include:
          - service: aianalysis
            dockerfile: docker/aianalysis.Dockerfile
          - service: apifrontend
            dockerfile: docker/apifrontend.Dockerfile
          - service: authwebhook
            dockerfile: docker/authwebhook.Dockerfile
          - service: datastorage
            dockerfile: docker/data-storage.Dockerfile
          - service: effectivenessmonitor
            dockerfile: docker/effectivenessmonitor-controller.Dockerfile
          - service: fleetmetadatacache
            dockerfile: docker/fleetmetadatacache.Dockerfile
          - service: gateway
            dockerfile: docker/gateway.Dockerfile
          - service: kubernautagent
            dockerfile: docker/kubernautagent.Dockerfile
          - service: notification
            dockerfile: docker/notification-controller.Dockerfile
          - service: remediationorchestrator
            dockerfile: docker/remediationorchestrator-controller.Dockerfile
          - service: signalprocessing
            dockerfile: docker/signalprocessing-controller.Dockerfile
          - service: workflowexecution
            dockerfile: docker/workflowexecution-controller.Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}

      - name: Generate required files (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: |
          echo "🔄 Generating OpenAPI specs and required files for Docker builds..."
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.2

      - name: Generate image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=main-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Compute image reference
        id: image-ref
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            echo "full_tag=${TAG}-arm64" >> $GITHUB_OUTPUT
          else
            echo "full_tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push amd64 image
        if: matrix.arch == 'amd64'
        run: |
          IMAGE="${IMAGE_REGISTRY}/${{ matrix.service }}:${{ steps.image-ref.outputs.full_tag }}"
          
          echo "🔨 Building ${{ matrix.service }} image (amd64, multi-stage)..."
          echo "   Image: ${IMAGE}"
          echo "   Dockerfile: ${{ matrix.dockerfile }}"
          
          docker build \
            --build-arg GOFLAGS=-cover \
            -t "${IMAGE}" \
            -f ${{ matrix.dockerfile }} \
            .
          
          echo "📤 Pushing to ghcr.io..."
          docker push "${IMAGE}"
          echo "✅ Image pushed successfully!"

      - name: Cross-compile binary for arm64 (native, no QEMU)
        if: matrix.arch == 'arm64'
        run: |
          echo "Cross-compiling ${{ matrix.service }} for arm64 (native)..."
          make cross-build-${{ matrix.service }} IMAGE_ARCH=arm64

      - name: Build and push arm64 runtime image
        if: matrix.arch == 'arm64'
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          IMAGE_ARCH: arm64
          CONTAINER_TOOL: docker
        run: |
          IMAGE="${IMAGE_REGISTRY}/${{ matrix.service }}:${{ steps.image-ref.outputs.full_tag }}"
          echo "Building runtime image ${IMAGE} (no QEMU)..."
          make image-runtime-${{ matrix.service }}
          echo "📤 Pushing ${IMAGE}..."
          docker push "${IMAGE}"
          echo "✅ Image pushed successfully!"

      - name: Cosign sign image (keyless)
        run: |
          IMAGE="${IMAGE_REGISTRY}/${{ matrix.service }}:${{ steps.image-ref.outputs.full_tag }}"
          echo "Signing ${IMAGE} (keyless, GitHub OIDC)..."
          cosign sign --yes "${IMAGE}"

      - name: Verify image signature (self-check)
        run: |
          IMAGE="${IMAGE_REGISTRY}/${{ matrix.service }}:${{ steps.image-ref.outputs.full_tag }}"
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/\.github/workflows/ci-pipeline\.yml@.*$" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${IMAGE}"

      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:${{ steps.image-ref.outputs.full_tag }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:${{ steps.image-ref.outputs.full_tag }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}-${{ matrix.arch }}.cdx.json
          artifact-name: sbom-${{ matrix.service }}-${{ matrix.arch }}

  # ========================================
  # STAGE 2a-infra: BUILD & PUSH INFRA IMAGES (ghcr.io)
  # Matrix job: Build infrastructure and test fixture images.
  # Separated from service images so downstream jobs can depend on
  # service images without waiting for infra builds (and vice versa).
  # ========================================

  build-infra-images:
    name: Build Infra (${{ matrix.service }})
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write  # Required for ghcr.io push
      id-token: write  # Required for Cosign keyless signing (GitHub OIDC)
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Infrastructure (1)
          - service: db-migrate
            dockerfile: docker/db-migrate.Dockerfile
            image_name: db-migrate
          # Test Fixtures (1)
          - service: mock-llm
            dockerfile: test/services/mock-llm/go.Dockerfile
            image_name: mock-llm
            context: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}

      - name: Generate required files (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: |
          echo "🔄 Generating OpenAPI specs and required files for Docker builds..."
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.2

      - name: Generate image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=main-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.service }} image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/kubernaut/${{ matrix.image_name }}
          IMAGE_TAG=${{ steps.tag.outputs.tag }}
          CONTEXT=${{ matrix.context || '.' }}
          
          echo "🔨 Building ${{ matrix.service }} image..."
          echo "   Image: ${IMAGE_NAME}:${IMAGE_TAG}"
          echo "   Dockerfile: ${{ matrix.dockerfile }}"
          echo "   Context: ${CONTEXT}"
          
          docker build \
            --build-arg GOFLAGS=-cover \
            -t ${IMAGE_NAME}:${IMAGE_TAG} \
            -f ${{ matrix.dockerfile }} \
            ${CONTEXT}
          
          echo "📤 Pushing to ghcr.io..."
          docker push ${IMAGE_NAME}:${IMAGE_TAG}
          
          echo "✅ Image pushed successfully!"

      - name: Cosign sign image (keyless)
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/kubernaut/${{ matrix.image_name }}:${{ steps.tag.outputs.tag }}"
          echo "Signing ${IMAGE} (keyless, GitHub OIDC)..."
          cosign sign --yes "${IMAGE}"

      - name: Verify image signature (self-check)
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/kubernaut/${{ matrix.image_name }}:${{ steps.tag.outputs.tag }}"
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/\.github/workflows/ci-pipeline\.yml@.*$" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${IMAGE}"

      - name: Scan image for CVEs (trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/kubernaut/${{ matrix.image_name }}:${{ steps.tag.outputs.tag }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/kubernaut/${{ matrix.image_name }}:${{ steps.tag.outputs.tag }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.image_name }}.cdx.json
          artifact-name: sbom-${{ matrix.image_name }}

  # ========================================
  # STAGE 2b: MULTI-ARCH MANIFESTS (ghcr.io)
  # Creates manifest lists so docker/podman pull resolves the correct
  # arch automatically. Only covers the 12 Go services that have both
  # amd64 and arm64 images. Single job with loop (fast API calls only).
  # Authority: Issue #1500
  # ========================================

  create-ci-manifests:
    name: "Multi-Arch Manifests"
    needs: [detect-changes, build-and-push-images]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for Cosign keyless signing (GitHub OIDC)
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.2

      - name: Create and push multi-arch manifests
        env:
          IMAGE_TAG: ${{ needs.build-and-push-images.outputs.tag }}
        run: |
          SERVICES="datastorage gateway aianalysis authwebhook notification remediationorchestrator signalprocessing workflowexecution effectivenessmonitor kubernautagent apifrontend fleetmetadatacache"

          for svc in ${SERVICES}; do
            BASE="${IMAGE_REGISTRY}/${svc}"
            echo "Creating manifest: ${BASE}:${IMAGE_TAG} [amd64 + arm64]..."

            docker manifest create "${BASE}:${IMAGE_TAG}" \
              "${BASE}:${IMAGE_TAG}" \
              "${BASE}:${IMAGE_TAG}-arm64"

            docker manifest push "${BASE}:${IMAGE_TAG}"
            echo "  pushed ${svc}"

            echo "Signing manifest list ${BASE}:${IMAGE_TAG} (keyless, GitHub OIDC)..."
            cosign sign --yes "${BASE}:${IMAGE_TAG}"

            cosign verify \
              --certificate-identity-regexp "^https://github.com/${{ github.repository }}/\.github/workflows/ci-pipeline\.yml@.*$" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "${BASE}:${IMAGE_TAG}"
            echo "  signed + verified ${svc} manifest list"
          done

          echo ""
          echo "All 12 multi-arch manifests created, pushed, and signed."

  # ========================================
  # STAGE 3: INTEGRATION TESTS
  # Waits for BOTH unit-tests AND build-and-push-images to complete
  # Matrix strategy: 10 services (all Go, same pattern: envtest + Podman)
  # 
  # CI/CD Optimization:
  #   - Pulls dependency images from ghcr.io (DataStorage, KA, Mock LLM)
  #   - Fallback to local build if registry pull fails
  #   - Saves ~60% disk space and ~30% build time
  #
  # DESIGN DECISION: No smart path detection at this level
  # - All integration tests run for ANY change (after images are built)
  # - Rationale: Integration tests are fast (~15 min total, parallel)
  # - Benefit: Better cross-service issue detection
  # - Trade-off: Uses more CI minutes, but comprehensive coverage worth it
  # - Smart path detection reserved for E2E tests (slower, 30 min each)
  # ========================================

  integration-tests:
    name: Integration (${{ matrix.service }})
    needs: [detect-changes, unit-tests, build-and-push-images, build-infra-images]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    env:
      IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}/kubernaut
      IMAGE_TAG: ${{ needs.build-and-push-images.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        service: [signalprocessing, aianalysis, authwebhook, workflowexecution, remediationorchestrator, notification, gateway, datastorage, effectivenessmonitor, kubernautagent, apifrontend, fleetmetadatacache]
        include:
          - service: signalprocessing
            service_name: "Signal Processing"
            timeout: 10
          - service: aianalysis
            service_name: "AI Analysis"
            timeout: 15
          - service: fleetmetadatacache
            service_name: "Fleet Metadata Cache"
            timeout: 10
          - service: authwebhook
            service_name: "Auth Webhook"
            timeout: 10
          - service: workflowexecution
            service_name: "Workflow Execution"
            timeout: 15
          - service: remediationorchestrator
            service_name: "Remediation Orchestrator"
            timeout: 15
          - service: notification
            service_name: "Notification"
            timeout: 10
          - service: gateway
            service_name: "Gateway"
            timeout: 20
          - service: datastorage
            service_name: "Data Storage"
            timeout: 10
          - service: effectivenessmonitor
            service_name: "Effectiveness Monitor"
            timeout: 15
          - service: kubernautagent
            service_name: "Kubernaut Agent"
            timeout: 20
          - service: apifrontend
            service_name: "API Frontend"
            timeout: 15
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}
      - name: Generate OpenAPI specs (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: make generate
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Setup envtest (K8s test binaries)
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.23
          echo "KUBEBUILDER_ASSETS=$($(go env GOPATH)/bin/setup-envtest use -p path)" >> $GITHUB_ENV
      - name: Run ${{ matrix.service }} integration tests
        run: |
          make test-integration-${{ matrix.service }} 2>&1 | tee integration-${{ matrix.service }}.log
          exit ${PIPESTATUS[0]}
      
      - name: Upload integration test log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-log-${{ matrix.service }}-${{ github.run_id }}
          path: integration-${{ matrix.service }}.log
          retention-days: 14
          if-no-files-found: ignore
      
      - name: Calculate and save integration coverage
        if: always()
        run: |
          mkdir -p coverage-reports
          if [ -f coverage_integration_${{ matrix.service }}.out ]; then
            COVERAGE=$(go tool cover -func=coverage_integration_${{ matrix.service }}.out | grep total | awk '{print $3}')
            if [ -z "$COVERAGE" ]; then
              echo "${{ matrix.service }},N/A" > coverage-reports/integration-${{ matrix.service }}.txt
              echo "⚠️  No integration coverage data found for ${{ matrix.service }} (parsing failed)"
            else
              echo "${{ matrix.service }},${COVERAGE}" > coverage-reports/integration-${{ matrix.service }}.txt
              echo "📊 Integration Coverage for ${{ matrix.service }}: ${COVERAGE}"
            fi
          else
            echo "${{ matrix.service }},N/A" > coverage-reports/integration-${{ matrix.service }}.txt
            echo "ℹ️  No integration coverage data found for ${{ matrix.service }}"
          fi
      
      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration-${{ matrix.service }}
          path: coverage-reports/integration-${{ matrix.service }}.txt
          retention-days: 1

      - name: Upload full integration coverage profile
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile-integration-${{ matrix.service }}
          path: coverage_integration_${{ matrix.service }}.out
          retention-days: 1
          if-no-files-found: ignore
      
      - name: Validate Data Storage OpenAPI spec (ADR-031)
        if: matrix.service == 'datastorage'
        run: make validate-openapi-datastorage
      - name: Collect must-gather logs on failure
        if: failure() || cancelled()
        run: |
          echo "📋 Collecting must-gather logs for triage..."
          if [ -d "/tmp/kubernaut-must-gather" ]; then
            echo "✅ Found must-gather directory"
            ls -la /tmp/kubernaut-must-gather/
            # Create timestamped archive for this service
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            tar -czf must-gather-${{ matrix.service }}-${TIMESTAMP}.tar.gz -C /tmp kubernaut-must-gather/
            echo "✅ Created must-gather archive: must-gather-${{ matrix.service }}-${TIMESTAMP}.tar.gz"
          else
            echo "⚠️  No must-gather directory found at /tmp/kubernaut-must-gather"
            echo "    This may be expected if tests failed before must-gather was triggered"
          fi
      - name: Upload must-gather logs as artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: must-gather-logs-integration-${{ matrix.service }}-${{ github.run_id }}
          path: must-gather-*.tar.gz
          retention-days: 14
          if-no-files-found: warn
      - name: Cleanup
        if: always()
        run: podman ps -a --filter "name=${{ matrix.service }}-" --format "{{.Names}}" | xargs -r podman rm -f
  # ========================================
  # STAGE 4: E2E TESTS (PARALLEL)
  # Matrix job, 11 services in parallel (~30 min each)
  # 
  # Test Coverage:
  #   - 10 Go services: signalprocessing, aianalysis, authwebhook, workflowexecution,
  #     remediationorchestrator, notification, gateway, datastorage,
  #     effectivenessmonitor, kubernautagent
  #   - 1 full pipeline E2E
  # 
  # Image Strategy:
  #   - E2E tests attempt registry pull first (fast path, ~30% time savings)
  #   - Fallback to local build on 403/failure (with coverage instrumentation)
  #   - BuildImageForKind() handles this automatically via IMAGE_REGISTRY + IMAGE_TAG
  #
  # DESIGN DECISION: Runs after integration tests pass
  # - E2E tests are slower (30 min each) and more resource-intensive
  # - Integration tests validate core functionality first (faster feedback)
  # - E2E tests validate full user journeys and cross-service scenarios
  # ========================================

  e2e-tests:
    name: E2E (${{ matrix.service }})
    needs: [detect-changes, unit-tests, build-and-push-images, build-infra-images]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    env:
      # E2E Image Strategy: Pull from registry first, fallback to local build
      # - BuildImageForKind() attempts registry pull if IMAGE_REGISTRY + IMAGE_TAG set
      # - Falls back to local build on 403/failure (with coverage instrumentation)
      # - Ensures fastest possible E2E execution when registry is accessible
      IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}/kubernaut
      IMAGE_TAG: ${{ needs.build-and-push-images.outputs.tag }}
      E2E_COVERAGE: true  # Enable coverage instrumentation for local builds (GOFLAGS=-cover)
    strategy:
      fail-fast: false
      matrix:
        service: [signalprocessing, aianalysis, authwebhook, workflowexecution, remediationorchestrator, notification, gateway, datastorage, effectivenessmonitor, kubernautagent, apifrontend, fullpipeline, fleet, fleetmetadatacache-kuadrant, fleetmetadatacache-eaigw]
        include:
          - service: signalprocessing
            service_name: "Signal Processing"
            timeout: 20
          - service: aianalysis
            service_name: "AI Analysis"
            timeout: 20
          - service: authwebhook
            service_name: "Auth Webhook"
            timeout: 20
          - service: workflowexecution
            service_name: "Workflow Execution"
            timeout: 20
          - service: remediationorchestrator
            service_name: "Remediation Orchestrator"
            timeout: 20
          - service: notification
            service_name: "Notification"
            timeout: 20
          - service: gateway
            service_name: "Gateway"
            timeout: 20
          - service: datastorage
            service_name: "Data Storage"
            timeout: 20
          - service: effectivenessmonitor
            service_name: "Effectiveness Monitor"
            timeout: 20
          - service: kubernautagent
            service_name: "Kubernaut Agent"
            timeout: 30
          - service: apifrontend
            service_name: "API Frontend"
            timeout: 25
          - service: fullpipeline
            service_name: "Full Pipeline"
            timeout: 20
          - service: fleet
            service_name: "Fleet Multi-Cluster"
            timeout: 35
          - service: fleetmetadatacache-kuadrant
            service_name: "Fleet Metadata Cache (Kuadrant)"
            timeout: 15
          - service: fleetmetadatacache-eaigw
            service_name: "Fleet Metadata Cache (EAIGW)"
            timeout: 20
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Free disk space (E2E jobs need headroom for Kind + images)
        if: matrix.service == 'workflowexecution' || matrix.service == 'fullpipeline' || matrix.service == 'fleet'
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo apt-get purge -y \
            google-cloud-cli azure-cli microsoft-edge-stable google-chrome-stable \
            dotnet-sdk-* powershell mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/share/swift /opt/hostedtoolcache/CodeQL \
            /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/share/edge_driver /opt/microsoft 2>/dev/null || true
          sudo docker image prune -a -f 2>/dev/null || true
          sudo podman system prune -a -f 2>/dev/null || true
          echo "Disk after cleanup:"
          df -h /

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
      - name: Cache generated code
        id: gen-cache
        uses: actions/cache@v6
        with:
          path: |
            api/*/v1alpha1/zz_generated.deepcopy.go
            pkg/shared/types/zz_generated.deepcopy.go
            pkg/agentclient/oas_*.go
            pkg/datastorage/ogen-client/oas_*.go
            pkg/datastorage/server/middleware/openapi_spec_data.yaml
            pkg/audit/openapi_spec_data.yaml
          key: generated-code-v1-${{ hashFiles('api/**/*.go', 'pkg/shared/types/**/*.go', 'api/openapi/**', 'internal/kubernautagent/api/openapi.json', 'pkg/agentclient/generate.go', 'pkg/datastorage/ogen-client/gen.go', 'Makefile') }}
      - name: Generate OpenAPI specs (cache miss)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: make generate
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Login to GitHub Container Registry (for image pulls)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Install Kind v0.30.0
        run: |
          KIND_VERSION="v0.30.0"
          curl -Lo ./kind "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version
      - name: Install Helm (fleet/fleetmetadatacache-kuadrant/fleetmetadatacache-eaigw E2E deploy Istio/Kuadrant/Envoy AI Gateway via helm)
        if: matrix.service == 'fleet' || matrix.service == 'fleetmetadatacache-kuadrant' || matrix.service == 'fleetmetadatacache-eaigw'
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version
      - name: Install Tekton CLI (tkn)
        run: |
          TKN_VERSION="0.40.0"
          TKN_TARBALL="tkn_${TKN_VERSION}_Linux_x86_64.tar.gz"
          TKN_URL="https://github.com/tektoncd/cli/releases/download/v${TKN_VERSION}/${TKN_TARBALL}"
          curl -L --retry 3 --retry-delay 5 -o "${TKN_TARBALL}" "${TKN_URL}"
          file "${TKN_TARBALL}" | grep -q "gzip" || {
            echo "::error::Downloaded ${TKN_TARBALL} is not a valid gzip archive (possible CDN issue). Actual type: $(file ${TKN_TARBALL})"
            exit 1
          }
          tar xzf "${TKN_TARBALL}" tkn
          chmod +x tkn
          sudo mv tkn /usr/local/bin/tkn
          tkn version
      - name: Disable AppArmor rsyslog profile (for AWX)
        if: matrix.service == 'workflowexecution' || matrix.service == 'fullpipeline' || matrix.service == 'fleet'
        run: |
          # Issue #440: AWX rsyslog sidecar crash-loops on Ubuntu runners because
          # AppArmor denies rsyslogd read access to /var/lib/awx/rsyslog/rsyslog.conf.
          # Upstream fix: ansible/awx#15717 (merged to devel, not yet released).
          if sudo apparmor_parser -R /etc/apparmor.d/usr.sbin.rsyslogd 2>/dev/null; then
            echo "✅ AppArmor rsyslog profile removed"
          else
            echo "⚠️  AppArmor rsyslog profile not found or already removed (non-fatal)"
          fi
      # Note: previously wrapped in nick-fields/retry@v4 (max_attempts: 3). Retries
      # mask flakes AND destroy diagnostics: a retry tears down the failing attempt's
      # cluster and stands up a fresh one, so the "Collect must-gather logs on failure"
      # step below only ever sees the LAST attempt's (often mid-bootstrap) cluster
      # instead of the one that actually failed. A single attempt gets the full
      # matrix.timeout budget (job-level timeout-minutes below), which is more time
      # than any individual retry attempt got before.
      - name: Run ${{ matrix.service }} E2E tests
        run: make test-e2e-${{ matrix.service }}
      
      - name: Calculate and save E2E coverage
        if: always()
        run: |
          mkdir -p coverage-reports
          if [ -f coverage_e2e_${{ matrix.service }}.out ]; then
            COVERAGE=$(go tool cover -func=coverage_e2e_${{ matrix.service }}.out | grep total | awk '{print $3}')
            if [ -z "$COVERAGE" ]; then
              echo "${{ matrix.service }},N/A" > coverage-reports/e2e-${{ matrix.service }}.txt
              echo "⚠️  No E2E coverage data found for ${{ matrix.service }} (coverage file exists but parsing failed)"
            else
              echo "${{ matrix.service }},${COVERAGE}" > coverage-reports/e2e-${{ matrix.service }}.txt
              echo "📊 E2E Coverage for ${{ matrix.service }}: ${COVERAGE}"
            fi
          else
            echo "${{ matrix.service }},N/A" > coverage-reports/e2e-${{ matrix.service }}.txt
            echo "ℹ️  No E2E coverage data found for ${{ matrix.service }}"
          fi
      
      - name: Upload E2E coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-e2e-${{ matrix.service }}
          path: coverage-reports/e2e-${{ matrix.service }}.txt
          retention-days: 1

      - name: Upload full E2E coverage profile
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile-e2e-${{ matrix.service }}
          path: coverage_e2e_${{ matrix.service }}.out
          retention-days: 1
          if-no-files-found: ignore

      - name: Collect must-gather logs on failure
        if: failure() || cancelled()
        run: |
          echo "📋 Collecting must-gather logs for triage..."
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          if [ -d "/tmp/kubernaut-must-gather" ]; then
            echo "✅ Found must-gather directory (AfterSuite executed)"
            ls -la /tmp/kubernaut-must-gather/
            tar -czf must-gather-e2e-${{ matrix.service }}-${TIMESTAMP}.tar.gz -C /tmp kubernaut-must-gather/
            echo "✅ Created must-gather archive: must-gather-e2e-${{ matrix.service }}-${TIMESTAMP}.tar.gz"
          else
            echo "⚠️  No must-gather directory found (BeforeSuite failure)"
            echo "📋 Manually exporting Kind cluster logs..."
            
            # FIX: Dynamically detect cluster name (each E2E test uses custom names)
            # Examples: gateway-e2e, authwebhook-e2e, notification-e2e, ro-e2e, etc.
            CLUSTER_NAME=$(kind get clusters 2>/dev/null | grep -E "e2e|${{ matrix.service }}" | head -1)
            
            if [ -n "$CLUSTER_NAME" ]; then
              echo "✅ Found Kind cluster: $CLUSTER_NAME"
              
              # Export Kind logs to temporary directory
              EXPORT_DIR=$(mktemp -d)
              kind export logs "$EXPORT_DIR" --name "$CLUSTER_NAME" || echo "⚠️  Kind export logs failed"
              
              if [ -d "$EXPORT_DIR" ]; then
                echo "✅ Exported Kind logs to $EXPORT_DIR"
                ls -la "$EXPORT_DIR"
                tar -czf must-gather-e2e-${{ matrix.service }}-${TIMESTAMP}.tar.gz -C "$EXPORT_DIR" .
                echo "✅ Created must-gather archive from Kind export"
                rm -rf "$EXPORT_DIR"
              else
                echo "❌ Failed to export Kind logs"
              fi
            else
              echo "❌ No Kind cluster found - tests failed before cluster creation"
              echo "Available clusters:"
              kind get clusters 2>&1 || echo "  (none)"
            fi
          fi
      - name: Upload must-gather logs as artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: must-gather-logs-e2e-${{ matrix.service }}-${{ github.run_id }}
          path: must-gather-e2e-*.tar.gz
          retention-days: 14
          if-no-files-found: warn
      - name: Cleanup Kind cluster
        if: always()
        run: |
          # FIX: Dynamically detect and cleanup E2E clusters (custom names per service)
          for cluster in $(kind get clusters 2>/dev/null | grep -E "e2e"); do
            echo "🗑️  Deleting Kind cluster: $cluster"
            kind delete cluster --name "$cluster" || true
          done
      - name: Cleanup containers
        if: always()
        run: podman ps -a --filter "name=${{ matrix.service }}-" --format "{{.Names}}" | xargs -r podman rm -f

  # ========================================
  # HELM SMOKE TESTS
  # Validates the Helm chart install/upgrade/uninstall lifecycle on a Kind cluster.
  # Runs after images are built (parallel with integration + E2E tests).
  #
  # Includes two freshness gates that run BEFORE the Kind cluster is created:
  #   1. CRD freshness: `make manifests` + diff against charts/kubernaut/crds/
  #   2. values.schema.json: `helm lint --strict` validates schema consistency
  #
  # Image strategy: Pull pre-built images from ghcr.io (no local builds).
  # Authority: docs/testing/342/TEST_PLAN.md
  # ========================================

  helm-smoke-test:
    name: Helm Smoke Tests (Kind)
    needs: [detect-changes, build-and-push-images, build-infra-images, unit-tests]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KIND_CLUSTER_NAME: helm-smoke
      IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}/kubernaut
      IMAGE_TAG: ${{ needs.build-and-push-images.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: CRD freshness gate
        run: |
          echo "Generating CRDs from Go types (make manifests)..."
          make manifests
          echo ""
          echo "Comparing config/crd/bases/ with charts/kubernaut/crds/..."
          if ! diff -r config/crd/bases/ charts/kubernaut/crds/; then
            echo ""
            echo "FAIL: Chart CRDs are stale. Run 'make manifests' and copy"
            echo "      config/crd/bases/*.yaml to charts/kubernaut/crds/"
            exit 1
          fi
          echo "PASS: Chart CRDs match generated CRDs"

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: values.schema.json validation
        run: |
          echo "Running helm lint --strict to validate schema consistency..."
          helm lint charts/kubernaut/ --strict \
            --set global.image.tag=schema-check \
            --set postgresql.auth.existingSecret=lint-placeholder \
            --set datastorage.dbExistingSecret=lint-placeholder \
            --set valkey.existingSecret=lint-placeholder \
            --set kubernautAgent.llm.provider=openai \
            --set kubernautAgent.llm.model=gpt-4o \
            --set kubernautAgent.llm.credentialsSecretName=lint-placeholder
          echo "PASS: values.schema.json is consistent with values.yaml"

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman --version

      - name: Install Kind
        run: |
          KIND_VERSION="v0.30.0"
          curl -Lo ./kind "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Create Kind cluster
        run: |
          kind create cluster --name "$KIND_CLUSTER_NAME" --wait 120s
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Run smoke tests
        env:
          PULL_SECRET_SERVER: ghcr.io
          PULL_SECRET_USER: ${{ github.actor }}
          PULL_SECRET_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          scripts/helm-smoke-test.sh \
            --platform kind \
            --image-tag "${IMAGE_TAG}" \
            --registry "${IMAGE_REGISTRY}" \
            --pull-secret ghcr-creds \
            --chart-path charts/kubernaut/

      - name: Collect Kind node logs on failure
        if: failure() || cancelled()
        run: |
          kind export logs /tmp/kind-smoke-logs --name "$KIND_CLUSTER_NAME" 2>/dev/null || true

      - name: Upload must-gather and Kind logs
        if: failure() || cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: helm-smoke-must-gather-${{ github.run_id }}
          path: |
            /tmp/must-gather-helm-smoke-*.tar.gz
            /tmp/kind-smoke-logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup Kind cluster
        if: always()
        run: |
          kind delete cluster --name "$KIND_CLUSTER_NAME" 2>/dev/null || true

      - name: Cleanup Podman
        if: always()
        run: |
          podman system prune -a -f 2>/dev/null || true

  # ========================================
  # SUMMARY
  # ========================================
  summary:
    name: Test Suite Summary
    needs: [detect-changes, lint-go, unit-tests, build-and-push-images, build-infra-images, create-ci-manifests, integration-tests, e2e-tests, helm-smoke-test]
    if: always() && needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # required for sticky-pull-request-comment to post/update PR comment
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download coverage summary reports
        if: always()
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-reports
          merge-multiple: true
        continue-on-error: true

      - name: Download full coverage profiles
        if: always()
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-profile-*
          path: coverage-profiles
          merge-multiple: true
        continue-on-error: true
      
      - name: Generate comprehensive coverage report
        if: always()
        run: |
          echo "📊 Generating comprehensive coverage report (Python-based, line-by-line merging)..."
          echo ""
          
          # Debug: Show available coverage artifacts
          echo "🔍 Downloaded coverage summary artifacts:"
          find coverage-reports -name "*.txt" -type f 2>/dev/null | sort || echo "  ⚠️  No coverage-reports directory found"
          echo ""
          echo "🔍 Downloaded full coverage profiles:"
          find coverage-profiles -type f 2>/dev/null | sort || echo "  ⚠️  No coverage-profiles directory found"
          echo ""
          
          # Move full .out/.txt coverage profiles to repo root (where coverage_report.py expects them)
          echo "🔄 Reconstructing coverage files..."
          if [ -d "coverage-profiles" ]; then
            for profile in coverage-profiles/coverage_*; do
              [ ! -f "$profile" ] && continue
              filename=$(basename "$profile")
              if [ -s "$profile" ]; then
                cp "$profile" "./$filename"
                echo "  ✅ $filename ($(wc -l < "$profile") lines)"
              else
                echo "  ⏭️  $filename (empty, skipped)"
              fi
            done
          fi
          echo ""
          
          # For services/tiers where full .out profiles aren't available,
          # create .pct fallback files from the summary artifacts
          echo "🔄 Creating .pct fallbacks for missing profiles..."
          if [ -d "coverage-reports" ]; then
            for artifact_file in coverage-reports/*.txt; do
              [ ! -f "$artifact_file" ] && continue
              filename=$(basename "$artifact_file")
              
              if [[ "$filename" =~ ^(unit|integration|e2e)-(.+)\.txt$ ]]; then
                tier="${BASH_REMATCH[1]}"
                service="${BASH_REMATCH[2]}"
                coverage=$(cut -d',' -f2 "$artifact_file" | head -1 | tr -d '[:space:]')
                
                # Only create .pct if no real .out file exists
                out_file="coverage_${tier}_${service}.out"
                if [ ! -s "$out_file" ]; then
                  echo "${coverage}" > "coverage_${tier}_${service}.pct"
                  echo "  📝 coverage_${tier}_${service}.pct = $coverage (fallback)"
                else
                  echo "  ✅ $out_file exists ($(wc -l < "$out_file") lines), skip .pct"
                fi
              fi
            done
          fi
          echo ""
          
          # Debug: Show final coverage file state
          echo "📋 Coverage files in workspace:"
          ls -la coverage_*.out coverage_*.pct coverage_*.txt 2>/dev/null | head -30 || echo "  (none)"
          echo ""
          
          # Generate markdown report using Python script (replaces bash+awk)
          if python3 scripts/coverage/coverage_report.py --format markdown > coverage-summary.md 2>&1; then
            echo "✅ Coverage report generated successfully"
            echo ""
            echo "📋 Preview:"
            head -n 40 coverage-summary.md | sed 's/^/  /'
            echo ""
            
            if grep -q "Kubernaut Coverage Report" coverage-summary.md && \
               grep -q "Unit-Testable" coverage-summary.md && \
               grep -q "All Tiers" coverage-summary.md; then
              echo "✅ Report format validated"
            else
              echo "⚠️  Warning: Report may be incomplete"
            fi
            
            SERVICE_COUNT=$(grep -c "^| [a-z]" coverage-summary.md || echo "0")
            echo "📊 Report contains $SERVICE_COUNT services"
          else
            echo "❌ Coverage report generation failed"
            echo "## 📊 Kubernaut Coverage Report" > coverage-summary.md
            echo "" >> coverage-summary.md
            echo "⚠️ **Coverage data could not be generated.**" >> coverage-summary.md
            echo "" >> coverage-summary.md
            echo "Run locally: \`make coverage-report-markdown\`" >> coverage-summary.md
            echo "" >> coverage-summary.md
            echo "See [Testing Coverage Methodology](docs/testing/TESTING_COVERAGE_METHODOLOGY.md)." >> coverage-summary.md
            echo "⚠️  Fallback report created"
          fi
          
          # Ensure file exists
          if [ ! -f coverage-summary.md ]; then
            echo "❌ CRITICAL: coverage-summary.md not created"
            echo "## ❌ Coverage Report Unavailable" > coverage-summary.md
            exit 1
          fi
      
      - name: Enforce coverage gate (unit + all-tiers merged >=80%)
        if: always()
        run: |
          echo "🔒 Coverage Gate: Checking unit-testable + all-tiers-merged >=80%..."
          echo "   (IT/E2E measured by wiring + control completeness, not line %. See AGENTS.md)"
          if python3 scripts/coverage/coverage_report.py --check-gate 80 > /dev/null 2>&1; then
            echo "✅ Coverage gate PASSED"
          else
            echo "⚠️  Coverage gate: some services below 80% — see report for details"
            echo "   (Non-blocking in V1.5 rollout; will become blocking after Phase 9)"
          fi

      - name: Post coverage report to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage-report
          path: coverage-summary.md
      
      - name: Test Suite Summary
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "Defense-in-Depth Test Suite Summary (Optimized + Parallel)"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          echo "STAGE 1 - Lint & Unit Tests (All Parallel):"
          echo "  Lint (Go):        ${{ needs.lint-go.result }}"
          echo "  Unit Tests (13):  ${{ needs.unit-tests.result }}"
          echo ""
          echo "STAGE 2 - Build & Push Images (Parallel Matrix):"
          echo "  Go Services (12×2 arch):    ${{ needs.build-and-push-images.result }}"
          echo "  Infra Images (2, amd64):    ${{ needs.build-infra-images.result }}"
          echo "  Multi-Arch Manifests:       ${{ needs.create-ci-manifests.result }}"
          echo "  Registry: ghcr.io (CI/CD ephemeral images, 14-day retention)"
          echo ""
          echo "STAGE 3 - Integration Tests (Parallel Matrix):"
          echo "  All Services (12 services): ${{ needs.integration-tests.result }}"
          echo "  Image Strategy: Pull from ghcr.io (DataStorage, KA, Mock LLM)"
          echo ""
          echo "STAGE 4 - E2E Tests (Parallel Matrix):"
          echo "  All Services (13 services): ${{ needs.e2e-tests.result }}"
          echo "  Image Strategy: Pull from ghcr.io (all service images)"
          echo ""
          echo "Helm Smoke Tests (parallel with Stage 3+4):"
          echo "  Smoke Tests (Kind):  ${{ needs.helm-smoke-test.result }}"
          echo "  Gates: CRD freshness + values.schema.json validation"
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "Test Strategy:"
          echo "  ✅ ALL tests run for every non-draft PR"
          echo "  ✅ Comprehensive validation ensures stability"
          echo "  ✅ Sequential stages ensure images ready before use"
          echo ""
          echo "Optimizations:"
          echo "  ✅ Stage 1: All parallel (1 lint + 13 unit tests)"
          echo "  ✅ No redundant builds (code compiled once in image builds)"
          echo "  ✅ Parallel image builds & push to ghcr.io (matrix: 12 services × 2 arches + 2 infra)"
          echo "  ✅ Integration tests reuse registry images (saves ~60% disk, ~30% time)"
          echo "  ✅ Parallel integration tests (matrix: 12 services)"
          echo "  ✅ E2E tests reuse registry images (saves ~60% disk, ~30% time)"
          echo "  ✅ Parallel E2E tests (matrix: 13 services)"
          echo "  ✅ Automatic fallback to local build if registry pull fails"
          echo "═══════════════════════════════════════════════════════════"

          # Check for lint failure (non-blocking, but report)
          if [ "${{ needs.lint-go.result }}" != "success" ]; then
            echo ""
            echo "⚠️  Lint warnings detected (non-blocking in V1.0)"
          fi

          # Check for unit tests failure (critical)
          if [ "${{ needs.unit-tests.result }}" == "failure" ]; then
            echo ""
            echo "❌ Unit tests failed - subsequent stages skipped"
            exit 1
          elif [ "${{ needs.unit-tests.result }}" == "cancelled" ]; then
            echo ""
            echo "⚠️  Unit tests cancelled"
            exit 1
          fi

          # Check for image build & push failure (critical for integration + E2E)
          if [ "${{ needs.build-and-push-images.result }}" == "failure" ]; then
            echo ""
            echo "❌ Image builds failed - check individual service builds in the matrix"
            echo "   Services: datastorage, gateway, aianalysis, authwebhook, notification,"
            echo "             remediationorchestrator, signalprocessing, workflowexecution,"
            echo "             kubernautagent, mock-llm"
            exit 1
          elif [ "${{ needs.build-and-push-images.result }}" == "cancelled" ]; then
            echo ""
            echo "⚠️  Image builds cancelled"
            exit 1
          fi

          # Check for integration tests (handle skipped if dependencies failed)
          if [ "${{ needs.integration-tests.result }}" == "failure" ]; then
            echo ""
            echo "❌ Integration tests failed - check individual service logs in the matrix"
            echo "   Services tested: signalprocessing, aianalysis, workflowexecution,"
            echo "                    remediationorchestrator, gateway, datastorage,"
            echo "                    notification, kubernautagent, authwebhook"
            exit 1
          elif [ "${{ needs.integration-tests.result }}" == "skipped" ]; then
            echo ""
            echo "⏭️  Integration tests skipped (dependencies failed)"
          elif [ "${{ needs.integration-tests.result }}" == "cancelled" ]; then
            echo ""
            echo "⚠️  Integration tests cancelled"
            exit 1
          fi

          # Check for E2E tests (handle skipped if dependencies failed)
          if [ "${{ needs.e2e-tests.result }}" == "failure" ]; then
            echo ""
            echo "❌ E2E tests failed - check individual service logs in the matrix"
            echo "   Services tested: signalprocessing, aianalysis, workflowexecution,"
            echo "                    remediationorchestrator, gateway, datastorage,"
            echo "                    notification, authwebhook, kubernautagent"
            exit 1
          elif [ "${{ needs.e2e-tests.result }}" == "skipped" ]; then
            echo ""
            echo "⏭️  E2E tests skipped (dependencies failed)"
          elif [ "${{ needs.e2e-tests.result }}" == "cancelled" ]; then
            echo ""
            echo "⚠️  E2E tests cancelled"
            exit 1
          fi

          # Check for Helm smoke test (handle skipped if dependencies failed)
          if [ "${{ needs.helm-smoke-test.result }}" == "failure" ]; then
            echo ""
            echo "❌ Helm smoke tests failed - check CRD freshness, schema validation, or install logs"
            exit 1
          elif [ "${{ needs.helm-smoke-test.result }}" == "skipped" ]; then
            echo ""
            echo "⏭️  Helm smoke tests skipped (dependencies failed)"
          elif [ "${{ needs.helm-smoke-test.result }}" == "cancelled" ]; then
            echo ""
            echo "⚠️  Helm smoke tests cancelled"
            exit 1
          fi

          # Final result
          echo ""
          if [ "${{ needs.integration-tests.result }}" == "success" ] && \
             [ "${{ needs.e2e-tests.result }}" == "success" ] && \
             [ "${{ needs.helm-smoke-test.result }}" == "success" ]; then
            echo "✅ All tests passed!"
            exit 0
          else
            echo "⚠️  Some tests were skipped or had issues (see above)"
            exit 1
          fi

  # ========================================
  # MERGE GATE (single required check)
  # This is the ONLY job required in branch protection.
  # - Code PRs: checks that all CI jobs passed
  # - Docs-only PRs: all CI jobs are skipped → no failures → auto-passes
  # - Replaces the previous 3-check + ci-skip-checks.yml approach
  # ========================================

  merge-gate:
    name: Merge Gate
    if: always()
    needs: [detect-changes, lint-go, license-scan, unit-tests, build-and-push-images,
            build-infra-images, create-ci-manifests,
            integration-tests, e2e-tests, helm-smoke-test, summary]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI results
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "Merge Gate - Evaluating CI Pipeline Results"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          echo "Code changed: ${{ needs.detect-changes.outputs.code_changed }}"
          echo ""
          echo "Job results:"
          echo "  detect-changes:       ${{ needs.detect-changes.result }}"
          echo "  lint-go:              ${{ needs.lint-go.result }}"
          echo "  license-scan:         ${{ needs.license-scan.result }}"
          echo "  unit-tests:           ${{ needs.unit-tests.result }}"
          echo "  build-and-push:       ${{ needs.build-and-push-images.result }}"
          echo "  build-infra:          ${{ needs.build-infra-images.result }}"
          echo "  multi-arch-manifests: ${{ needs.create-ci-manifests.result }}"
          echo "  integration-tests:    ${{ needs.integration-tests.result }}"
          echo "  e2e-tests:            ${{ needs.e2e-tests.result }}"
          echo "  helm-smoke-test:      ${{ needs.helm-smoke-test.result }}"
          echo "  summary:              ${{ needs.summary.result }}"
          echo ""

          # Fail if any job failed
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ One or more CI jobs failed — merge blocked"
            exit 1
          fi

          # Fail if any job was cancelled (except for docs-only PRs where jobs are skipped)
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "❌ One or more CI jobs were cancelled — merge blocked"
            exit 1
          fi

          echo "═══════════════════════════════════════════════════════════"
          if [[ "${{ needs.detect-changes.outputs.code_changed }}" == "true" ]]; then
            echo "✅ All CI checks passed — merge allowed"
          else
            echo "✅ Docs-only PR — no CI checks required — merge allowed"
          fi
          echo "═══════════════════════════════════════════════════════════"
