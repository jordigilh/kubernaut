            - 'remediationworkflow.admitted.denied'
          description: Event type for discriminator (matches parent event_type)
        workflow_name:
          type: string
          description: Name of the RemediationWorkflow CRD (metadata.name)
          example: "crashloop-rollback-v1"
        action:
          type: string
