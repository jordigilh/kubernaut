# GolangCI-Lint v2 Configuration for Kubernaut
# Enforces anti-pattern detection per TESTING_GUIDELINES.md

version: "2"

run:
  timeout: 10m
  tests: true

linters:
  enable:
    - forbidigo  # Detects forbidden patterns (NULL-TESTING, Skip(), time.Sleep())
    - errcheck   # Ensures error returns are checked
    - ineffassign # Detects assignments to variables that are never used
    - staticcheck
    - unused
    - govet
    - gosec      # SAST: detects common Go security issues (Issue #1002)
    - prealloc   # Flags slices that could be pre-allocated with a known/derivable
                 # capacity (100 Go Mistakes #57). Verified 0 findings in production
                 # code as of GO-ANTIPATTERN-AUDIT-2026-07-01 follow-up; test-only
                 # findings are excluded below (perf of test setup code is not
                 # worth the churn).
    - revive     # Scoped to argument-limit only (see settings below) — other
                 # revive rules are not vetted for this codebase and are left off
                 # to avoid an unreviewed wall of new findings.
    - containedctx # Flags context.Context stored as a struct field outside of a
                   # single call scope (100 Go Mistakes #57/AGENTS.md). Verified 0
                   # findings in production code; two pre-existing, reviewed
                   # exceptions carry //nolint:containedctx (DD-scoped lifecycle
                   # contexts). Test-double interface embeddings are excluded below.
    - funlen     # Flags overly long functions (AGENTS.md anti-pattern checklist).
                 # Fully remediated across 127 pre-existing findings in
                 # GO-ANTIPATTERN-AUDIT-2026-07-01 §complexity remediation
                 # (5-wave TDD effort, Issue #1532); production code only,
                 # test files excluded below.
    - gocyclo    # Cyclomatic complexity. Fully remediated alongside funlen/
                 # gocognit/nestif (Issue #1532); production code only.
    - gocognit   # Cognitive complexity. Fully remediated alongside funlen/
                 # gocyclo/nestif (Issue #1532); production code only.
    - nestif     # Deeply nested if-statements. Fully remediated alongside
                 # funlen/gocyclo/gocognit (Issue #1532); production code only.
    - maintidx   # Composite maintainability index (cyclomatic complexity +
                 # Halstead volume + LOC). Verified 100% overlap with the
                 # funlen/gocyclo/gocognit/nestif baseline during preflight;
                 # cleared as a side effect of that remediation (Issue #1532).
    - interfacebloat # Flags interfaces with too many methods (AGENTS.md
                     # "Interface pollution (5+ methods)" checklist item).
                     # Verified 0 findings repo-wide as of GO-ANTIPATTERN-
                     # AUDIT-2026-07-01 follow-up (Issue #1532).
    - nakedret   # Flags naked returns in functions longer than 5 lines
                 # (AGENTS.md checklist item). Verified 0 findings repo-wide.
    - rowserrcheck   # Flags missing sql.Rows.Err() checks (resource-leak risk).
                     # Verified 0 findings repo-wide.
    - sqlclosecheck  # Flags unclosed sql.Rows/Stmt/*DB resources. Verified 0
                     # findings repo-wide.
    - loggercheck    # Validates structured logr key-value pair arity/typing.
                     # Verified 0 findings repo-wide.
    - bodyclose      # Flags HTTP response bodies that may not be closed on
                     # all paths (Issue #1546 Tier 2). Real leak risk given
                     # heavy outbound HTTP usage (LLM APIs, Prometheus,
                     # AlertManager clients). Two verified false positives on
                     # generic gobreaker.NewCircuitBreaker[*http.Response]
                     # constructors carry scoped //nolint:bodyclose comments.
    - noctx          # Flags HTTP requests / DB calls / net.Listen / exec.Command
                     # missing context.Context propagation (Issue #1546 Tier 2).
                     # Production code (cmd/pkg/internal) and test/ helper
                     # libraries (test/infrastructure/, test/testutil/,
                     # test/services/) are held to this: they drive real Kind
                     # clusters/containers and a hung/uncancellable call there
                     # is a genuine CI-hygiene risk (leaked kubectl subprocesses,
                     # stalled E2E runs), not just a style nit. Only _test.go
                     # Ginkgo spec files are excluded below (see exclusions).
    - nilnil         # Flags functions returning (nil, nil) — classic source
                     # of downstream nil-pointer bugs (Issue #1546 Tier 2).
                     # Three verified, well-documented "not configured/not
                     # applicable" sentinel idioms (single- or well-guarded
                     # multi-caller, all correctly err-checked before nil-
                     # checked) carry scoped //nolint:nilnil comments; test
                     # doubles are excluded below.
    - wastedassign   # Flags dead assignments overwritten before use (Issue
                     # #1546 Tier 2). Verified 0 findings repo-wide.
    - unconvert      # Flags unnecessary type conversions (Issue #1546 Tier
                     # 2). 117 findings auto-remediated via `unconvert -apply`;
                     # generated ogen-client code is excluded implicitly (same
                     # as golangci-lint's default generated-file skip).
    - predeclared    # Flags parameters/variables shadowing Go builtins (max,
                     # min, new, close, copy, real, etc.) (Issue #1546 Tier 3).
                     # 24 findings remediated via mechanical rename (or, for
                     # locally-defined min()/max() helpers now redundant on
                     # Go 1.21+, removed in favor of the builtin).

  settings:
    govet:
      enable:
        - shadow  # Variable shadowing (100 Go Mistakes / AGENTS.md anti-pattern
                  # checklist). Verified 0 non-idiomatic findings as of
                  # GO-ANTIPATTERN-AUDIT-2026-07-01 follow-up; the benign `err`/`ok`
                  # re-declaration idiom remains excluded below.
    revive:
      rules:
        - name: argument-limit
          arguments: [7]  # AGENTS.md Go Anti-Pattern Checklist: 8+ params -> Options pattern
          severity: warning
    funlen:
      lines: 80
      statements: 60
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    nestif:
      min-complexity: 5
    maintidx:
      under: 20
    forbidigo:
      # ANTI-PATTERN DETECTION: Per TESTING_GUIDELINES.md and NT_TEST_ANTI_PATTERN_TRIAGE_DEC_17_2025.md
      forbid:
        # NULL-TESTING Anti-Pattern (Per TESTING_GUIDELINES.md)
        - pattern: '\bExpect\([^)]+\)\.ToNot\(BeNil\(\)\)'
          msg: "NULL-TESTING anti-pattern: Validate business outcomes, not just nil checks. See TESTING_GUIDELINES.md"
        - pattern: '\bExpect\([^)]+\)\.ToNot\(BeEmpty\(\)\)'
          msg: "NULL-TESTING anti-pattern: Validate specific values or counts, not just empty checks. See TESTING_GUIDELINES.md"
        - pattern: '\.ShouldNot\(BeEmpty\(\)\)'
          msg: "NULL-TESTING anti-pattern: Validate terminal states like NotificationPhaseSent/Failed, not just empty checks"
        - pattern: '\.ShouldNot\(BeNil\(\)\)'
          msg: "NULL-TESTING anti-pattern: Validate actual pointer values after checking non-nil"

        # Skip() Anti-Pattern (Per TESTING_GUIDELINES.md: Integration tests must Fail() when required infra unavailable)
        - pattern: '\bSkip\('
          msg: "Skip() forbidden in integration tests when required infrastructure unavailable (DD-AUDIT-003). Use Fail() instead."

        # time.Sleep() Anti-Pattern (Per TESTING_GUIDELINES.md v2.0.0: ABSOLUTELY FORBIDDEN)
        - pattern: 'time\.Sleep\('
          msg: "time.Sleep() ABSOLUTELY FORBIDDEN per TESTING_GUIDELINES.md v2.0.0. Use Eventually/Consistently for async validation."

  exclusions:
    rules:
      # Exclude test setup/teardown and infrastructure code from Close() checks
      - path: (_test\.go|test/)
        linters:
          - errcheck
        text: "Error return value of.*Close.*is not checked"
      # gosec: suppress specific rules in test code that flag expected test patterns
      # G101: hardcoded credentials (test fixtures for credential handling/sanitization)
      # G107: HTTP variable URL, G112: Slowloris (test servers), G115: int overflow
      # G201/G202/G204: SQL/subprocess with variable, G301/G302/G304/G306: file/dir perms
      # G402: TLS InsecureSkipVerify (test endpoints), G404: math/rand (not crypto)
      - path: "(^test/|_test\\.go)"
        linters:
          - gosec
        text: "G101|G1(07|12|15)|G20[124]|G30[1246]|G40[24]"
      # Dot imports are idiomatic for Ginkgo/Gomega BDD test framework
      - path: "^test/"
        linters:
          - staticcheck
        text: "ST1001"
      # SA1019: controller-runtime deprecated APIs (GetEventRecorderFor, result.Requeue)
      # require a coordinated migration to the new events API — tracked separately
      - linters:
          - staticcheck
        text: "SA1019"
      # G101: mount paths, config keys, constant names, and test fixture hashes are not credentials
      - linters:
          - gosec
        text: "G101"
        path: "(cmd/|internal/kubernautagent/|pkg/workflowexecution/|pkg/shared/|test/infrastructure/)"
      # G304: file paths from config loaders, credential resolvers, and TLS helpers
      - linters:
          - gosec
        text: "G304"
        path: "(cmd/|/config/|/config\\.go|credentials/|tls/|tls\\.go|resolver\\.go|signalmode\\.go)"
      # G306: test fixture files don't need 0600 permissions
      - path: _test\.go
        linters:
          - gosec
        text: "G306"
      # G115: safe integer conversions (len() to int32 for K8s API types)
      - linters:
          - gosec
        text: "G115"
        path: "(internal/|pkg/)"
      # G104: intentionally unhandled errors (already covered by errcheck linter)
      - linters:
          - gosec
        text: "G104"
      # G201/G202: SQL string formatting in DataStorage (uses parameterized queries internally)
      - linters:
          - gosec
        text: "G20[12]"
        path: "pkg/datastorage/"
      # G301/G306: notification file delivery uses appropriate permissions
      - linters:
          - gosec
        text: "G30[16]"
        path: "notification"
      # G401/G505: UUID v5 uses SHA1 per RFC 4122 spec
      - linters:
          - gosec
        text: "G40[15]|G505"
        path: "pkg/shared/uuid/"
      # G404: backoff jitter uses math/rand intentionally (not security-sensitive)
      - linters:
          - gosec
        text: "G404"
        path: "pkg/shared/backoff/"
      # govet shadow: the ~114 `if err := ...; err != nil` idiomatic re-declarations
      # reviewed and accepted in GO-ANTIPATTERN-AUDIT-2026-07-01 §8 (Variable
      # Shadowing) are excluded here. Only the benign `err`/`ok` re-declaration
      # pattern is excluded; shadowing of other identifiers still fails CI.
      - linters:
          - govet
        text: 'shadow: declaration of "(err|ok)" shadows declaration'
      # govet shadow: Ginkgo BDD suites idiomatically re-declare suite-scoped
      # variables (ctx, client, logger, recorder, etc.) inside BeforeEach/It
      # closures for readability. This is an accepted, pervasive pattern in
      # this codebase's ~2000 Ginkgo test files; shadowing still fails CI for
      # production (non-test) code.
      - path: (_test\.go|^test/)
        linters:
          - govet
        text: "shadow:"
      # prealloc/argument-limit: test setup code duplicates slices/params for
      # readability and isn't worth churn to pre-allocate or restructure.
      - path: (_test\.go|^test/)
        linters:
          - prealloc
          - revive
        text: "Consider preallocating|argument-limit"
      # funlen/gocyclo/gocognit/nestif/maintidx: per the plan behind Issue
      # #1532, these 5 complexity linters apply to production code only.
      # Ginkgo BDD test files/suites are long and branchy by nature (table-
      # driven DescribeTable entries, multi-scenario Context/When nesting)
      # and were never in scope for the remediation baseline.
      - path: (_test\.go|^test/)
        linters:
          - funlen
          - gocyclo
          - gocognit
          - nestif
          - maintidx
      # containedctx: test doubles that embed context.Context to satisfy an
      # interface (e.g. tool.Context, agent.ReadonlyContext fakes) are not the
      # long-lived-context anti-pattern this linter targets. Also covers
      # non-_test.go suite harnesses under test/ (e.g. Ginkgo Harness structs
      # populated in SynchronizedBeforeSuite and read by It() closures across
      # the whole suite lifetime) — same idiom as the govet-shadow/prealloc/
      # revive test exclusions above.
      - path: (_test\.go|^test/)
        linters:
          - containedctx
      # nilnil: test doubles/mocks legitimately return (nil, nil) to satisfy
      # an interface with "do nothing" behavior (e.g. a nop resolver used
      # only to test structural wiring, never exercised for data flow).
      # Production code sentinel idioms are handled with scoped //nolint
      # comments instead, so each one gets an explicit, reviewed justification.
      - path: (_test\.go|^test/)
        linters:
          - nilnil
      # noctx: only Ginkgo/Gomega *_test.go spec files are exempted — these are
      # almost always one-shot calls against an in-process httptest.Server,
      # already bounded by an http.Client.Timeout and the outer `go test
      # -timeout`. test/infrastructure/ and other non-_test.go helper
      # libraries are NOT exempted: they orchestrate real subprocesses
      # (kubectl/podman/kind) and real network calls (Kind pods, Postgres,
      # Keycloak, AWX) where an uncancellable hang can leak subprocesses or
      # stall CI for the full outer job timeout (Issue #1546 Tier 2).
      - path: _test\.go
        linters:
          - noctx

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

# Per TESTING_GUIDELINES.md v2.0.0: Enforce best practices with NO EXCEPTIONS
# - NULL-TESTING: Weak assertions (ToNot(BeNil), ToNot(BeEmpty)) - FORBIDDEN
# - Skip(): Forbidden for required infrastructure (DD-AUDIT-003) - FORBIDDEN
# - time.Sleep(): ABSOLUTELY FORBIDDEN per v2.0.0 - Use Eventually/Consistently
#
# NO EXCEPTIONS ALLOWED: All violations must be remediated per TESTING_GUIDELINES.md v2.0.0
