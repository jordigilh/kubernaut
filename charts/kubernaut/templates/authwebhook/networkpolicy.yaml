{{- if and .Values.networkPolicies.enabled .Values.networkPolicies.authwebhook.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
{{ include "kubernaut.np.metadata" (dict "root" $ "nameSuffix" "authwebhook" "appLabel" "authwebhook") }}
spec:
  podSelector:
    matchLabels:
      app: authwebhook
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- $peers := include "kubernaut.np.apiServerPeers" . }}
    {{- if $peers }}
    - ports:
        - port: 9443
          protocol: TCP
      from:
        {{- $peers | nindent 8 }}
    {{- end }}
  egress:
    {{- include "kubernaut.np.commonEgress" . | nindent 4 }}
    {{- include "kubernaut.np.datastorageEgress" . | nindent 4 }}
{{- end }}
