---
# Minimal Backend CRD for envtest.
# This is an external Envoy AI Gateway CRD; only the fields needed by
# registry.CRDWatcher and registry.ExtractClusterInfo are defined.
# The Backend CR name serves as the cluster ID and tool name prefix
# ({backendName}__{toolName}).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: backends.gateway.envoyproxy.io
spec:
  group: gateway.envoyproxy.io
  names:
    kind: Backend
    listKind: BackendList
    plural: backends
    singular: backend
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                endpoints:
                  type: array
                  items:
                    type: object
                    properties:
                      fqdn:
                        type: object
                        properties:
                          hostname:
                            type: string
                          port:
                            type: integer
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                endpoint:
                  type: string
                  description: Resolved MCP endpoint URL (set by the controller).
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
