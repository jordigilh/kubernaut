{{- if eq .Values.tls.mode "hook" }}
# Job 1: Generate TLS certificates (pre-install/pre-upgrade).
# Runs BEFORE chart resources so the authwebhook pod can mount the TLS secret.
# Embeds the CA cert as a ca.crt key in the Secret for the init-container
# and post-install caBundle patch job (#377).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubernaut.fullname" . }}-tls-cert-gen
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: tls-cert-gen
    spec:
      serviceAccountName: {{ include "kubernaut.fullname" . }}-hook-sa
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- include "kubernaut.scheduling" (dict "component" .Values.hooks "global" .Values.global) | nindent 6 }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Mi
      containers:
        - name: tls-cert-gen
          image: {{ .Values.hooks.tlsCerts.image }}
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          command:
            - /bin/sh
            - -c
            - |
              set -e
              NAMESPACE="{{ .Release.Namespace }}"
              SERVICE="authwebhook"

              RENEW=false
              if kubectl get secret authwebhook-tls -n "$NAMESPACE" >/dev/null 2>&1; then
                echo "authwebhook-tls secret already exists, checking expiry..."
                CERT_PEM=$(kubectl get secret authwebhook-tls -n "$NAMESPACE" -o jsonpath='{.data.tls\.crt}' | base64 -d)
                if printf '%s' "$CERT_PEM" | openssl x509 -checkend $((30*86400)) -noout 2>/dev/null; then
                  echo "  Certificate is valid for at least 30 more days."
                  CA_KEY=$(kubectl get secret authwebhook-tls -n "$NAMESPACE" -o jsonpath='{.data.ca\.crt}')
                  if [ -n "$CA_KEY" ]; then
                    echo "  ca.crt key present in Secret. Nothing to do."
                    exit 0
                  fi
                  echo "WARNING: ca.crt key missing from Secret. Forcing regeneration..."
                  RENEW=true
                  kubectl delete secret authwebhook-tls -n "$NAMESPACE" --ignore-not-found
                else
                  echo "  Certificate expires within 30 days (or is already expired). Regenerating..."
                  RENEW=true
                  kubectl delete secret authwebhook-tls -n "$NAMESPACE" --ignore-not-found
                fi
              fi

              TMPDIR=$(mktemp -d)

              echo "==> Generating TLS certificates for AuthWebhook"
              openssl genrsa -out "$TMPDIR/ca.key" 2048 2>/dev/null
              openssl req -new -x509 -days 365 -key "$TMPDIR/ca.key" \
                -out "$TMPDIR/ca.crt" -subj "/CN=authwebhook-ca" 2>/dev/null

              openssl genrsa -out "$TMPDIR/tls.key" 2048 2>/dev/null
              openssl req -new -key "$TMPDIR/tls.key" \
                -out "$TMPDIR/tls.csr" \
                -subj "/CN=${SERVICE}.${NAMESPACE}.svc" \
                -addext "subjectAltName=DNS:${SERVICE},DNS:${SERVICE}.${NAMESPACE},DNS:${SERVICE}.${NAMESPACE}.svc,DNS:${SERVICE}.${NAMESPACE}.svc.cluster.local" \
                2>/dev/null

              echo "subjectAltName=DNS:${SERVICE},DNS:${SERVICE}.${NAMESPACE},DNS:${SERVICE}.${NAMESPACE}.svc,DNS:${SERVICE}.${NAMESPACE}.svc.cluster.local" > "$TMPDIR/san.cnf"

              openssl x509 -req -in "$TMPDIR/tls.csr" \
                -CA "$TMPDIR/ca.crt" -CAkey "$TMPDIR/ca.key" -CAcreateserial \
                -out "$TMPDIR/tls.crt" -days 365 \
                -extfile "$TMPDIR/san.cnf" \
                2>/dev/null

              echo "  Storing TLS secret (with embedded CA)..."
              kubectl delete secret authwebhook-tls -n "$NAMESPACE" --ignore-not-found
              kubectl create secret tls authwebhook-tls \
                --cert="$TMPDIR/tls.crt" \
                --key="$TMPDIR/tls.key" \
                -n "$NAMESPACE"

              CA_B64=$(base64 < "$TMPDIR/ca.crt" | tr -d '\n')
              kubectl patch secret authwebhook-tls -n "$NAMESPACE" \
                -p "{\"data\":{\"ca.crt\":\"$CA_B64\"}}"

              echo "  Verifying ca.crt key in Secret..."
              kubectl get secret authwebhook-tls -n "$NAMESPACE" \
                -o jsonpath='{.data.ca\.crt}' | base64 -d | head -1

              rm -rf "$TMPDIR"
              echo "==> TLS certificates generated and CA embedded in Secret"
---
# Job 2: Patch webhook configurations with caBundle (post-install/post-upgrade).
# Runs AFTER chart resources so the webhook configurations exist when we patch them.
# Reads the CA cert from the ca.crt key embedded in the authwebhook-tls Secret.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubernaut.fullname" . }}-tls-cabundle-patch
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: tls-cabundle-patch
    spec:
      serviceAccountName: {{ include "kubernaut.fullname" . }}-hook-sa
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- include "kubernaut.scheduling" (dict "component" .Values.hooks "global" .Values.global) | nindent 6 }}
      containers:
        - name: tls-cabundle-patch
          image: {{ .Values.hooks.tlsCerts.image }}
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          command:
            - /bin/sh
            - -c
            - |
              set -e
              NAMESPACE="{{ .Release.Namespace }}"

              echo "==> Patching webhook configurations with CA bundle..."

              CA_B64=$(kubectl get secret authwebhook-tls -n "$NAMESPACE" -o jsonpath='{.data.ca\.crt}')
              if [ -z "$CA_B64" ]; then
                echo "ERROR: ca.crt key not found in authwebhook-tls Secret."
                echo "  Delete the secret and re-run helm upgrade to regenerate."
                exit 1
              fi

              CA_BUNDLE=$(printf '%s' "$CA_B64")

              patch_webhooks() {
                KIND="$1"   # mutatingwebhookconfigurations or validatingwebhookconfigurations
                NAME="$2"
                COUNT=$(kubectl get "$KIND" "$NAME" -o jsonpath='{.webhooks}' | tr ',' '\n' | grep -c '"name"')
                PATCH="["
                i=0
                while [ "$i" -lt "$COUNT" ]; do
                  [ "$i" -gt 0 ] && PATCH="${PATCH},"
                  PATCH="${PATCH}{\"op\":\"add\",\"path\":\"/webhooks/${i}/clientConfig/caBundle\",\"value\":\"${CA_BUNDLE}\"}"
                  i=$((i + 1))
                done
                PATCH="${PATCH}]"
                echo "  Patching $NAME ($COUNT webhooks)..."
                kubectl patch "$KIND" "$NAME" --type='json' -p "$PATCH"
              }

              patch_webhooks mutatingwebhookconfigurations authwebhook-mutating
              patch_webhooks validatingwebhookconfigurations authwebhook-validating

              echo "==> Webhook CA bundle patching complete"
{{- end }}
---
# Shared RBAC for all Helm hooks (TLS cert jobs + migration job).
# Uses both pre- and post- phases so the SA exists across all hook jobs.
# Only cleaned up on next install/upgrade (before-hook-creation), not on success.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubernaut.fullname" . }}-hook-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,post-install,post-upgrade,post-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubernaut.fullname" . }}-hook-role
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,post-install,post-upgrade,post-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "create", "update", "patch", "delete"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubernaut.fullname" . }}-hook-rolebinding
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,post-install,post-upgrade,post-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubernaut.fullname" . }}-hook-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kubernaut.fullname" . }}-hook-sa
    namespace: {{ .Release.Namespace }}
{{- if eq .Values.tls.mode "hook" }}
---
# Job 3: Clean up hook-created resources on uninstall (post-delete).
# Removes authwebhook-tls Secret that is created by kubectl (not tracked
# by Helm) and would otherwise be orphaned.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubernaut.fullname" . }}-tls-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: tls-cleanup
    spec:
      serviceAccountName: {{ include "kubernaut.fullname" . }}-hook-sa
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tls-cleanup
          image: {{ .Values.hooks.tlsCerts.image }}
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command:
            - /bin/sh
            - -c
            - |
              set -e
              NAMESPACE="{{ .Release.Namespace }}"
              echo "==> Cleaning up hook-created TLS resources..."
              kubectl delete secret authwebhook-tls -n "$NAMESPACE" --ignore-not-found
              echo "==> Cleanup complete"
{{- end }}
