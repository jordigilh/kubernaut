    <text x="106" y="204" font-weight="600" fill="#0F766E">User intent parsing</text>
    <text x="106" y="222" fill="#475569" font-size="11">Understanding "what's going on" means "investigate"</text>

    <rect x="64" y="244" width="372" height="48" rx="8" fill="#F0FDFA"/>
    <rect x="72" y="256" width="24" height="24" rx="6" fill="#0D9488" opacity="0.12"/>
    <text x="84" y="273" text-anchor="middle" font-size="11" font-weight="700" fill="#0D9488">FMT</text>
    <text x="106" y="262" font-weight="600" fill="#0F766E">Result formatting</text>
    <text x="106" y="280" fill="#475569" font-size="11">Render findings, options, and progress in your style</text>

