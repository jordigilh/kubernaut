name: Release

# Triggered by version tag push (e.g., v1.0.0, v1.1.0-rc0)
# Builds multi-arch images (amd64 + arm64) for all 13 services in parallel,
# runs Helm smoke tests against the amd64 images, scans all images for CVEs
# (Trivy) and generates SBOMs (CycloneDX), signs images with Cosign (keyless),
# generates SLSA build provenance, publishes Helm chart to OCI registry,
# and creates a GitHub Release gated on smoke test + security scan success.
# Pre-release tags (-rc*, -alpha*, -beta*) create a pre-release and skip :latest tagging.
#
# Prerequisites:
#   - Quay.io robot account with Creator role in kubernaut-ai org
#   - GitHub Actions secrets: QUAY_ROBOT_USERNAME, QUAY_ROBOT_TOKEN
#
# Authority: Issue #257 (sub-issue of #80), Issue #569, Issue #1315, Issue #1319
# Business Requirement: BR-PLATFORM-RELEASE-001
# FedRAMP Controls: SA-12 (Supply Chain), RA-5 (Vulnerability Scanning),
#                   CM-14 (Signed Components), AU-3 (Audit Content)

on:
  push:
    tags: ['v*']


# Least-privilege default for every job. All image push/pull in this workflow
# goes to Quay.io via QUAY_ROBOT_* secrets, not GITHUB_TOKEN, so no job needs
# a `packages` scope. Only sign-and-attest (Cosign OIDC + SLSA provenance) and
# release (gh release create/upload) need elevated GITHUB_TOKEN scopes; they
# declare their own job-level `permissions:` below, which fully replaces
# (not merges with) this default for that job.
permissions:
  contents: read

env:
  IMAGE_REGISTRY: quay.io/kubernaut-ai

jobs:
  # ========================================
  # STAGE 0: PREPARE
  # Extract version metadata and generate code once.
  # Outputs are consumed by all downstream jobs.
  # ========================================

  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      build_date: ${{ steps.version.outputs.build_date }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

          if [[ "$VERSION" =~ -(rc|alpha|beta) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "Pre-release: $TAG (version: $VERSION)"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "Release: $TAG (version: $VERSION)"
          fi

  # ========================================
  # STAGE 1a: BUILD & PUSH amd64 IMAGES
  # 14 parallel jobs: one per service, amd64 only.
  # Helm smoke tests depend on this stage completing (Issue #569).
  #
  # Services (14):
  #   Go (13): gateway, signalprocessing, aianalysis, authwebhook,
  #            remediationorchestrator, workflowexecution, notification,
  #            datastorage, effectivenessmonitor, db-migrate, kubernautagent,
  #            apifrontend, fleetmetadatacache
  #   Bash (1): must-gather
  #
  # Strategy:
  #   - Go services: CGO_ENABLED=0 cross-compile via GOARCH (native speed)
  #   - Makefile image-build-% targets handle service-to-Dockerfile mapping
  # ========================================

  build-amd64:
    name: "${{ matrix.service }} (amd64)"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - signalprocessing
          - aianalysis
          - authwebhook
          - remediationorchestrator
          - workflowexecution
          - notification
          - datastorage
          - effectivenessmonitor
          - kubernautagent
          - apifrontend
          - fleetmetadatacache
          - must-gather
          - db-migrate
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
          cache: true

      - name: Generate code
        run: |
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Build image
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
          IMAGE_ARCH: amd64
          IMAGE_TARGET: production
          CONTAINER_TOOL: podman
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
        run: |
          echo "Building ${{ matrix.service }} for amd64..."
          make image-build-${{ matrix.service }}

      - name: Push image
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          IMAGE="${IMAGE_REGISTRY}/${{ matrix.service }}:${IMAGE_TAG}-amd64"
          echo "Pushing ${IMAGE}..."
          podman push "${IMAGE}"

  # ========================================
  # STAGE 1b: BUILD & PUSH arm64 IMAGES (Go services)
  # 11 parallel jobs: one per Go service, arm64 via host-native cross-compile.
  # No QEMU needed — CGO_ENABLED=0 GOARCH=arm64 runs natively on amd64.
  # Runtime images use FROM scratch with pre-built binary.
  #
  # Strategy:
  #   - Host cross-compile: go build with GOARCH=arm64 (native speed, ~25s)
  #   - Runtime image: scratch + certs from amd64 ubi-minimal (no QEMU, ~5s)
  # ========================================

  build-arm64:
    name: "${{ matrix.service }} (arm64)"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - signalprocessing
          - aianalysis
          - authwebhook
          - remediationorchestrator
          - workflowexecution
          - notification
          - datastorage
          - effectivenessmonitor
          - kubernautagent
          - apifrontend
          - fleetmetadatacache
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
          cache: true

      - name: Generate code
        run: |
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Cross-compile binary (native, no QEMU)
        env:
          IMAGE_ARCH: arm64
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
        run: |
          echo "Cross-compiling ${{ matrix.service }} for arm64 (native)..."
          START=$(date +%s)
          make cross-build-${{ matrix.service }}
          END=$(date +%s)
          echo "Binary built in $(($END - $START))s"
          ls -lh bin/*-arm64

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Build runtime image (no QEMU)
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
          IMAGE_ARCH: arm64
          CONTAINER_TOOL: podman
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
        run: |
          echo "Building runtime image ${{ matrix.service }} (arm64, no QEMU)..."
          START=$(date +%s)
          make image-runtime-${{ matrix.service }}
          END=$(date +%s)
          echo "Image built in $(($END - $START))s"

      - name: Push image
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          IMAGE="${IMAGE_REGISTRY}/${{ matrix.service }}:${IMAGE_TAG}-arm64"
          echo "Pushing ${IMAGE}..."
          podman push "${IMAGE}"

  # ========================================
  # STAGE 1c: BUILD & PUSH arm64 IMAGES (non-Go services)
  # must-gather (Bash) and db-migrate (downloads goose binary) still need QEMU
  # for package installation in their respective base images.
  # ========================================

  build-arm64-qemu:
    name: "${{ matrix.service }} (arm64, QEMU)"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        service:
          - must-gather
          - db-migrate
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
          cache: true

      - name: Generate code
        run: |
          export PATH="${{ github.workspace }}/bin:$PATH"
          make generate

      - name: Install QEMU for arm64 emulation
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          if [ -f /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo "QEMU aarch64 registered successfully"
          else
            echo "::warning::QEMU aarch64 not registered in binfmt_misc"
          fi

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Build image
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
          IMAGE_ARCH: arm64
          IMAGE_TARGET: production
          CONTAINER_TOOL: podman
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          GIT_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
        run: |
          echo "::group::arm64 QEMU build for ${{ matrix.service }}"
          echo "Building ${{ matrix.service }} for arm64 (QEMU emulated)..."
          echo "Start: $(date -u '+%H:%M:%S UTC')"

          # Background heartbeat: prints elapsed time every 60s
          (
            LOOP_START=$SECONDS
            while true; do
              sleep 60
              ELAPSED=$(( (SECONDS - LOOP_START) / 60 ))
              BUILD_PID=$(pgrep -f "podman build" || echo "none")
              QEMU_PROCS=$(pgrep -c qemu-aarch64 2>/dev/null || echo "0")
              echo "[heartbeat +${ELAPSED}m] podman_pid=${BUILD_PID} qemu_procs=${QEMU_PROCS}"
            done
          ) &
          HEARTBEAT_PID=$!

          make image-build-${{ matrix.service }}
          BUILD_EXIT=$?

          kill $HEARTBEAT_PID 2>/dev/null || true
          echo "Finished: $(date -u '+%H:%M:%S UTC') (exit: $BUILD_EXIT)"
          echo "::endgroup::"
          exit $BUILD_EXIT

      - name: Push image
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          IMAGE="${IMAGE_REGISTRY}/${{ matrix.service }}:${IMAGE_TAG}-arm64"
          echo "Pushing ${IMAGE}..."
          podman push "${IMAGE}"

  # ========================================
  # STAGE 1d: SECURITY SCAN (amd64)
  # Runs Trivy CVE scan and generates CycloneDX SBOM for each amd64 image.
  # Gates the GitHub Release — any CRITICAL/HIGH unfixed CVE blocks release.
  # Authority: Issue #1315 | FedRAMP RA-5, SA-12
  # ========================================

  security-scan-amd64:
    name: "Security Scan ${{ matrix.service }} (amd64)"
    needs: [prepare, build-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - signalprocessing
          - aianalysis
          - authwebhook
          - remediationorchestrator
          - workflowexecution
          - notification
          - datastorage
          - effectivenessmonitor
          - kubernautagent
          - apifrontend
          - fleetmetadatacache
          - must-gather
          - db-migrate
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Scan for CVEs (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:${{ needs.prepare.outputs.version }}-amd64
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.72.0
          # DD-PLATFORM-003: time-bound exceptions for must-gather's kubectl CVEs
          # with no fix available yet in any published kubectl release.
          trivyignores: ${{ matrix.service == 'must-gather' && 'cmd/must-gather/.trivyignore' || '' }}

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:${{ needs.prepare.outputs.version }}-amd64
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}-amd64.cdx.json
          artifact-name: sbom-${{ matrix.service }}-amd64

  # ========================================
  # STAGE 1e: SECURITY SCAN (arm64)
  # Same as 1d but for arm64 images. Depends on both arm64 build stages.
  # Authority: Issue #1315 | FedRAMP RA-5, SA-12
  # ========================================

  security-scan-arm64:
    name: "Security Scan ${{ matrix.service }} (arm64)"
    needs: [prepare, build-arm64, build-arm64-qemu]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - signalprocessing
          - aianalysis
          - authwebhook
          - remediationorchestrator
          - workflowexecution
          - notification
          - datastorage
          - effectivenessmonitor
          - kubernautagent
          - apifrontend
          - fleetmetadatacache
          - must-gather
          - db-migrate
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Scan for CVEs (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:${{ needs.prepare.outputs.version }}-arm64
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.72.0
          # DD-PLATFORM-003: time-bound exceptions for must-gather's kubectl CVEs
          # with no fix available yet in any published kubectl release.
          trivyignores: ${{ matrix.service == 'must-gather' && 'cmd/must-gather/.trivyignore' || '' }}

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:${{ needs.prepare.outputs.version }}-arm64
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}-arm64.cdx.json
          artifact-name: sbom-${{ matrix.service }}-arm64

  # ========================================
  # STAGE 2: HELM SMOKE TESTS (Issue #569)
  # Depends ONLY on build-amd64. Runs as soon as amd64 images are in Quay.
  # arm64 builds continue in parallel and do NOT block this stage.
  #
  # Pulls amd64 images from Quay into a Kind cluster and runs the full
  # smoke test suite. Gates the GitHub Release — a failing smoke test
  # prevents the release from being published.
  #
  # Uses the same script and pattern as ci-pipeline.yml's helm-smoke-test
  # job, adapted for Quay (public registry, no pull secret needed).
  # ========================================

  helm-smoke-test:
    name: Helm Smoke Tests (Kind, tls=${{ matrix.tls_mode }})
    needs: [prepare, build-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # #334 + DD-PLATFORM-001: release gate must cover cert-manager mode
        # too, not just the hook-mode default.
        tls_mode: [hook, cert-manager]
    env:
      KIND_EXPERIMENTAL_PROVIDER: podman
      KIND_CLUSTER_NAME: helm-smoke-release-${{ matrix.tls_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
          cache: true

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman --version

      - name: Install Kind
        run: |
          KIND_VERSION="v0.32.0"
          curl -Lo ./kind "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: latest

      - name: Create Kind cluster
        run: |
          kind create cluster --name "$KIND_CLUSTER_NAME" --wait 120s
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Pull amd64 images from Quay and load into Kind
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          for svc in gateway signalprocessing aianalysis authwebhook \
                     remediationorchestrator workflowexecution notification \
                     datastorage effectivenessmonitor kubernautagent \
                     apifrontend must-gather db-migrate; do
            IMAGE="${IMAGE_REGISTRY}/${svc}:${IMAGE_TAG}-amd64"
            echo "Pulling ${IMAGE}..."
            podman pull "${IMAGE}"
            echo "Loading into Kind..."
            podman save "${IMAGE}" | kind load image-archive /dev/stdin --name "$KIND_CLUSTER_NAME"
          done

      - name: Install cert-manager
        if: matrix.tls_mode == 'cert-manager'
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.20.3/cert-manager.yaml
          kubectl wait --for=condition=Available --timeout=120s deployment --all -n cert-manager
          kubectl apply -f deploy/cert-manager/selfsigned-issuer.yaml
          kubectl wait --for=condition=Ready --timeout=60s clusterissuer/selfsigned-issuer

      - name: Run smoke tests
        run: |
          scripts/helm-smoke-test.sh \
            --platform kind \
            --image-tag "${{ needs.prepare.outputs.version }}-amd64" \
            --chart-path charts/kubernaut/ \
            --tls-mode "${{ matrix.tls_mode }}"

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -A --no-headers 2>/dev/null || true
          echo "=== Events ==="
          kubectl get events -n kubernaut-system --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true
          echo "=== Describe failing pods ==="
          kubectl get pods -n kubernaut-system --no-headers 2>/dev/null \
            | grep -v Running \
            | awk '{print $1}' \
            | xargs -r -I {} kubectl describe pod {} -n kubernaut-system 2>/dev/null || true
          echo "=== Kind logs ==="
          kind export logs /tmp/kind-smoke-logs --name "$KIND_CLUSTER_NAME" 2>/dev/null || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: helm-smoke-diagnostics-${{ matrix.tls_mode }}-${{ github.run_id }}
          path: /tmp/kind-smoke-logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup Kind cluster
        if: always()
        run: |
          kind delete cluster --name "$KIND_CLUSTER_NAME" 2>/dev/null || true

      - name: Cleanup Podman
        if: always()
        run: |
          podman system prune -a -f 2>/dev/null || true

  # ========================================
  # STAGE 3: MULTI-ARCH MANIFESTS
  # After both arch builds AND helm smoke tests complete, create manifest
  # lists so a single tag (e.g., 1.0.0) resolves to the correct arch
  # automatically. Also tags every image as :latest for GA releases.
  # ========================================

  create-manifests:
    name: Create Multi-Arch Manifests
    needs: [prepare, build-amd64, build-arm64, build-arm64-qemu, helm-smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Login to Quay.io
        run: |
          podman login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Create and push multi-arch manifests
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
          CONTAINER_TOOL: podman
        run: |
          echo "Creating multi-arch manifests (amd64 + arm64)..."
          make image-manifest

      - name: Tag images as latest
        if: needs.prepare.outputs.is_prerelease == 'false'
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.version }}
        run: |
          for svc in datastorage gateway aianalysis authwebhook notification \
                     remediationorchestrator signalprocessing workflowexecution \
                     effectivenessmonitor kubernautagent apifrontend \
                     fleetmetadatacache must-gather db-migrate; do
            echo "  Tagging $svc:latest..."
            podman manifest rm ${IMAGE_REGISTRY}/$svc:latest 2>/dev/null || true
            podman manifest create ${IMAGE_REGISTRY}/$svc:latest \
              ${IMAGE_REGISTRY}/$svc:${IMAGE_TAG}-amd64 \
              ${IMAGE_REGISTRY}/$svc:${IMAGE_TAG}-arm64
            podman manifest push ${IMAGE_REGISTRY}/$svc:latest \
              docker://${IMAGE_REGISTRY}/$svc:latest
          done
          echo "All images tagged as latest"

  # ========================================
  # STAGE 3b: COSIGN SIGNING & SLSA ATTESTATION
  # Signs all arch-tagged images and manifest lists with Cosign (keyless),
  # then generates SLSA v1.0 build provenance for each manifest list.
  # Authority: Issue #1315, #1319 | FedRAMP CM-14, AU-3, SA-12
  # ========================================

  sign-and-attest:
    name: "Sign & Attest ${{ matrix.service }}"
    needs: [prepare, create-manifests, security-scan-amd64, security-scan-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write       # Cosign keyless signing + SLSA provenance via GitHub OIDC
      attestations: write   # SLSA build provenance attestation
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - signalprocessing
          - aianalysis
          - authwebhook
          - remediationorchestrator
          - workflowexecution
          - notification
          - datastorage
          - effectivenessmonitor
          - kubernautagent
          - apifrontend
          - fleetmetadatacache
          - must-gather
          - db-migrate
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to Quay.io (Cosign)
        run: |
          cosign login -u "${{ secrets.QUAY_ROBOT_USERNAME }}" \
                       -p "${{ secrets.QUAY_ROBOT_TOKEN }}" \
                       quay.io

      - name: Resolve image digests
        id: digests
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          SVC="${{ matrix.service }}"

          AMD64_DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://${IMAGE_REGISTRY}/${SVC}:${VERSION}-amd64")
          ARM64_DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://${IMAGE_REGISTRY}/${SVC}:${VERSION}-arm64")
          MANIFEST_DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://${IMAGE_REGISTRY}/${SVC}:${VERSION}")

          echo "amd64=${AMD64_DIGEST}" >> $GITHUB_OUTPUT
          echo "arm64=${ARM64_DIGEST}" >> $GITHUB_OUTPUT
          echo "manifest=${MANIFEST_DIGEST}" >> $GITHUB_OUTPUT

          echo "Digests for ${SVC}:"
          echo "  amd64:    ${AMD64_DIGEST}"
          echo "  arm64:    ${ARM64_DIGEST}"
          echo "  manifest: ${MANIFEST_DIGEST}"

      - name: Cosign sign images (keyless)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          SVC: ${{ matrix.service }}
        run: |
          echo "Signing ${{ matrix.service }} images (keyless, GitHub OIDC)..."

          cosign sign --yes "${IMAGE_REGISTRY}/${SVC}@${{ steps.digests.outputs.amd64 }}"
          echo "  Signed ${SVC} amd64"

          cosign sign --yes "${IMAGE_REGISTRY}/${SVC}@${{ steps.digests.outputs.arm64 }}"
          echo "  Signed ${SVC} arm64"

          cosign sign --yes "${IMAGE_REGISTRY}/${SVC}@${{ steps.digests.outputs.manifest }}"
          echo "  Signed ${SVC} manifest list"

      - name: SLSA build provenance attestation
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}
          subject-digest: ${{ steps.digests.outputs.manifest }}
          push-to-registry: true

      - name: Stage provenance bundle for release upload
        # Scorecard's Signed-Releases check looks for signature/provenance files
        # attached directly to GitHub Release assets — registry-level attestation
        # (push-to-registry above) isn't visible to it. Renaming and uploading the
        # bundle as an artifact here lets the release job attach it alongside SBOMs.
        run: |
          cp "${{ steps.attest.outputs.bundle-path }}" \
             "provenance-${{ matrix.service }}.sigstore.json"

      - name: Upload provenance bundle artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: provenance-${{ matrix.service }}
          path: provenance-${{ matrix.service }}.sigstore.json
          retention-days: 1

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sbom-${{ matrix.service }}-*
          path: sboms/
          merge-multiple: true

      - name: Cosign attest SBOM (amd64)
        run: |
          cosign attest --yes \
            --predicate "sboms/sbom-${{ matrix.service }}-amd64.cdx.json" \
            --type cyclonedx \
            "${IMAGE_REGISTRY}/${{ matrix.service }}@${{ steps.digests.outputs.amd64 }}"
          echo "  Attested ${{ matrix.service }} amd64 SBOM"

      - name: Cosign attest SBOM (arm64)
        run: |
          cosign attest --yes \
            --predicate "sboms/sbom-${{ matrix.service }}-arm64.cdx.json" \
            --type cyclonedx \
            "${IMAGE_REGISTRY}/${{ matrix.service }}@${{ steps.digests.outputs.arm64 }}"
          echo "  Attested ${{ matrix.service }} arm64 SBOM"

  # ========================================
  # STAGE 4: HELM CHART PUBLISH
  # Gated on all image builds AND helm smoke tests (Issue #569).
  # Packages the Helm chart with the release version and pushes
  # to the OCI registry at oci://quay.io/kubernaut-ai/charts
  #
  # Users install with:
  #   helm install kubernaut oci://quay.io/kubernaut-ai/charts/kubernaut --version <version>
  # ========================================

  helm-publish:
    name: Publish Helm Chart
    needs: [prepare, build-amd64, build-arm64, build-arm64-qemu, helm-smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Update Chart.yaml with release version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          CHART_VERSION=$(cat CHART_VERSION)
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" charts/kubernaut/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/kubernaut/Chart.yaml

          echo "Updated Chart.yaml (chart=${CHART_VERSION}, app=${VERSION}):"
          head -6 charts/kubernaut/Chart.yaml

      - name: Login to Quay.io OCI registry
        run: |
          echo "${{ secrets.QUAY_ROBOT_TOKEN }}" | helm registry login quay.io \
            -u "${{ secrets.QUAY_ROBOT_USERNAME }}" --password-stdin

      - name: Package and push Helm chart
        run: |
          CHART_VERSION=$(cat CHART_VERSION)
          helm package charts/kubernaut/
          helm push kubernaut-${CHART_VERSION}.tgz oci://quay.io/kubernaut-ai/charts
          echo "Helm chart published: oci://quay.io/kubernaut-ai/charts/kubernaut:${CHART_VERSION}"

  # ========================================
  # STAGE 6: GITHUB RELEASE
  # Creates a GitHub Release with auto-generated release notes.
  # Gated on smoke tests, manifests, security scans, signing,
  # AND Helm publish.
  # Downloads SBOMs from security scan jobs and attaches them
  # to the release for customer consumption.
  # Authority: Issue #569, #1315 | FedRAMP SA-12
  # ========================================

  release:
    name: Create GitHub Release
    needs: [prepare, helm-smoke-test, create-manifests, helm-publish, security-scan-amd64, security-scan-arm64, sign-and-attest]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # Required for gh release create/upload
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Download all SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sbom-*
          path: sboms/
          merge-multiple: true

      - name: Download all provenance bundle artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: provenance-*
          path: provenance/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          if gh release view "${TAG}" &>/dev/null; then
            echo "Release ${TAG} already exists — skipping creation."
          else
            PRERELEASE_FLAG=""
            if [ "$IS_PRERELEASE" = "true" ]; then
              PRERELEASE_FLAG="--prerelease"
            fi

            gh release create "${TAG}" \
              --title "Kubernaut ${TAG}" \
              --generate-notes \
              ${PRERELEASE_FLAG} \
              --notes-start-tag "$(git tag --sort=-creatordate | grep '^v' | sed -n '2p')" || \
            gh release create "${TAG}" \
              --title "Kubernaut ${TAG}" \
              --generate-notes \
              ${PRERELEASE_FLAG}

            echo ""
            echo "Release created: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          fi

          echo ""
          echo "Install with:"
          echo "  helm install kubernaut oci://quay.io/kubernaut-ai/charts/kubernaut --version ${VERSION}"

      - name: Attach SBOMs to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          echo "Attaching SBOMs to release ${TAG}..."
          SBOM_COUNT=0
          for sbom in sboms/*.cdx.json; do
            if [ -f "$sbom" ]; then
              echo "  Uploading $(basename "$sbom")..."
              gh release upload "${TAG}" "$sbom" --clobber
              SBOM_COUNT=$((SBOM_COUNT + 1))
            fi
          done
          echo "Attached ${SBOM_COUNT} SBOMs to release ${TAG}"

      - name: Attach SLSA provenance bundles to release
        # Authority: OpenSSF Scorecard "Signed-Releases" check — requires
        # signature/provenance files attached to the release itself, not just
        # pushed to the image registry (see sign-and-attest job).
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          echo "Attaching SLSA provenance bundles to release ${TAG}..."
          PROVENANCE_COUNT=0
          for bundle in provenance/*.sigstore.json; do
            if [ -f "$bundle" ]; then
              echo "  Uploading $(basename "$bundle")..."
              gh release upload "${TAG}" "$bundle" --clobber
              PROVENANCE_COUNT=$((PROVENANCE_COUNT + 1))
            fi
          done
          echo "Attached ${PROVENANCE_COUNT} provenance bundles to release ${TAG}"
