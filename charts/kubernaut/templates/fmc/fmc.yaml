{{- if .Values.fmc.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fmc-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fmc
    app.kubernetes.io/component: fleet-metadata-cache
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  FMC_MCP_GATEWAY_ENDPOINT: {{ .Values.fmc.mcpGatewayEndpoint | quote }}
  FMC_VALKEY_ADDR: {{ .Values.fmc.valkeyAddr | quote }}
  FMC_NAMESPACE: {{ .Values.fmc.namespace | quote }}
  FMC_SYNC_INTERVAL: {{ .Values.fmc.syncInterval | quote }}
  FMC_KEY_TTL: {{ .Values.fmc.keyTTL | quote }}
  FMC_API_ADDR: ":8080"
  FMC_METRICS_ADDR: ":8081"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fmc
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fmc
    app.kubernetes.io/component: fleet-metadata-cache
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.fmc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: fmc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fmc
        app.kubernetes.io/component: fleet-metadata-cache
    spec:
      serviceAccountName: fmc
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fmc
          image: "{{ .Values.fmc.image.repository }}:{{ .Values.fmc.image.tag }}"
          imagePullPolicy: {{ .Values.fmc.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: fmc-config
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: api
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.fmc.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: fmc-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fmc
    app.kubernetes.io/component: fleet-metadata-cache
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fmc
  ports:
    - name: api
      port: 8080
      targetPort: api
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: metrics
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fmc
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fmc
    app.kubernetes.io/component: fleet-metadata-cache
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fmc
  labels:
    app.kubernetes.io/name: fmc
rules:
  - apiGroups: ["gateway.envoyproxy.io"]
    resources: ["backends"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["aigateway.envoyproxy.io"]
    resources: ["mcproutes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fmc
  labels:
    app.kubernetes.io/name: fmc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fmc
subjects:
  - kind: ServiceAccount
    name: fmc
    namespace: {{ .Release.Namespace }}
{{- end }}
