# Issue #353: Test YAML override for NoActionRequiredDelayHours.
# Validates that the YAML tag noActionRequiredDelayHours is correctly mapped.
controller:
  metricsAddr: ":9090"
  healthProbeAddr: ":8081"
  leaderElection: false
  leaderElectionId: "remediationorchestrator.kubernaut.ai"

timeouts:
  global: 1h
  processing: 5m
  analyzing: 10m
  executing: 30m
  awaitingApproval: 15m
  verifying: 30m

datastorage:
  url: "http://data-storage-service:8080"
  timeout: 10s
  buffer:
    bufferSize: 10000
    batchSize: 100
    flushInterval: 1s
    maxRetries: 3

effectivenessAssessment:
  stabilizationWindow: 5m

routing:
  noActionRequiredDelayHours: 48
  consecutiveFailureThreshold: 3
  consecutiveFailureCooldown: 1h
  recentlyRemediatedCooldown: 5m
  exponentialBackoffBase: 1m
  exponentialBackoffMax: 10m
  exponentialBackoffMaxExponent: 4
  scopeBackoffBase: 5s
  scopeBackoffMax: 5m
  ineffectiveChainThreshold: 3
  recurrenceCountThreshold: 5
  ineffectiveTimeWindow: 4h
