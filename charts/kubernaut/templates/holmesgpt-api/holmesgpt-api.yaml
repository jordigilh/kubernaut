---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: holmesgpt-api-sa
  namespace: {{ .Release.Namespace }}
  labels:
    app: holmesgpt-api
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: holmesgpt-api-investigator
  labels:
    app: holmesgpt-api
    component: investigation
    {{- include "kubernaut.labels" . | nindent 4 }}
  # NOTE: This ClusterRole uses an explicit resource enumeration rather than
  # cluster-reader. Rules for API groups whose CRDs are not installed are
  # silently ignored by Kubernetes (no extra privileges are granted).
  # If HAPI reports "permission restrictions" during investigation, check
  # whether the target resource's API group is listed here and add it if not.
rules:
  # ── Core Kubernetes ──────────────────────────────────────────────────────
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - services
      - endpoints
      - configmaps
      - secrets
      - nodes
      - namespaces
      - replicationcontrollers
      - persistentvolumeclaims
      - resourcequotas
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  # ── cert-manager ─────────────────────────────────────────────────────────
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "clusterissuers", "certificaterequests"]
    verbs: ["get", "list", "watch"]
  # ── ArgoCD ───────────────────────────────────────────────────────────────
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  # ── Linkerd ──────────────────────────────────────────────────────────────
  - apiGroups: ["policy.linkerd.io"]
    resources: ["servers", "authorizationpolicies", "meshtlsauthentications"]
    verbs: ["get", "list", "watch"]
  # ── Istio ───────────────────────────────────────────────────────────────
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies", "peerauthentications", "requestauthentications"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "destinationrules", "gateways", "serviceentries"]
    verbs: ["get", "list", "watch"]
  # ── Prometheus Operator ──────────────────────────────────────────────────
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheusrules", "servicemonitors", "podmonitors", "probes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: holmesgpt-api-investigator-binding
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: holmesgpt-api-investigator
subjects:
  - kind: ServiceAccount
    name: holmesgpt-api-sa
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: holmesgpt-api-auth-middleware
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: data-storage-auth-middleware
subjects:
  - kind: ServiceAccount
    name: holmesgpt-api-sa
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: holmesgpt-api-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: holmesgpt-api
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  config.yaml: |
    logging:
      level: "INFO"
    data_storage:
      url: "{{ include "kubernaut.datastorage.url" . }}"
{{- if include "kubernaut.hapi.tlsEnabled" . }}
    tls:
      ca_file: "{{ include "kubernaut.hapi.tlsCaDir" . }}/{{ include "kubernaut.hapi.tlsCaKey" . }}"
{{- end }}
    audit:
      flush_interval_seconds: 0.1
      buffer_size: 10000
      batch_size: 50
{{- if and .Values.holmesgptApi.prometheus.ocpMonitoringRbac (not (and .Values.holmesgptApi.prometheus.tls .Values.holmesgptApi.prometheus.tls.caConfigMapName)) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: holmesgpt-api-service-ca
  namespace: {{ .Release.Namespace }}
  labels:
    app: holmesgpt-api
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
data: {}
{{- end }}
{{- if not .Values.holmesgptApi.existingSdkConfigMap }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: holmesgpt-sdk-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: holmesgpt-api
    component: sdk-config
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  sdk-config.yaml: |
{{- if .Values.holmesgptApi.sdkConfigContent }}
{{ .Values.holmesgptApi.sdkConfigContent | indent 4 }}
{{- else if and .Values.holmesgptApi.llm.provider .Values.holmesgptApi.llm.model }}
    llm:
      provider: {{ .Values.holmesgptApi.llm.provider | quote }}
      model: {{ .Values.holmesgptApi.llm.model | quote }}
      max_retries: 3
      timeout_seconds: 120
      temperature: 0.7
{{- if and .Values.holmesgptApi.prometheus.enabled .Values.holmesgptApi.prometheus.url }}
    toolsets:
      prometheus/metrics:
        enabled: true
        config:
          prometheus_url: {{ .Values.holmesgptApi.prometheus.url | quote }}
{{- else }}
    toolsets: {}
{{- end }}
    mcp_servers: {}
{{- else }}
{{- fail "LLM configuration required. Choose one:\n  1) --set holmesgptApi.llm.provider=openai --set holmesgptApi.llm.model=gpt-4o  (quickstart)\n  2) --set-file holmesgptApi.sdkConfigContent=sdk-config.yaml  (full config)\n  3) --set holmesgptApi.existingSdkConfigMap=my-configmap  (pre-existing)" }}
{{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: holmesgpt-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: holmesgpt-api
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.holmesgptApi.replicas }}
  selector:
    matchLabels:
      app: holmesgpt-api
  template:
    metadata:
      labels:
        app: holmesgpt-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: holmesgpt-api-sa
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.holmesgptApi | nindent 8 }}
      {{- include "kubernaut.affinity" .Values.holmesgptApi | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.holmesgptApi "global" .Values.global) | nindent 6 }}
      containers:
        - name: holmesgpt-api
          image: {{ include "kubernaut.image" (dict "service" "holmesgpt-api" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.holmesgptApi | nindent 12 }}
          ports:
            - containerPort: 8080
          {{- if and .Values.holmesgptApi.prometheus.enabled .Values.holmesgptApi.prometheus.ocpMonitoringRbac }}
          env:
            - name: IS_OPENSHIFT
              value: "True"
          {{- end }}
          args:
            - "-config"
            - "/etc/holmesgpt/config.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/holmesgpt
              readOnly: true
            - name: sdk-config
              mountPath: /etc/holmesgpt/sdk
              readOnly: true
            - name: llm-credentials-file
              mountPath: /etc/holmesgpt/credentials
              readOnly: true
            {{- if include "kubernaut.hapi.tlsEnabled" . }}
            - name: service-ca
              mountPath: {{ include "kubernaut.hapi.tlsCaDir" . }}
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml (.Values.holmesgptApi.resources | default dict) | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: holmesgpt-api-config
        - name: sdk-config
          configMap:
            name: {{ .Values.holmesgptApi.existingSdkConfigMap | default "holmesgpt-sdk-config" }}
        - name: llm-credentials-file
          secret:
            secretName: {{ .Values.holmesgptApi.llm.credentialsSecretName }}
            optional: true
        {{- if include "kubernaut.hapi.tlsEnabled" . }}
        - name: service-ca
          configMap:
            name: {{ include "kubernaut.hapi.tlsCaConfigMapName" . }}
        - name: tmp
          emptyDir:
            sizeLimit: 1Mi
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: holmesgpt-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: holmesgpt-api
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  type: {{ .Values.holmesgptApi.service.type }}
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: holmesgpt-api
{{- if and .Values.holmesgptApi.prometheus.enabled .Values.holmesgptApi.prometheus.ocpMonitoringRbac }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: holmesgpt-api-monitoring-view
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: holmesgpt-api-sa
    namespace: {{ .Release.Namespace }}
{{- end }}
