server:
  port: 8080
  host: "0.0.0.0"
  maxBatchSize: 500    # Issue #667: Max events per batch API request (default: 500)
  readTimeout: "30s"
  writeTimeout: "30s"
  # #1048 Phase 4 / SC-5: Maximum request body size in bytes (default: 5242880 = 5 MiB)
  # Clamped to [1048576, 52428800] (1–50 MiB). Plain integer only.
  maxBodySize: "5242880"
  # #1048 Phase 4 / AC-4: CORS allowed origins (default: ["*"])
  corsAllowedOrigins:
    - "*"

logging:
  level: "info"

database:
  host: "localhost"
  port: 5432
  name: "action_history"
  user: "slm_user"
  password: "slm_password_dev"
  sslMode: "disable"
  maxOpenConns: 25
  maxIdleConns: 5
  connMaxLifetime: "5m"
  connMaxIdleTime: "10m"
  statementTimeout: "30s"    # Issue #667/M1: PG-level statement timeout (default: 30s)
  lockTimeout: "10s"         # Issue #667/M1: PG-level lock wait timeout (default: 10s)

redis:
  addr: "localhost:6379"
  # DD-009: Redis used for Dead Letter Queue (DLQ) fallback
  # when PostgreSQL is unavailable
  dlqMaxLen: 10000
