{{/*
BR-PLATFORM-006 (Kubernaut Operator parity, chart-only enhancement — the Operator
has no NetworkPolicy for Console). Follows the same default-deny + explicit-allow
convention as every other component in the chart.
*/}}
{{- if and .Values.networkPolicies.enabled .Values.networkPolicies.console.enabled .Values.console.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubernaut.fullname" . }}-console
  namespace: {{ .Release.Namespace }}
  labels:
    app: console
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: console
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Same-namespace callers (port-forward, testing).
    - ports:
        - port: 4180
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
    {{- range .Values.networkPolicies.console.ingressNamespaces }}
    # External ingress-controller namespace (user-configured).
    - ports:
        - port: 4180
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
    {{- end }}
  egress:
    {{- include "kubernaut.np.dnsEgress" . | nindent 4 }}
    - ports:
        - port: {{ .Values.apifrontend.config.server.httpPort | default 8443 }}
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app: apifrontend
    # OIDC token exchange / JWKS discovery may be outside the cluster.
    - ports:
        - port: 443
          protocol: TCP
{{- end }}
