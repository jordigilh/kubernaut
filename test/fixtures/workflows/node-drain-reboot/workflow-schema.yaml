apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: node-drain-reboot-v1
spec:
  # Node Drain and Reboot Workflow Schema (BR-WORKFLOW-004)
  # Used by: AIAnalysis E2E, HolmesGPT-API E2E
  version: "1.0.0"
  description:
    what: "Drains and reboots a node that is in NotReady state"
    whenToUse: "When a node becomes NotReady and requires a reboot to recover"
    whenNotToUse: "When the node issue is caused by network partitioning"
    preconditions: "Node exists and is accessible via kubectl"
  
  actionType: DrainNode
  
  labels:
    severity: [critical]
    environment: [production, staging, test]
    component: [v1/Node]
    priority: P0
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/tekton-bundles/hello-world:v1.0.0@sha256:a663ba9ddf8a074025723a4fbbef5542f520deb4e5eaf9814e07775456ecd7e0
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: NODE_NAME
      type: string
      required: true
      description: "Name of the node to drain and reboot"
    - name: DRAIN_TIMEOUT_SECONDS
      type: integer
      required: false
      description: "Timeout for drain operation in seconds"
      default: 120
      minimum: 30
      maximum: 600
