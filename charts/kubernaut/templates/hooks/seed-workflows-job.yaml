apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubernaut.fullname" . }}-seed-workflows
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: seed-workflows
    spec:
      serviceAccountName: {{ include "kubernaut.fullname" . }}-hook-sa
      restartPolicy: Never
      {{- include "kubernaut.scheduling" (dict "component" .Values.hooks "global" .Values.global) | nindent 6 }}
      initContainers:
        - name: wait-for-authwebhook
          image: {{ .Values.hooks.seedWorkflows.image }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for AuthWebhook to become ready..."
              until kubectl get endpoints auth-webhook-service -n {{ .Release.Namespace }} -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null | grep -q .; do
                echo "  AuthWebhook not ready, retrying in 3s..."
                sleep 3
              done
              echo "AuthWebhook is ready."
      containers:
        - name: seed
          image: {{ .Values.hooks.seedWorkflows.image }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "==> Seeding workflow catalog via RemediationWorkflow CRDs"
              echo "    Applying manifests from /workflows/ ..."

              APPLIED=0
              SKIPPED=0
              for f in /workflows/*.yaml; do
                NAME=$(basename "$f" .yaml)
                echo -n "  Applying: ${NAME}..."
                if kubectl apply -f "$f" -n {{ .Release.Namespace }} 2>&1; then
                  APPLIED=$((APPLIED + 1))
                  echo " OK"
                else
                  SKIPPED=$((SKIPPED + 1))
                  echo " SKIPPED (already exists or error)"
                fi
              done

              echo ""
              echo "==> Workflow seeding complete (applied: ${APPLIED}, skipped: ${SKIPPED})"
          volumeMounts:
            - name: workflow-manifests
              mountPath: /workflows
              readOnly: true
      volumes:
        - name: workflow-manifests
          configMap:
            name: {{ include "kubernaut.fullname" . }}-seed-workflows
