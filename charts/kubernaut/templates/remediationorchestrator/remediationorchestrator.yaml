{{- $remediationorchestratorFleetPreamble := include "kubernaut.fleet.preamble" (dict "root" $ "fleet" .Values.remediationorchestrator.fleet "oauth2" .Values.remediationorchestrator.fleet.oauth2) | fromYaml }}
{{- if .Values.global.fleet.enabled }}
{{- if not $remediationorchestratorFleetPreamble.config.mcpGatewayEndpoint }}
{{- fail "remediationorchestrator.fleet.mcpGatewayEndpoint is required when global.fleet.enabled=true (set it directly, or set global.fleet.mcpGatewayEndpoint if shared across services)" }}
{{- end }}
{{- if .Values.remediationorchestrator.fleet.oauth2.enabled }}
{{- if not $remediationorchestratorFleetPreamble.oauth2.tokenURL }}
{{- fail "remediationorchestrator.fleet.oauth2.tokenURL is required when remediationorchestrator.fleet.oauth2.enabled=true (set it directly, or set global.fleet.oauth2.tokenURL if shared across services)" }}
{{- end }}
{{- if not $remediationorchestratorFleetPreamble.oauth2.credentialsSecretRef }}
{{- fail "remediationorchestrator.fleet.oauth2.credentialsSecretRef is required when remediationorchestrator.fleet.oauth2.enabled=true (Secret must contain keys: client-id, client-secret; set it directly, or set global.fleet.oauth2.credentialsSecretRef if shared across services)" }}
{{- end }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: remediationorchestrator-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: remediationorchestrator
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  remediationorchestrator.yaml: |
    logging:
      level: {{ .Values.remediationorchestrator.logging.level | default "INFO" | quote }}
    controller:
      metricsAddr: ":9090"
      healthProbeAddr: ":8081"
      leaderElection: false
      leaderElectionId: "remediationorchestrator.kubernaut.ai"
    timeouts:
      global: {{ .Values.remediationorchestrator.config.timeouts.global | default "1h" | quote }}
      processing: {{ .Values.remediationorchestrator.config.timeouts.processing | default "5m" | quote }}
      analyzing: {{ .Values.remediationorchestrator.config.timeouts.analyzing | default "10m" | quote }}
      executing: {{ .Values.remediationorchestrator.config.timeouts.executing | default "30m" | quote }}
      verifying: {{ .Values.remediationorchestrator.config.timeouts.verifying | default "30m" | quote }}
    datastorage:
      url: "{{ include "kubernaut.datastorage.url" . }}"
      timeout: "10s"
      buffer:
        bufferSize: 30000
        batchSize: 1000
        flushInterval: "1s"
        maxRetries: 3
    effectivenessAssessment:
      stabilizationWindow: {{ .Values.remediationorchestrator.config.effectivenessAssessment.stabilizationWindow | default "5m" | quote }}
    asyncPropagation:
      gitOpsSyncDelay: {{ .Values.remediationorchestrator.config.asyncPropagation.gitOpsSyncDelay | default "3m" | quote }}
      operatorReconcileDelay: {{ .Values.remediationorchestrator.config.asyncPropagation.operatorReconcileDelay | default "1m" | quote }}
      proactiveAlertDelay: {{ .Values.remediationorchestrator.config.asyncPropagation.proactiveAlertDelay | default "5m" | quote }}
    notifications:
      notifySelfResolved: {{ ((.Values.remediationorchestrator.config.notifications).notifySelfResolved) | default false }}
    routing:
      consecutiveFailureThreshold: {{ .Values.remediationorchestrator.config.routing.consecutiveFailureThreshold | default 3 }}
      consecutiveFailureCooldown: {{ .Values.remediationorchestrator.config.routing.consecutiveFailureCooldown | default "1h" | quote }}
      recentlyRemediatedCooldown: {{ .Values.remediationorchestrator.config.routing.recentlyRemediatedCooldown | default "5m" | quote }}
      exponentialBackoffBase: "1m"
      exponentialBackoffMax: "10m"
      exponentialBackoffMaxExponent: 4
      scopeBackoffBase: "5s"
      scopeBackoffMax: "5m"
      noActionRequiredDelayHours: 24
      ineffectiveChainThreshold: {{ .Values.remediationorchestrator.config.routing.ineffectiveChainThreshold | default 3 }}
      recurrenceCountThreshold: {{ .Values.remediationorchestrator.config.routing.recurrenceCountThreshold | default 5 }}
      ineffectiveTimeWindow: {{ .Values.remediationorchestrator.config.routing.ineffectiveTimeWindow | default "4h" | quote }}
    retention:
      period: {{ .Values.remediationorchestrator.config.retention.period | default "24h" | quote }}
    {{- if .Values.global.fleet.enabled }}
    fleet:
      enabled: true
      {{- if .Values.remediationorchestrator.fleet.backend }}
      backend: {{ .Values.remediationorchestrator.fleet.backend | quote }}
      {{- end }}
      {{- if .Values.remediationorchestrator.fleet.endpoint }}
      endpoint: {{ .Values.remediationorchestrator.fleet.endpoint | quote }}
      {{- else if eq (default "fleetmetadatacache" .Values.remediationorchestrator.fleet.backend) "fleetmetadatacache" }}
      endpoint: {{ include "kubernaut.fleetmetadatacache.url" . | quote }}
      {{- end }}
      mcpGatewayEndpoint: {{ $remediationorchestratorFleetPreamble.config.mcpGatewayEndpoint | quote }}
      {{- if $remediationorchestratorFleetPreamble.config.mcpGatewayType }}
      mcpGatewayType: {{ $remediationorchestratorFleetPreamble.config.mcpGatewayType | quote }}
      {{- end }}
      tlsCAFile: {{ $remediationorchestratorFleetPreamble.config.tlsCAFile | default (include "kubernaut.interServiceTLS.caFile" .) | quote }}
      {{/* ACM bearer-token wiring (BR-PLATFORM-003, Issue #1589). FleetConfig.TokenPath
           consumes this (Issue #1556) and Validate() hard-requires it when backend=acm. */}}
      {{- if .Values.remediationorchestrator.fleet.tokenSecretRef }}
      tokenPath: "/etc/remediationorchestrator/{{ .Values.remediationorchestrator.fleet.tokenSecretRef }}/token"
      {{- end }}
      {{- if .Values.remediationorchestrator.fleet.oauth2.enabled }}
      oauth2:
        enabled: true
        tokenURL: {{ $remediationorchestratorFleetPreamble.oauth2.tokenURL | quote }}
        credentialsSecretRef: {{ $remediationorchestratorFleetPreamble.oauth2.credentialsSecretRef | quote }}
        {{- if $remediationorchestratorFleetPreamble.oauth2.scopes }}
        scopes:
          {{- range $remediationorchestratorFleetPreamble.oauth2.scopes }}
          - {{ . | quote }}
          {{- end }}
        {{- end }}
        tlsCAFile: {{ $remediationorchestratorFleetPreamble.oauth2.tlsCAFile | default (include "kubernaut.interServiceTLS.caFile" .) | quote }}
      {{- end }}
    {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: remediationorchestrator-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: remediationorchestrator-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: remediationorchestrator-controller
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests", "remediationapprovalrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests/status", "remediationapprovalrequests/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests/finalizers"]
    verbs: ["update"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["signalprocessings"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["signalprocessings/status"]
    verbs: ["get"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["aianalyses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["aianalyses/status"]
    verbs: ["get"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["workflowexecutions"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["workflowexecutions/status"]
    verbs: ["get"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["notificationrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["notificationrequests/status"]
    verbs: ["get"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["effectivenessassessments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["effectivenessassessments/status"]
    verbs: ["get"]
  # Issue #643: Resolve workflow UUID to human-readable CRD name for display
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationworkflows"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # BR-ORCH-025: Distributed locking via coordination.k8s.io Leases
  # controller-runtime leader election requires list+watch for reflector cache sync (#687)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "namespaces", "persistentvolumes", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  # ── Istio (#373) ────────────────────────────────────────────────────────
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies", "peerauthentications", "requestauthentications"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "destinationrules", "gateways", "serviceentries"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: remediationorchestrator-controller
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: remediationorchestrator-controller
subjects:
  - kind: ServiceAccount
    name: remediationorchestrator-controller
    namespace: {{ .Release.Namespace }}
---
# Issue #545: Bind to built-in view ClusterRole for broad read access to CRDs
# (cert-manager, Istio, etc.) needed for pre-remediation hash capture (DD-EM-002).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: remediationorchestrator-view
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: remediationorchestrator-controller
    namespace: {{ .Release.Namespace }}
---
# Role: namespace-scoped access to configmaps and secrets (#229)
{{ include "kubernaut.nsRoleForSecrets" (dict "name" "remediationorchestrator" "serviceAccount" "remediationorchestrator-controller" "Release" .Release "labels" (include "kubernaut.labels" .)) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediationorchestrator-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: remediationorchestrator-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.remediationorchestrator.replicas }}
  selector:
    matchLabels:
      app: remediationorchestrator-controller
  template:
    metadata:
      labels:
        app: remediationorchestrator-controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: remediationorchestrator-controller
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.remediationorchestrator | nindent 8 }}
      {{- include "kubernaut.affinity" (dict "component" .Values.remediationorchestrator "matchLabels" (dict "app" "remediationorchestrator-controller")) | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.remediationorchestrator "global" .Values.global) | nindent 6 }}
      containers:
        - name: remediationorchestrator-controller
          image: {{ include "kubernaut.image" (dict "service" "remediationorchestrator" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.remediationorchestrator | nindent 12 }}
          args:
            - "--config=/etc/config/remediationorchestrator.yaml"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KUBERNAUT_CONTROLLER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TLS_CA_FILE
              value: {{ include "kubernaut.interServiceTLS.caFile" . | quote }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: config
              mountPath: /etc/config
              readOnly: true
            {{- include "kubernaut.tlsCaVolumeMount" . | nindent 12 }}
            {{- if and .Values.global.fleet.enabled .Values.remediationorchestrator.fleet.oauth2.enabled }}
            - name: oauth2-credentials
              mountPath: "/etc/remediationorchestrator/{{ $remediationorchestratorFleetPreamble.oauth2.credentialsSecretRef }}"
              readOnly: true
            {{- end }}
            {{- if and .Values.global.fleet.enabled .Values.remediationorchestrator.fleet.tokenSecretRef }}
            - name: fleet-acm-token
              mountPath: "/etc/remediationorchestrator/{{ .Values.remediationorchestrator.fleet.tokenSecretRef }}"
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.remediationorchestrator.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: remediationorchestrator-config
        {{- include "kubernaut.tlsCaVolume" . | nindent 8 }}
        {{- if and .Values.global.fleet.enabled .Values.remediationorchestrator.fleet.oauth2.enabled }}
        - name: oauth2-credentials
          secret:
            secretName: {{ $remediationorchestratorFleetPreamble.oauth2.credentialsSecretRef }}
        {{- end }}
        {{- if and .Values.global.fleet.enabled .Values.remediationorchestrator.fleet.tokenSecretRef }}
        - name: fleet-acm-token
          secret:
            secretName: {{ .Values.remediationorchestrator.fleet.tokenSecretRef }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: remediationorchestrator-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: remediationorchestrator-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: remediationorchestrator-controller
