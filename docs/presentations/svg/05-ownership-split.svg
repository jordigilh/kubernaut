    <rect x="72" y="430" width="24" height="24" rx="6" fill="#0D9488" opacity="0.12"/>
    <text x="84" y="447" text-anchor="middle" font-size="10" font-weight="700" fill="#0D9488">POL</text>
    <text x="106" y="436" font-weight="600" fill="#0F766E">Policy overlay</text>
    <text x="106" y="454" fill="#475569" font-size="11">Additional approval rules, organizational policies</text>
