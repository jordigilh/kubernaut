apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: security-gate-test-v1
spec:
  # Security Gate Test Workflow Schema (BR-WORKFLOW-004)
  # Used by: DataStorage E2E — 04_workflow_discovery_test.go (DD-HAPI-017)
  # This workflow tests context-filter security gate (mismatched labels → 404)
  version: "1.0.0"
  description:
    what: "Test workflow for security gate context filter validation"
    whenToUse: "For E2E testing of context-based access control on workflow retrieval"
    whenNotToUse: "Not intended for production use"
    preconditions: "DataStorage service running"
  
  actionType: ScaleReplicas
  
  labels:
    severity: [critical]
    environment: [production]
    component: pod
    priority: P0
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:9771eca86cd5b39ac22c9490a5e7e0420abe6b4576e927326edfac1ecc7e5980
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: NAMESPACE
      type: string
      required: true
      description: "Target namespace"
    - name: REPLICA_COUNT
      type: integer
      required: false
      description: "Target replica count"
      default: 3
