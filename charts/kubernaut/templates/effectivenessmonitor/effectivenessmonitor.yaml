---
apiVersion: v1
kind: ConfigMap
metadata:
  name: effectivenessmonitor-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: effectivenessmonitor
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  effectivenessmonitor.yaml: |
    assessment:
      stabilizationWindow: {{ .Values.effectivenessmonitor.config.assessment.stabilizationWindow | default "30s" }}
      validityWindow: {{ .Values.effectivenessmonitor.config.assessment.validityWindow | default "300s" }}
    datastorage:
      url: {{ include "kubernaut.datastorage.url" . }}
      timeout: 10s
      buffer:
        bufferSize: 100
        batchSize: 10
        flushInterval: 1s
        maxRetries: 3
    controller:
      metricsAddr: ":9090"
      healthProbeAddr: ":8081"
      leaderElection: false
      leaderElectionId: "effectivenessmonitor.kubernaut.ai"
    external:
      prometheusUrl: {{ .Values.effectivenessmonitor.external.prometheusUrl | default "http://kube-prometheus-stack-prometheus.monitoring.svc:9090" }}
      prometheusEnabled: {{ if hasKey .Values.effectivenessmonitor.external "prometheusEnabled" }}{{ .Values.effectivenessmonitor.external.prometheusEnabled }}{{ else }}true{{ end }}
      alertManagerUrl: {{ .Values.effectivenessmonitor.external.alertManagerUrl | default "http://kube-prometheus-stack-alertmanager.monitoring.svc:9093" }}
      alertManagerEnabled: {{ if hasKey .Values.effectivenessmonitor.external "alertManagerEnabled" }}{{ .Values.effectivenessmonitor.external.alertManagerEnabled }}{{ else }}true{{ end }}
      connectionTimeout: 10s
      {{- if .Values.effectivenessmonitor.external.tlsCaFile }}
      tlsCaFile: {{ .Values.effectivenessmonitor.external.tlsCaFile }}
      {{- end }}
{{- if .Values.effectivenessmonitor.external.tlsCaFile }}
---
# Issue #452: OCP service-serving CA injection.
# On OCP, the service CA operator populates this ConfigMap with the
# service-serving signer CA under the key "service-ca.crt".
apiVersion: v1
kind: ConfigMap
metadata:
  name: effectivenessmonitor-service-ca
  namespace: {{ .Release.Namespace }}
  labels:
    app: effectivenessmonitor
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
data: {}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: effectivenessmonitor-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: effectivenessmonitor-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: effectivenessmonitor-controller
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["effectivenessassessments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["effectivenessassessments/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "persistentvolumeclaims", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  # ── Istio (#373) ────────────────────────────────────────────────────────
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies", "peerauthentications", "requestauthentications"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "destinationrules", "gateways", "serviceentries"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: effectivenessmonitor-controller
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: effectivenessmonitor-controller
subjects:
  - kind: ServiceAccount
    name: effectivenessmonitor-controller
    namespace: {{ .Release.Namespace }}
---
# Issue #545: Bind to built-in view ClusterRole for broad read access to CRDs
# (cert-manager, Istio, etc.) needed for post-remediation hash capture (DD-EM-002).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: effectivenessmonitor-view
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: effectivenessmonitor-controller
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: effectivenessmonitor-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: effectivenessmonitor-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.effectivenessmonitor.replicas }}
  selector:
    matchLabels:
      app: effectivenessmonitor-controller
  template:
    metadata:
      labels:
        app: effectivenessmonitor-controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: effectivenessmonitor-controller
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.effectivenessmonitor | nindent 8 }}
      {{- include "kubernaut.affinity" .Values.effectivenessmonitor | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.effectivenessmonitor "global" .Values.global) | nindent 6 }}
      {{- if .Values.effectivenessmonitor.external.tlsCaFile }}
      initContainers:
        - name: wait-for-service-ca
          image: {{ .Values.effectivenessmonitor.initImage | default "registry.access.redhat.com/ubi10/ubi-minimal:latest" }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for service-ca.crt to be populated..."
              while [ ! -s /etc/ssl/em/service-ca.crt ]; do
                echo "  service-ca.crt not yet populated, retrying in 2s..."
                sleep 2
              done
              echo "service-ca.crt is available ($(wc -c < /etc/ssl/em/service-ca.crt) bytes)"
          volumeMounts:
            - name: service-ca
              mountPath: /etc/ssl/em
              readOnly: true
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.effectivenessmonitor | nindent 12 }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      {{- end }}
      containers:
        - name: controller
          image: {{ include "kubernaut.image" (dict "service" "effectivenessmonitor" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.effectivenessmonitor | nindent 12 }}
          args:
            - "--config=/etc/effectivenessmonitor/effectivenessmonitor.yaml"
          ports:
            - containerPort: 9090
              name: metrics
            - containerPort: 8081
              name: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/effectivenessmonitor
            {{- if .Values.effectivenessmonitor.external.tlsCaFile }}
            - name: service-ca
              mountPath: /etc/ssl/em
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.effectivenessmonitor.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: effectivenessmonitor-config
        {{- if .Values.effectivenessmonitor.external.tlsCaFile }}
        - name: service-ca
          configMap:
            name: effectivenessmonitor-service-ca
        {{- end }}
{{- if .Values.effectivenessmonitor.external.ocpMonitoringRbac }}
---
# Issue #452: OCP monitoring RBAC — Prometheus metrics.
# Grants the EM service account read access to cluster monitoring on OCP.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: effectivenessmonitor-monitoring-view
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: effectivenessmonitor-controller
    namespace: {{ .Release.Namespace }}
{{- if .Values.effectivenessmonitor.external.alertManagerEnabled }}
---
# Issue #576: OCP AlertManager API access via kube-rbac-proxy.
# On OCP, AlertManager sits behind kube-rbac-proxy which performs
# SubjectAccessReview on resource-level permissions — nonResourceURLs
# are not evaluated by the proxy. This ClusterRole grants the
# resource-level permission that kube-rbac-proxy checks.
# On Kind/vanilla K8s (ocpMonitoringRbac=false), this block is not rendered.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernaut-alertmanager-view
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["alertmanagers/api"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: effectivenessmonitor-alertmanager-view
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernaut-alertmanager-view
subjects:
  - kind: ServiceAccount
    name: effectivenessmonitor-controller
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: effectivenessmonitor-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: effectivenessmonitor-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
  selector:
    app: effectivenessmonitor-controller
