{{- if .Values.apifrontend.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apifrontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apifrontend
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["investigationsessions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["investigationsessions/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationapprovalrequests"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationapprovalrequests/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "create", "patch"]
  - apiGroups: [""]
    resources: ["pods", "replicationcontrollers"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["aianalyses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: apifrontend
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: apifrontend
subjects:
  - kind: ServiceAccount
    name: apifrontend
    namespace: {{ .Release.Namespace }}
---
# RoleBinding granting AF SA access to KA service (trusted intermediary, #1287)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: apifrontend-kubernaut-agent-access
  namespace: {{ .Release.Namespace }}
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernaut-agent-client
subjects:
  - kind: ServiceAccount
    name: apifrontend
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apifrontend-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      port: {{ .Values.apifrontend.config.server.httpPort | default 8443 }}
      metricsPort: {{ .Values.apifrontend.config.server.metricsPort | default 9090 }}
      healthPort: {{ .Values.apifrontend.config.server.healthPort | default 8081 }}
    agent:
      kaBaseURL: "http://kubernaut-agent.{{ .Release.Namespace }}.svc:8080"
      dsBearerTokenFile: "/var/run/secrets/kubernetes.io/serviceaccount/token"
    session:
      namespace: {{ .Release.Namespace }}
      disconnectTTL: {{ .Values.apifrontend.config.session.disconnectTTL | default "10m" }}
      retentionTTL: {{ .Values.apifrontend.config.session.retentionTTL | default "720h" }}
    severityTriage:
      cacheTTLSeconds: {{ .Values.apifrontend.config.severityTriage.cacheTTLSeconds | default 30 }}
      llmConfidence: {{ .Values.apifrontend.config.severityTriage.llmConfidence | default 0.7 }}
    auth:
      kubernetesAuthEnabled: {{ .Values.apifrontend.config.auth.kubernetesAuthEnabled | default false }}
      {{- with .Values.apifrontend.config.auth.issuerURL }}
      issuerURL: {{ . | quote }}
      {{- end }}
      {{- with .Values.apifrontend.config.auth.audience }}
      audience: {{ . | quote }}
      {{- end }}
    rbac:
      sarCacheTTL: {{ .Values.apifrontend.config.rbac.sarCacheTTL | default "30s" }}
    logging:
      level: {{ .Values.apifrontend.logging.level | default "INFO" }}
      format: json
---
# Per-persona ClusterRoles for SAR-based tool authorization.
# The AF performs SubjectAccessReview checks against verb=use, group=kubernaut.ai,
# resource=tools, name=<toolName>. Bind these ClusterRoles to OIDC groups via
# ClusterRoleBindings to grant tool access per persona.
{{- range $persona, $tools := .Values.apifrontend.config.rbac.personas }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernaut-tool-{{ $persona }}
  labels:
    app.kubernetes.io/part-of: kubernaut
    kubernaut.ai/component: tool-authorization
    {{- include "kubernaut.labels" $ | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["tools"]
    verbs: ["use"]
    resourceNames:
      {{- range $tools }}
      - {{ . }}
      {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apifrontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apifrontend.replicas | default 1 }}
  selector:
    matchLabels:
      app: apifrontend
  template:
    metadata:
      labels:
        app: apifrontend
    spec:
      serviceAccountName: apifrontend
      automountServiceAccountToken: true
      containers:
        - name: apifrontend
          image: {{ include "kubernaut.image" (dict "service" "apifrontend" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: https
              containerPort: {{ .Values.apifrontend.config.server.httpPort | default 8443 }}
            - name: metrics
              containerPort: {{ .Values.apifrontend.config.server.metricsPort | default 9090 }}
            - name: health
              containerPort: {{ .Values.apifrontend.config.server.healthPort | default 8081 }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config
              mountPath: /etc/apifrontend
              readOnly: true
            - name: tls-certs
              mountPath: /etc/apifrontend/tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.apifrontend.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: apifrontend-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: tls-certs
          secret:
            secretName: apifrontend-tls
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: apifrontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  ports:
    - name: https
      port: {{ .Values.apifrontend.config.server.httpPort | default 8443 }}
      targetPort: https
    - name: metrics
      port: 9090
      targetPort: metrics
    - name: health
      port: 8081
      targetPort: health
  selector:
    app: apifrontend
{{- end }}
