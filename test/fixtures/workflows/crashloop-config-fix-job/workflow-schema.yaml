apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: crashloop-config-fix-v1
spec:
  # CrashLoop Config Fix Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Used by: FullPipeline + Fleet E2E (execution.engine: job)
  # Issue #1542: real fix (patches the offending ConfigMap key, then restarts
  # the deployment) instead of a no-op simulation.
  version: "1.0.0"
  description:
    what: "Patches the offending ConfigMap key back to a known-good value and restarts the deployment to recover from CrashLoopBackOff caused by configuration issues"
    whenToUse: "When pods are in CrashLoopBackOff due to misconfiguration"
    whenNotToUse: "When crash is caused by a persistent code bug"
    preconditions: "Pod is managed by a Deployment; offending value lives in a ConfigMap"
  
  actionType: RestartDeployment
  
  labels:
    severity: [high, warning]
    environment: [production, staging, test]
    component: ["*"]
    priority: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/crashloop-config-fix-job:v1.0.0-exec@sha256:aac1f1ea1b845c33cbd825482380646e4d7f78271cb1816e7d2c1d3263402621
    # DD-WE-005 v2.0: Pre-created SA with cross-namespace RBAC so remediate.sh
    # can kubectl get/patch Deployments and ConfigMaps in any namespace.
    serviceAccountName: workflow-job-executor
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected from root_owner)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected from root_owner)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected from root_owner)"
    - name: CONFIGMAP_NAME
      type: string
      required: true
      description: "Name of the ConfigMap containing the offending key"
    - name: CONFIGMAP_KEY
      type: string
      required: true
      description: "ConfigMap key to correct"
    - name: CONFIGMAP_VALUE
      type: string
      required: true
      description: "Known-good value to set for CONFIGMAP_KEY"
    - name: GRACE_PERIOD_SECONDS
      type: integer
      required: false
      description: "Graceful shutdown period in seconds"
      default: 30
      minimum: 0
      maximum: 300
