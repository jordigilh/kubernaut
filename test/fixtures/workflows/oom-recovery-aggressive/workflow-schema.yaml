apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: oom-recovery-aggressive-v1
spec:
  # Aggressive OOM Recovery Workflow (BR-WORKFLOW-004)
  # Used by: KA Custom Tools IT — cursor-based pagination (IT-KA-688-401)
  version: "1.0.0"
  description:
    what: "Aggressively increases memory limits for critical OOM events"
    whenToUse: "When aggressive memory recovery is needed for critical OOM"
    whenNotToUse: "When OOM is caused by a memory leak requiring code fix"
    preconditions: "Pod is managed by a Deployment or StatefulSet"
  
  actionType: IncreaseMemoryLimits
  
  labels:
    severity: [critical]
    environment: [production, staging]
    component: ["*"]
    priority: "*"
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/tekton-bundles/hello-world:v1.0.0@sha256:c4fc636f28d46f94c3f4a211f4dc07f60545891818ee45262e860b0825296ba0
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: MEMORY_LIMIT_NEW
      type: string
      required: true
      description: "New memory limit to apply (e.g., 128Mi, 256Mi, 1Gi)"
