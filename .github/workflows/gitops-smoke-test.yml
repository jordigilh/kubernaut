name: GitOps Smoke Test (ArgoCD)

# Repeatable, scripted validation that charts/kubernaut/ deploys correctly
# through a real ArgoCD Application -- not just `helm install`. This is item 4
# from issue #1617's original findings: the manual Kind+ArgoCD spike that
# found and confirmed the #334 / DD-PLATFORM-001 fixes (and the CRD-ConfigMap
# ServerSideApply requirement) was valuable but not automated. This workflow
# makes it repeatable.
#
# Scheduled (not per-PR) because it is heavier and more failure-prone than the
# plain helm-install smoke test in ci-pipeline.yml (ArgoCD sync timing, CRD
# bundling size limits, cascade-delete timing) -- see the CI feasibility
# discussion on issue #1617.
#
# Authority: issue #1617 (GitOps/ArgoCD operational readiness)

on:
  schedule:
    - cron: '37 4 * * 1' # weekly, Monday 04:37 UTC
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch/tag/SHA) of charts/kubernaut/ to deploy'
        required: false
        type: string
        default: main
      image_tag:
        description: 'Published image tag to deploy (this test validates chart/GitOps mechanics, not new app code)'
        required: false
        type: string
        default: latest

permissions:
  contents: read

env:
  KIND_CLUSTER_NAME: gitops-smoke
  ARGOCD_VERSION: v3.4.4
  CERT_MANAGER_VERSION: v1.20.3
  NAMESPACE: kubernaut-system

jobs:
  gitops-smoke-test:
    name: GitOps Smoke Test (Kind + ArgoCD + cert-manager)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Install Kind
        run: |
          KIND_VERSION="v0.32.0"
          curl -Lo ./kind "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd
          argocd version --client

      - name: Create Kind cluster
        run: |
          kind create cluster --name "$KIND_CLUSTER_NAME" --wait 120s
          kubectl cluster-info
          kubectl get nodes -o wide

      # #1617 spike finding: ArgoCD's own CRDs (e.g. applicationsets.argoproj.io)
      # exceed the client-side apply kubectl.kubernetes.io/last-applied-configuration
      # annotation limit (262144 bytes) -- server-side apply is required to install
      # ArgoCD itself, not just to sync this chart.
      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd
          kubectl apply -n argocd --server-side --force-conflicts \
            -f "https://raw.githubusercontent.com/argoproj/argo-cd/${ARGOCD_VERSION}/manifests/install.yaml"
          kubectl wait --for=condition=Available --timeout=180s deployment -l app.kubernetes.io/part-of=argocd -n argocd

      - name: Install cert-manager
        run: |
          kubectl apply -f "https://github.com/cert-manager/cert-manager/releases/download/${CERT_MANAGER_VERSION}/cert-manager.yaml"
          kubectl wait --for=condition=Available --timeout=120s deployment --all -n cert-manager
          kubectl apply -f deploy/cert-manager/selfsigned-issuer.yaml
          kubectl wait --for=condition=Ready --timeout=60s clusterissuer/selfsigned-issuer

      - name: Log in to ArgoCD CLI
        run: |
          kubectl -n argocd wait --for=condition=Available --timeout=60s deployment/argocd-server
          kubectl port-forward svc/argocd-server -n argocd 8080:443 > /tmp/argocd-pf.log 2>&1 &
          echo $! > /tmp/argocd-pf.pid
          sleep 5
          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d)
          for i in $(seq 1 10); do
            argocd login localhost:8080 --username admin --password "$ARGOCD_PASSWORD" --insecure && break
            echo "Retrying ArgoCD login ($i/10)..."
            sleep 5
          done

      - name: Provision prerequisite namespace and secrets
        run: |
          kubectl create namespace "$NAMESPACE"
          # #1617 spike finding: `lookup` has no live cluster access when ArgoCD's
          # repo-server renders the chart (equivalent to `helm template`, not a real
          # `helm install`) -- every value the chart would otherwise auto-discover
          # via `lookup` (issuerRef, secrets) must be supplied explicitly here.
          kubectl create secret generic postgresql-secret -n "$NAMESPACE" \
            --from-literal=POSTGRES_USER=slm_user \
            --from-literal=POSTGRES_PASSWORD=gitops-smoke-pass \
            --from-literal=POSTGRES_DB=action_history \
            --from-literal="db-secrets.yaml=$(printf 'username: slm_user\npassword: gitops-smoke-pass')"
          kubectl create secret generic valkey-secret -n "$NAMESPACE" \
            --from-literal="valkey-secrets.yaml=password: gitops-smoke-pass"
          kubectl create secret generic kubernaut-llm-credentials -n "$NAMESPACE" \
            --from-literal=OPENAI_API_KEY=sk-gitops-smoke-placeholder # pre-commit:allow-sensitive

      - name: Create ArgoCD Application
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          TARGET_REVISION: ${{ inputs.ref || 'main' }}
          IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
        run: |
          cat <<EOF | argocd app create -f -
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: kubernaut-gitops-smoke
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: ${REPO_URL}
              targetRevision: ${TARGET_REVISION}
              path: charts/kubernaut
              helm:
                valuesObject:
                  global:
                    image:
                      tag: ${IMAGE_TAG}
                  postgresql:
                    auth:
                      existingSecret: postgresql-secret
                  valkey:
                    existingSecret: valkey-secret
                  kubernautAgent:
                    llm:
                      provider: openai
                      model: gpt-4o
                      credentialsSecretName: kubernaut-llm-credentials
                  signalprocessing:
                    policies:
                      content: |
                        package signalprocessing
                        import rego.v1
                        default severity := "info"
                  aianalysis:
                    policies:
                      content: |
                        package aianalysis.approval
                        import rego.v1
                        default allow := false
                  monitoring:
                    prometheus:
                      enabled: false
                    alertManager:
                      enabled: false
                  tls:
                    mode: cert-manager
                    certManager:
                      issuerRef:
                        name: selfsigned-issuer
                        kind: ClusterIssuer
            destination:
              server: https://kubernetes.default.svc
              namespace: ${NAMESPACE}
            # #1617 spike finding: the chart's bundled-CRDs ConfigMap (consumed by the
            # crd-upgrade hook) is large enough that ArgoCD's default client-side apply
            # fails with "metadata.annotations: Too long: may not be more than 262144
            # bytes". ServerSideApply is required at the Application level.
            syncPolicy:
              syncOptions:
                - ServerSideApply=true
          EOF
          argocd app list

      # NOTE: `argocd app sync` blocks until the app reaches its "desired state"
      # (Synced AND Healthy), not just until manifests are applied. This smoke
      # test intentionally uses placeholder LLM credentials/config (it validates
      # GitOps sync mechanics -- CRDs, hooks, cert-manager wiring -- not full
      # application runtime health), so pods never reach Healthy and this
      # command reliably times out even on a fully successful sync. That
      # timeout is therefore tolerated here (`|| true`); the "Verify GitOps
      # deployment" step below asserts the specific resources that actually
      # matter (CRD count, Certificate readiness, ConfigMap sync) with their
      # own precise waits, instead of relying on aggregate app health.
      - name: Sync ArgoCD Application
        run: |
          argocd app sync kubernaut-gitops-smoke --server-side --timeout 180 || \
            echo "::notice::sync timed out waiting for full pod health (expected with placeholder credentials) -- proceeding to targeted resource checks"
          argocd app get kubernaut-gitops-smoke || true

      - name: Verify GitOps deployment
        run: |
          FAIL=0

          echo "=== CRDs (expect 10, installed by the PreSync crd-upgrade hook) ==="
          CRD_COUNT=$(kubectl get crds 2>/dev/null | grep -c "kubernaut.ai" || true)
          echo "Found: ${CRD_COUNT}"
          [[ "$CRD_COUNT" -eq 10 ]] || { echo "FAIL: expected 10 CRDs"; FAIL=1; }

          echo "=== cert-manager Certificates (#334 + DD-PLATFORM-001) ==="
          for cert in authwebhook-cert datastorage-signing-cert kubernaut-interservice-ca gateway-tls datastorage-tls kubernautagent-tls; do
            if kubectl wait --for=condition=Ready --timeout=180s "certificate/${cert}" -n "$NAMESPACE" 2>/dev/null; then
              echo "OK: ${cert} Ready"
            else
              echo "FAIL: ${cert} not Ready"
              kubectl describe "certificate/${cert}" -n "$NAMESPACE" 2>&1 || true
              FAIL=1
            fi
          done

          # KNOWN LIMITATION (tracked separately, not a #1619/#1620 regression):
          # interservice-ca-sync-job and migration-job both use Helm's
          # "post-install,post-upgrade" hook, which ArgoCD maps to PostSync.
          # ArgoCD's PostSync gate requires the WHOLE Application to already be
          # Healthy before it fires -- but DataStorage can never become Healthy
          # without migrations having run, and several services never become
          # Healthy without this ConfigMap. That's a genuine chart/ArgoCD hook
          # deadlock (well-documented upstream pattern: argoproj/argo-cd#17604,
          # same class of issue Airflow/OpenFGA hit), pre-existing and NOT
          # specific to tls.mode=cert-manager or this issue's scope. It needs
          # its own design pass (e.g. explicit `argocd.argoproj.io/hook: Sync`
          # override on those two Jobs). Until fixed, this check is
          # informational only so this workflow doesn't perpetually red-flag a
          # known, separately-tracked issue.
          echo "=== inter-service-ca ConfigMap sync hook (DD-PLATFORM-001) ==="
          if kubectl get configmap inter-service-ca -n "$NAMESPACE" >/dev/null 2>&1; then
            echo "OK: inter-service-ca ConfigMap exists"
          else
            echo "::warning::inter-service-ca ConfigMap missing -- expected until the PostSync/health deadlock (see workflow comments) is fixed; not gating this job"
          fi

          echo "=== datastorage-signing-cert Secret (#334 regression guard) ==="
          if kubectl get secret datastorage-signing-cert -n "$NAMESPACE" -o jsonpath='{.data.tls\.key}' 2>/dev/null | grep -q .; then
            echo "OK: datastorage-signing-cert has tls.key"
          else
            echo "FAIL: datastorage-signing-cert missing or empty tls.key"
            FAIL=1
          fi

          echo "=== Pod status (informational -- real quay.io images, no app-level config tuning) ==="
          kubectl get pods -n "$NAMESPACE" -o wide

          if [[ "$FAIL" -ne 0 ]]; then
            echo "::error::One or more GitOps deployment checks failed"
            exit 1
          fi
          echo "PASS: all GitOps deployment checks succeeded"

      - name: Verify PreDelete hook fires on cascade delete
        if: always()
        run: |
          echo "=== Webhook configs before delete ==="
          kubectl get mutatingwebhookconfigurations,validatingwebhookconfigurations 2>&1 || true

          argocd app delete kubernaut-gitops-smoke --cascade --yes || true

          echo "Waiting up to 3m for cascade delete + webhook-cleanup PreDelete hook..."
          for i in $(seq 1 18); do
            if ! kubectl get namespace "$NAMESPACE" >/dev/null 2>&1; then
              echo "OK: namespace ${NAMESPACE} fully removed (cascade + PreDelete hook completed)"
              exit 0
            fi
            sleep 10
          done

          echo "::warning::Namespace ${NAMESPACE} still present after 3m -- cascade delete or PreDelete hook may be stuck"
          kubectl get all -n "$NAMESPACE" 2>&1 || true

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "=== ArgoCD Application status ==="
          argocd app get kubernaut-gitops-smoke 2>&1 || true
          echo "=== Pods ==="
          kubectl get pods -n "$NAMESPACE" -o wide 2>&1 || true
          echo "=== Events ==="
          kubectl get events -n "$NAMESPACE" --sort-by='.lastTimestamp' 2>&1 | tail -40 || true
          echo "=== Certificates ==="
          kubectl get certificates -n "$NAMESPACE" -o wide 2>&1 || true
          echo "=== Kind node logs ==="
          kind export logs /tmp/kind-gitops-smoke-logs --name "$KIND_CLUSTER_NAME" 2>/dev/null || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gitops-smoke-diagnostics-${{ github.run_id }}
          path: /tmp/kind-gitops-smoke-logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          [[ -f /tmp/argocd-pf.pid ]] && kill "$(cat /tmp/argocd-pf.pid)" 2>/dev/null || true
          kind delete cluster --name "$KIND_CLUSTER_NAME" 2>/dev/null || true
