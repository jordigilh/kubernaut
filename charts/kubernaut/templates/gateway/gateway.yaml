{{- $gatewayOauth2 := include "kubernaut.fleet.oauth2" (dict "root" $ "svc" .Values.gateway.fleet.oauth2) | fromYaml }}
{{- $gatewayFleet := include "kubernaut.fleet.config" (dict "root" $ "svc" .Values.gateway.fleet) | fromYaml }}
{{- if .Values.gateway.fleet.enabled }}
{{- if not $gatewayFleet.mcpGatewayEndpoint }}
{{- fail "gateway.fleet.mcpGatewayEndpoint is required when gateway.fleet.enabled=true (set it directly, or set global.fleet.mcpGatewayEndpoint if shared across services)" }}
{{- end }}
{{- if .Values.gateway.fleet.oauth2.enabled }}
{{- if not $gatewayOauth2.tokenURL }}
{{- fail "gateway.fleet.oauth2.tokenURL is required when gateway.fleet.oauth2.enabled=true (set it directly, or set global.fleet.oauth2.tokenURL if shared across services)" }}
{{- end }}
{{- if not $gatewayOauth2.credentialsSecretRef }}
{{- fail "gateway.fleet.oauth2.credentialsSecretRef is required when gateway.fleet.oauth2.enabled=true (Secret must contain keys: client-id, client-secret; set it directly, or set global.fleet.oauth2.credentialsSecretRef if shared across services)" }}
{{- end }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: gateway
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  config.yaml: |
    logging:
      level: {{ .Values.gateway.logging.level | default "INFO" | quote }}
    server:
      listenAddr: ":8080"
      healthAddr: ":8081"
      metricsAddr: ":9090"
      maxConcurrentRequests: {{ .Values.gateway.config.server.maxConcurrentRequests | default 100 }}
      readTimeout: {{ .Values.gateway.config.server.readTimeout | default "30s" }}
      writeTimeout: {{ .Values.gateway.config.server.writeTimeout | default "30s" }}
      idleTimeout: 120s
      k8sRequestTimeout: {{ .Values.gateway.config.server.k8sRequestTimeout | default "15s" }}
    cors:
      allowedOrigins:
      {{- range .Values.gateway.config.cors.allowedOrigins }}
        - {{ . | quote }}
      {{- end }}
      allowedMethods:
      {{- range .Values.gateway.config.cors.allowedMethods }}
        - {{ . | quote }}
      {{- end }}
      allowCredentials: {{ .Values.gateway.config.cors.allowCredentials | default false }}
      maxAge: {{ .Values.gateway.config.cors.maxAge | default 300 }}
    middleware:
      trustedProxyCIDRs:
      {{- range .Values.gateway.config.middleware.trustedProxyCIDRs }}
        - {{ . | quote }}
      {{- end }}
    datastorage:
      url: "{{ include "kubernaut.datastorage.url" . }}"
      timeout: 10s
      buffer:
        bufferSize: 10000
        batchSize: 100
        flushInterval: 1s
        maxRetries: 3
    processing:
      deduplication:
        cooldownPeriod: {{ .Values.gateway.config.deduplication.cooldownPeriod | default "5m" }}
      retry:
        maxAttempts: 3
        initialBackoff: 100ms
        maxBackoff: 5s
    {{- if .Values.gateway.fleet.enabled }}
    fleet:
      enabled: true
      {{- if .Values.gateway.fleet.backend }}
      backend: {{ .Values.gateway.fleet.backend | quote }}
      {{- end }}
      {{- if .Values.gateway.fleet.endpoint }}
      endpoint: {{ .Values.gateway.fleet.endpoint | quote }}
      {{- else if eq (default "fleetmetadatacache" .Values.gateway.fleet.backend) "fleetmetadatacache" }}
      endpoint: {{ include "kubernaut.fleetmetadatacache.url" . | quote }}
      {{- end }}
      mcpGatewayEndpoint: {{ $gatewayFleet.mcpGatewayEndpoint | quote }}
      {{- if $gatewayFleet.mcpGatewayType }}
      mcpGatewayType: {{ $gatewayFleet.mcpGatewayType | quote }}
      {{- end }}
      tlsCAFile: {{ $gatewayFleet.tlsCAFile | default (include "kubernaut.interServiceTLS.caFile" .) | quote }}
      {{- if .Values.gateway.fleet.oauth2.enabled }}
      oauth2:
        enabled: true
        tokenURL: {{ $gatewayOauth2.tokenURL | quote }}
        credentialsSecretRef: {{ $gatewayOauth2.credentialsSecretRef | quote }}
        {{- if $gatewayOauth2.scopes }}
        scopes:
          {{- range $gatewayOauth2.scopes }}
          - {{ . | quote }}
          {{- end }}
        {{- end }}
        tlsCAFile: {{ $gatewayOauth2.tlsCAFile | default (include "kubernaut.interServiceTLS.caFile" .) | quote }}
      {{- end }}
    {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: gateway
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gateway-role
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests"]
    verbs: ["create", "get", "list", "watch", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests/status"]
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  # controller-runtime leader election requires list+watch for reflector cache sync (#687)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # BR-GATEWAY-036/037: TokenReview and SAR for auth middleware
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gateway-rolebinding
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gateway-role
subjects:
  - kind: ServiceAccount
    name: gateway
    namespace: {{ .Release.Namespace }}
---
# Role: namespace-scoped access to configmaps and secrets (#229)
{{ include "kubernaut.nsRoleForSecrets" (dict "name" "gateway" "serviceAccount" "gateway" "Release" .Release "labels" (include "kubernaut.labels" .)) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: gateway
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: gateway
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.gateway | nindent 8 }}
      {{- include "kubernaut.affinity" .Values.gateway | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.gateway "global" .Values.global) | nindent 6 }}
      containers:
        - name: gateway
          image: {{ include "kubernaut.image" (dict "service" "gateway" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.gateway | nindent 12 }}
          args:
            - "--config=/etc/gateway/config.yaml"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TLS_CA_FILE
              value: {{ include "kubernaut.interServiceTLS.caFile" . | quote }}
          volumeMounts:
            - name: config
              mountPath: /etc/gateway
              readOnly: true
            - name: tls-ca
              mountPath: /etc/tls-ca
              readOnly: true
            {{- if and .Values.gateway.fleet.enabled .Values.gateway.fleet.oauth2.enabled }}
            - name: oauth2-credentials
              mountPath: "/etc/gateway/{{ $gatewayOauth2.credentialsSecretRef }}"
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: gateway-config
        - name: tls-ca
          configMap:
            name: inter-service-ca
            optional: true
        {{- if and .Values.gateway.fleet.enabled .Values.gateway.fleet.oauth2.enabled }}
        - name: oauth2-credentials
          secret:
            secretName: {{ $gatewayOauth2.credentialsSecretRef }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: gateway
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    # DEPRECATED v1.4 (Issue #848): OCP service-ca annotation. Removed in v1.5.
    service.beta.openshift.io/serving-cert-secret-name: gateway-tls
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    app: gateway
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: health
      protocol: TCP
      port: 8081
      targetPort: 8081
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
