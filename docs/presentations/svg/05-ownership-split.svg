    <rect x="72" y="314" width="24" height="24" rx="6" fill="#0D9488" opacity="0.12"/>
    <text x="84" y="331" text-anchor="middle" font-size="10" font-weight="700" fill="#0D9488">AUTH</text>
    <text x="106" y="320" font-weight="600" fill="#0F766E">Authentication</text>
    <text x="106" y="338" fill="#475569" font-size="11">Who can access what, multi-tenant routing</text>

    <rect x="64" y="360" width="372" height="48" rx="8" fill="#F0FDFA"/>
    <rect x="72" y="372" width="24" height="24" rx="6" fill="#0D9488" opacity="0.12"/>
    <text x="84" y="389" text-anchor="middle" font-size="10" font-weight="700" fill="#0D9488">AGT</text>
    <text x="106" y="378" font-weight="600" fill="#0F766E">Agent orchestration</text>
    <text x="106" y="396" fill="#475569" font-size="11">Multi-agent coordination, task routing, fallbacks</text>

