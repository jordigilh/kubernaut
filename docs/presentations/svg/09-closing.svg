<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <rect width="960" height="540" fill="url(#bgGrad)"/>

  <rect x="320" y="160" width="320" height="3" rx="1.5" fill="url(#accentLine)"/>

  <text x="480" y="220" text-anchor="middle" font-size="32" font-weight="700" fill="white">Better together</text>

  <rect x="320" y="240" width="320" height="3" rx="1.5" fill="url(#accentLine)"/>

  <text x="480" y="300" text-anchor="middle" font-size="16" fill="#94A3B8">Your project brings the experience layer.</text>
  <text x="480" y="332" text-anchor="middle" font-size="16" fill="#94A3B8">Kubernaut brings the remediation engine.</text>
  <text x="480" y="372" text-anchor="middle" font-size="16" font-weight="600" fill="white">Our users get end-to-end Kubernetes incident response</text>
  <text x="480" y="400" text-anchor="middle" font-size="16" font-weight="600" fill="white">that neither project delivers alone.</text>

  <text x="480" y="470" text-anchor="middle" font-size="12" fill="#64748B">Let's figure out the integration together.</text>
</svg>
