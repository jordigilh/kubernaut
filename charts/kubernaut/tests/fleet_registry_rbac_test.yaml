    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["gateway.envoyproxy.io"]
            resources: ["backends"]
            verbs: ["get", "list", "watch"]
      - contains:
          path: rules
          content:
            apiGroups: ["aigateway.envoyproxy.io"]
            resources: ["mcproutes"]
            verbs: ["get", "list", "watch"]

