# Kubernaut Agent SDK Configuration
#
# Provide this to the chart via:
#   helm install kubernaut charts/kubernaut/ \
#     --set-file kubernautAgent.sdkConfigContent=charts/kubernaut/examples/sdk-config.yaml
#
# Or pre-create a ConfigMap and reference it:
#   kubectl create configmap kubernaut-agent-sdk-config --from-file=sdk-config.yaml=sdk-config.yaml
#   helm install kubernaut charts/kubernaut/ --set kubernautAgent.existingSdkConfigMap=kubernaut-agent-sdk-config

# -- LLM provider configuration (required)
# Credentials are sourced from the K8s Secret referenced by kubernautAgent.llm.credentialsSecretName
# Provider names must match LangChainGo provider identifiers (e.g., "openai", "azure", "vertex_ai").
# See: https://tmc.github.io/langchaingo/docs/integrations/llms/
llm:
  provider: ""       # "openai", "azure", "vertex_ai", "bedrock", etc.
  model: ""          # e.g., "gpt-4o", "vertex_ai/claude-sonnet-4"
  endpoint: ""       # API endpoint (required for Azure, optional for others)
  # GCP Vertex AI specific (required for vertex_ai provider):
  # vertex_project: ""
  # vertex_location: ""   # e.g., "us-central1", "europe-west1"
  max_retries: 3
  timeout_seconds: 120
  temperature: 0.7

# -- Toolsets (optional)
# See: https://docs.kubernaut.ai/agent/toolsets/
toolsets: {}
  # prometheus/metrics:
  #   enabled: true
  #   config:
  #     prometheus_url: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"

# -- MCP servers (optional)
mcp_servers: {}
