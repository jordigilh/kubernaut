---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: notification-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
---
# ClusterRole: CRD access (cluster-wide watch on NotificationRequests)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: notification-controller-role
  labels:
    app: notification-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["notificationrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["notificationrequests/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["notificationrequests/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: notification-controller-rolebinding
  labels:
    app: notification-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: notification-controller-role
subjects:
  - kind: ServiceAccount
    name: notification-controller
    namespace: {{ .Release.Namespace }}
---
# Role: namespace-local access to secrets and configmaps only (#207, #229)
{{ include "kubernaut.nsRoleForSecrets" (dict "name" "notification-controller" "serviceAccount" "notification-controller" "Release" .Release "labels" (include "kubernaut.labels" .)) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-controller-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: notification-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  config.yaml: |
    controller:
      metricsAddr: ":9090"
      healthProbeAddr: ":8081"
      leaderElection: false
      leaderElectionId: "notification.kubernaut.ai"
    delivery:
      console:
        enabled: true
      file:
        outputDir: "/tmp/notifications"
        format: "json"
        timeout: 5s
      log:
        enabled: true
        format: "json"
      slack:
        timeout: 10s
      credentials:
        dir: "/etc/notification/credentials"
    datastorage:
      url: "{{ include "kubernaut.datastorage.url" . }}"
      timeout: 10s
      buffer:
        bufferSize: 10000
        batchSize: 100
        flushInterval: 1s
        maxRetries: 3
---
{{- if not .Values.notification.routing.existingConfigMap }}
# Routing ConfigMap: Alertmanager-compatible routing rules (BR-NOT-066, #207)
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-routing-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: notification-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  routing.yaml: |
{{- if .Values.notification.routing.content }}
{{ .Values.notification.routing.content | indent 4 }}
{{- else if .Values.notification.slack.secretName }}
    route:
      receiver: slack-and-console
    receivers:
      - name: slack-and-console
        consoleConfigs:
          - enabled: true
        slackConfigs:
          - channel: {{ .Values.notification.slack.channel | default "#kubernaut-alerts" | quote }}
            credentialRef: slack-webhook
{{- else }}
    route:
      receiver: default-console
    receivers:
      - name: default-console
        consoleConfigs:
          - enabled: true
{{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: notification-controller
    control-plane: controller-manager
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.notification.replicas }}
  selector:
    matchLabels:
      app: notification-controller
      control-plane: controller-manager
  template:
    metadata:
      labels:
        app: notification-controller
        control-plane: controller-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: notification-controller
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.notification | nindent 8 }}
      {{- include "kubernaut.affinity" .Values.notification | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.notification "global" .Values.global) | nindent 6 }}
      containers:
        - name: manager
          image: {{ include "kubernaut.image" (dict "service" "notification" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.notification | nindent 12 }}
          env:
            - name: CONFIG_PATH
              value: "/etc/notification/config.yaml"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if include "kubernaut.interServiceTLS.enabled" . }}
            - name: TLS_CA_FILE
              value: {{ include "kubernaut.interServiceTLS.caFile" . | quote }}
            {{- end }}
          args:
            - "-config"
            - "$(CONFIG_PATH)"
          ports:
            - containerPort: 9090
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: config
              mountPath: /etc/notification
              readOnly: true
            - name: credentials
              mountPath: /etc/notification/credentials
              readOnly: true
            - name: notification-output
              mountPath: /tmp/notifications
            {{- if include "kubernaut.interServiceTLS.enabled" . }}
            - name: tls-ca
              mountPath: /etc/tls-ca
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.notification.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: notification-controller-config
        - name: credentials
          {{- if .Values.notification.credentials }}
          projected:
            sources:
            {{- range .Values.notification.credentials }}
              - secret:
                  name: {{ .secretName }}
                  items:
                    - key: {{ .secretKey | default "webhook-url" }}
                      path: {{ .name }}
            {{- end }}
          {{- else if .Values.notification.slack.secretName }}
          projected:
            sources:
              - secret:
                  name: {{ .Values.notification.slack.secretName }}
                  items:
                    - key: {{ .Values.notification.slack.secretKey | default "webhook-url" }}
                      path: slack-webhook
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: notification-output
          emptyDir: {}
        {{- if include "kubernaut.interServiceTLS.enabled" . }}
        - name: tls-ca
          configMap:
            name: inter-service-ca
            optional: true
        {{- end }}
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: notification-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: notification-controller
    control-plane: controller-manager
  ports:
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
