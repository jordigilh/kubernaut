# Air-gapped / disconnected overlay for Kubernaut Helm chart.
#
# Usage:
#   helm install kubernaut charts/kubernaut \
#     -f charts/kubernaut/values-demo.yaml \
#     -f charts/kubernaut/values-airgap.yaml \
#     --set global.image.registry=<mirror-registry>/kubernaut-ai
#
# Prerequisites:
#   1. Mirror all images listed by hack/airgap/generate-image-list.sh
#      to your internal registry using `oc mirror` or `skopeo copy`.
#   2. If using OCP, add mirror registry credentials to the global pull secret:
#        oc set data secret/pull-secret -n openshift-config \
#          --from-file=.dockerconfigjson=<auth-file>
#   3. For OCP 4.13+, create an ImageDigestMirrorSet (see chart README).

# Override the registry for all Kubernaut service images.
# Replace <mirror-registry> with your internal registry hostname.
global:
  image:
    registry: <mirror-registry>/kubernaut-ai
    # Optionally pin by digest for immutable references:
    # digest: "sha256:<digest-from-oc-mirror-output>"

# Override each third-party image to point to your mirror.
# These images are NOT governed by global.image.registry.
# Red Hat equivalents are used (matching values-ocp.yaml).
postgresql:
  image: <mirror-registry>/rhel9/postgresql-16

valkey:
  image: <mirror-registry>/rhel9/valkey-8

# Event exporter is disabled on OCP (no Red Hat-supported equivalent).
# values-ocp.yaml already sets eventExporter.enabled=false.

hooks:
  migrations:
    image: <mirror-registry>/kubernaut-ai/db-migrate:v3.24.1
  tlsCerts:
    image: <mirror-registry>/openshift4/ose-cli-rhel9:v4.17
