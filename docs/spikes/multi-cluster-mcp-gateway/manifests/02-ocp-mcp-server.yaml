# OCP MCP Server deployment for a workload cluster.
# Deploy one instance per workload cluster with a cluster-scoped ServiceAccount.
# The MCP server exposes K8s tools via HTTP/SSE transport.
#
# RBAC: mcp-operator grants both read and write access. The MCP Gateway's
# Authorino OPA policy controls which callers can invoke write tools:
#   - mcp-read role (KA, FMC): read-only tools
#   - mcp-write role (WE): read + write tools (remediation execution)
# The SA defines the ceiling; the gateway defines the floor.
#
# Authority: ADR-068 design decision #9 (unified MCP Gateway chokepoint)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-operator
  namespace: kubernaut-mcp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-operator
rules:
  # --- Read access (KA investigation, FMC sync, WE pre-action validation) ---
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps",
                "secrets", "events", "namespaces", "nodes", "nodes/proxy",
                "persistentvolumeclaims", "persistentvolumes",
                "replicationcontrollers", "serviceaccounts", "resourcequotas",
                "limitranges"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  # --- Write access (WE remediation execution) ---
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps", "services", "persistentvolumeclaims"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets"]
    verbs: ["patch", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["patch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["patch"]
  # Tekton (if installed on the cluster)
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "taskruns"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-operator
subjects:
  - kind: ServiceAccount
    name: mcp-operator
    namespace: kubernaut-mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocp-mcp-server
  namespace: kubernaut-mcp
  labels:
    app.kubernetes.io/name: ocp-mcp-server
    app.kubernetes.io/part-of: kubernaut
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ocp-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ocp-mcp-server
        app.kubernetes.io/part-of: kubernaut
    spec:
      serviceAccountName: mcp-operator
      securityContext:
        runAsNonRoot: true
      containers:
        - name: mcp-server
          # Use the OCP variant for metrics/prometheus toolset
          image: ghcr.io/openshift/openshift-mcp-server:latest
          args:
            - "--port=9090"
            - "--stateless"
            - "--toolsets=core,config"
            - "--log-level=2"
            - "--disable-multi-cluster"
          ports:
            - name: mcp
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /mcp
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /mcp
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: ocp-mcp-server
  namespace: kubernaut-mcp
  labels:
    app.kubernetes.io/name: ocp-mcp-server
    app.kubernetes.io/part-of: kubernaut
spec:
  selector:
    app.kubernetes.io/name: ocp-mcp-server
  ports:
    - name: mcp
      port: 9090
      targetPort: mcp
      protocol: TCP
  type: ClusterIP
