apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: crashloop-config-fix-v1
spec:
  # CrashLoop Config Fix Workflow Schema (BR-WORKFLOW-004)
  # Used by: AIAnalysis E2E, HolmesGPT-API E2E
  version: "1.0.0"
  description:
    what: "Restarts deployment to recover from CrashLoopBackOff caused by configuration issues"
    whenToUse: "When pods are in CrashLoopBackOff due to misconfiguration"
    whenNotToUse: "When crash is caused by a persistent code bug"
    preconditions: "Pod is managed by a Deployment"

  actionType: RestartDeployment

  labels:
    severity: [high]
    environment: [production, staging, test]
    component: deployment
    priority: P1

  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:adfc09ea45a5b627550c6a73fe75d50efe1c80fa43359fcc4908c9c5b0639ac3

  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (HAPI-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (HAPI-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (HAPI-injected)"
    - name: NAMESPACE
      type: string
      required: true
      description: "Target namespace"
    - name: DEPLOYMENT_NAME
      type: string
      required: true
      description: "Name of the deployment to restart"
    - name: GRACE_PERIOD_SECONDS
      type: integer
      required: false
      description: "Graceful shutdown period in seconds"
      default: 30
      minimum: 0
      maximum: 300
