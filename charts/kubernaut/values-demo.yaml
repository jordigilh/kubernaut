# Demo credentials overlay for local development and Kind clusters.
# Usage: helm install kubernaut charts/kubernaut -f charts/kubernaut/values-demo.yaml
#
# PREREQUISITE: Run platform-helper.sh (via ensure_platform) to pre-create
# the credential Secrets before installing the chart with this overlay.
#
# For production, create your own Secrets and reference them here.

postgresql:
  auth:
    existingSecret: kubernaut-pg-credentials

datastorage:
  dbExistingSecret: kubernaut-ds-db-credentials

redis:
  existingSecret: kubernaut-redis-credentials
