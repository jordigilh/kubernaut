# Kind cluster configuration for Fleet Metadata Cache (FMC) E2E tests
# Reference: DD-TEST-001 Port Allocation Strategy
#
# This lane deploys only what FMC's own journeys need: Keycloak (OIDC IdP +
# RFC 8693 token exchange) and the fleet-core stack (Istio + Kuadrant MCP
# Gateway + kube-mcp-server + Valkey + FMC) via
# infrastructure.DeployFleetCoreInfra -- NOT the other 10+ Kubernaut services
# deployed by the "fleet" (full pipeline) E2E suite.
#
# No DataStorage/PostgreSQL/Redis: FMC is audit-exempt (DD-AUDIT-003) and
# never calls DataStorage's API, so unlike other E2E lanes this one has no
# audit-trail dependency to satisfy.
#
# Keycloak replaces Dex in this lane only (Spike S17/S18): Dex does not
# implement RFC 8693 Standard Token Exchange, which this lane validates
# end-to-end for kube-mcp-server's passthrough auth mode. The "fleet" full
# pipeline suite (kind-fullpipeline-config.yaml) still uses Dex.
#
# Port Allocation (from DD-TEST-001):
#   FMC API:              hostPort 8150,  NodePort 30150 (new -- mirrors FMC's
#                          production port 8150; DD-TEST-001 previously listed
#                          FMC E2E as "ClusterIP only", which is now stale)
#   Keycloak OIDC:        hostPort 30557, NodePort 30557
#   Kuadrant MCP Gateway: hostPort 31975, NodePort 31975
#
# The Kuadrant port is reused verbatim from other isolated Kind clusters
# (31975 already used by Kuadrant in the fullpipeline/fleet cluster). Port
# 30557 is dedicated to this lane's Keycloak (distinct from Dex's 30556 used
# elsewhere). This is safe because each Kind cluster is its own isolated
# network namespace and CI matrix jobs run on separate runners. Per
# DD-TEST-001 policy, FMC's own API is exposed via NodePort (not kubectl
# port-forward) through a dedicated Service created by
# SetupFMCE2EInfrastructure (fleetmetadatacache_e2e.go), additive to the
# ClusterIP Service that DeployFleetCoreInfra creates for in-cluster callers
# (GW/RO in the full "fleet" suite).
#
# Dependencies:
#   - Keycloak (port 30557) - OIDC IdP + RFC 8693 token exchange for FMC,
#     kube-mcp-server (passthrough auth), and API server OIDC (runs in
#     start-dev mode with embedded H2 storage -- no external DB)
#   - Kuadrant MCP Gateway (port 31975) - MCP entry point, proxies to kube-mcp-server
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5  # K8s 1.34.0 with containerd 2.1.3 (avoids v2.2.0 mount-manager regression)
  extraMounts:
  - hostPath: ./coverdata
    containerPath: /coverdata
    readOnly: false
  extraPortMappings:
  # FMC's own API (scope check + cluster listing) -- DD-TEST-001 mandates
  # NodePort over kubectl port-forward for E2E test stability.
  - containerPort: 30150  # FMC API NodePort
    hostPort: 8150        # DD-TEST-001: FMC API (mirrors production port 8150)
    protocol: TCP
  # Keycloak OIDC + RFC 8693 token exchange (client_credentials IdP for FMC,
  # STS provider for kube-mcp-server passthrough auth, API server OIDC discovery)
  - containerPort: 30557  # Keycloak NodePort
    hostPort: 30557       # DD-TEST-001: Keycloak OIDC
    protocol: TCP
  # Fleet: Kuadrant MCP Gateway (multi-cluster tool routing entry point)
  - containerPort: 31975  # Kuadrant Istio gateway MCP NodePort
    hostPort: 31975       # DD-TEST-001: MCP Gateway
    protocol: TCP
  # OIDC for fleet: configured post-deploy by patchAPIServerForOIDCConfig()
  # in fleet_e2e.go (Keycloak must be running before the API server can
  # perform OIDC discovery)
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        # Increase API server rate limits for parallel integration testing
        max-requests-inflight: "800"
        max-mutating-requests-inflight: "400"
    controllerManager:
      extraArgs:
        # Increase controller manager QPS for CRD operations
        kube-api-qps: "100"
        kube-api-burst: "200"
