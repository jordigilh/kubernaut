apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: test-dep-secret-ansible
spec:
  # DD-WE-006 Test Workflow: Ansible with Secret Dependency (BR-WE-015)
  # Used by: WorkflowExecution E2E (Ansible Secret dependency injection tests)
  # Authority: DD-WE-006, BR-WE-014, BR-WE-015
  version: "1.0.0"
  description:
    what: "Ansible workflow that declares a Secret dependency for E2E testing of AWX credential injection"
    whenToUse: "For E2E validation of dependencies.secrets injection via ephemeral AWX credentials"
    whenNotToUse: "Not intended for production use"
    preconditions: "AWX deployed, Secret 'e2e-dep-secret-ansible' in execution namespace"
  
  actionType: RestartPod
  
  labels:
    severity: [low]
    environment: [test]
    component: deployment
    priority: P3
  
  execution:
    engine: ansible
    bundle: https://github.com/jordigilh/kubernaut-test-playbooks.git
    bundleDigest: 42eadeba052b13e3ec4e113ebc8165efd5497974
    engineConfig:
      playbookPath: "playbooks/test-dep-secret.yml"
      jobTemplateName: "kubernaut-test-dep-secret"
  
  dependencies:
    secrets:
      - name: e2e-dep-secret-ansible
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (HAPI-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (HAPI-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (HAPI-injected)"
    - name: target_kind
      type: string
      required: true
      description: "Kubernetes resource kind"
      default: "Deployment"
    - name: target_name
      type: string
      required: true
      description: "Name of the target resource"
      default: "test-deployment"
    - name: target_namespace
      type: string
      required: false
      description: "Namespace of the target resource"
      default: "default"
