global:
  image:
    registry: quay.io
    namespace: kubernaut-ai
    separator: "/"  # "/" for nested registries, "-" for flat registries (quay.io, Docker Hub)
    tag: ""  # defaults to Chart.appVersion
    digest: ""  # when set (e.g. "sha256:abc..."), overrides tag for immutable image references
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []

nameOverride: ""
fullnameOverride: ""

# -- Demo content: bundled ActionTypes and RemediationWorkflows.
# When enabled, deploys 25 ActionTypes and 20 RemediationWorkflows
# from kubernaut-demo-scenarios, allowing immediate end-to-end evaluation.
# Production: set to false and deploy your own CRs.
demoContent:
  enabled: true

# -- TLS certificate management for the AuthWebhook admission controller.
# Three modes are supported:
#   hook         - Self-signed certificates generated by Helm hooks (default, suitable for dev/testing).
#                  No external dependencies. Certs are stored in authwebhook-tls Secret.
#   cert-manager - Certificates managed by cert-manager (recommended for production).
#                  Requires cert-manager installed and an Issuer/ClusterIssuer configured.
#   manual       - User-managed certificates. The chart creates no TLS resources or hooks.
#                  The user must create the authwebhook-tls Secret and patch webhook caBundle.
#                  Suitable for service meshes, external PKI, or CI environments.
tls:
  mode: hook  # "hook", "cert-manager", or "manual"
  certManager:
    issuerRef:
      name: ""    # required when tls.mode=cert-manager (e.g., "letsencrypt-prod" or "selfsigned-issuer")
      kind: ClusterIssuer
      group: cert-manager.io

# -- Gateway service (AlertManager webhook target + external signal ingestion)
gateway:
  replicas: 1
  pdb:
    enabled: false
    # minAvailable: 1
    # maxUnavailable: ""
  config:
    server:
      maxConcurrentRequests: 100
      readTimeout: "30s"
      writeTimeout: "30s"
    deduplication:
      cooldownPeriod: "5m"
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  service:
    type: ClusterIP
  # BR-GATEWAY-036/037: Auth middleware configuration
  auth:
    # External signal sources that need RBAC to call the Gateway.
    # Each entry creates a ClusterRoleBinding granting services/gateway-service/create.
    # To enable AlertManager integration, install kube-prometheus-stack and add:
    #   signalSources:
    #     - name: alertmanager
    #       serviceAccount: alertmanager-kube-prometheus-stack-alertmanager
    #       namespace: monitoring
    signalSources: []

# -- DataStorage service (audit trail, workflow catalog)
datastorage:
  replicas: 1
  pdb:
    enabled: false
    # minAvailable: 1
    # maxUnavailable: ""
  dbExistingSecret: ""  # pre-created Secret with db-secrets.yaml key; empty = auto-generate
  config:
    database:
      sslMode: "disable"
      maxOpenConns: 100
      maxIdleConns: 20
      connMaxLifetime: "1h"
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  service:
    type: ClusterIP

# -- AIAnalysis controller
aianalysis:
  replicas: 1
  pdb:
    enabled: false
    # minAvailable: 1
    # maxUnavailable: ""
  rego:
    confidenceThreshold: null  # nil = use Rego default (0.8 per BR-AI-076)
  # -- Approval policy externalization.
  # Option A: provide policy content via --set-file (chart creates ConfigMap).
  # Option B: reference a pre-existing ConfigMap.
  # One of the two is required; the chart will fail at install if neither is set.
  policies:
    content: ""           # --set-file aianalysis.policies.content=approval.rego
    existingConfigMap: "" # name of pre-existing ConfigMap with key "approval.rego"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- SignalProcessing controller
signalprocessing:
  replicas: 1
  pdb:
    enabled: false
    # minAvailable: 1
    # maxUnavailable: ""
  # -- Unified Rego policy (ADR-060, #415).
  # Single policy.rego file containing all classification rules
  # (environment, severity, priority, custom labels).
  # Option A: provide raw .rego content via --set-file (chart creates ConfigMap).
  #   helm install ... --set-file signalprocessing.policy=policy.rego
  # Option B: reference a pre-existing ConfigMap with key "policy.rego".
  # One of the two is required; the chart will fail at install if neither is set.
  policy: ""
  existingPolicyConfigMap: ""
  # -- Proactive signal mappings (YAML, not Rego).
  # Maps proactive signal names to their reactive equivalents (ADR-054).
  # Optional: when neither is set, all signals default to reactive mode.
  proactiveSignalMappings:
    content: ""            # --set-file signalprocessing.proactiveSignalMappings.content=mappings.yaml
    existingConfigMap: ""  # name of pre-existing ConfigMap with key "proactive-signal-mappings.yaml"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- RemediationOrchestrator controller
remediationorchestrator:
  replicas: 1
  pdb:
    enabled: false
    # minAvailable: 1
    # maxUnavailable: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  config:
    timeouts:
      global: "1h"
      processing: "5m"
      analyzing: "10m"
      executing: "30m"
      verifying: "30m"
    routing:
      consecutiveFailureThreshold: 3
      consecutiveFailureCooldown: "1h"
      recentlyRemediatedCooldown: "5m"
      ineffectiveChainThreshold: 3
      recurrenceCountThreshold: 5
      ineffectiveTimeWindow: "4h"
    effectivenessAssessment:
      stabilizationWindow: "5m"
    asyncPropagation:
      gitOpsSyncDelay: "3m"
      operatorReconcileDelay: "1m"
      proactiveAlertDelay: "5m"

# -- WorkflowExecution controller
workflowexecution:
  workflowNamespace: kubernaut-workflows  # namespace for Job/PipelineRun execution
  replicas: 1
  pdb:
    enabled: false
    # minAvailable: 1
    # maxUnavailable: ""
  config:
    execution:
      cooldownPeriod: "1m"
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Notification controller
notification:
  replicas: 1
  pdb:
    enabled: false
    # minAvailable: 1
    # maxUnavailable: ""
  # -- Slack quickstart shortcut.
  # Set secretName to auto-generate Slack routing and credential projection.
  # For advanced routing (multiple receivers, custom routes), use routing.content or routing.existingConfigMap.
  slack:
    secretName: ""        # K8s Secret containing the Slack webhook URL; empty = no Slack
    secretKey: "webhook-url"
    channel: "#kubernaut-alerts"
  # -- Notification routing externalization (#405).
  # Precedence: routing.existingConfigMap > routing.content > slack.* shortcut > console-only default.
  routing:
    content: ""
    existingConfigMap: ""
  # Per-receiver credentials projected into /etc/notification/credentials/
  # Each entry creates a projected volume source from a K8s Secret.
  # Default: [] (no credentials required). Auto-populated when slack.secretName is set.
  credentials: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- EffectivenessMonitor controller
effectivenessmonitor:
  replicas: 1
  pdb:
    enabled: false
    # minAvailable: 1
    # maxUnavailable: ""
  config:
    assessment:
      stabilizationWindow: "30s"
      validityWindow: "120s"
  external:
    # To enable monitoring integration, install kube-prometheus-stack and set both to true.
    prometheusUrl: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"
    prometheusEnabled: false
    alertManagerUrl: "http://kube-prometheus-stack-alertmanager.monitoring.svc:9093"
    alertManagerEnabled: false
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 500m

# -- HolmesGPT API (LLM integration service)
holmesgptApi:
  replicas: 1
  pdb:
    enabled: false
    # minAvailable: 1
    # maxUnavailable: ""
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    type: ClusterIP
  llm:
    # K8s Secret reference for LLM API credentials (not part of SDK ConfigMap).
    credentialsSecretName: llm-credentials
    # -- Quickstart: set provider + model to auto-generate a minimal SDK config.
    # Supported providers for quickstart: openai, anthropic (any provider needing only an API key env var).
    # For Vertex AI, Azure, or advanced setups (toolsets, MCP), use sdkConfigContent or existingSdkConfigMap.
    provider: ""   # e.g., "openai", "anthropic"
    model: ""      # e.g., "gpt-4o", "claude-sonnet-4-20250514"
  # -- Raw SDK config YAML content. When set, used verbatim in the
  # holmesgpt-sdk-config ConfigMap. Takes priority over llm.provider/model.
  # Usage: helm install --set-file holmesgptApi.sdkConfigContent=my-sdk-config.yaml
  sdkConfigContent: ""
  # -- Use a pre-existing ConfigMap for SDK config instead of chart-generated.
  # When set, the chart does NOT create holmesgpt-sdk-config and mounts
  # this ConfigMap at /etc/holmesgpt/sdk/ instead.
  # Takes priority over sdkConfigContent and llm.provider/model.
  existingSdkConfigMap: ""

# -- AuthWebhook admission controller
authwebhook:
  replicas: 1
  pdb:
    enabled: false
    # minAvailable: 1
    # maxUnavailable: ""
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

# -- PostgreSQL (DataStorage backend)
# Credentials: auto-generated on first install when existingSecret is empty.
#   Upgrade: existing passwords are preserved via lookup.
#   Production: pre-create a Secret and set existingSecret.
#   BYO (#256): Set postgresql.enabled=false and provide postgresql.host.
postgresql:
  enabled: true  # set false to use an external PostgreSQL instance
  host: ""       # required when enabled=false (e.g., "db.example.com")
  port: 5432
  # variant: "upstream" (default) or "ocp".
  #   upstream — postgres:16-alpine with POSTGRES_* env vars
  #   ocp      — Red Hat RHEL10 PostgreSQL with POSTGRESQL_* env vars,
  #              runs non-root (UID 26), compatible with restricted-v2 SCC
  variant: upstream
  image: postgres:16-alpine  # OCP: registry.redhat.io/rhel10/postgresql-16
  auth:
    existingSecret: ""  # pre-created Secret with POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB keys; empty = auto-generate
    username: slm_user
    database: action_history
  replicas: 1
  storage:
    size: 10Gi
    storageClassName: ""  # empty = cluster default
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

# -- Valkey (DataStorage DLQ)
# Valkey is a BSD-licensed Redis-compatible in-memory data store.
# Credentials: auto-generated on first install when existingSecret is empty.
#   Production: pre-create a Secret and set existingSecret.
#   BYO (#256): Set valkey.enabled=false and provide valkey.host.
valkey:
  enabled: true  # set false to use an external Valkey/Redis instance
  host: ""       # required when enabled=false (e.g., "valkey.example.com")
  port: 6379
  image: valkey/valkey:8-alpine
  existingSecret: ""  # pre-created Secret with valkey-secrets.yaml key; empty = auto-generate
  replicas: 1
  storage:
    size: 512Mi
    storageClassName: ""  # empty = cluster default
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

# -- Hooks (post-install Jobs)
hooks:
  tlsCerts:
    image: docker.io/bitnami/kubectl:latest@sha256:6e2cdb22d6ab7264ea198c717f555e30536b54029d26c8781b9f25f78951b564
