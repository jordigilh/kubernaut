---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: holmesgpt-api-sa
  namespace: {{ .Release.Namespace }}
  labels:
    app: holmesgpt-api
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: holmesgpt-api-investigator
  labels:
    app: holmesgpt-api
    component: investigation
    {{- include "kubernaut.labels" . | nindent 4 }}
  # NOTE: This ClusterRole uses an explicit resource enumeration rather than
  # cluster-reader. Rules for API groups whose CRDs are not installed are
  # silently ignored by Kubernetes (no extra privileges are granted).
  # If HAPI reports "permission restrictions" during investigation, check
  # whether the target resource's API group is listed here and add it if not.
rules:
  # ── Core Kubernetes ──────────────────────────────────────────────────────
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - services
      - endpoints
      - configmaps
      - secrets
      - nodes
      - namespaces
      - replicationcontrollers
      - persistentvolumeclaims
      - resourcequotas
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  # ── cert-manager ─────────────────────────────────────────────────────────
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "clusterissuers", "certificaterequests"]
    verbs: ["get", "list", "watch"]
  # ── ArgoCD ───────────────────────────────────────────────────────────────
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  # ── Linkerd ──────────────────────────────────────────────────────────────
  - apiGroups: ["policy.linkerd.io"]
    resources: ["servers", "authorizationpolicies", "meshtlsauthentications"]
    verbs: ["get", "list", "watch"]
  # ── Istio ───────────────────────────────────────────────────────────────
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies", "peerauthentications", "requestauthentications"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "destinationrules", "gateways", "serviceentries"]
    verbs: ["get", "list", "watch"]
  # ── Prometheus Operator ──────────────────────────────────────────────────
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheusrules", "servicemonitors", "podmonitors", "probes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: holmesgpt-api-investigator-binding
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: holmesgpt-api-investigator
subjects:
  - kind: ServiceAccount
    name: holmesgpt-api-sa
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: holmesgpt-api-auth-middleware
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: data-storage-auth-middleware
subjects:
  - kind: ServiceAccount
    name: holmesgpt-api-sa
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: holmesgpt-api-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: holmesgpt-api
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  config.yaml: |
    logging:
      level: "INFO"
    llm:
      provider: {{ .Values.holmesgptApi.llm.provider | quote }}
      model: {{ .Values.holmesgptApi.llm.model | quote }}
      endpoint: {{ .Values.holmesgptApi.llm.endpoint | quote }}
      gcp_project_id: {{ .Values.holmesgptApi.llm.gcpProjectId | quote }}
      gcp_region: {{ .Values.holmesgptApi.llm.gcpRegion | quote }}
      max_retries: {{ .Values.holmesgptApi.llm.maxRetries }}
      timeout_seconds: {{ .Values.holmesgptApi.llm.timeoutSeconds }}
      temperature: {{ .Values.holmesgptApi.llm.temperature }}
    data_storage:
      url: "{{ include "kubernaut.datastorage.url" . }}"
    audit:
      flush_interval_seconds: 0.1
      buffer_size: 10000
      batch_size: 50
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: holmesgpt-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: holmesgpt-api
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.holmesgptApi.replicas }}
  selector:
    matchLabels:
      app: holmesgpt-api
  template:
    metadata:
      labels:
        app: holmesgpt-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: holmesgpt-api-sa
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.holmesgptApi | nindent 8 }}
      {{- include "kubernaut.affinity" .Values.holmesgptApi | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.holmesgptApi "global" .Values.global) | nindent 6 }}
      containers:
        - name: holmesgpt-api
          image: {{ include "kubernaut.image" (dict "service" "holmesgpt-api" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.holmesgptApi | nindent 12 }}
          ports:
            - containerPort: 8080
          args:
            - "-config"
            - "/etc/holmesgpt/config.yaml"
          env:
            - name: DATA_STORAGE_URL
              value: "{{ include "kubernaut.datastorage.url" . }}"
            - name: LITELLM_LOG
              value: "DEBUG"
          envFrom:
            - secretRef:
                name: {{ .Values.holmesgptApi.llm.credentialsSecretName }}
                optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/holmesgpt
              readOnly: true
            - name: llm-credentials-file
              mountPath: /etc/holmesgpt/credentials
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml (.Values.holmesgptApi.resources | default dict) | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: holmesgpt-api-config
        - name: llm-credentials-file
          secret:
            secretName: {{ .Values.holmesgptApi.llm.credentialsSecretName }}
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: holmesgpt-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: holmesgpt-api
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  type: {{ .Values.holmesgptApi.service.type }}
  ports:
    - port: 8080
      targetPort: 8080
      {{- if .Values.holmesgptApi.service.nodePort }}
      nodePort: {{ .Values.holmesgptApi.service.nodePort }}
      {{- end }}
  selector:
    app: holmesgpt-api
