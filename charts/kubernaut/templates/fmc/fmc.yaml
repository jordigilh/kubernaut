{{- if .Values.fmc.enabled }}
{{- if not .Values.fmc.oauth2.tokenURL }}
{{- fail "fmc.oauth2.tokenURL is required when fmc.enabled=true — MCP Gateway requires OAuth2 authentication" }}
{{- end }}
{{- if not .Values.fmc.oauth2.credentialsSecretRef }}
{{- fail "fmc.oauth2.credentialsSecretRef is required when fmc.enabled=true (Secret must contain keys: client-id, client-secret)" }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fmc-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fmc
    app.kubernetes.io/component: fleet-metadata-cache
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  config.yaml: |
    server:
      apiAddr: ":8080"
      metricsAddr: ":8081"
    mcpGateway:
      endpoint: {{ .Values.fmc.mcpGatewayEndpoint | quote }}
      gatewayType: {{ .Values.fmc.gatewayType | quote }}
      namespace: {{ .Values.fmc.namespace | quote }}
    valkey:
      addr: {{ .Values.fmc.valkeyAddr | quote }}
    sync:
      interval: {{ .Values.fmc.syncInterval | quote }}
      keyTtl: {{ .Values.fmc.keyTTL | quote }}
    oauth2:
      tokenUrl: {{ .Values.fmc.oauth2.tokenURL | quote }}
      credentialsDir: "/etc/fmc/fleet-oauth2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fmc
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fmc
    app.kubernetes.io/component: fleet-metadata-cache
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.fmc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: fmc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fmc
        app.kubernetes.io/component: fleet-metadata-cache
    spec:
      serviceAccountName: fmc
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fmc
          image: "{{ .Values.fmc.image.repository }}:{{ .Values.fmc.image.tag }}"
          imagePullPolicy: {{ .Values.fmc.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - "--config=/etc/fmc/config.yaml"
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: api
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.fmc.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/fmc
              readOnly: true
            - name: oauth2-credentials
              mountPath: /etc/fmc/fleet-oauth2
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: fmc-config
        - name: oauth2-credentials
          secret:
            secretName: {{ .Values.fmc.oauth2.credentialsSecretRef }}
---
apiVersion: v1
kind: Service
metadata:
  name: fmc-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fmc
    app.kubernetes.io/component: fleet-metadata-cache
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fmc
  ports:
    - name: api
      port: 8080
      targetPort: api
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: metrics
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fmc
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fmc
    app.kubernetes.io/component: fleet-metadata-cache
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fmc
  labels:
    app.kubernetes.io/name: fmc
rules:
{{- if eq .Values.fmc.gatewayType "kuadrant" }}
  - apiGroups: ["mcp.kuadrant.io"]
    resources: ["mcpserverregistrations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes"]
    verbs: ["get", "list", "watch"]
{{- else }}
  - apiGroups: ["gateway.envoyproxy.io"]
    resources: ["backends"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["aigateway.envoyproxy.io"]
    resources: ["mcproutes"]
    verbs: ["get", "list", "watch"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fmc
  labels:
    app.kubernetes.io/name: fmc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fmc
subjects:
  - kind: ServiceAccount
    name: fmc
    namespace: {{ .Release.Namespace }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fmc
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fmc
    app.kubernetes.io/component: fleet-metadata-cache
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fmc
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: remediationorchestrator
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
{{- end }}
