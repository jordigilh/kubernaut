# F-011 / ADR-022: AF SA unified security model.
# All K8s operations (MCP bridge and A2A agent) use AF's ServiceAccount.
# MCP RBAC (SubjectAccessReview) is the application-level access gate;
# users do not need direct K8s RBAC for kubernaut CRDs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apifrontend
rules:
  # InvestigationSession controller (owned CRD) — AC-6 least privilege
  - apiGroups: ["kubernaut.ai"]
    resources: ["investigationsessions"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["investigationsessions/status"]
    verbs: ["get", "update"]
  # RemediationRequest management (MCP bridge + A2A agent)
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests/status"]
    verbs: ["get", "update", "patch"]
  # RemediationApprovalRequest management (MCP kubernaut_approve)
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationapprovalrequests"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationapprovalrequests/status"]
    verbs: ["get", "update", "patch"]
  # Events for controller status reporting + kubectl_list_events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "create", "patch"]
  # Internal triage tools (kubectl_get, kubectl_list) — aligned with gvk.go static kinds
  - apiGroups: [""]
    resources: ["pods", "replicationcontrollers", "services", "endpoints", "configmaps", "secrets", "namespaces", "nodes", "persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list"]
  # Lease observation: sync KA lease state to IS CRD status (SESSION-JOIN-06)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]
  # AIAnalysis read-only: kubernaut_await_session watches for KA session readiness
  - apiGroups: ["kubernaut.ai"]
    resources: ["aianalyses"]
    verbs: ["get", "list", "watch"]
  # EffectivenessAssessment read-only: fetch stabilizationWindow for progress artifacts (#1403)
  - apiGroups: ["kubernaut.ai"]
    resources: ["effectivenessassessments"]
    verbs: ["get"]
  # SubjectAccessReview: SAR-based tool authorization (ADR-021)
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
  # TokenReview: validate ServiceAccount tokens (BR-INTERACTIVE-010)
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  # DD-AUTH-014: KA auth middleware SAR gate — AF SA must be authorized
  # to invoke KA's API (virtual SAR resource, not an actual service create)
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["kubernaut-agent"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: apifrontend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: apifrontend
subjects:
  - kind: ServiceAccount
    name: apifrontend
    namespace: kubernaut-system
