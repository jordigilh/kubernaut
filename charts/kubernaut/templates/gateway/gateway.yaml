---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: gateway
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      listenAddr: ":8080"
      maxConcurrentRequests: {{ .Values.gateway.config.server.maxConcurrentRequests | default 100 }}
      readTimeout: {{ .Values.gateway.config.server.readTimeout | default "30s" }}
      writeTimeout: {{ .Values.gateway.config.server.writeTimeout | default "30s" }}
      idleTimeout: 120s
      k8sRequestTimeout: {{ .Values.gateway.config.server.k8sRequestTimeout | default "15s" }}
      {{- if include "kubernaut.interServiceTLS.enabled" . }}
      tls:
        certDir: {{ include "kubernaut.interServiceTLS.certDir" . | quote }}
      {{- end }}
    middleware:
      trustedProxyCIDRs:
      {{- range .Values.gateway.config.middleware.trustedProxyCIDRs }}
        - {{ . | quote }}
      {{- end }}
    datastorage:
      url: "{{ include "kubernaut.datastorage.url" . }}"
      timeout: 10s
      buffer:
        bufferSize: 10000
        batchSize: 100
        flushInterval: 1s
        maxRetries: 3
    processing:
      deduplication:
        cooldownPeriod: {{ .Values.gateway.config.deduplication.cooldownPeriod | default "5m" }}
      retry:
        maxAttempts: 3
        initialBackoff: 100ms
        maxBackoff: 5s
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: gateway
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gateway-role
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests"]
    verbs: ["create", "get", "list", "watch", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests/status"]
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  # controller-runtime leader election requires list+watch for reflector cache sync (#687)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # BR-GATEWAY-036/037: TokenReview and SAR for auth middleware
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gateway-rolebinding
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gateway-role
subjects:
  - kind: ServiceAccount
    name: gateway
    namespace: {{ .Release.Namespace }}
---
# Role: namespace-scoped access to configmaps and secrets (#229)
{{ include "kubernaut.nsRoleForSecrets" (dict "name" "gateway" "serviceAccount" "gateway" "Release" .Release "labels" (include "kubernaut.labels" .)) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: gateway
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: gateway
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.gateway | nindent 8 }}
      {{- include "kubernaut.affinity" .Values.gateway | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.gateway "global" .Values.global) | nindent 6 }}
      containers:
        - name: gateway
          image: {{ include "kubernaut.image" (dict "service" "gateway" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.gateway | nindent 12 }}
          args:
            - "--config=/etc/gateway/config.yaml"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Issue #673 H-2: Restrictive CORS default for M2M webhook API.
            # Gateway is not accessed by browsers; CORS is irrelevant but must not default to "*".
            # Set to "none" to trigger FromEnvironment() to use an explicit deny-all value.
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.gateway.config.cors.allowedOrigins | default "https://no-browser-clients.invalid" | quote }}
            {{- if include "kubernaut.interServiceTLS.enabled" . }}
            - name: TLS_CA_FILE
              value: {{ include "kubernaut.interServiceTLS.caFile" . | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/gateway
              readOnly: true
            {{- if include "kubernaut.interServiceTLS.enabled" . }}
            - name: tls-certs
              mountPath: {{ include "kubernaut.interServiceTLS.certDir" . }}
              readOnly: true
            - name: tls-ca
              mountPath: /etc/tls-ca
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: gateway-config
        {{- if include "kubernaut.interServiceTLS.enabled" . }}
        - name: tls-certs
          secret:
            secretName: gateway-tls
            optional: true
        - name: tls-ca
          configMap:
            name: inter-service-ca
            optional: true
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: gateway
    {{- include "kubernaut.labels" . | nindent 4 }}
  {{- if include "kubernaut.interServiceTLS.enabled" . }}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: gateway-tls
  {{- end }}
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    app: gateway
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
