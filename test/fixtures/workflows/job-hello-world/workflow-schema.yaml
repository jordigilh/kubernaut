apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: test-job-hello-world
spec:
  # Hello World Job Backend Test Workflow (BR-WE-014)
  # Used by: WorkflowExecution E2E (Job backend tests)
  version: "1.0.0"
  description:
    what: "Simple hello-world workflow using the Job execution engine"
    whenToUse: "For E2E validation of Job backend lifecycle"
    whenNotToUse: "Not intended for production use"
    preconditions: "Kubernetes cluster available"
  
  actionType: RestartPod
  
  labels:
    severity: [low]
    environment: [test]
    component: deployment
    priority: P3
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:c7583414d1d027de60adb1bd0fac2f1550c3c449365c480fc39a4cab7e39f190
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE
      type: string
      required: true
      description: "Target resource identifier"
      default: "test/deployment/hello"
    - name: MESSAGE
      type: string
      required: false
      description: "Message to print during execution"
      default: "Hello from Kubernaut Job Backend E2E!"
