{{- $signalprocessingOauth2 := include "kubernaut.fleet.oauth2" (dict "root" $ "svc" .Values.signalprocessing.fleet.oauth2) | fromYaml }}
{{- $signalprocessingFleet := include "kubernaut.fleet.config" (dict "root" $ "svc" .Values.signalprocessing.fleet) | fromYaml }}
{{- if .Values.signalprocessing.fleet.oauth2.enabled }}
{{- if not $signalprocessingOauth2.tokenURL }}
{{- fail "signalprocessing.fleet.oauth2.tokenURL is required when signalprocessing.fleet.oauth2.enabled=true (set it directly, or set global.fleet.oauth2.tokenURL if shared across services)" }}
{{- end }}
{{- if not $signalprocessingOauth2.credentialsSecretRef }}
{{- fail "signalprocessing.fleet.oauth2.credentialsSecretRef is required when signalprocessing.fleet.oauth2.enabled=true (Secret must contain keys: client-id, client-secret; set it directly, or set global.fleet.oauth2.credentialsSecretRef if shared across services)" }}
{{- end }}
{{- end }}
{{- if not .Values.signalprocessing.policies.existingConfigMap }}
{{- if not .Values.signalprocessing.policies.content }}
{{- fail "signalprocessing.policies.content is required (via --set-file signalprocessing.policies.content=policy.rego) or provide signalprocessing.policies.existingConfigMap" }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalprocessing-policy
  namespace: {{ .Release.Namespace }}
  labels:
    app: signalprocessing
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  policy.rego: |
{{ .Values.signalprocessing.policies.content | indent 4 }}
{{- end }}
{{- if not .Values.signalprocessing.proactiveSignalMappings.existingConfigMap }}
{{- $mappingsContent := .Values.signalprocessing.proactiveSignalMappings.content | default (.Files.Get "files/defaults/proactive-signal-mappings.yaml") }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalprocessing-proactive-signal-mappings
  namespace: {{ .Release.Namespace }}
  labels:
    app: signalprocessing
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  proactive-signal-mappings.yaml: |
{{ $mappingsContent | indent 4 }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalprocessing-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: signalprocessing
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  config.yaml: |
    logging:
      level: {{ .Values.signalprocessing.logging.level | default "INFO" | quote }}
    controller:
      metricsAddr: ":9090"
      healthProbeAddr: ":8081"
      leaderElection: false
      leaderElectionId: "signalprocessing.kubernaut.ai"
    enrichment:
      cacheTtl: "5m"
      timeout: "10s"
    classifier:
      regoConfigMapName: "signalprocessing-policy"
      regoConfigMapKey: "policy.rego"
      hotReloadInterval: "30s"
    datastorage:
      url: "{{ include "kubernaut.datastorage.url" . }}"
      timeout: "10s"
      buffer:
        bufferSize: 10000
        batchSize: 100
        flushInterval: "1s"
        maxRetries: 3
    {{- if .Values.signalprocessing.fleet.endpoint }}
    fleet:
      endpoint: {{ .Values.signalprocessing.fleet.endpoint | quote }}
      {{- if $signalprocessingFleet.mcpGatewayType }}
      mcpGatewayType: {{ $signalprocessingFleet.mcpGatewayType | quote }}
      {{- end }}
      {{- if .Values.signalprocessing.fleet.namespace }}
      namespace: {{ .Values.signalprocessing.fleet.namespace | quote }}
      {{- end }}
      {{- if .Values.signalprocessing.fleet.oauth2.enabled }}
      oauth2:
        enabled: true
        tokenURL: {{ $signalprocessingOauth2.tokenURL | quote }}
        credentialsSecretRef: {{ $signalprocessingOauth2.credentialsSecretRef | quote }}
        {{- if $signalprocessingOauth2.scopes }}
        scopes:
          {{- range $signalprocessingOauth2.scopes }}
          - {{ . | quote }}
          {{- end }}
        {{- end }}
        tlsCAFile: {{ $signalprocessingOauth2.tlsCAFile | default (include "kubernaut.interServiceTLS.caFile" .) | quote }}
      {{- end }}
    {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: signalprocessing-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: signalprocessing-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: signalprocessing-controller
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["signalprocessings", "remediationrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["signalprocessings/status", "signalprocessings/finalizers"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- if eq $signalprocessingFleet.mcpGatewayType "kuadrant" }}
  # BR-FLEET-003 (#1511): SP's ClusterRegistry watches MCPServerRegistration
  # CRs directly via a dynamic informer to evaluate the `cluster`
  # classification dimension when the Kuadrant MCP Gateway is used.
  - apiGroups: ["mcp.kuadrant.io"]
    resources: ["mcpserverregistrations"]
    verbs: ["get", "list", "watch"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: signalprocessing-controller
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: signalprocessing-controller
subjects:
  - kind: ServiceAccount
    name: signalprocessing-controller
    namespace: {{ .Release.Namespace }}
---
# Role: namespace-scoped access to configmaps and secrets (#229)
{{ include "kubernaut.nsRoleForSecrets" (dict "name" "signalprocessing" "serviceAccount" "signalprocessing-controller" "Release" .Release "labels" (include "kubernaut.labels" .)) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signalprocessing-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: signalprocessing-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.signalprocessing.replicas }}
  selector:
    matchLabels:
      app: signalprocessing-controller
  template:
    metadata:
      labels:
        app: signalprocessing-controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: signalprocessing-controller
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.signalprocessing | nindent 8 }}
      {{- include "kubernaut.affinity" .Values.signalprocessing | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.signalprocessing "global" .Values.global) | nindent 6 }}
      containers:
        - name: signalprocessing-controller
          image: {{ include "kubernaut.image" (dict "service" "signalprocessing" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.signalprocessing | nindent 12 }}
          args:
            - "--config=/etc/signalprocessing/config.yaml"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          env:
            - name: TLS_CA_FILE
              value: {{ include "kubernaut.interServiceTLS.caFile" . | quote }}
          volumeMounts:
            - name: config
              mountPath: /etc/signalprocessing/config.yaml
              subPath: config.yaml
            - name: policy
              mountPath: /etc/signalprocessing/policies
              readOnly: true
            - name: proactive-signal-mappings
              mountPath: /etc/signalprocessing/proactive-signal-mappings.yaml
              subPath: proactive-signal-mappings.yaml
            - name: tls-ca
              mountPath: /etc/tls-ca
              readOnly: true
            {{- if .Values.signalprocessing.fleet.oauth2.enabled }}
            - name: oauth2-credentials
              mountPath: "/etc/signalprocessing/{{ $signalprocessingOauth2.credentialsSecretRef }}"
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.signalprocessing.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: signalprocessing-config
        - name: policy
          configMap:
            name: {{ .Values.signalprocessing.policies.existingConfigMap | default "signalprocessing-policy" }}
        - name: proactive-signal-mappings
          configMap:
            name: {{ .Values.signalprocessing.proactiveSignalMappings.existingConfigMap | default "signalprocessing-proactive-signal-mappings" }}
        - name: tls-ca
          configMap:
            name: inter-service-ca
            optional: true
        {{- if .Values.signalprocessing.fleet.oauth2.enabled }}
        - name: oauth2-credentials
          secret:
            secretName: {{ $signalprocessingOauth2.credentialsSecretRef }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: signalprocessing-controller-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: signalprocessing-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: signalprocessing-controller
