        component: "*"
        priority: "*"
      
      detectedLabels:
        stateful: "true"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/fix-statefulset-pvc-job@sha256:d5b0c73ab0fb4093e1e291974013660dd2e5d8e0b2016eaf94d78cf9759be500
      
