apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: image-pull-backoff-fix-credentials
spec:
  # ImagePull Fix Credentials Workflow Schema (BR-WORKFLOW-004)
  # Used by: HolmesGPT-API Integration and E2E tests
  version: "1.0.0"
  description:
    what: "Rolls back a deployment to fix ImagePullBackOff caused by credential issues"
    whenToUse: "When pods are in ImagePullBackOff due to invalid or expired registry credentials"
    whenNotToUse: "When the image genuinely does not exist in the registry"
    preconditions: "Deployment has a previous working revision"
  
  actionType: RollbackDeployment
  
  labels:
    severity: [high]
    environment: [production, staging]
    component: deployment
    priority: P1
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:9771eca86cd5b39ac22c9490a5e7e0420abe6b4576e927326edfac1ecc7e5980
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: NAMESPACE
      type: string
      required: true
      description: "Target namespace"
    - name: DEPLOYMENT_NAME
      type: string
      required: true
      description: "Name of the deployment to roll back"
    - name: REVISION
      type: integer
      required: false
      description: "Target revision to roll back to (0 = previous)"
      default: 0
