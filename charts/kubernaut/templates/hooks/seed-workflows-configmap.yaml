apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubernaut.fullname" . }}-seed-workflows
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  autoscale.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: provision-node-v1
    spec:
      # Node Provisioning Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #126 -- Cluster autoscaling (Kind + Podman)
      metadata:
        workflowId: provision-node-v1
        version: "1.0.0"
        description:
          what: "Requests provisioning of a new Kubernetes node to increase cluster capacity when pods are stuck Pending"
          whenToUse: "When pods are Pending due to insufficient cluster-wide resources (CPU, memory) and no existing node has capacity"
          whenNotToUse: "When scheduling failures are caused by taints, affinity rules, or PDB constraints rather than resource exhaustion"
          preconditions: "All schedulable nodes are at or near capacity, pending pods have resource requests that cannot be satisfied"
      
      actionType: ProvisionNode
      
      labels:
        severity: [critical, high]
        environment: [production, staging, "*"]
        component: "*"
        priority: "*"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/provision-node-job@sha256:2ce8e74486cb692e4494f00f2489461ff223cb9089f2db416fea7e55fc99a8d8
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace with pending pods"
        - name: TARGET_APP
          type: string
          required: true
          description: "Label selector value for the app with pending pods"
        - name: CLUSTER_NAME
          type: string
          required: true
          description: "Kind cluster name (for provisioner agent coordination)"
  cert-failure-gitops.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: fix-certificate-gitops-v1
    spec:
      # Fix Certificate (GitOps) Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #134 -- GitOps-managed Certificate failure -> git revert
      metadata:
        workflowId: fix-certificate-gitops-v1
        version: "1.0.0"
        description:
          what: "Reverts a bad Git commit that broke a cert-manager ClusterIssuer in a GitOps-managed environment"
          whenToUse: "When a GitOps-managed cert-manager Certificate is stuck NotReady because a recent Git commit changed the ClusterIssuer to reference a non-existent CA Secret"
          whenNotToUse: "When the environment is not GitOps-managed (use fix-certificate-v1 instead for direct kubectl remediation)"
          preconditions: "ArgoCD is active, the Gitea repository is accessible, and a previous healthy commit exists with the correct ClusterIssuer configuration"
      
      actionType: GitRevertCommit
      
      labels:
        severity: [critical, high]
        environment: ["*"]
        component: "*"
        priority: "*"
      
      detectedLabels:
        gitOpsTool: "*"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/fix-certificate-gitops-job@sha256:9c97e791e8c58397f668456f54414e263852974f85f89c0a65a1eb454f0877e1
      
      # DD-WE-006: Infrastructure dependencies provisioned by operators in kubernaut-workflows.
      # Credentials are mounted as files, NOT provided by the LLM.
      dependencies:
        secrets:
          - name: gitea-repo-creds
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace of the affected Certificate"
        - name: TARGET_RESOURCE_NAME
          type: string
          required: true
          description: "Name of the affected Certificate (for verification)"
  cert-failure.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: fix-certificate-v1
    spec:
      # Fix Certificate Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #133 -- cert-manager Certificate NotReady -> recreate CA Secret
      metadata:
        workflowId: fix-certificate-v1
        version: "1.0.0"
        description:
          what: "Recreates the CA Secret backing a cert-manager ClusterIssuer to restore certificate issuance"
          whenToUse: "When a cert-manager Certificate is stuck in NotReady because the CA Secret has been deleted or corrupted"
          whenNotToUse: "When the Certificate failure is caused by DNS validation issues or incorrect certificate spec rather than a missing CA"
          preconditions: "cert-manager is installed and the ClusterIssuer exists but cannot sign due to a missing or corrupted CA Secret"
      
      actionType: FixCertificate
      
      labels:
        severity: [critical, high]
        environment: [production, staging, "*"]
        component: "*"
        priority: "*"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/fix-certificate-job@sha256:62dc796515f3247101274c7e7e137a9275b725118c272b24ecd6711f34553936
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace of the affected Certificate"
        - name: TARGET_CERTIFICATE
          type: string
          required: true
          description: "Name of the Certificate to fix"
        - name: ISSUER_NAME
          type: string
          required: true
          description: "Name of the ClusterIssuer backing the certificate"
        - name: CA_SECRET_NAME
          type: string
          required: true
          description: "Name of the CA Secret to recreate"
        - name: CA_SECRET_NAMESPACE
          type: string
          required: false
          description: "Namespace of the CA Secret"
          default: "cert-manager"
  crashloop-helm.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: helm-rollback-v1
    spec:
      # Helm Rollback Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #135 -- Helm-managed CrashLoopBackOff -> helm rollback
      metadata:
        workflowId: helm-rollback-v1
        version: "1.0.0"
        description:
          what: "Rolls back a Helm release to its previous revision to recover from CrashLoopBackOff caused by a bad configuration change deployed via helm upgrade"
          whenToUse: "When a Helm-managed deployment enters CrashLoopBackOff immediately after a helm upgrade, and the previous Helm revision was healthy"
          whenNotToUse: "When the workload is not managed by Helm (use RollbackDeployment instead), or when the crash is caused by an external dependency failure"
          preconditions: "The Helm release has at least one previous healthy revision in its history"
      
      actionType: HelmRollback
      
      labels:
        severity: [critical, high]
        environment: [production, staging, "*"]
        component: "*"
        priority: "*"
      
      detectedLabels:
        helmManaged: "true"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/helm-rollback-job@sha256:f23baab51006d365887df8f3e23ad37ccb7fadc89f0638554d6b514e88b2964d
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace of the Helm release"
        - name: RELEASE_NAME
          type: string
          required: true
          description: "Name of the Helm release to roll back"
  crashloop.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: crashloop-rollback-v1
    spec:
      # Rollback Deployment Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #120 -- CrashLoopBackOff -> rollback to working config
      metadata:
        workflowId: crashloop-rollback-v1
        version: "1.0.1"
        description:
          what: "Rolls back a deployment to its previous revision to recover from CrashLoopBackOff caused by a bad configuration change"
          whenToUse: "When a deployment enters CrashLoopBackOff immediately after a config or image change, and the previous revision was healthy"
          whenNotToUse: "When the crash is caused by an external dependency failure (database down, network partition) rather than a local configuration change"
          preconditions: "The deployment has at least one previous healthy revision in its rollout history"
      
      actionType: RollbackDeployment
      
      labels:
        severity: [critical, low]
        environment: [production, staging, "*"]
        component: "*"
        priority: "*"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/crashloop-rollback-job@sha256:64338763a1f7fd3a771122a6491c2fc67b11524e434f2ab298c0641e4a9d81bd
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace of the affected deployment"
        - name: TARGET_DEPLOYMENT
          type: string
          required: true
          description: "Name of the deployment to roll back"
  gitops-drift.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: git-revert-v1
    spec:
      # GitOps Revert Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #125 -- GitOps drift remediation (ArgoCD + Gitea)
      metadata:
        workflowId: git-revert-v1
        version: "1.0.0"
        description:
          what: "Reverts the most recent commit in a GitOps-managed repository to undo a bad change"
          whenToUse: "When a GitOps-managed workload is crashing due to a bad commit (ConfigMap, Deployment spec, etc.) and ArgoCD/Flux will reconcile the reverted state"
          whenNotToUse: "When the environment is not GitOps-managed -- use RollbackDeployment instead"
          preconditions: "ArgoCD or Flux is active, the Gitea/GitHub repository is accessible, and a previous healthy commit exists"
      
      actionType: GitRevertCommit
      
      labels:
        severity: [critical, high]
        environment: [production, staging, "*"]
        component: "*"
        priority: "*"
      
      # Workflow-author-defined: what infrastructure characteristics this workflow REQUIRES
      # DD-WORKFLOW-001 v2.0: matched against incident DetectedLabels from HAPI LabelDetector
      detectedLabels:
        gitOpsTool: "*"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/git-revert-job@sha256:53e2a7e36b391569d3ab4cfed090bd526e836027ec35121876da3baf8edcaac5
      
      # DD-WE-006: Infrastructure dependencies provisioned by operators in kubernaut-workflows.
      # Credentials are mounted as files, NOT embedded in GIT_REPO_URL by the LLM.
      dependencies:
        secrets:
          - name: gitea-repo-creds
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace of the affected workload"
        - name: TARGET_RESOURCE_NAME
          type: string
          required: true
          description: "Name of the affected resource (for verification)"
  hpa-maxed.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: patch-hpa-v1
    spec:
      # Patch HPA Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #123 -- HPA at maxReplicas -> temporarily raise ceiling
      metadata:
        workflowId: patch-hpa-v1
        version: "1.0.0"
        description:
          what: "Temporarily increases the maxReplicas value of an HPA to allow scaling beyond the current ceiling"
          whenToUse: "When an HPA has reached its maxReplicas limit and the deployment is still under resource pressure from a legitimate traffic spike"
          whenNotToUse: "When the high CPU usage is caused by a bug (infinite loop, runaway process) rather than legitimate traffic growth"
          preconditions: "The cluster has sufficient node capacity to schedule additional pods, and the traffic spike is expected to be temporary"
      
      actionType: PatchHPA
      
      labels:
        severity: [low, medium, high, critical]
        environment: [production, staging]
        component: "*"
        priority: "*"
      
      detectedLabels:
        hpaEnabled: "true"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/patch-hpa-job@sha256:d2163627451a0eaaa5004c7ab82a731812ee0ef08695343eb91465bf17bc58f6
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace of the HPA"
        - name: TARGET_HPA
          type: string
          required: true
          description: "Name of the HPA to patch"
        - name: NEW_MAX_REPLICAS
          type: integer
          required: false
          description: "New maxReplicas value (default: current + 2)"
  memory-escalation.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: increase-memory-limits-v1
    spec:
      # Increase Memory Limits Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: Memory escalation -- increase limits to prevent OOMKill
      metadata:
        workflowId: increase-memory-limits-v1
        version: "1.0.0"
        description:
          what: "Increases the memory limits of a deployment's containers to prevent OOMKill events. Doubles the current memory limit by default."
          whenToUse: "When containers are being OOMKilled because the memory limit is too low for the workload's legitimate requirements."
          whenNotToUse: "When the OOMKill is caused by a memory leak. Increasing limits only delays the inevitable -- the application needs to be fixed. Check remediation history: if this workflow has been applied multiple times with declining effectiveness, escalate to human review."
          preconditions: "The deployment exists and containers have memory limits set. The node has sufficient allocatable memory for the increased limit."
      
      actionType: IncreaseMemoryLimits
      
      labels:
        severity: [critical, high]
        environment: [production, staging]
        component: "*"
        priority: "*"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/increase-memory-limits-job@sha256:03cb9b076d74d90d48f5c919c0f760ee566dfffc9793c89f8171a5d82123ecfe
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace of the affected deployment"
        - name: TARGET_DEPLOYMENT
          type: string
          required: true
          description: "Name of the deployment to patch"
        - name: MEMORY_INCREASE_FACTOR
          type: string
          required: false
          default: "2"
          description: "Multiplier for current memory limit (e.g., 2 means double)"
  memory-leak.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: graceful-restart-v1
    spec:
      # Graceful Restart Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #129 -- Proactive memory exhaustion -> graceful restart
      metadata:
        workflowId: graceful-restart-v1
        version: "1.0.0"
        description:
          what: "Performs a graceful rolling restart of a deployment to reset its runtime state and reclaim leaked memory"
          whenToUse: "When proactive analysis indicates a container is trending toward OOM based on memory growth rate, and a restart will reset the leak without data loss"
          whenNotToUse: "When the memory growth is from legitimate workload (cache warming, data loading) rather than a leak, or when the application cannot tolerate restarts"
          preconditions: "The deployment supports rolling restarts without data loss, and the memory growth pattern is confirmed as a leak (linear, unbounded)"
      
      actionType: GracefulRestart
      
      labels:
        severity: [low, medium, high, critical]
        environment: [production, staging]
        component: "*"
        priority: "*"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/graceful-restart-job@sha256:ff29339e9d9bb4a590a5392de0b8a7c6326932af207230b8cefc77a70b2b67e7
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace of the affected deployment"
        - name: TARGET_DEPLOYMENT
          type: string
          required: true
          description: "Name of the deployment to restart"
  mesh-routing-failure.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: fix-authz-policy-v1
    spec:
      # Fix AuthorizationPolicy Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #136 -- Linkerd AuthorizationPolicy blocks traffic -> remove/fix policy
      metadata:
        workflowId: fix-authz-policy-v1
        version: "1.0.0"
        description:
          what: "Removes or fixes a Linkerd AuthorizationPolicy that is blocking legitimate traffic"
          whenToUse: "When a Linkerd-meshed workload has high error rates (403s) due to a restrictive AuthorizationPolicy"
          whenNotToUse: "When the 403 errors are intentional (security policy) or caused by something other than an AuthorizationPolicy"
          preconditions: "Linkerd is installed, the workload is meshed, and an AuthorizationPolicy is identified as the traffic blocker"
      
      actionType: FixAuthorizationPolicy
      
      labels:
        severity: [critical, high]
        environment: ["*"]
        component: "*"
        priority: "*"
      
      detectedLabels:
        serviceMesh: "*"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/fix-authz-policy-job@sha256:e2f72645f71aac3209a0b22f5ef4f3c1912e9efbdbea4adf8b3b24a163e4529c
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace of the affected workload"
        - name: TARGET_POLICY
          type: string
          required: true
          description: "Name of the AuthorizationPolicy to remove"
        - name: TARGET_SERVER
          type: string
          required: false
          description: "Name of the Linkerd Server resource associated with the policy"
  network-policy-block.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: fix-network-policy-v1
    spec:
      # Fix NetworkPolicy Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #138 -- Deny-all NetworkPolicy blocks traffic -> remove offending policy
      metadata:
        workflowId: fix-network-policy-v1
        version: "1.0.0"
        description:
          what: "Removes a deny-all NetworkPolicy that is blocking legitimate ingress traffic and causing health check failures"
          whenToUse: "When a NetworkPolicy is blocking all ingress traffic to a workload, causing liveness/readiness probe failures"
          whenNotToUse: "When the NetworkPolicy is intentionally restrictive for security purposes and the outage has a different root cause"
          preconditions: "A deny-all NetworkPolicy exists in the namespace, and the workload's health checks are failing due to blocked traffic"
      
      actionType: FixNetworkPolicy
      
      labels:
        severity: [critical, high]
        environment: [production, staging, "*"]
        component: "*"
        priority: "*"
      
      detectedLabels:
        networkIsolated: "true"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/fix-network-policy-job@sha256:d2eeab74a2e2c6840147932ffdb22f287081f82fbe15e832e02380b62aef993a
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace of the affected workload"
        - name: TARGET_POLICY
          type: string
          required: false
          description: "Name of the offending NetworkPolicy (auto-detected if not provided)"
  node-notready.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: cordon-drain-v1
    spec:
      # Cordon + Drain Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #127 -- Node NotReady -> cordon and drain
      metadata:
        workflowId: cordon-drain-v1
        version: "1.0.0"
        description:
          what: "Cordons a NotReady node to prevent new scheduling and drains existing workloads to healthy nodes"
          whenToUse: "When a node has been in NotReady state for an extended period, indicating a persistent hardware or OS-level failure"
          whenNotToUse: "When the node is briefly NotReady due to a known transient condition (e.g., kubelet restart, brief network hiccup)"
          preconditions: "The cluster has sufficient capacity on remaining nodes to absorb the drained workloads"
      
      actionType: CordonDrainNode
      
      labels:
        severity: [critical]
        environment: [production, staging, "*"]
        component: "*"
        priority: "*"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/cordon-drain-job@sha256:3efdfea88d0d79cd06b253daf1fd648934ed0c5361d24bf88a60c523c1796b17
      
      parameters:
        - name: TARGET_NODE
          type: string
          required: true
          description: "Name of the NotReady node to cordon and drain"
  orphaned-pvc-no-action.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: cleanup-pvc-v1
    spec:
      # Cleanup PVC Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #121 -- Orphaned PVCs consuming disk -> cleanup
      metadata:
        workflowId: cleanup-pvc-v1
        version: "1.0.0"
        description:
          what: "Deletes orphaned PersistentVolumeClaims that are not mounted by any running pod"
          whenToUse: "When PVCs from completed or failed batch jobs accumulate and contribute to storage pressure"
          whenNotToUse: "When PVCs are in use by running workloads, or when the data in the PVCs needs to be preserved for compliance"
          preconditions: "The PVCs are confirmed orphaned (not mounted by any running pod) and the data does not need to be retained"
      
      actionType: CleanupPVC
      
      labels:
        severity: [low, critical]
        environment: [production, staging]
        component: "*"
        priority: "*"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/cleanup-pvc-job@sha256:255742f491ddbacfe92f06ccc2e8bfcf231215ce62cbe6ca26d259a97841c84a
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace containing the orphaned PVCs"
        - name: LABEL_SELECTOR
          type: string
          required: false
          description: "Label selector to identify PVCs to clean up (default: batch-run=completed)"
  pdb-deadlock.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: relax-pdb-v1
    spec:
      # Relax PDB Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #124 -- PDB deadlock -> temporarily relax PDB
      metadata:
        workflowId: relax-pdb-v1
        version: "1.0.0"
        description:
          what: "Temporarily relaxes a PodDisruptionBudget by reducing minAvailable to allow voluntary disruptions to proceed"
          whenToUse: "When a PDB is blocking rolling updates or node drains because minAvailable equals the replica count, leaving zero allowed disruptions"
          whenNotToUse: "When pods are genuinely unhealthy and the PDB is correctly protecting against further disruption during an outage"
          preconditions: "All pods matching the PDB selector are healthy, and the blocking is caused by an overly conservative minAvailable setting rather than actual instability"
      
      actionType: RelaxPDB
      
      labels:
        severity: [low, high, critical]
        environment: [production, staging]
        component: "*"
        priority: "*"
      
      detectedLabels:
        pdbProtected: "true"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/relax-pdb-job@sha256:4e9e13aaa0ebc42417493f629f3c53ce68129880b42150ca9d6ac3e32d54fe6d
      
      parameters:
        - name: TARGET_NAMESPACE
          type: string
          required: true
          description: "Namespace of the PDB"
        - name: TARGET_PDB
          type: string
          required: true
          description: "Name of the PDB to relax"
  pending-taint.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: remove-taint-v1
    spec:
      # Remove Taint Workflow Schema - Job Backend (BR-WORKFLOW-004)
      # Scenario: #122 -- Pods pending due to node taint -> remove taint
      metadata:
        workflowId: remove-taint-v1
        version: "1.0.0"
        description:
          what: "Removes a specific taint from a Kubernetes node to unblock pod scheduling"
          whenToUse: "When pods are stuck in Pending state because a node has a taint that blocks scheduling, and the taint is no longer needed (e.g., maintenance window ended)"
          whenNotToUse: "When the taint is intentional (e.g., node is genuinely under maintenance or has a hardware issue)"
          preconditions: "The node is otherwise healthy and the taint is the sole reason pods are unschedulable"
      
      actionType: RemoveTaint
      
      labels:
        severity: [low, medium, high, critical]
        environment: [production, staging, "*"]
        component: "*"
        priority: "*"
      
      execution:
        engine: job
        bundle: quay.io/kubernaut-cicd/test-workflows/remove-taint-job@sha256:4055ea8f483abec1cb7d7567fc529c65f4250e74ff9ae9d92e2b6ff485b580e2
      
      parameters:
        - name: TARGET_NODE
          type: string
          required: true
          description: "Name of the node with the taint to remove"
        - name: TAINT_KEY
          type: string
          required: true
          description: "Key of the taint to remove (e.g., 'maintenance')"
  slo-burn.yaml: |
    apiVersion: kubernaut.ai/v1alpha1
    kind: RemediationWorkflow
    metadata:
      name: proactive-rollback-v1
    spec:
      # Proactive Rollback Workflow Schema - Job Backend (BR-WORKFLOW-004)
