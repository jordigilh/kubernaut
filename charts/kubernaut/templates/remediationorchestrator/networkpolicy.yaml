{{- if and .Values.networkPolicies.enabled .Values.networkPolicies.remediationorchestrator.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
{{ include "kubernaut.np.metadata" (dict "root" $ "nameSuffix" "remediationorchestrator" "appLabel" "remediationorchestrator-controller") }}
spec:
  podSelector:
    matchLabels:
      app: remediationorchestrator-controller
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- include "kubernaut.np.metricsIngress" $ | nindent 4 }}
  egress:
    {{- include "kubernaut.np.commonEgress" . | nindent 4 }}
    {{- include "kubernaut.np.datastorageEgress" . | nindent 4 }}
{{- end }}
