{{/*
  Infrastructure credentials — auto-generated when no existingSecret is provided.
  Uses lookup + randAlphaNum (Bitnami pattern):
    - First install:  random password generated once, shared between postgresql-secret and datastorage-db-secret
    - Upgrade:        lookup retrieves existing Secret, preserves password
    - helm template:  lookup returns nil, always generates (expected)
  Production: set existingSecret to skip auto-generation entirely.

  IMPORTANT: postgresql-secret and datastorage-db-secret MUST share the same password.
  A single $pgPassword variable is generated and reused for both secrets.
*/}}

{{/* Generate or retrieve the PostgreSQL password once for consistency */}}
{{- $pgExisting := (lookup "v1" "Secret" .Release.Namespace "postgresql-secret") }}
{{- $pgPassword := "" }}
{{- if $pgExisting }}
  {{- $pgPassword = (index $pgExisting.data "POSTGRES_PASSWORD" | b64dec) }}
{{- else }}
  {{- $pgPassword = (randAlphaNum 24) }}
{{- end }}

{{- if .Values.postgresql.enabled }}
{{- if not .Values.postgresql.auth.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgresql
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if $pgExisting }}
  {{- toYaml $pgExisting.data | nindent 2 }}
  {{- else }}
  POSTGRES_USER: {{ .Values.postgresql.auth.username | default "slm_user" | b64enc }}
  POSTGRES_PASSWORD: {{ $pgPassword | b64enc }}
  POSTGRES_DB: {{ .Values.postgresql.auth.database | default "action_history" | b64enc }}
  {{- end }}
{{- end }}
{{- end }}
---
{{- if not .Values.datastorage.dbExistingSecret }}
{{- $dsExisting := (lookup "v1" "Secret" .Release.Namespace "datastorage-db-secret") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: datastorage-db-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app: datastorage
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
{{- if $dsExisting }}
data:
  {{- toYaml $dsExisting.data | nindent 2 }}
{{- else }}
stringData:
  db-secrets.yaml: |
    username: {{ .Values.postgresql.auth.username | default "slm_user" }}
    password: {{ $pgPassword }}
{{- end }}
{{- end }}
---
{{- if .Values.valkey.enabled }}
{{- if not .Values.valkey.existingSecret }}
{{- $secretName := "valkey-secret" }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: valkey
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
{{- if $existing }}
data:
  {{- toYaml $existing.data | nindent 2 }}
{{- else }}
stringData:
  valkey-secrets.yaml: |
    password: {{ randAlphaNum 24 }}
{{- end }}
{{- end }}
{{- end }}
