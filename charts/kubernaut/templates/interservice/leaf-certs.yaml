{{- if eq .Values.tls.mode "cert-manager" }}
# DD-PLATFORM-001: leaf certificates for inter-service mTLS, issued by the
# dedicated internal CA (templates/interservice/ca.yaml), not by
# tls.certManager.issuerRef. ECDSA P-256 and DNS SANs mirror hook mode's
# per-service certs exactly (tls-cert-job.yaml Section 2), so consumers
# behave identically regardless of tls.mode.
{{- range $i, $cert := list
    (dict "name" "gateway-tls" "dnsNameBase" "gateway-service")
    (dict "name" "datastorage-tls" "dnsNameBase" "data-storage-service")
    (dict "name" "kubernautagent-tls" "dnsNameBase" "kubernaut-agent")
  }}
{{- if $i }}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $cert.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "kubernaut.labels" $ | nindent 4 }}
  annotations:
    {{- if not $i }}
    # DD-PLATFORM-003: leaf Certificates render in ArgoCD's "-1" sync-wave so
    # the Secret they produce already exists before the consuming Deployment
    # (default wave "0") mounts it as `optional: true` -- otherwise the
    # volume mounts empty and kubelet never retroactively populates it.
    {{- end }}
    "argocd.argoproj.io/sync-wave": "-1"
spec:
  secretName: {{ $cert.name }}
  {{- if not $i }}
  duration: 8760h   # 365 days
  renewBefore: 720h  # 30 days
  {{- else }}
  duration: 8760h
  renewBefore: 720h
  {{- end }}
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: kubernaut-interservice-ca-issuer
    kind: Issuer
    group: cert-manager.io
  dnsNames:
    - {{ $cert.dnsNameBase }}
    - {{ $cert.dnsNameBase }}.{{ $.Release.Namespace }}
    - {{ $cert.dnsNameBase }}.{{ $.Release.Namespace }}.svc
    - {{ $cert.dnsNameBase }}.{{ $.Release.Namespace }}.svc.cluster.local
{{- end }}
{{- end }}
