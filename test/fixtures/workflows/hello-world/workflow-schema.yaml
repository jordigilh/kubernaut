apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: test-hello-world
spec:
  # Hello World Test Workflow Schema (BR-WORKFLOW-004)
  # Used by: WorkflowExecution E2E
  metadata:
    workflowName: test-hello-world
    version: "1.0.0"
    description:
      what: "Simple hello-world workflow for testing the execution pipeline"
      whenToUse: "For E2E validation of workflow registration and execution"
      whenNotToUse: "Not intended for production use"
      preconditions: "Tekton Pipelines installed in the cluster"
  
  actionType: RestartPod
  
  labels:
    severity: [low]
    environment: [test]
    component: deployment
    priority: P3
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:adfc09ea45a5b627550c6a73fe75d50efe1c80fa43359fcc4908c9c5b0639ac3
  
  parameters:
    - name: TARGET_RESOURCE
      type: string
      required: true
      description: "Target resource identifier"
      default: "test/deployment/hello"
    - name: MESSAGE
      type: string
      required: false
      description: "Message to print during execution"
      default: "Hello from Kubernaut WorkflowExecution!"
