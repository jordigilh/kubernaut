    <rect x="532" y="198" width="24" height="24" rx="6" fill="#2563EB" opacity="0.12"/>
    <text x="544" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">LLM</text>
    <text x="566" y="204" font-weight="600" fill="#1D4ED8">LLM-powered RCA</text>
    <text x="566" y="222" fill="#475569" font-size="11">Actual diagnosis, not pattern matching or rules</text>

    <rect x="524" y="244" width="372" height="48" rx="8" fill="#EFF6FF"/>
    <rect x="532" y="256" width="24" height="24" rx="6" fill="#2563EB" opacity="0.12"/>
    <text x="544" y="273" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">DDP</text>
    <text x="566" y="262" font-weight="600" fill="#1D4ED8">Signal deduplication</text>
    <text x="566" y="280" fill="#475569" font-size="11">50 identical alerts -&gt; 1 remediation request</text>

    <rect x="524" y="302" width="372" height="48" rx="8" fill="#EFF6FF"/>
    <rect x="532" y="314" width="24" height="24" rx="6" fill="#2563EB" opacity="0.12"/>
    <text x="544" y="331" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">WF</text>
    <text x="566" y="320" font-weight="600" fill="#1D4ED8">Workflow execution</text>
    <text x="566" y="338" fill="#475569" font-size="11">Tekton Pipelines, K8s Jobs, Ansible (AWX/AAP)</text>

    <rect x="524" y="360" width="372" height="48" rx="8" fill="#EFF6FF"/>
    <rect x="532" y="372" width="24" height="24" rx="6" fill="#2563EB" opacity="0.12"/>
    <text x="544" y="389" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">OPA</text>
    <text x="566" y="378" font-weight="600" fill="#1D4ED8">Safety controls</text>
    <text x="566" y="396" fill="#475569" font-size="11">OPA policies, RBAC, human approval gates</text>

    <rect x="524" y="418" width="372" height="48" rx="8" fill="#EFF6FF"/>
    <rect x="532" y="430" width="24" height="24" rx="6" fill="#2563EB" opacity="0.12"/>
    <text x="544" y="447" text-anchor="middle" font-size="10" font-weight="700" fill="#2563EB">EA</text>
    <text x="566" y="436" font-weight="600" fill="#1D4ED8">Effectiveness verification</text>
    <text x="566" y="454" fill="#475569" font-size="11">Health checks, alert resolution, scoring feedback</text>
