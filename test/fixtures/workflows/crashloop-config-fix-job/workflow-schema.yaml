apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: crashloop-config-fix-v1
spec:
  # CrashLoop Config Fix Workflow Schema - Job Backend (BR-WORKFLOW-004)
  # Used by: FullPipeline E2E (execution.engine: job)
  version: "1.0.0"
  description:
    what: "Restarts deployment to recover from CrashLoopBackOff caused by configuration issues"
    whenToUse: "When pods are in CrashLoopBackOff due to misconfiguration"
    whenNotToUse: "When crash is caused by a persistent code bug"
    preconditions: "Pod is managed by a Deployment"
  
  actionType: RestartDeployment
  
  labels:
    severity: [high, medium]
    environment: [production, staging, test]
    component: "*"
    priority: "*"
  
  execution:
    engine: job
    bundle: quay.io/kubernaut-cicd/test-workflows/crashloop-config-fix-job:v1.0.0-exec@sha256:a0ad0d5c896dfcdccbbc585f183b1d6936fe0c7783f16c72127dd52d5b7e7994
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: NAMESPACE
      type: string
      required: true
      description: "Target namespace"
    - name: DEPLOYMENT_NAME
      type: string
      required: true
      description: "Name of the deployment to restart"
    - name: GRACE_PERIOD_SECONDS
      type: integer
      required: false
      description: "Graceful shutdown period in seconds"
      default: 30
      minimum: 0
      maximum: 300
