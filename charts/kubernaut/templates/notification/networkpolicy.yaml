{{- if and .Values.networkPolicies.enabled .Values.networkPolicies.notification.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubernaut.fullname" . }}-notification
  namespace: {{ .Release.Namespace }}
  labels:
    app: notification-controller
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: notification-controller
      control-plane: controller-manager
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- include "kubernaut.np.metricsIngress" $ | nindent 4 }}
  egress:
    {{- include "kubernaut.np.commonEgress" . | nindent 4 }}
    {{- include "kubernaut.np.datastorageEgress" . | nindent 4 }}
    {{- if .Values.networkPolicies.externalWebhooks.cidr }}
    - ports:
        - port: {{ .Values.networkPolicies.externalWebhooks.port | default 443 }}
          protocol: TCP
      to:
        - ipBlock:
            cidr: {{ .Values.networkPolicies.externalWebhooks.cidr }}
    {{- end }}
{{- end }}
