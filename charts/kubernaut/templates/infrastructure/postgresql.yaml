{{- if .Values.postgresql.enabled }}
# DD-PLATFORM-003: PostgreSQL renders in ArgoCD's "-1" sync-wave (ahead of the
# default "0" application controllers) -- db-migration and DataStorage's own
# wait-for-postgres initContainer both need it Ready before their wave can
# proceed, and running it concurrently with ~14 application controllers was
# a measured contributor to CI resource-contention pod restarts.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgresql
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-1"
automountServiceAccountToken: false
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgresql
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-1"
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: postgresql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgresql
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-1"
spec:
  replicas: {{ .Values.postgresql.replicas | default 1 }}
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      serviceAccountName: postgresql
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.mergedSecurityContext" (dict "override" .Values.postgresql.podSecurityContext "defaults" (dict "seccompProfile" (dict "type" "RuntimeDefault"))) | nindent 8 }}
      {{- include "kubernaut.affinity" (dict "component" .Values.postgresql "matchLabels" (dict "app" "postgresql")) | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.postgresql "global" .Values.global) | nindent 6 }}
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "kubernaut.mergedSecurityContext" (dict "override" .Values.postgresql.containerSecurityContext "defaults" (dict "allowPrivilegeEscalation" false)) | nindent 12 }}
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: {{ include "kubernaut.postgresql.envVarUser" . }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernaut.postgresql.secretName" . }}
                  key: POSTGRES_USER
            - name: {{ include "kubernaut.postgresql.envVarPassword" . }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernaut.postgresql.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: {{ include "kubernaut.postgresql.envVarDatabase" . }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernaut.postgresql.secretName" . }}
                  key: POSTGRES_DB
            - name: PGDATA
              value: {{ include "kubernaut.postgresql.dataDir" . }}/pgdata
          volumeMounts:
            - name: postgresql-data
              mountPath: {{ include "kubernaut.postgresql.dataDir" . }}
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.auth.username | quote }}, "-d", {{ .Values.postgresql.auth.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.auth.username | quote }}, "-d", {{ .Values.postgresql.auth.database | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: postgresql-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-data
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgresql
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
    "argocd.argoproj.io/sync-wave": "-1"
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.postgresql.storage.storageClassName }}
  storageClassName: {{ .Values.postgresql.storage.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgresql.storage.size }}
{{- end }}
