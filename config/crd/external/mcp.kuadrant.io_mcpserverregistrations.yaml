---
# Minimal MCPServerRegistration CRD for envtest.
# This is an external Kuadrant CRD; only the fields needed by
# registry.CRDWatcher and registry.ExtractClusterInfo are defined.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcpserverregistrations.mcp.kuadrant.io
spec:
  group: mcp.kuadrant.io
  names:
    kind: MCPServerRegistration
    listKind: MCPServerRegistrationList
    plural: mcpserverregistrations
    singular: mcpserverregistration
    shortNames:
      - mcpreg
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                endpoint:
                  type: string
                  description: MCP endpoint URL for the cluster.
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                endpoint:
                  type: string
                  description: Resolved MCP endpoint URL (set by the controller).
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
