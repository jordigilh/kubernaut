{{- if .Values.apifrontend.enabled }}
{{- $apifrontendFleetPreamble := include "kubernaut.fleet.preamble" (dict "root" $ "fleet" .Values.apifrontend.fleet "oauth2" .Values.apifrontend.fleet.oauth2) | fromYaml }}
{{- if and .Values.apifrontend.fleet.enabled .Values.apifrontend.fleet.oauth2.enabled }}
{{- if not $apifrontendFleetPreamble.oauth2.tokenURL }}
{{- fail "apifrontend.fleet.oauth2.tokenURL is required when apifrontend.fleet.oauth2.enabled=true (set it directly, or set global.fleet.oauth2.tokenURL if shared across services)" }}
{{- end }}
{{- if not $apifrontendFleetPreamble.oauth2.credentialsSecretRef }}
{{- fail "apifrontend.fleet.oauth2.credentialsSecretRef is required when apifrontend.fleet.oauth2.enabled=true (Secret must contain keys: client-id, client-secret; set it directly, or set global.fleet.oauth2.credentialsSecretRef if shared across services)" }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apifrontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apifrontend
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["investigationsessions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["investigationsessions/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationapprovalrequests"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationapprovalrequests/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "create", "patch"]
  - apiGroups: [""]
    resources: ["pods", "replicationcontrollers", "services", "endpoints", "configmaps", "secrets", "namespaces", "nodes", "persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["aianalyses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  {{- if eq $apifrontendFleetPreamble.config.mcpGatewayType "kuadrant" }}
  # BR-FLEET-054: AF's ClusterRegistry watches MCPServerRegistration CRs
  # directly via a dynamic informer when the Kuadrant MCP Gateway is used.
  - apiGroups: ["mcp.kuadrant.io"]
    resources: ["mcpserverregistrations"]
    verbs: ["get", "list", "watch"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: apifrontend
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: apifrontend
subjects:
  - kind: ServiceAccount
    name: apifrontend
    namespace: {{ .Release.Namespace }}
---
# RoleBinding granting AF SA access to KA service (trusted intermediary, #1287)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: apifrontend-kubernaut-agent-access
  namespace: {{ .Release.Namespace }}
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernaut-agent-client
subjects:
  - kind: ServiceAccount
    name: apifrontend
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apifrontend-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      port: {{ .Values.apifrontend.config.server.httpPort | default 8443 }}
      metricsPort: {{ .Values.apifrontend.config.server.metricsPort | default 9090 }}
      healthPort: {{ .Values.apifrontend.config.server.healthPort | default 8081 }}
    agent:
      kaBaseURL: "https://kubernaut-agent.{{ .Release.Namespace }}.svc:8443"
      dsBearerTokenFile: "/var/run/secrets/kubernetes.io/serviceaccount/token"
    session:
      namespace: {{ .Release.Namespace }}
      disconnectTTL: {{ .Values.apifrontend.config.session.disconnectTTL | default "10m" }}
      retentionTTL: {{ .Values.apifrontend.config.session.retentionTTL | default "720h" }}
    severityTriage:
      cacheTTLSeconds: {{ .Values.apifrontend.config.severityTriage.cacheTTLSeconds | default 30 }}
      llmConfidence: {{ .Values.apifrontend.config.severityTriage.llmConfidence | default 0.7 }}
    auth:
      {{- with .Values.apifrontend.config.auth.issuerURL }}
      issuerURL: {{ . | quote }}
      {{- end }}
      {{- with .Values.apifrontend.config.auth.audience }}
      audience: {{ . | quote }}
      {{- end }}
      {{- with .Values.apifrontend.config.auth.jwtProviders }}
      jwtProviders:
      {{- range . }}
        - name: {{ .name | quote }}
          issuerURL: {{ .issuerURL | quote }}
          {{- with .jwksURL }}
          jwksURL: {{ . | quote }}
          {{- end }}
          audiences:
          {{- range .audiences }}
            - {{ . | quote }}
          {{- end }}
          {{- with .claimMappings }}
          claimMappings:
            {{- with .username }}
            username: {{ . | quote }}
            {{- end }}
            {{- with .groups }}
            groups: {{ . | quote }}
            {{- end }}
          {{- end }}
      {{- end }}
      {{- end }}
      {{- if .Values.apifrontend.config.auth.replayCache.enabled }}
      # GAP-08 (Issue #1505): distributed jti replay cache shared across all
      # APIFrontend replicas via the cluster's Valkey instance.
      replayCache:
        backend: redis
        redisAddr: {{ include "kubernaut.valkey.addr" . }}
        redisDB: {{ .Values.apifrontend.config.auth.replayCache.redisDB | default 1 }}
        credentialsPath: "/etc/apifrontend/valkey/valkey-secrets.yaml"
      {{- end }}
    rbac:
      sarCacheTTL: {{ .Values.apifrontend.config.rbac.sarCacheTTL | default "30s" }}
    logging:
      level: {{ .Values.apifrontend.logging.level | default "INFO" }}
      format: json
    {{- if .Values.apifrontend.fleet.enabled }}
    fleet:
      enabled: true
      mcpGatewayEndpoint: {{ $apifrontendFleetPreamble.config.mcpGatewayEndpoint | quote }}
      {{- if $apifrontendFleetPreamble.config.mcpGatewayType }}
      mcpGatewayType: {{ $apifrontendFleetPreamble.config.mcpGatewayType | quote }}
      {{- end }}
      tlsCAFile: {{ $apifrontendFleetPreamble.config.tlsCAFile | default (include "kubernaut.interServiceTLS.caFile" .) | quote }}
      {{- if .Values.apifrontend.fleet.oauth2.enabled }}
      oauth2:
        enabled: true
        tokenURL: {{ $apifrontendFleetPreamble.oauth2.tokenURL | quote }}
        credentialsSecretRef: {{ $apifrontendFleetPreamble.oauth2.credentialsSecretRef | quote }}
        {{- if $apifrontendFleetPreamble.oauth2.scopes }}
        scopes:
          {{- range $apifrontendFleetPreamble.oauth2.scopes }}
          - {{ . | quote }}
          {{- end }}
        {{- end }}
        tlsCAFile: {{ $apifrontendFleetPreamble.oauth2.tlsCAFile | default (include "kubernaut.interServiceTLS.caFile" .) | quote }}
      {{- end }}
    {{- end }}
---
# Per-persona ClusterRoles for SAR-based tool authorization.
# The AF performs SubjectAccessReview checks against verb=use, group=kubernaut.ai,
# resource=tools, name=<toolName>. Bind these ClusterRoles to OIDC groups via
# ClusterRoleBindings to grant tool access per persona.
{{- range $persona, $tools := .Values.apifrontend.config.rbac.personas }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernaut-tool-{{ $persona }}
  labels:
    kubernaut.ai/component: tool-authorization
    {{- include "kubernaut.labels" $ | nindent 4 }}
rules:
  - apiGroups: ["kubernaut.ai"]
    resources: ["tools"]
    verbs: ["use"]
    resourceNames:
      {{- range $tools }}
      - {{ . }}
      {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apifrontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apifrontend.replicas | default 1 }}
  selector:
    matchLabels:
      app: apifrontend
  template:
    metadata:
      labels:
        app: apifrontend
    spec:
      serviceAccountName: apifrontend
      automountServiceAccountToken: true
      {{- include "kubernaut.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "kubernaut.podSecurityContext" .Values.apifrontend | nindent 8 }}
      {{- include "kubernaut.affinity" (dict "component" .Values.apifrontend "matchLabels" (dict "app" "apifrontend")) | nindent 6 }}
      {{- include "kubernaut.scheduling" (dict "component" .Values.apifrontend "global" .Values.global) | nindent 6 }}
      containers:
        - name: apifrontend
          image: {{ include "kubernaut.image" (dict "service" "apifrontend" "global" .Values.global "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            {{- include "kubernaut.containerSecurityContext" .Values.apifrontend | nindent 12 }}
          ports:
            - name: https
              containerPort: {{ .Values.apifrontend.config.server.httpPort | default 8443 }}
            - name: metrics
              containerPort: {{ .Values.apifrontend.config.server.metricsPort | default 9090 }}
            - name: health
              containerPort: {{ .Values.apifrontend.config.server.healthPort | default 8081 }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config
              mountPath: /etc/apifrontend
              readOnly: true
            - name: tls-certs
              mountPath: /etc/apifrontend/tls
              readOnly: true
            {{- if .Values.apifrontend.config.auth.replayCache.enabled }}
            - name: valkey-secrets
              mountPath: /etc/apifrontend/valkey
              readOnly: true
            {{- end }}
            {{- if .Values.apifrontend.fleet.enabled }}
            {{- include "kubernaut.tlsCaVolumeMount" . | nindent 12 }}
            {{- if .Values.apifrontend.fleet.oauth2.enabled }}
            - name: oauth2-credentials
              mountPath: "/etc/apifrontend/{{ $apifrontendFleetPreamble.oauth2.credentialsSecretRef }}"
              readOnly: true
            {{- end }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.apifrontend.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: apifrontend-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: tls-certs
          secret:
            secretName: apifrontend-tls
            optional: true
        {{- if .Values.apifrontend.config.auth.replayCache.enabled }}
        - name: valkey-secrets
          secret:
            secretName: {{ include "kubernaut.valkey.secretName" . }}
            items:
              - key: valkey-secrets.yaml
                path: valkey-secrets.yaml
        {{- end }}
        {{- if .Values.apifrontend.fleet.enabled }}
        {{- include "kubernaut.tlsCaVolume" . | nindent 8 }}
        {{- if .Values.apifrontend.fleet.oauth2.enabled }}
        - name: oauth2-credentials
          secret:
            secretName: {{ $apifrontendFleetPreamble.oauth2.credentialsSecretRef }}
        {{- end }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: apifrontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: apifrontend
    {{- include "kubernaut.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.apifrontend.config.server.metricsPort | default 9090 }}"
spec:
  type: ClusterIP
  ports:
    - name: https
      port: {{ .Values.apifrontend.config.server.httpPort | default 8443 }}
      targetPort: https
    - name: metrics
      port: {{ .Values.apifrontend.config.server.metricsPort | default 9090 }}
      targetPort: metrics
    - name: health
      port: {{ .Values.apifrontend.config.server.healthPort | default 8081 }}
      targetPort: health
  selector:
    app: apifrontend
{{- end }}
