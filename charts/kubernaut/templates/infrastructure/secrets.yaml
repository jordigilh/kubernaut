{{/*
  PostgreSQL credentials validation.
  Requires a pre-created Secret — the chart never creates Secrets containing passwords.
*/}}
{{- if .Values.postgresql.enabled }}
{{- if not .Values.postgresql.auth.existingSecret }}
{{- fail "postgresql.auth.existingSecret is required. Pre-create a Secret with POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB keys." }}
{{- end }}
{{- else }}
{{- if not .Values.externalPostgresql.auth.existingSecret }}
{{- fail "externalPostgresql.auth.existingSecret is required when postgresql.enabled=false. Pre-create a Secret with POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB keys." }}
{{- end }}
{{- end }}
---
{{/*
  DataStorage DB secret validation.
  Requires datastorage.dbExistingSecret — the chart never creates Secrets containing passwords.
*/}}
{{- if not .Values.datastorage.dbExistingSecret }}
{{- fail "datastorage.dbExistingSecret is required. Pre-create a Secret with a db-secrets.yaml key containing 'username: <user>\npassword: <pass>'." }}
{{- end }}
---
{{/*
  Valkey credentials validation.
  Requires a pre-created Secret — the chart never creates Secrets containing passwords.
*/}}
{{- if .Values.valkey.enabled }}
{{- if not .Values.valkey.existingSecret }}
{{- fail "valkey.existingSecret is required. Pre-create a Secret with a valkey-secrets.yaml key containing 'password: <pass>'." }}
{{- end }}
{{- else }}
{{- if not .Values.externalValkey.existingSecret }}
{{- fail "externalValkey.existingSecret is required when valkey.enabled=false. Pre-create a Secret with a valkey-secrets.yaml key containing 'password: <pass>'." }}
{{- end }}
{{- end }}
