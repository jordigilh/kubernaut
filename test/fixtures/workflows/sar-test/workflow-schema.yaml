apiVersion: kubernaut.ai/v1alpha1
kind: RemediationWorkflow
metadata:
  name: sar-test-v1
spec:
  # SAR Test Workflow Schema (BR-WORKFLOW-004)
  # Used by: DataStorage E2E — 23_sar_access_control_test.go (DD-AUTH-012)
  version: "1.0.0"
  description:
    what: "Test workflow for SubjectAccessReview and user attribution validation"
    whenToUse: "For E2E testing of SAR-based access control on workflow catalog"
    whenNotToUse: "Not intended for production use"
    preconditions: "DataStorage service running with RBAC configured"
  
  actionType: RestartPod
  
  labels:
    severity: [high]
    environment: [test]
    component: deployment
    priority: P2
  
  execution:
    engine: tekton
    bundle: quay.io/kubernaut-cicd/test-workflows/placeholder-execution:v1.0.0@sha256:c7583414d1d027de60adb1bd0fac2f1550c3c449365c480fc39a4cab7e39f190
  
  parameters:
    - name: TARGET_RESOURCE_NAME
      type: string
      required: true
      description: "Name of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_KIND
      type: string
      required: true
      description: "Kind of the root managing resource (KA-injected)"
    - name: TARGET_RESOURCE_NAMESPACE
      type: string
      required: true
      description: "Namespace of the root managing resource (KA-injected)"
    - name: NAMESPACE
      type: string
      required: true
      description: "Target namespace"
    - name: DEPLOYMENT_NAME
      type: string
      required: true
      description: "Name of the deployment to restart"
